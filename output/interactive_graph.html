#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p-eA<\/text>\n<text x=\"242.0\" y=\"338.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> - eA<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_3\">\n<title id=\"title-n8_3\">Minimal coupling<\/title>\n<defs>\n\n<marker id=\"n8_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"190.0\" y1=\"164.0\" x2=\"216.0\" y2=\"146.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"228.0\" y1=\"218.0\" x2=\"262.0\" y2=\"210.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"190.0\" y1=\"286.0\" x2=\"220.0\" y2=\"262.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<path d=\"M70,346 C142,260 214,306 286,218\" fill=\"none\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"164.0\" cy=\"292.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"62.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"184.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"226.0\" y=\"264.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">eA<\/text>\n<line x1=\"278.0\" y1=\"252.0\" x2=\"356.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p-eA<\/text>\n<text x=\"242.0\" y=\"338.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> - eA<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "Free momentum p enters an A-dependent coupling rule.", "svg_detail_caption": "Minimal coupling introduces electromagnetism by replacing free momentum with p_mu - e A_mu, so motion responds to the vector potential.", "study_questions": [{"question": "In a Lagrangian, the replacement from free-particle momentum to an electromagnetic-coupled expression is made with the least extra structure needed to respect gauge symmetry. What idea is being used?\n\nA. Mass-energy equivalence\nB. Light-cone classification\nC. Radiation reaction\nD. Minimal coupling", "answer": "D. This is minimal coupling.\n\nIt introduces electromagnetic interaction through the potential in the simplest gauge-compatible way, for example through combinations related to \\(p_\\mu-eA_\\mu\\)."}, {"question": "Why does minimal coupling help explain the difference between canonical and mechanical momentum?", "answer": "When a charged particle couples to the vector potential, the Lagrangian or momentum structure contains potential-dependent terms. The canonical momentum is defined from the Lagrangian, so it can include \\(A_\\mu\\)-dependent pieces, while mechanical momentum tracks the particle's motion."}, {"question": "In one component, suppose a gauge-covariant momentum combination is\n\\[ p-eA. \\]\nIf \\(p=10\\), \\(e=2\\), and \\(A=3\\), what is \\(p-eA\\)?", "answer": "Substitute the values:\n\\[ p-eA=10-2(3)=10-6=4. \\]\nThe interaction with the potential changes the momentum combination that enters the coupled dynamics."}]}, "8.4": {"label": "Lorentz force law", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "The Lorentz force law is the relativistic equation of motion for a charged particle in an electromagnetic field. In covariant form it relates the rate of change of \\cref{Momentum four-vector}{4.5} to the \\cref{Field tensor}{7.2} and the particle's \\cref{Velocity four-vector}{4.4}.", "derivation_new": "Starting from the \\cref{Action principle}{5.2} with \\cref{Minimal coupling}{8.3}, varying the charged particle worldline gives the covariant force equation \\[ \\frac{dp^\\mu}{d\\tau}=eF^\\mu{}_{\\nu}U^\\nu, \\] up to conventional placement of indices and unit factors. Here \\(p^\\mu\\) is the \\cref{Momentum four-vector}{4.5}, \\(U^\\nu\\) is the \\cref{Velocity four-vector}{4.4}, and \\(F^\\mu{}_{\\nu}\\) is formed from the \\cref{Field tensor}{7.2}. In three-vector form this contains \\[ \\mathbf F=e(\\mathbf E+\\mathbf v\\times\\mathbf B). \\]", "explanation_new": "The Lorentz force law is the bridge from field to particle motion. In three-vector form it says electric fields push charges along the field and magnetic fields deflect moving charges sideways. In covariant form the same statement becomes one compact equation involving \\(F^\\mu{}_{\\nu}\\), four-velocity, and four-momentum. The compact notation is not just elegance; it shows that electric and magnetic forces are components of one relativistic interaction. A charge at rest in an electric field and a moving charge curving in a magnetic field are two familiar faces of the same law.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<text x=\"258.0\" y=\"388.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">q F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan> u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> → dp<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan>/dτ<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<text x=\"258.0\" y=\"388.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">q F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan> u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> → dp<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan>/dτ<\/text>\n<\/svg>", "svg_icon_caption": "A particle with velocity u in field F receives a momentum change dp.", "svg_detail_caption": "The Lorentz force law uses charge, field tensor, and four-velocity to determine the particle's momentum change dp^mu/dtau.", "study_questions": [{"question": "A charged particle moving parallel to a magnetic field feels no magnetic part of the Lorentz force, but an electric field can still accelerate it. Which expression captures both effects?\n\nA. \\(m\\mathbf v\\)\nB. \\(e(\\mathbf E+\\mathbf v\\times\\mathbf B)\\)\nC. \\(\\nabla\\cdot\\mathbf B\\)\nD. \\(\\partial_\\mu A^\\mu\\)", "answer": "B. The Lorentz force is\n\\[ \\mathbf F=e(\\mathbf E+\\mathbf v\\times\\mathbf B). \\]\nThe magnetic part depends on the cross product, so it vanishes when \\(\\mathbf v\\) is parallel to \\(\\mathbf B\\)."}, {"question": "What is the covariant meaning of the Lorentz force law?", "answer": "Covariantly, the field tensor acts on the particle's velocity four-vector to change its momentum four-vector:\n\\[ \\frac{dp^\\mu}{d\\tau}=eF^\\mu{}_{\\nu}U^\\nu. \\]\nThis packages electric and magnetic force effects into one relativistic equation."}, {"question": "A particle with charge \\(e=2\\) has velocity \\(\\mathbf v=(1,0,0)\\). The fields are \\(\\mathbf E=(0,3,0)\\) and \\(\\mathbf B=(0,0,4)\\) in compatible units. Compute \\(\\mathbf F=e(\\mathbf E+\\mathbf v\\times\\mathbf B)\\).", "answer": "First compute the cross product:\n\\[ \\mathbf v\\times\\mathbf B=(1,0,0)\\times(0,0,4)=(0,-4,0). \\]\nThen\n\\[ \\mathbf E+\\mathbf v\\times\\mathbf B=(0,3,0)+(0,-4,0)=(0,-1,0). \\]\nMultiplying by \\(e=2\\):\n\\[ \\mathbf F=(0,-2,0). \\]"}]}, "8.5": {"label": "Charge conservation", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "Charge conservation is the local statement that electric charge cannot appear or disappear. In relativistic notation it is written as the continuity equation for the \\cref{Four-current}{7.6}: \\[ \\partial_\\mu j^\\mu=0. \\]", "derivation_new": "Charge conservation follows from the sourced \\cref{Maxwell's equations}{7.7}. Taking the divergence of \\[ \\partial_\\mu F^{\\mu\\nu}=\\mu_0 j^\\nu \\] gives \\[ \\partial_\\nu\\partial_\\mu F^{\\mu\\nu}=\\mu_0\\partial_\\nu j^\\nu. \\] The left-hand side vanishes because \\(F^{\\mu\\nu}\\) is antisymmetric while the double derivative is symmetric in \\(\\mu\\) and \\(\\nu\\). Therefore \\[ \\partial_\\mu j^\\mu=0. \\] This is the covariant continuity equation for the \\cref{Four-current}{7.6}.", "explanation_new": "Charge conservation is local bookkeeping. It does not merely say the total charge of the universe stays fixed; it says charge cannot disappear from a small box unless current flows through the boundary. The continuity equation expresses that point-by-point accounting. In Maxwell theory it also follows from the antisymmetry of the field tensor, so it is built into the consistency of the equations. If charge density in a small region decreases, the equation demands an outward current. The charge went somewhere; it did not vanish at an event.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_5\">\n<title id=\"title-n8_5\">Charge conservation<\/title>\n<defs>\n\n<marker id=\"n8_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"150.0\" y=\"142.0\" width=\"180.0\" height=\"180.0\" rx=\"12.0\" fill=\"#fff6f6\" stroke=\"#222222\" stroke-width=\"4\"/>\n<circle cx=\"196.0\" cy=\"198.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>
