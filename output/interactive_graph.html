erif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"76.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"332.0\" y1=\"206.0\" x2=\"332.0\" y2=\"398.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"8 9\" stroke-linecap=\"round\"/>\n<line x1=\"92.0\" y1=\"206.0\" x2=\"332.0\" y2=\"206.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"8 9\" stroke-linecap=\"round\"/>\n<path d=\"M344,274 C324,278.75 324,346.75 344,345\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<path d=\"M438,274 C458,278.75 458,346.75 438,345\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<text x=\"391.0\" y=\"300.8\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">ct<\/text>\n<text x=\"391.0\" y=\"334.8\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">x<\/text>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"332.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_vec)\"/>\n<circle cx=\"92.0\" cy=\"398.0\" r=\"9.0\" fill=\"#222222\" stroke=\"none\"/>\n<circle cx=\"332.0\" cy=\"206.0\" r=\"22.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"58.0\" y=\"432.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">O<\/text>\n<text x=\"360.0\" y=\"188.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">P<\/text>\n<text x=\"220.0\" y=\"286.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">x<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>"}, "4.4": {"label": "Velocity four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "body_orig": "Defined as the derivative of the \\cref{Position four-vector}{4.3} with respect to \\cref{Proper time}{4.1}:  \\[ u^\\mu = \\frac{dx^\\mu}{d\\tau}. \\]  Because proper time is invariant, the velocity four-vector transforms as a true \\cref{Four-vector}{4.2}.   Its invariant magnitude satisfies  \\[ u^\\mu u_\\mu = c^2. \\]  Multiplying the velocity four-vector by mass yields the \\cref{Momentum four-vector}{4.5}.", "definition_orig": "The velocity four-vector is the derivative of the \\cref{Position four-vector}{4.3} with respect to \\cref{Proper time}{4.1}, written \\(u^\\mu = dx^\\mu/d\\tau\\). Because proper time is invariant, this derivative transforms as a genuine \\cref{Four-vector}{4.2}.", "explanation_orig": "Ordinary three-velocity depends strongly on the chosen frame, and its components do not by themselves form a four-vector. The velocity four-vector repairs this by measuring change along the particle's own worldline per unit proper time. Its time component is related to the Lorentz factor, while its spatial components are related to the usual three-velocity multiplied by that factor. The invariant magnitude of the velocity four-vector is fixed, usually \\(u^\\mu u_\\mu=c^2\\) with the chosen sign convention. This fixed magnitude reflects the fact that massive particles always move through spacetime at a definite four-dimensional rate, even though their ordinary speeds differ between observers.", "example_orig": "A particle at rest in a particular inertial frame has zero ordinary spatial velocity in that frame, but it still has a nonzero velocity four-vector because it is advancing through time. In a frame where the same particle is moving, the time and spatial components change together according to a Lorentz transformation.", "definition_new": "The velocity four-vector is the derivative of the \\cref{Position four-vector}{4.3} with respect to \\cref{Proper time}{4.1}: \\[ U^\\mu=\\frac{dx^\\mu}{d\\tau}. \\] It has invariant magnitude \\(U^\\mu U_\\mu=c^2\\).", "derivation_new": "Differentiate the position four-vector \\(x^\\mu=(ct,\\mathbf x)\\) with respect to the invariant parameter \\(\\tau\\). Since \\(dt/d\\tau=\\gamma\\), \\[ U^\\mu=\\frac{dx^\\mu}{d\\tau}=\\gamma(c,\\mathbf v). \\] Using the \\(+---\\) metric, \\[ U^\\mu U_\\mu=\\gamma^2(c^2-v^2)=c^2. \\] Thus the construction depends directly on both the \\cref{Position four-vector}{4.3} and \\cref{Proper time}{4.1}.", "explanation_new": "Ordinary velocity \\(\\mathbf v=d\\mathbf x/dt\\) is frame-dependent and its components do not form a four-vector by themselves. The trick is to differentiate position with respect to proper time, the time measured along the particle's own path. That gives \\(U^\\mu=\\gamma(c,\\mathbf v)\\). The extra \\(\\gamma\\) is not a random correction; it converts coordinate-time change into proper-time change. A particle at rest still has \\(U^\\mu=(c,0,0,0)\\), because it is moving through time. The invariant norm \\(U_\\mu U^\\mu=c^2\\) is a useful sign check.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_4\">\n<title id=\"title-n4_4\">Velocity four-vector<\/title>\n<defs>\n\n<marker id=\"n4_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_4_u\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"92.0\" y1=\"402.0\" x2=\"420.0\" y2=\"402.0\" stroke=\"#222222\" stroke-width=\"5.3\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_axis_arrow)\"/>\n<line x1=\"92.0\" y1=\"402.0\" x2=\"92.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"5.3\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_axis_arrow)\"/>\n<text x=\"438.0\" y=\"412.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"76.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<path d=\"M132,366 C184,324 176,244 244,246 C314,248 306,156 386,118\" fill=\"none\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<circle cx=\"244.0\" cy=\"246.0\" r=\"18.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"244.0\" y1=\"246.0\" x2=\"348.0\" y2=\"158.0\" stroke=\"#248a3d\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_u)\"/>\n<text x=\"374.0\" y=\"154.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_4\">\n<title id=\"title-n4_4\">Velocity four-vector<\/title>\n<defs>\n\n<marker id=\"n4_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_4_u\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"145.0\" y1=\"112.0\" x2=\"145.0\" y2=\"402.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"198.0\" y1=\"112.0\" x2=\"198.0\" y2=\"402.0\" stroke=\ \" font-style=\"italic\" fill=\"#1f4fbf\">τ+dτ<\/text>\n<line x1=\"210.0\" y1=\"270.0\" x2=\"286.0\" y2=\"214.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"7 7\" stroke-linecap=\"round\"/>\n<text x=\"322.0\" y=\"182.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">dx^μ<\/text>\n<circle cx=\"244.0\" cy=\"246.0\" r=\"18.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"244.0\" y1=\"246.0\" x2=\"348.0\" y2=\"158.0\" stroke=\"#248a3d\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_u)\"/>\n<text x=\"374.0\" y=\"154.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>"}, "4.5": {"label": "Momentum four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "body_orig": "The relativistic generalization of momentum, defined by  \\[ p^\\mu = m u^\\mu, \\]  where \\(u^\\mu\\) is the \\cref{Velocity four-vector}{4.4}.    Its components are  \\[ p^\\mu = (E/c,\\,\\vec p), \\]  combining energy and three-momentum into a single \\cref{Four-vector}{4.2}.   The invariant magnitude of \\(p^\\mu\\) expresses the relativistic energy–momentum relation.", "definition_orig": "The momentum four-vector combines a particle's energy and three-momentum into one relativistic object, commonly written \\(p^\\mu=(E/c,\\vec p)\\). For a massive particle it is defined by \\(p^\\mu=m u^\\mu\\), where \\(u^\\mu\\) is the \\cref{Velocity four-vector}{4.4}.", "explanation_orig": "In Newtonian mechanics, energy and momentum are related but distinct quantities. Special relativity joins them into a single \\cref{Four-vector}{4.2}, so that a change of inertial frame mixes energy with momentum just as it mixes time with space. The invariant magnitude of the momentum four-vector, computed using the \\cref{Metric tensor}{3.3}, gives the rest-mass relation \\(p^\\mu p_\\mu = m^2c^2\\) with the common sign convention used here. Written in components, this is equivalent to the energy--momentum relation \\(E^2 = p^2c^2 + m^2c^4\\). This compact form is one reason four-vector notation is so powerful in relativistic dynamics.", "example_orig": "A particle at rest has zero three-momentum but still has momentum four-vector \\((mc,0,0,0)\\), corresponding to rest energy \\(E=mc^2\\). In a moving frame its energy and three-momentum are both nonzero, while the invariant magnitude of \\(p^\\mu\\) remains fixed by the particle's mass.", "definition_new": "The momentum four-vector combines relativistic energy and three-momentum into \\[ p^\\mu=mU^\\mu=(E/c,\\mathbf p). \\] Its invariant square is \\(p^\\mu p_\\mu=m^2c^2\\), equivalent to the energy-momentum relation.", "derivation_new": "For a massive particle, multiply the \\cref{Velocity four-vector}{4.4} by the invariant mass \\(m\\): \\[ p^\\mu=mU^\\mu=m\\gamma(c,\\mathbf v). \\] Identifying \\(E=\\gamma mc^2\\) and \\(\\mathbf p=\\gamma m\\mathbf v\\) gives \\[ p^\\mu=(E/c,\\mathbf p). \\] Contracting with the \\cref{Metric tensor}{3.3}, \\[ p^\\mu p_\\mu=\\frac{E^2}{c^2}-\\mathbf p^2=m^2c^2, \\] or \\[ E^2=\\mathbf p^2c^2+m^2c^4. \\]", "explanation_new": "Four-momentum is where energy and momentum stop being separate bookkeeping columns and become one relativistic object. One observer may say a particle has more energy and more spatial momentum than another observer does, but both are describing the same four-vector. In the rest frame the spatial momentum is zero, yet the time component remains \\(mc\\), corresponding to rest energy. In a moving frame, \\(p^\\mu=(\\gamma mc,\\gamma m\\mathbf v)\\). The invariant square stays \\(m^2c^2\\), which is why the energy-momentum relation is more fundamental than any one observer's measured energy.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_5\">\n<title id=\"title-n4_5\">Momentum four-vector<\/title>\n<defs>\n\n<marker id=\"n4_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_5_p\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"360.0\" y2=\"390.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"100.0\" y2=\"114.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_axis_arrow)\"/>\n<text x=\"378.0\" y=\"400.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<text x=\"84.0\" y=\"96.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">E/c<\/text>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"286.0\" y2=\"168.0\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_p)\"/>\n<text x=\"208.0\" y=\"264.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"348.0\" y=\"174.0\" width=\"92.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"348.0\" y1=\"232.0\" x2=\"440.0\" y2=\"232.0\" stroke=\"#c8c8c8\" stroke-width=\"2\"/>\n<text x=\"394.0\" y=\"216.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" f x2=\"100.0\" y2=\"114.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_axis_arrow)\"/>\n<text x=\"378.0\" y=\"400.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<text x=\"84.0\" y=\"96.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">E/c<\/text>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"260.0\" y2=\"196.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<text x=\"204.0\" y=\"256.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" opacity=\"0.65\">u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"318.0\" y=\"146.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">m<\/text>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"286.0\" y2=\"168.0\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_p)\"/>\n<text x=\"208.0\" y=\"264.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"348.0\" y=\"174.0\" width=\"92.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"348.0\" y1=\"232.0\" x2=\"440.0\" y2=\"232.0\" stroke=\"#c8c8c8\" stroke-width=\"2\"/>\n<text x=\"394.0\" y=\"216.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E/c<\/text>\n<text x=\"394.0\" y=\"270.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<\/text>\n<\/svg>"}, "4.6": {"label": "Mass-energy equivalence", "layer": "4", "layer_title": "Relativistic Kinematics", "body_orig": "", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "Mass-energy equivalence is the statement that the rest energy of a massive body is \\[ E_0=mc^2. \\] More generally, it is the zero-momentum limit of the relativistic energy-momentum relation \\[ E^2=\\mathbf p^2c^2+m^2c^4. \\]", "derivation_new": "Start with the \\cref{Momentum four-vector}{4.5}, written \\(p^\\mu=(E/c,\\mathbf p)\\). Its invariant square is computed with the \\cref{Metric tensor}{3.3}: \\[ p_\\mu p^\\mu=\\frac{E^2}{c^2}-\\mathbf p^2. \\] For a particle of invariant mass \\(m\\), the same norm is \\(m^2c^2\\), so \\[ \\frac{E^2}{c^2}-\\mathbf p^2=m^2c^2. \\] Multiplying by \\(c^2\\) gives \\[ E^2=\\mathbf p^2c^2+m^2c^4. \\] In the rest frame, \\(\\mathbf p=0\\), and therefore \\[ E_0=mc^2. \\]", "explanation_new": "The famous equation is easy to remember and surprisingly easy to misunderstand. It is best read as a statement about rest energy: even when a body's ordinary momentum is zero, its four-momentum has a nonzero time component. The full relation is \\(E^2=\\mathbf p^2c^2+m^2c^4\\). Setting \\(\\mathbf p=0\\) gives \\(E_0=mc^2\\). So mass is not being magically converted into an unrelated substance called energy; mass is the invariant measure of a system's total energy-momentum. If a bound system loses internal energy, its invariant mass decreases by \\(\\Delta E/c^2\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_6\">\n<title id=\"title-n4_6\">Mass-energy equivalence<\/title>\n\n<rect x=\"74.0\" y=\"162.0\" width=\"364.0\" height=\"142.0\" rx=\"18.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<text x=\"256.0\" y=\"254.0\" font-size=\"72\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E=mc<\/text>\n<text x=\"364.0\" y=\"222.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">2<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_6\">\n<title id=\"title-n4_6\">Mass-energy equivalence<\/title>\n\n<rect x=\"74.0\" y=\"104.0\" width=\"364.0\" height=\"142.0\" rx=\"18.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<text x=\"256.0\" y=\"196.0\" font-size=\"72\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E=mc<\/text>\n<text x=\"364.0\" y=\"164.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">2<\/text>\n<line x1=\"256.0\" y1=\"264.0\" x2=\"256.0\" y2=\"310.0\" stroke=\"#c8c8c8\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"88.0\" y=\"326.0\" width=\"336.0\" height=\"70.0\" rx=\"10.0\" fill=\"#ffffff\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"158.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"209.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"256.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">=<\/text>\n<text x=\"309.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">m<\/text>\n<text x=\"326.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"350.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">c<\/text>\n<text x=\"366.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"256.0\" y=\"446.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">rest frame: p = 0<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_6\">\n<title id=\"title-n4_6\">Mass-energy equivalence<\/title>\n\n<rect x=\"74.0\" y=\"104.0\" width=\"364.0\" height=\"142.0\" rx=\"18.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<text x=\"256.0\" y=\"196.0\" font-size=\"72\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E=mc<\/text>\n<text x=\"364.0\" y=\"164.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">2<\/text>\n<line x1=\"256.0\" y1=\"264.0\" x2=\"256.0\" y2=\"310.0\" stroke=\"#c8c8c8\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"88.0\" y=\"326.0\" width=\"336.0\" height=\"70.0\" rx=\"10.0\" fill=\"#ffffff\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"158.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"209.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"256.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">=<\/text>\n<text x=\"309.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">m<\/text>\n<text x=\"326.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"350.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">c<\/text>\n<text x=\"366.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"256.0\" y=\"446.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">rest frame: p = 0<\/text>\n<\/svg>"}, "5.1": {"label": "Action principle", "layer": "5", "layer_title": "Variational Mechanics", "body_orig": "The dynamics of a physical system are determined by the requirement that the action  \\[ S = \\int L\\, dt \\]  is stationary with respect to small variations of the path.    Here \\(L\\) is the \\cref{Lagrangian}{5.2}.   This principle provides a unified way of deriving equations of motion consistent with relativistic invariance under \\cref{Lorentz transformations}{3.1}.", "definition_orig": "The action principle states that the actual history of a physical system is one for which the action is stationary under small allowed variations. In particle mechanics the action is usually written as an integral of the \\cref{Lagrangian}{5.2} along a path, and the resulting stationarity condition determines the equations of motion.", "explanation_orig": "The action principle is a compact way of turning physical assumptions into dynamics. Instead of writing force laws directly, one specifies a single scalar quantity, the action, and asks which path makes its first-order variation vanish. This is powerful because symmetries and invariances can be built into the action from the start. In special relativity, a suitable action should not depend on the arbitrary coordinates chosen by a particular \\cref{Inertial frames}{2.1}; it should be compatible with \\cref{Lorentz transformations}{3.1} and, more generally, with \\cref{Lorentz invariance}{11.1}. The same idea extends naturally from particles to fields, where the action is built by integrating a \\cref{Field Lagrangian}{6.3} over spacetime.", "example_orig": "For a free relativistic particle, the action can be chosen proportional to the \\cref{Proper time}{4.1} along the particle's worldline. Varying the worldline then selects inertial straight-line motion as the stationary path, just as ordinary mechanics selects the path satisfying Newton's laws.", "definition_new": "The action principle states that the physical history of a system makes the action stationary under small allowed variations. For particle mechanics, the action is usually \\[ S=\\int L(q,\\dot q,t)\\,dt, \\] where \\(L\\) is the \\cref{Lagrangian}{5.2}.", "derivation_new": "The action principle is a principle rather than a result derived from another concept in this graph. Its mathematical content is the stationarity condition \\[ \\delta S=0. \\] Once an action is chosen, this condition produces equations of motion. In relativistic mechanics the action is chosen to be a scalar, often built from invariant quantities such as \\cref{Proper time}{4.1} or contractions of \\cref{Four-vectors}{4.2}, so that the resulting dynamics respect \\cref{Lorentz transformations}{3.1}.", "explanation_new": "The action principle can feel abstract because it talks about whole histories rather than instant-by-instant forces. The idea is to compare nearby possible paths between the same endpoints and ask which path makes the action stationary. 'Stationary' does not always mean shortest; it means the first-order change vanishes under small variations. This is like standing at the top of a hill or bottom of a valley: tiny moves do not change height to first order. From this global-sounding rule, local equations of motion emerge. That is why it becomes such a powerful bridge to fields.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Action principle<\/title>\n\n<path d=\"M96,370 C158,188 304,356 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C198,324 274,164 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C170,250 290,280 416,150\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\"/>\n<circle cx=\"96.0\" cy=\"370.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<circle cx=\"416.0\" cy=\"150.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"52.0\" y=\"380.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"440.0\" y=\"140.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"250.0\" y=\"210.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Action principle<\/title>\n\n<path d=\"M96,370 C145,208 326,334 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C198,324 274,164 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M144,260 C176,242 196,242 228,260\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M250,270 C286,254 318,254 354,270\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<text x=\"246.0\" y=\"214.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">δx<\/text>\n<path d=\"M96,370 C170,250 290,280 416,150\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\"/>\n<circle cx=\"96.0\" cy=\"370.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<circle cx=\"416.0\" cy=\"150.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"52.0\" y=\"380.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"440.0\" y=\"140.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"250.0\" y=\"210.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Action principle<\/title>\n\n<path d=\"M96,370 C145,208 326,334 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C198,324 274,164 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M144,260 C176,242 196,242 228,260\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M250,270 C286,254 318,254 354,270\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<text x=\"246.0\" y=\"214.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">δx<\/text>\n<path d=\"M96,370 C170,250 290,280 416,150\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\"/>\n<circle cx=\"96.0\" cy=\"370.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<circle cx=\"416.0\" cy=\"150.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"52.0\" y=\"380.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"440.0\" y=\"140.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"250.0\" y=\"210.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<\/svg>"}, "5.2": {"label": "Lagrangian", "layer": "5", "layer_title": "Variational Mechanics", "body_orig": "A function of generalized coordinates and velocities whose integral defines the action in the \\cref{Action principle}{5.1}.    For relativistic systems the Lagrangian can be constructed using invariant quantities derived from the \\cref{Spacetime interval}{3.2} or from combinations of \\cref{Four-vectors}{4.2}.    The equations of motion follow from the \\cref{Euler–Lagrange equations}{5.3}.", "definition_orig": "A Lagrangian is a function that encodes the dynamics of a system in terms of its generalized coordinates and velocities. For a particle system it is usually written \\(L(q,\\dot q,t)\\), and its time integral gives the action \\(S=\\int L\\,dt\\) used in the \\cref{Action principle}{5.1}.", "explanation_orig": "The Lagrangian is not itself usually an observable quantity like position, velocity, or energy. Its importance is that, when inserted into the action and varied, it generates the equations of motion through the \\cref{Euler–Lagrange equations}{5.3}. This makes it a compact way of representing the physical assumptions of a theory. In relativistic physics, the Lagrangian should be constructed from quantities that are invariant, or transform appropriately, under \\cref{Lorentz transformations}{3.1}. This is why relativistic Lagrangians are often built from the \\cref{Spacetime interval}{3.2}, proper time, or contractions of \\cref{Four-vectors}{4.2}.", "example_orig": "For a non-relativistic particle in a potential \\(V(q)\\), the standard Lagrangian is \\(L=T-V\\), where \\(T\\) is kinetic energy. For a free relativistic particle, the action is proportional to the proper time along its worldline, so the Lagrangian is chosen to reflect the invariant length of the particle's path through spacetime.", "definition_new": "A Lagrangian \\(L\\) is a function of generalized coordinates, velocities, and possibly time that is integrated to form the action. For particle mechanics, \\[ S=\\int L(q,\\dot q,t)\\,dt. \\]", "derivation_new": "The Lagrangian is not derived from a universal formula; it is chosen to encode the physical assumptions of the system. Once inserted into the \\cref{Action principle}{5.1}, it determines the equations of motion through the \\cref{Euler-Lagrange equations}{5.3}. In relativistic systems the allowed building blocks are constrained by Lorentz covariance: one builds \\(L\\), or the action directly, from invariant quantities such as the \\cref{Spacetime interval}{3.2}, \\cref{Proper time}{4.1}, or scalar contractions of \\cref{Four-vectors}{4.2}.", "explanation_new": "The Lagrangian is the local ingredient whose accumulated value gives the action. In simple mechanics it is often \\(T-V\\), but the deeper idea is not that particular formula. The Lagrangian is a compact rule that tells the variational principle what kind of motion is allowed. If you know \\(L\\), you can form \\(S=\\int L\\,dt\\), vary the path, and derive equations of motion. For relativistic systems, the Lagrangian must be built from quantities that make sense across inertial frames. That is why invariant intervals, four-vectors, and later field densities enter the story.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_2\">\n<title id=\"title-n5_2\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"172.0\" y=\"244.0\" width=\"70.0\" height=\"62.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"207.0\" y=\"289.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_2_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_2\">\n<title id=\"title-n5_2\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"98.0\" y=\"258.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"126.0\" y=\"297.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"162.0\" y=\"242.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"190.0\" y=\"281.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"226.0\" y=\"202.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"254.0\" y=\"241.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<text x=\"260.0\" y=\"388.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">∫ L dt<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_2_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_2\">\n<title id=\"title-n5_2\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"98.0\" y=\"258.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"126.0\" y=\"297.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"162.0\" y=\"242.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"190.0\" y=\"281.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"226.0\" y=\"202.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"254.0\" y=\"241.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<text x=\"260.0\" y=\"388.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">∫ L dt<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_2_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>"}, "5.3": {"label": "Euler–Lagrange equations", "layer": "5", "layer_title": "Variational Mechanics", "body_orig": "The equations obtained by varying the action defined in the \\cref{Action principle}{5.1}.   For a coordinate \\(q\\) they take the form  \\[ \\frac{d}{dt}\\frac{\\partial L}{\\partial \\dot q} - \\frac{\\partial L}{\\partial q} = 0. \\]  These equations determine the dynamics implied by a chosen \\cref{Lagrangian}{5.2}.", "definition_orig": "The Euler–Lagrange equations are the differential equations obtained by applying the \\cref{Action principle}{5.1} to a chosen \\cref{Lagrangian}{5.2}. For a coordinate \\(q\\), they state that \\(\\frac{d}{dt}\\frac{\\partial L}{\\partial \\dot q}-\\frac{\\partial L}{\\partial q}=0\\).", "explanation_orig": "These equations are the bridge between the variational formulation and ordinary equations of motion. The action principle says that the first-order change in the action should vanish for all small variations of the path; carrying out that calculation produces the Euler–Lagrange equations. They are especially useful because the same mathematical pattern works for many different systems: particles, constrained coordinates, relativistic worldlines, and eventually fields. In field theory the variables being varied are not just particle coordinates but field values at each \\cref{Spacetime event}{2.2}, leading to \\cref{Field equations}{6.4}.", "example_orig": "For a non-relativistic particle with \\(L=\\tfrac12 m\\dot x^2-V(x)\\), the Euler–Lagrange equation gives \\(m\\ddot x=-dV/dx\\). Thus Newton's second law appears as a consequence of stationary action rather than as a separate starting postulate.", "definition_new": "The Euler-Lagrange equations are the equations of motion obtained by applying the \\cref{Action principle}{5.1} to a chosen \\cref{Lagrangian}{5.2}. For one coordinate, \\[ \\frac{d}{dt}\\left(\\frac{\\partial L}{\\partial\\dot q}\\right)-\\frac{\\partial L}{\\partial q}=0. \\]", "derivation_new": "Start with the \\cref{Action principle}{5.1} in the form \\(S=\\int_{t_1}^{t_2}L(q,\\dot q,t)\\,dt\\) and vary the path \\(q(t)\\rightarrow q(t)+\\delta q(t)\\), holding the endpoints fixed. The first variation is \\[ \\delta S=\\int_{t_1}^{t_2}\\left(\\frac{\\partial L}{\\partial q}\\delta q+\\frac{\\partial L}{\\partial\\dot q}\\delta\\dot q\\right)dt. \\] Integrating the second term by parts and using \\(\\delta q(t_1)=\\delta q(t_2)=0\\) gives \\[ \\delta S=\\int_{t_1}^{t_2}\\left(\\frac{\\partial L}{\\partial q}-\\frac{d}{dt}\\frac{\\partial L}{\\partial\\dot q}\\right)\\delta q\\,dt. \\] Since this must vanish for arbitrary \\(\\delta q\\), the Euler-Lagrange equation follows.", "explanation_new": "Euler-Lagrange equations are what the action principle looks like after the variation has been done. The intimidating derivative expression is really a balance statement: changes in how \\(L\\) depends on position are balanced against changes in how \\(L\\) depends on velocity. For a familiar example, using \\(L=\\tfrac12m\\dot x^2-V(x)\\) gives \\(m\\ddot x=-dV/dx\\), Newton's law in disguise. The power of the formula is that the same pattern works for generalized coordinates and, with suitable modification, for fields.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<line x1=\"270.0\" y1=\"256.0\" x2=\"340.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"356.0\" y=\"214.0\" width=\"96.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"404.0\" y=\"268.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-l l=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<path d=\"M390,284 C430,272 454,244 474,202\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<rect x=\"288.0\" y=\"98.0\" width=\"112.0\" height=\"58.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"137.2\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">δS = 0<\/text>\n<line x1=\"344.0\" y1=\"164.0\" x2=\"344.0\" y2=\"238.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"280.0\" y=\"248.0\" width=\"100.0\" height=\"72.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"330.0\" y=\"295.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<path d=\"M390,284 C430,272 454,244 474,202\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<\/svg>"}, "5.4": {"label": "Hamiltonian formalism", "layer": "5", "layer_title": "Variational Mechanics", "body_orig": "A reformulation of mechanics derived from the \\cref{Lagrangian}{5.2} by introducing the \\cref{Canonical momentum}{5.5}.   The Hamiltonian is defined by  \\[ H = p\\dot q - L. \\]  Time evolution is then described by Hamilton’s equations.   Although equivalent to the \\cref{Euler–Lagrange equations}{5.3}, this formulation clarifies the structure of conserved quantities.", "definition_orig": "Hamiltonian formalism rewrites mechanics in terms of coordinates and their conjugate momenta rather than coordinates and velocities. It is obtained from the \\cref{Lagrangian}{5.2} by introducing \\cref{Canonical momentum}{5.5} and forming the Hamiltonian, which then generates time evolution through Hamilton's equations.", "explanation_orig": "The Hamiltonian formulation is usually equivalent to the \\cref{Euler–Lagrange equations}{5.3}, but it organizes the theory differently. Instead of asking how a configuration evolves through velocity space, it describes motion as a trajectory through phase space, whose coordinates are \\(q\\) and \\(p\\). This makes conserved quantities, symmetries, and transformations especially transparent. The Hamiltonian often corresponds to the total energy, although that identification depends on the system and on how time enters the Lagrangian. The formalism also prepares the ground for later developments, because canonical variables are the natural starting point for Poisson brackets, quantization, and the symmetry ideas associated with \\cref{Noether's theorem}{5.6}.", "example_orig": "For a simple particle with \\(L=\\tfrac12m\\dot q^2-V(q)\\), the canonical momentum is \\(p=m\\dot q\\), and the Hamiltonian is \\(H=p^2/(2m)+V(q)\\). Hamilton's equations then reproduce the same motion as the original Lagrangian description.", "definition_new": "Hamiltonian formalism rewrites dynamics in terms of coordinates and canonical momenta rather than coordinates and velocities. It is obtained by defining \\cref{Canonical momentum}{5.5} and forming the Hamiltonian \\[ H(q,p,t)=p\\dot q-L. \\]", "derivation_new": "Starting from a \\cref{Lagrangian}{5.2}, define the \\cref{Canonical momentum}{5.5} \\[ p=\\frac{\\partial L}{\\partial\\dot q}. \\] If this relation can be solved for \\(\\dot q\\) in terms of \\(q\\) and \\(p\\), perform the Legendre transform \\[ H(q,p,t)=p\\dot q-L(q,\\dot q,t). \\] Differentiating \\(H\\) gives Hamilton's equations, \\[ \\dot q=\\frac{\\partial H}{\\partial p}, \\qquad \\dot p=-\\frac{\\partial H}{\\partial q}. \\] Thus the formalism is derived from the Lagrangian formulation plus the canonical momentum construction.", "explanation_new": "Hamiltonian formalism reorganizes the same dynamics into phase space, where coordinates and momenta are treated as paired variables. The Hamiltonian often corresponds to energy, but conceptually it is the generator of time evolution in this phase-space description. The move from Lagrangian to Hamiltonian is a Legendre transform: replace velocity dependence with momentum dependence. This is useful because many conservation laws and symmetry structures become especially clear. For a free particle the Hamiltonian tracks energy; for constrained or gauge systems it can be subtler, so it should not be treated as merely a synonym for energy.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_4\">\n<title id=\"title-n5_4\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_4_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_flow)\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_4\">\n<title id=\"title-n5_4\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_4_axis_arro "#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_4\">\n<title id=\"title-n5_4\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_4_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M146,318 C214,236 308,230 374,306\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M166,344 C236,276 316,276 396,338\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_flow)\"/>\n<line x1=\"213.3\" y1=\"259.9\" x2=\"238.7\" y2=\"244.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"297.3\" y1=\"211.9\" x2=\"322.7\" y2=\"196.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>"}, "5.5": {"label": "Canonical momentum", "layer": "5", "layer_title": "Variational Mechanics", "body_orig": "The momentum conjugate to a coordinate \\(q\\), defined from the \\cref{Lagrangian}{5.2} as  \\[ p = \\frac{\\partial L}{\\partial \\dot q}. \\]  In relativistic systems it is closely related to the \\cref{Momentum four-vector}{4.5}.   Canonical momentum plays a central role in the \\cref{Hamiltonian formalism}{5.4} and later in the introduction of electromagnetic interaction.", "definition_orig": "Canonical momentum is the momentum conjugate to a coordinate in the Lagrangian formulation. For a coordinate \\(q\\), it is defined by \\(p=\\partial L/\\partial \\dot q\\), so it measures how the \\cref{Lagrangian}{5.2} changes when the corresponding velocity is changed.", "explanation_orig": "Canonical momentum is not merely the everyday quantity mass times velocity, although it reduces to that in simple non-relativistic examples. It is a structural quantity defined by the Lagrangian, and it is the variable paired with position in the \\cref{Hamiltonian formalism}{5.4}. In relativistic mechanics it is closely related to the \\cref{Momentum four-vector}{4.5}, but in interacting systems the distinction between canonical momentum and kinetic or mechanical momentum matters. This becomes important in electromagnetism, where \\cref{Minimal coupling}{8.3} introduces the \\cref{Vector potential \\(A_\\mu\\)}{7.1} into the particle's Lagrangian and changes the canonical momentum.", "example_orig": "For \\(L=\\tfrac12m\\dot q^2-V(q)\\), the canonical momentum is \\(p=m\\dot q\\). For a charged particle in an electromagnetic potential, the canonical momentum contains an additional potential-dependent term, so it is not simply the particle's mechanical momentum.", "definition_new": "Canonical momentum is the momentum conjugate to a coordinate in the Lagrangian formulation. For a coordinate \\(q\\), \\[ p=\\frac{\\partial L}{\\partial\\dot q}. \\]", "derivation_new": "Canonical momentum is derived from the velocity dependence of the \\cref{Lagrangian}{5.2}. When the action is varied, the coefficient of \\(\\delta\\dot q\\) is \\(\\partial L/\\partial\\dot q\\). This quantity is therefore the natural variable paired with \\(q\\), and it is the object used in the Legendre transform leading to \\cref{Hamiltonian formalism}{5.4}.", "explanation_new": "Canonical momentum is the momentum that belongs to the Lagrangian coordinate system. In simple cases it equals mechanical momentum, so it is tempting to identify the two. Electromagnetism shows why that is too quick. When a charged particle couples to a vector potential, the canonical momentum includes potential-dependent terms, while the mechanical momentum describes the particle's actual motion. The definition \\(p=\\partial L/\\partial\\dot q\\) is therefore not just a fancy way to write \\(mv\\); it tells you which momentum is paired with \\(q\\) in Hamiltonian mechanics.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Canonical momentum<\/title>\n<defs>\n\n<marker id=\"n5_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"76.0\" y1=\"344.0\" x2=\"290.0\" y2=\"344.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<text x=\"298.0\" y=\"374.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<circle cx=\"172.0\" cy=\"344.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"172.0\" y1=\"344.0\" x2=\"172.0\" y2=\"242.0\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<text x=\"188.0\" y=\"250.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">p<\/text>\n<rect x=\"320.0\" y=\"252.0\" width=\"72.0\" height=\"62.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"356.0\" y=\"295.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"314.0\" y1=\"282.0\" x2=\"220.0\" y2=\"282.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Canonical momentum<\/title>\n<defs>\n\n<marker id=\"n5_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"76.0\" y1=\"344.0\" x2=\"290.0\" y2=\"344.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<text x=\"298.0\" y=\"374.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<circle cx=\"172.0\" cy=\"344.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"172.0\" y1=\"344.0\" x2=\"172.0\" y2=\"242.0\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<text x=\"188.0\" y=\"250.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">p<\/text>\n<line x1=\"122.0\" y1=\"300.0\" x2=\"206.0\" y2=\"300.0\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<text x=\"154.0\" y=\"288.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">qdot<\/text>\n<rect x=\"312.0\" y=\"164.0\" width=\"64.0\" height=\"60.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"206.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"340.0\" y1=\"232.0\" x2=\"340.0\" y2=\"282.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<rect x=\"304.0\" y=\"270.0\" width=\"126.0\" height=\"54.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"367.0\" y=\"305.5\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂L/∂q̇<\/text>\n<line x1=\"304.0\" y1=\"318.0\" x2=\"214.0\" y2=\"306.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Canonical momentum<\/title>\n<defs>\n\n<marker id=\"n5_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"76.0\" y1=\"344.0\" x2=\"290.0\" y2=\"344.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<text x=\"298.0\" y=\"374.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<circle cx=\"172.0\" cy=\"344.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"172.0\" y1=\"344.0\" x2=\"172.0\" y2=\"242.0\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<text x=\"188.0\" y=\"250.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">p<\/text>\n<line x1=\"122.0\" y1=\"300.0\" x2=\"206.0\" y2=\"300.0\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<text x=\"154.0\" y=\"288.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">qdot<\/text>\n<rect x=\"312.0\" y=\"164.0\" width=\"64.0\" height=\"60.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"206.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"340.0\" y1=\"232.0\" x2=\"340.0\" y2=\"282.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<rect x=\"304.0\" y=\"270.0\" width=\"126.0\" height=\"54.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"367.0\" y=\"305.5\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂L/∂q̇<\/text>\n<line x1=\"304.0\" y1=\"318.0\" x2=\"214.0\" y2=\"306.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_arrow)\"/>\n<\/svg>"}, "5.6": {"label": "Noether's theorem", "layer": "5", "layer_title": "Variational Mechanics", "body_orig": "A fundamental result connecting symmetry and conservation laws.   Every continuous symmetry of the action in the \\cref{Action principle}{5.1} implies a conserved quantity.  For example, invariance under spacetime translations leads to conservation of energy and momentum, which are later expressed through the \\cref{Energy–momentum tensor}{9.4}.", "definition_orig": "Noether's theorem states that every continuous symmetry of the action corresponds to a conserved quantity. It links the variational structure of the \\cref{Action principle}{5.1} directly to conservation laws such as conservation of energy, momentum, angular momentum, and charge.", "explanation_orig": "The theorem explains why conservation laws are not isolated coincidences. If shifting the time coordinate leaves the action unchanged, energy is conserved; if shifting spatial position leaves it unchanged, momentum is conserved; if rotating the system leaves it unchanged, angular momentum is conserved. In relativistic field theory this idea becomes especially central because spacetime symmetries and internal gauge symmetries are built into the formulation of the theory. The connection between spacetime translations and conserved energy-momentum is later expressed using the \\cref{Energy–momentum tensor}{9.4}. The same general philosophy also underlies the importance of \\cref{Lorentz invariance}{11.1}: symmetries of spacetime constrain the form of physical laws and their conserved currents.", "example_orig": "A Lagrangian that has no explicit time dependence is invariant under time translations. Noether's theorem then says that there is a conserved quantity, usually identified as the energy or Hamiltonian of the system.", "definition_new": "Noether's theorem states that every continuous symmetry of the action corresponds to a conserved quantity. It links symmetries in the \\cref{Action principle}{5.1} to conservation laws such as energy, momentum, angular momentum, and charge.", "derivation_new": "The theorem follows from the stationarity of the action in the \\cref{Action principle}{5.1}. Suppose a continuous transformation changes the dynamical variables by an infinitesimal amount and leaves the action unchanged, up to possible boundary terms. Applying \\(\\delta S=0\\) and using the equations of motion leaves a total derivative, which identifies a conserved current or conserved quantity. For time translations the conserved quantity is energy; for spatial translations it is momentum. In field theory, spacetime translations lead to the \\cref{Energy--momentum tensor}{9.4}.", "explanation_new": "Noether's theorem is one of the best organizing ideas in physics: a continuous symmetry gives a conservation law. If the action does not change when you shift every position by the same small amount, momentum is conserved. If it does not change when you shift the time origin, energy is conserved. The theorem is not saying conservation is a coincidence; it explains where conservation laws come from. For example, in a translation-invariant system, nudging the whole experiment sideways should not change the physics, and that symmetry is what lies behind conservation of momentum.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_6\">\n<title id=\"title-n5_6\">Noether's theorem<\/title>\n<defs>\n\n<marker id=\"n5_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"92.0\" y=\"204.0\" width=\"98.0\" height=\"88.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"141.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<path d=\"M104,196 C78,144 158,104  y1=\"248.0\" x2=\"306.0\" y2=\"248.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<rect x=\"324.0\" y=\"198.0\" width=\"108.0\" height=\"100.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"378.0\" y=\"267.7\" font-size=\"58\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Q<\/text>\n<circle cx=\"406.0\" cy=\"212.0\" r=\"11.0\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\"/>\n<line x1=\"400.0\" y1=\"218.0\" x2=\"412.0\" y2=\"206.0\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"378.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">conserved<\/text>\n<\/svg>"}, "6.1": {"label": "Scalar field", "layer": "6", "layer_title": "Field Foundations", "body_orig": "A quantity that assigns a single value to every \\cref{Spacetime event}{2.2}.   A scalar field is therefore a function  \\[ \\phi(x) \\]  defined over spacetime.    Unlike a \\cref{Four-vector}{4.2}, a scalar field has the same value for all observers related by \\cref{Lorentz transformations}{3.1}.   Its dynamics are determined by a \\cref{Field Lagrangian}{6.3}, whose variation using the \\cref{Euler–Lagrange equations}{5.3} produces relativistic \\cref{Field equations}{6.4}.", "definition_orig": "A scalar field assigns a single number to every \\cref{Spacetime event}{2.2}. In relativistic notation it is usually written \\(\\phi(x)\\), where \\(x\\) denotes the spacetime position; its defining feature is that the field value itself is unchanged by \\cref{Lorentz transformations}{3.1}.", "explanation_orig": "A scalar field is the simplest kind of relativistic field because it has no direction or vector components. Different observers may use different coordinates to label the same event, but they agree on the value of the scalar field at that event. This contrasts with a \\cref{Four-vectors}{4.2}, whose components mix between time and space under a change of inertial frame. To turn a scalar field into a physical theory one specifies a \\cref{Field Lagrangian}{6.3}, usually depending on \\(\\phi\\) and its spacetime derivatives. Varying the corresponding action gives \\cref{Field equations}{6.4}, the field-theoretic analogue of the particle equations obtained from the \\cref{Euler-Lagrange equations}{5.3}.", "example_orig": "Temperature in ordinary space is a useful non-relativistic analogy: it assigns one number to each point. A relativistic scalar field does the same over spacetime. In particle physics, an idealized spin-zero field is described this way: the field value may vary from event to event, but it does not acquire vector components when viewed from another inertial frame.", "definition_new": "A scalar field assigns a single value \\(\\phi(x)\\) to every \\cref{Spacetime event}{2.2}. Its defining relativistic property is that the value at an event is invariant under \\cref{Lorentz transformations}{3.1}: observers relabel the event but do not transform \\(\\phi\\) into components.", "derivation_new": "A scalar field is a definition rather than a quantity derived from another field. Starting with spacetime points \\(x\\), assign one number \\(\\phi(x)\\) to each point. Under a Lorentz transformation \\(x\\rightarrow x'\\), the scalar transformation law is \\[ \\phi'(x')=\\phi(x). \\] This contrasts with \\cref{Four-vectors}{4.2}, whose components mix between frames.", "explanation_new": "A scalar field assigns one value to every spacetime point. Temperature in a room is a useful nonrelativistic analogy: at each location and time there is a number, not an arrow. In relativity the special feature is that the value of a scalar field at an event is observer-independent. Different observers may use different coordinates to label the event, but they agree on the scalar value there. This makes scalar fields the simplest examples for learning field theory: they have spacetime dependence and dynamics without the extra complication of vector or tensor components.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_1\">\n<title id=\"title-n6_1\">Scalar field<\/title>\n<defs>\n\n<marker id=\"n6_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<line x1=\"158.0\" y1=\"118.0\" x2=\"158.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"218.0\" y1=\"118.0\" x2=\"218.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"278.0\" y1=\"118.0\" x2=\"278.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"338.0\" y1=\"118.0\" x2=\"338.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"178.0\" x2=\"398.0\" y2=\"178.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"238.0\" x2=\"398.0\" y2=\"238.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"298.0\" x2=\"398.0\" y2=\"298.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"358.0\" x2=\"398.0\" y2=\"358.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"414.0\" x2=\"418.0\" y2=\"414.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_1_axis_arrow)\"/>\n<line x1=\"82.0\" y1=\"414.0\" x2=\"82.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_1_axis_arrow)\"/>\n<text x=\"436.0\" y=\"424.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"66.0\" y=\"86.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New
