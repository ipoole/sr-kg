nt-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" opacity=\"0.65\">u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"318.0\" y=\"146.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">m<\/text>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"286.0\" y2=\"168.0\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_p)\"/>\n<text x=\"208.0\" y=\"264.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"348.0\" y=\"174.0\" width=\"92.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"348.0\" y1=\"232.0\" x2=\"440.0\" y2=\"232.0\" stroke=\"#c8c8c8\" stroke-width=\"2\"/>\n<text x=\"394.0\" y=\"216.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E/c<\/text>\n<text x=\"394.0\" y=\"270.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_5\">\n<title id=\"title-n4_5\">Momentum four-vector<\/title>\n<defs>\n\n<marker id=\"n4_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_5_p\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"360.0\" y2=\"390.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"100.0\" y2=\"114.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_axis_arrow)\"/>\n<text x=\"378.0\" y=\"400.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<text x=\"84.0\" y=\"96.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">E/c<\/text>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"260.0\" y2=\"196.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<text x=\"204.0\" y=\"256.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" opacity=\"0.65\">u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"318.0\" y=\"146.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">m<\/text>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"286.0\" y2=\"168.0\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_p)\"/>\n<text x=\"208.0\" y=\"264.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"348.0\" y=\"174.0\" width=\"92.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"348.0\" y1=\"232.0\" x2=\"440.0\" y2=\"232.0\" stroke=\"#c8c8c8\" stroke-width=\"2\"/>\n<text x=\"394.0\" y=\"216.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E/c<\/text>\n<text x=\"394.0\" y=\"270.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<\/text>\n<\/svg>", "svg_icon_caption": "The four-momentum arrow combines energy and spatial momentum.", "svg_detail_caption": "Four-momentum p^mu packages energy and spatial momentum together; for a massive particle it points with the four-velocity u^mu.", "study_questions": [{"question": "In one frame a particle has more energy and more three-momentum than in another frame, yet both observers describe the same physical object. Which invariant quantity keeps the descriptions tied together?\n\nA. \\(E+pc\\)\nB. \\(\\mathbf p^2+E^2\\)\nC. \\(\\gamma v\\)\nD. \\(p_\\mu p^\\mu=m^2c^2\\)", "answer": "D. The invariant square of four-momentum is\n\\[ p_\\mu p^\\mu=m^2c^2. \\]\nEnergy and three-momentum are frame-dependent components, but this contraction is frame-independent."}, {"question": "Why is the invariant square \\(p^\\mu p_\\mu=m^2c^2\\) useful?", "answer": "It gives a frame-independent relation between energy, momentum, and mass:\n\\[ p^\\mu p_\\mu=\\frac{E^2}{c^2}-\\mathbf p^2=m^2c^2. \\]\nMultiplying by \\(c^2\\) gives the energy-momentum relation\n\\[ E^2=\\mathbf p^2c^2+m^2c^4. \\]"}, {"question": "A particle has mass \\(m=2\\,\\mathrm{kg}\\) and moves at speed \\(v=0.6c\\), so \\(\\gamma=1.25\\). Calculate its energy in units of \\(c^2\\), and its momentum in units of \\(c\\).", "answer": "The energy is\n\\[ E=\\gamma mc^2=1.25(2)c^2=2.5c^2. \\]\nThe momentum magnitude is\n\\[ p=\\gamma mv=1.25(2)(0.6c)=1.5c. \\]\nSo\n\\[ p^\\mu=(E/c,p,0,0)=(2.5c,1.5c,0,0). \\]"}]}, "4.6": {"label": "Mass-energy equivalence", "layer": "4", "layer_title": "Relativistic Kinematics", "definition_new": "Mass-energy equivalence is the statement that the rest energy of a massive body is \\[ E_0=mc^2. \\] More generally, it is the zero-momentum limit of the relativistic energy-momentum relation \\[ E^2=\\mathbf p^2c^2+m^2c^4. \\]", "derivation_new": "Start with the \\cref{Momentum four-vector}{4.5}, written \\(p^\\mu=(E/c,\\mathbf p)\\). Its invariant square is computed with the \\cref{Metric tensor}{3.1}: \\[ p_\\mu p^\\mu=\\frac{E^2}{c^2}-\\mathbf p^2. \\] For a particle of invariant mass \\(m\\), the same norm is \\(m^2c^2\\), so \\[ \\frac{E^2}{c^2}-\\mathbf p^2=m^2c^2. \\] Multiplying by \\(c^2\\) gives \\[ E^2=\\mathbf p^2c^2+m^2c^4. \\] In the rest frame, \\(\\mathbf p=0\\), and therefore \\[ E_0=mc^2. \\]", "explanation_new": "The famous equation is easy to remember and surprisingly easy to misunderstand. It is best read as a statement about rest energy: even when a body's ordinary momentum is zero, its four-momentum has a nonzero time component. The full relation is \\(E^2=\\mathbf p^2c^2+m^2c^4\\). Setting \\(\\mathbf p=0\\) gives \\(E_0=mc^2\\). So mass is not being magically converted into an unrelated substance called energy; mass is the invariant measure of a system's total energy-momentum. If a bound system loses internal energy, its invariant mass decreases by \\(\\Delta E/c^2\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_6\">\n<title id=\"title-n4_6\">Mass-energy equivalence<\/title>\n\n<rect x=\"74.0\" y=\"162.0\" width=\"364.0\" height=\"142.0\" rx=\"18.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<text x=\"256.0\" y=\"254.0\" font-size=\"72\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E=mc<\/text>\n<text x=\"364.0\" y=\"222.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">2<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_6\">\n<title id=\"title-n4_6\">Mass-energy equivalence<\/title>\n\n<rect x=\"74.0\" y=\"104.0\" width=\"364.0\" height=\"142.0\" rx=\"18.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<text x=\"256.0\" y=\"196.0\" font-size=\"72\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E=mc<\/text>\n<text x=\"364.0\" y=\"164.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">2<\/text>\n<line x1=\"256.0\" y1=\"264.0\" x2=\"256.0\" y2=\"310.0\" stroke=\"#c8c8c8\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"88.0\" y=\"326.0\" width=\"336.0\" height=\"70.0\" rx=\"10.0\" fill=\"#ffffff\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"158.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"209.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"256.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">=<\/text>\n<text x=\"309.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">m<\/text>\n<text x=\"326.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"350.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">c<\/text>\n<text x=\"366.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"256.0\" y=\"446.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">rest frame: p = 0<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_6\">\n<title id=\"title-n4_6\">Mass-energy equivalence<\/title>\n\n<rect x=\"74.0\" y=\"104.0\" width=\"364.0\" height=\"142.0\" rx=\"18.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<text x=\"256.0\" y=\"196.0\" font-size=\"72\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E=mc<\/text>\n<text x=\"364.0\" y=\"164.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">2<\/text>\n<line x1=\"256.0\" y1=\"264.0\" x2=\"256.0\" y2=\"310.0\" stroke=\"#c8c8c8\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"88.0\" y=\"326.0\" width=\"336.0\" height=\"70.0\" rx=\"10.0\" fill=\"#ffffff\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"158.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"209.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"256.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">=<\/text>\n<text x=\"309.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">m<\/text>\n<text x=\"326.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"350.0\" y=\"372.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">c<\/text>\n<text x=\"366.0\" y=\"357.0\" font-size=\"19\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">2<\/text>\n<text x=\"256.0\" y=\"446.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">rest frame: p = 0<\/text>\n<\/svg>", "svg_icon_caption": "The iconic equation marks rest energy as mass times c squared.", "svg_detail_caption": "Rest mass is stored energy: in the rest frame, the invariant four-momentum relation becomes E=mc^2.", "study_questions": [{"question": "A box is at rest before and after it emits radiation, and its internal energy has decreased. What should happen to its invariant mass?\n\nA. It must increase because radiation was emitted\nB. It decreases by \\(\\Delta E/c^2\\)\nC. It is unchanged because the box is at rest\nD. It becomes zero if the box has no momentum", "answer": "B. Losing internal energy decreases the system's invariant mass by\n\\[ \\Delta m=\\frac{\\Delta E}{c^2}. \\]\nRest energy is part of the system's mass-energy content even when total three-momentum is zero."}, {"question": "Why is \\(E_0=mc^2\\) best read as a statement about rest energy rather than as 'mass turning into energy'?", "answer": "A body at rest still has a nonzero time component of four-momentum. The invariant mass measures the system's total energy-momentum content. If a system loses internal energy, its invariant mass can decrease by \\(\\Delta E/c^2\\), but energy is not a separate substance into which mass magically turns."}, {"question": "A system loses \\(9.0\\times10^{16}\\,\\mathrm J\\) of internal energy. Using \\(c=3.0\\times10^8\\,\\mathrm{m\\,s^{-1}}\\), what is the corresponding mass decrease?", "answer": "Use\n\\[ \\Delta m=\\frac{\\Delta E}{c^2}. \\]\nSince\n\\[ c^2=(3.0\\times10^8)^2=9.0\\times10^{16}\\,\\mathrm{m^2\\,s^{-2}}, \\]\nwe get\n\\[ \\Delta m=\\frac{9.0\\times10^{16}}{9.0\\times10^{16}}=1.0\\,\\mathrm{kg}. \\]\nThe invariant mass decreases by \\(1.0\\,\\mathrm{kg}\\)."}]}, "5.2": {"label": "Action principle", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "The action principle states that the physical history of a system makes the action stationary under small allowed variations. For particle mechanics, the action is usually \\[ S=\\int L(q,\\dot q,t)\\,dt, \\] where \\(L\\) is the \\cref{Lagrangian}{5.1}.", "derivation_new": "The action principle is a principle rather than a result derived from another concept in this graph. Its mathematical content is the stationarity condition \\[ \\delta S=0. \\] Once an action is chosen, this condition produces equations of motion. In relativistic mechanics the action is chosen to be a scalar, often built from invariant quantities such as \\cref{Proper time}{4.1} or contractions of \\cref{Four-vectors}{4.2}, so that the resulting dynamics respect \\cref{Lorentz transformations}{3.3}.", "explanation_new": "The action principle can feel abstract because it talks about whole histories rather than instant-by-instant forces. The idea is to compare nearby possible paths between the same endpoints and ask which path makes the action stationary. 'Stationary' does not always mean shortest; it means the first-order change vanishes under small variations. This is like standing at the top of a hill or bottom of a valley: tiny moves do not change height to first order. From this global-sounding rule, local equations of motion emerge. That is why it becomes such a powerful bridge to fields.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_2\">\n<title id=\"title-n5_2\">Action principle<\/title>\n\n<path d=\"M96,370 C158,188 304,356 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C198,324 274,164 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C170,250 290,280 416,150\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\"/>\n<circle cx=\"96.0\" cy=\"370.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<circle cx=\"416.0\" cy=\"150.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"52.0\" y=\"380.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"440.0\" y=\"140.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"250.0\" y=\"210.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_2\">\n<title id=\"title-n5_2\">Action principle<\/title>\n\n<path d=\"M96,370 C145,208 326,334 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C198,324 274,164 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M144,260 C176,242 196,242 228,260\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M250,270 C286,254 318,254 354,270\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<text x=\"246.0\" y=\"214.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">δx<\/text>\n<path d=\"M96,370 C170,250 290,280 416,150\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\"/>\n<circle cx=\"96.0\" cy=\"370.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<circle cx=\"416.0\" cy=\"150.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"52.0\" y=\"380.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"440.0\" y=\"140.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"250.0\" y=\"210.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_2\">\n<title id=\"title-n5_2\">Action principle<\/title>\n\n<path d=\"M96,370 C145,208 326,334 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M96,370 C198,324 274,164 416,150\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 9\"/>\n<path d=\"M144,260 C176,242 196,242 228,260\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M250,270 C286,254 318,254 354,270\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<text x=\"246.0\" y=\"214.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">δx<\/text>\n<path d=\"M96,370 C170,250 290,280 416,150\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\"/>\n<circle cx=\"96.0\" cy=\"370.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<circle cx=\"416.0\" cy=\"150.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"52.0\" y=\"380.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"440.0\" y=\"140.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"250.0\" y=\"210.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "A highlighted path between fixed endpoints is compared with nearby variations.", "svg_detail_caption": "The physical path is the one whose action is stationary: small fixed-endpoint variations make no first-order change in S.", "study_questions": [{"question": "When applying the action principle, why do we compare nearby possible histories with the same endpoints?\n\nA. To find the path with the largest speed at every point\nB. To make the potential energy vanish\nC. To identify the history for which the first-order change in action is zero\nD. To avoid using a Lagrangian", "answer": "C. The physical history makes the action stationary.\n\nThat means the first-order change in \\(S\\) vanishes under allowed variations of the path with fixed endpoints; it does not necessarily mean shortest distance."}, {"question": "In the action principle, why does stationary not necessarily mean shortest or smallest?", "answer": "Stationary means that the first-order change vanishes under small allowed variations. A minimum is one kind of stationary point, but a maximum or saddle point can also have zero first-order change. The key condition is \\(\\delta S=0\\), not that \\(S\\) must be the smallest possible number."}, {"question": "Suppose nearby trial paths are labelled by a small parameter \\(a\\), and their action is\n\\[ S(a)=10+3a^2. \\]\nAt \\(a=0\\), is the action stationary? Is it a minimum?", "answer": "Differentiate:\n\\[ \\frac{dS}{da}=6a. \\]\nAt \\(a=0\\), \\(dS/da=0\\), so the action is stationary. Since\n\\[ \\frac{d^2S}{da^2}=6>0, \\]\nit is also a minimum. The action principle needs stationarity; in this simple example the stationary path also minimizes \\(S\\)."}]}, "5.1": {"label": "Lagrangian", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "A Lagrangian \\(L\\) is a function of generalized coordinates, velocities, and possibly time that is integrated to form the action. For particle mechanics, \\[ S=\\int L(q,\\dot q,t)\\,dt. \\]", "derivation_new": "The Lagrangian is not derived from a universal formula; it is chosen to encode the physical assumptions of the system. Once inserted into the \\cref{Action principle}{5.2}, it determines the equations of motion through the \\cref{Euler-Lagrange equations}{5.3}. In relativistic systems the allowed building blocks are constrained by Lorentz covariance: one builds \\(L\\), or the action directly, from invariant quantities such as the \\cref{Spacetime interval}{3.2}, \\cref{Proper time}{4.1}, or scalar contractions of \\cref{Four-vectors}{4.2}.", "explanation_new": "The Lagrangian is the local ingredient whose accumulated value gives the action. In simple mechanics it is often \\(T-V\\), but the deeper idea is not that particular formula. The Lagrangian is a compact rule that tells the variational principle what kind of motion is allowed. If you know \\(L\\), you can form \\(S=\\int L\\,dt\\), vary the path, and derive equations of motion. For relativistic systems, the Lagrangian must be built from quantities that make sense across inertial frames. That is why invariant intervals, four-vectors, and later field densities enter the story.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"172.0\" y=\"244.0\" width=\"70.0\" height=\"62.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"207.0\" y=\"289.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_1_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"98.0\" y=\"258.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"126.0\" y=\"297.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"162.0\" y=\"242.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"190.0\" y=\"281.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"226.0\" y=\"202.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"254.0\" y=\"241.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<text x=\"260.0\" y=\"388.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">∫ L dt<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_1_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"98.0\" y=\"258.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"126.0\" y=\"297.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"162.0\" y=\"242.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"190.0\" y=\"281.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"226.0\" y=\"202.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"254.0\" y=\"241.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<text x=\"260.0\" y=\"388.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">∫ L dt<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_1_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "Local Lagrangian tiles accumulate into the action S.", "svg_detail_caption": "The Lagrangian is the local rule assigned along a history; adding it up through time gives the action S.", "study_questions": [{"question": "Suppose two proposed Lagrangians give the same Euler-Lagrange equations but differ by a total time derivative. How should you interpret this?\n\nA. They can describe the same dynamics because the action changes only by endpoint terms\nB. One must be rejected because \\(L\\) itself is directly observable\nC. Both must give zero forces\nD. The one with the larger numerical value is more physical", "answer": "A. Lagrangians that differ by a total time derivative can give the same equations of motion.\n\nThe action changes only by endpoint terms, so the stationary-path condition is unchanged for fixed endpoints."}, {"question": "For many simple nonrelativistic systems,\n\\[ L=T-V. \\]\nWhy should a student not treat this as the definition of a Lagrangian?", "answer": "Because \\(T-V\\) is a common example, not the general definition. More generally, a Lagrangian is the local rule inserted into the action. It is chosen to encode the physics of the system. In relativistic settings this choice is constrained by Lorentz covariance, so \\(L\\), or the action directly, must be built from invariant quantities."}, {"question": "A particle of mass \\(m=2\\,\\mathrm{kg}\\) moves in one dimension with velocity \\(\\dot x=3\\,\\mathrm{m\\,s^{-1}}\\). Its potential energy at that position is \\(V=5\\,\\mathrm{J}\\).\n\nUsing\n\\[ L=T-V, \\qquad T=\\frac12 m\\dot x^2, \\]\ncalculate \\(L\\).", "answer": "First calculate the kinetic energy:\n\\[ T=\\frac12 m\\dot x^2 = \\frac12(2)(3^2)=9\\,\\mathrm{J}. \\]\nThen\n\\[ L=T-V=9-5=4\\,\\mathrm{J}. \\]\nSo the Lagrangian value at that instant is \\(L=4\\,\\mathrm{J}\\). This is not the whole action; the action comes from accumulating \\(L\\) over time."}]}, "5.3": {"label": "Euler–Lagrange equations", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "The Euler-Lagrange equations are the equations of motion obtained by applying the \\cref{Action principle}{5.2} to a chosen \\cref{Lagrangian}{5.1}. For one coordinate, \\[ \\frac{d}{dt}\\left(\\frac{\\partial L}{\\partial\\dot q}\\right)-\\frac{\\partial L}{\\partial q}=0. \\]", "derivation_new": "Start with the \\cref{Action principle}{5.2} in the form \\(S=\\int_{t_1}^{t_2}L(q,\\dot q,t)\\,dt\\) and vary the path \\(q(t)\\rightarrow q(t)+\\delta q(t)\\), holding the endpoints fixed. The first variation is \\[ \\delta S=\\int_{t_1}^{t_2}\\left(\\frac{\\partial L}{\\partial q}\\delta q+\\frac{\\partial L}{\\partial\\dot q}\\delta\\dot q\\right)dt. \\] Integrating the second term by parts and using \\(\\delta q(t_1)=\\delta q(t_2)=0\\) gives \\[ \\delta S=\\int_{t_1}^{t_2}\\left(\\frac{\\partial L}{\\partial q}-\\frac{d}{dt}\\frac{\\partial L}{\\partial\\dot q}\\right)\\delta q\\,dt. \\] Since this must vanish for arbitrary \\(\\delta q\\), the Euler-Lagrange equation follows.", "explanation_new": "Euler-Lagrange equations are what the action principle looks like after the variation has been done. The intimidating derivative expression is really a balance statement: changes in how \\(L\\) depends on position are balanced against changes in how \\(L\\) depends on velocity. For a familiar example, using \\(L=\\tfrac12m\\dot x^2-V(x)\\) gives \\(m\\ddot x=-dV/dx\\), Newton's law in disguise. The power of the formula is that the same pattern works for generalized coordinates and, with suitable modification, for fields.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<line x1=\"270.0\" y1=\"256.0\" x2=\"340.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"356.0\" y=\"214.0\" width=\"96.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"404.0\" y=\"268.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<rect x=\"288.0\" y=\"98.0\" width=\"112.0\" height=\"58.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"137.2\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">δS = 0<\/text>\n<line x1=\"344.0\" y1=\"164.0\" x2=\"344.0\" y2=\"238.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"280.0\" y=\"248.0\" width=\"100.0\" height=\"72.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"330.0\" y=\"295.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<path d=\"M390,284 C430,272 454,244 474,202\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<rect x=\"288.0\" y=\"98.0\" width=\"112.0\" height=\"58.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"137.2\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">δS = 0<\/text>\n<line x1=\"344.0\" y1=\"164.0\" x2=\"344.0\" y2=\"238.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"280.0\" y=\"248.0\" width=\"100.0\" height=\"72.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"330.0\" y=\"295.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<path d=\"M390,284 C430,272 454,244 474,202\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<\/svg>", "svg_icon_caption": "A varied path leads to an Euler-Lagrange equation tile.", "svg_detail_caption": "Fixed-endpoint variations of the path impose delta S = 0, which turns the action principle into the Euler-Lagrange equations.", "study_questions": [{"question": "You are given an action \\(S=\\int L(q,\\dot q,t)dt\\) and want local equations of motion. Which step expresses the stationarity condition in differential form?\n\nA. Set \\(L=0\\)\nB. Replace \\(q\\) by \\(ct\\)\nC. Demand \\(\\partial L/\\partial \\dot q=0\\) only\nD. Apply \\(\\frac{d}{dt}\\frac{\\partial L}{\\partial\\dot q}-\\frac{\\partial L}{\\partial q}=0\\)", "answer": "D. The Euler-Lagrange equation is\n\\[ \\frac{d}{dt}\\frac{\\partial L}{\\partial\\dot q}-\\frac{\\partial L}{\\partial q}=0. \\]\nIt converts the stationary-action statement into a local equation of motion."}, {"question": "For\n\\[ L=\\frac12m\\dot x^2-V(x), \\]\nshow briefly how the Euler-Lagrange equation gives Newton's law for a conservative force.", "answer": "Compute the two terms:\n\\[ \\frac{\\partial L}{\\partial\\dot x}=m\\dot x, \\qquad \\frac{d}{dt}\\frac{\\partial L}{\\partial\\dot x}=m\\ddot x, \\]\nand\n\\[ \\frac{\\partial L}{\\partial x}=-\\frac{dV}{dx}. \\]\nThe Euler-Lagrange equation gives\n\\[ m\\ddot x+\\frac{dV}{dx}=0, \\]\nso\n\\[ m\\ddot x=-\\frac{dV}{dx}=F. \\]"}, {"question": "A mass on a spring has\n\\[ L=\\frac12m\\dot x^2-\\frac12kx^2. \\]\nIf \\(m=2\\,\\mathrm{kg}\\), \\(k=8\\,\\mathrm{N\\,m^{-1}}\\), and \\(x=0.5\\,\\mathrm m\\), what acceleration does the Euler-Lagrange equation predict at that instant?", "answer": "The Euler-Lagrange equation gives\n\\[ m\\ddot x+kx=0, \\]\nso\n\\[ \\ddot x=-\\frac{k}{m}x. \\]\nSubstitute the numbers:\n\\[ \\ddot x=-\\frac{8}{2}(0.5)=-2\\,\\mathrm{m\\,s^{-2}}. \\]\nThe acceleration points back toward equilibrium."}]}, "5.5": {"label": "Hamiltonian formalism", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "Hamiltonian formalism rewrites dynamics in terms of coordinates and canonical momenta rather than coordinates and velocities. It is obtained by defining \\cref{Canonical momentum}{5.4} and forming the Hamiltonian \\[ H(q,p,t)=p\\dot q-L. \\]", "derivation_new": "Starting from a \\cref{Lagrangian}{5.1}, define the \\cref{Canonical momentum}{5.4} \\[ p=\\frac{\\partial L}{\\partial\\dot q}. \\] If this relation can be solved for \\(\\dot q\\) in terms of \\(q\\) and \\(p\\), perform the Legendre transform \\[ H(q,p,t)=p\\dot q-L(q,\\dot q,t). \\] Differentiating \\(H\\) gives Hamilton's equations, \\[ \\dot q=\\frac{\\partial H}{\\partial p}, \\qquad \\dot p=-\\frac{\\partial H}{\\partial q}. \\] Thus the formalism is derived from the Lagrangian formulation plus the canonical momentum construction.", "explanation_new": "Hamiltonian formalism reorganizes the same dynamics into phase space, where coordinates and momenta are treated as paired variables. The Hamiltonian often corresponds to energy, but conceptually it is the generator of time evolution in this phase-space description. The move from Lagrangian to Hamiltonian is a Legendre transform: replace velocity dependence with momentum dependence. This is useful because many conservation laws and symmetry structures become especially clear. For a free particle the Hamiltonian tracks energy; for constrained or gauge systems it can be subtler, so it should not be treated as merely a synonym for energy.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_5_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_flow)\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_5_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M146,318 C214,236 308,230 374,306\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M166,344 C236,276 316,276 396,338\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_flow)\"/>\n<line x1=\"213.3\" y1=\"259.9\" x2=\"238.7\" y2=\"244.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"297.3\" y1=\"211.9\" x2=\"322.7\" y2=\"196.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_5_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M146,318 C214,236 308,230 374,306\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M166,344 C236,276 316,276 396,338\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_flow)\"/>\n<line x1=\"213.3\" y1=\"259.9\" x2=\"238.7\" y2=\"244.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"297.3\" y1=\"211.9\" x2=\"322.7\" y2=\"196.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_icon_caption": "A curve in q-p phase space is generated by H.", "svg_detail_caption": "Hamiltonian mechanics describes dynamics as flow in q-p phase space, where H generates time evolution of coordinates and momenta.", "study_questions": [{"question": "Why is Hamiltonian formalism often useful after a Lagrangian description has been found?\n\nA. It removes the need for initial data\nB. It rewrites dynamics in terms of coordinates and momenta, often making energy and evolution structure clearer\nC. It works only for electromagnetic waves\nD. It makes all relativistic effects vanish", "answer": "B. Hamiltonian formalism uses coordinates and canonical momenta as phase-space variables.\n\nThis often gives a clearer view of conserved energy, evolution, and the structure behind dynamics."}, {"question": "What is the Legendre-transform relation between the Hamiltonian and the Lagrangian?", "answer": "After defining the canonical momentum and solving for velocity in terms of \\(q\\) and \\(p\\), the Hamiltonian is formed as\n\\[ H(q,p,t)=p\\dot q-L(q,\\dot q,t). \\]\nConceptually, this replaces velocity dependence with momentum dependence."}, {"question": "For a free particle with\n\\[ L=\\frac12m\\dot x^2, \\qquad p=m\\dot x, \\]\ntake \\(m=2\\,\\mathrm{kg}\\) and \\(\\dot x=3\\,\\mathrm{m\\,s^{-1}}\\). Compute \\(p\\) and \\(H=p\\dot x-L\\).", "answer": "First compute the canonical momentum:\n\\[ p=m\\dot x=2(3)=6\\,\\mathrm{kg\\,m\\,s^{-1}}. \\]\nThe Lagrangian value is\n\\[ L=\\frac12(2)(3^2)=9\\,\\mathrm J. \\]\nThen\n\\[ H=p\\dot x-L=6(3)-9=9\\,\\mathrm J. \\]\nFor this free particle, the Hamiltonian equals the kinetic energy."}]}, "5.4": {"label": "Canonical momentum", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "Canonical momentum is the momentum conjugate to a coordinate in the Lagrangian formulation. For a coordinate \\(q\\), \\[ p=\\frac{\\partial L}{\\partial\\dot q}. \\]", "derivation_new": "Canonical momentum is derived from the velocity dependence of the \\cref{Lagrangian}{5.1}. When the action is varied, the coefficient of \\(\\delta\\dot q\\) is \\(\\partial L/\\partial\\dot q\\). This quantity is therefore the natural variable paired with \\(q\\), and it is the object used in the Legendre transform leading to \\cref{Hamiltonian formalism}{5.5}.", "explanation_new": "Canonical momentum is the momentum that belongs to the Lagrangian coordinate system. In simple cases it equals mechanical momentum, so it is tempting to identify the two. Electromagnetism shows why that is too quick. When a charged particle couples to a vector potential, the canonical momentum includes potential-dependent terms, while the mechanical momentum describes the particle's actual motion. The definition \\(p=\\partial L/\\partial\\dot q\\) is therefore not just a fancy way to write \\(mv\\); it tells you which momentum is paired with \\(q\\) in Hamiltonian mechanics.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_4\">\n<title id=\"title-n5_4\">Canonical momentum<\/title>\n<defs>\n\n<marker id=\"n5_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"76.0\" y1=\"344.0\" x2=\"290.0\" y2=\"344.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<text x=\"298.0\" y=\"374.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<circle cx=\"172.0\" cy=\"344.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"172.0\" y1=\"344.0\" x2=\"172.0\" y2=\"242.0\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<text x=\"188.0\" y=\"250.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">p<\/text>\n<rect x=\"320.0\" y=\"252.0\" width=\"72.0\" height=\"62.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"356.0\" y=\"295.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"314.0\" y1=\"282.0\" x2=\"220.0\" y2=\"282.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_4\">\n<title id=\"title-n5_4\">Canonical momentum<\/title>\n<defs>\n\n<marker id=\"n5_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"76.0\" y1=\"344.0\" x2=\"290.0\" y2=\"344.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<text x=\"298.0\" y=\"374.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<circle cx=\"172.0\" cy=\"344.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"172.0\" y1=\"344.0\" x2=\"172.0\" y2=\"242.0\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<text x=\"188.0\" y=\"250.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">p<\/text>\n<line x1=\"122.0\" y1=\"300.0\" x2=\"206.0\" y2=\"300.0\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<text x=\"154.0\" y=\"288.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">q̇<\/text>\n<rect x=\"312.0\" y=\"164.0\" width=\"64.0\" height=\"60.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"206.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"340.0\" y1=\"232.0\" x2=\"340.0\" y2=\"282.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<rect x=\"304.0\" y=\"270.0\" width=\"126.0\" height=\"54.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"367.0\" y=\"305.0\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂L / ∂q̇<\/text>\n<line x1=\"304.0\" y1=\"318.0\" x2=\"214.0\" y2=\"306.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_4\">\n<title id=\"title-n5_4\">Canonical momentum<\/title>\n<defs>\n\n<marker id=\"n5_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"76.0\" y1=\"344.0\" x2=\"290.0\" y2=\"344.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<text x=\"298.0\" y=\"374.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<circle cx=\"172.0\" cy=\"344.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"172.0\" y1=\"344.0\" x2=\"172.0\" y2=\"242.0\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<text x=\"188.0\" y=\"250.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">p<\/text>\n<line x1=\"122.0\" y1=\"300.0\" x2=\"206.0\" y2=\"300.0\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<text x=\"154.0\" y=\"288.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">q̇<\/text>\n<rect x=\"312.0\" y=\"164.0\" width=\"64.0\" height=\"60.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"206.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"340.0\" y1=\"232.0\" x2=\"340.0\" y2=\"282.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<rect x=\"304.0\" y=\"270.0\" width=\"126.0\" height=\"54.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"367.0\" y=\"305.0\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂L / ∂q̇<\/text>\n<line x1=\"304.0\" y1=\"318.0\" x2=\"214.0\" y2=\"306.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<\/svg>", "svg_icon_caption": "The coordinate q is paired with a conjugate momentum p.", "svg_detail_caption": "Canonical momentum p is paired with coordinate q because it comes from how the Lagrangian depends on q's velocity.", "study_questions": [{"question": "A system includes a velocity-dependent interaction, so the canonical momentum is not simply \\(m\\dot q\\). Which definition should you use?\n\nA. \\(p=qL\\)\nB. \\(p=\\partial L/\\partial q\\)\nC. \\(p=\\partial L/\\partial\\dot q\\)\nD. \\(p=L/\\dot q\\)", "answer": "C. Canonical momentum is defined by\n\\[ p=\\frac{\\partial L}{\\partial\\dot q}. \\]\nIt is conjugate to the coordinate \\(q\\), and velocity-dependent interactions can make it differ from ordinary mechanical momentum."}, {"question": "Why is canonical momentum not always the same thing as mechanical momentum?", "answer": "Canonical momentum is defined by the velocity dependence of the Lagrangian. In simple free-particle cases this gives \\(p=m\\dot q\\), matching mechanical momentum. But if the Lagrangian contains velocity-dependent interaction terms, such as electromagnetic coupling to a vector potential, \\(\\partial L/\\partial\\dot q\\) can include extra potential-dependent pieces."}, {"question": "In a one-dimensional toy model for a charged particle, suppose\n\\[ L=\\frac12m\\dot x^2+qA\\dot x-q\\phi, \\]\nwhere \\(A\\) and \\(\\phi\\) do not depend on \\(\\dot x\\). Find the canonical momentum. If \\(m=2\\), \\(\\dot x=3\\), \\(q=1.5\\), and \\(A=4\\), what is \\(p\\)?", "answer": "Differentiate with respect to \\(\\dot x\\):\n\\[ p=\\frac{\\partial L}{\\partial\\dot x}=m\\dot x+qA. \\]\nThe scalar-potential term \\(-q\\phi\\) contributes nothing because it has no \\(\\dot x\\). Numerically,\n\\[ p=2(3)+1.5(4)=6+6=12. \\]\nThis illustrates why canonical momentum can differ from mechanical momentum \\(m\\dot x\\)."}]}, "5.6": {"label": "Noether's theorem", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "Noether's theorem states that every continuous symmetry of the action corresponds to a conserved quantity. It links symmetries in the \\cref{Action principle}{5.2} to conservation laws such as energy, momentum, angular momentum, and charge.", "derivation_new": "The theorem follows from the stationarity of the action in the \\cref{Action principle}{5.2}. Suppose a continuous transformation changes the dynamical variables by an infinitesimal amount and leaves the action unchanged, up to possible boundary terms. Applying \\(\\delta S=0\\) and using the equations of motion leaves a total derivative, which identifies a conserved current or conserved quantity. For time translations the conserved quantity is energy; for spatial translations it is momentum. In field theory, spacetime translations lead to the \\cref{Energy--momentum tensor}{9.1}.", "explanation_new": "Noether's theorem is one of the best organizing ideas in physics: a continuous symmetry gives a conservation law. If the action does not change when you shift every position by the same small amount, momentum is conserved. If it does not change when you shift the time origin, energy is conserved. The theorem is not saying conservation is a coincidence; it explains where conservation laws come from. For example, in a translation-invariant system, nudging the whole experiment sideways should not change the physics, and that symmetry is what lies behind conservation of momentum.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_6\">\n<title id=\"title-n5_6\">Noether's theorem<\/title>\n<defs>\n\n<marker id=\"n5_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"92.0\" y=\"204.0\" width=\"98.0\" height=\"88.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"141.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<path d=\"M104,196 C78,144 158,104 196,156 C214,184 210,198 196,198\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<line x1=\"204.0\" y1=\"248.0\" x2=\"306.0\" y2=\"248.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<rect x=\"324.0\" y=\"198.0\" width=\"108.0\" height=\"100.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"378.0\" y=\"267.7\" font-size=\"58\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Q<\/text>\n<circle cx=\"406.0\" cy=\"212.0\" r=\"11.0\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\"/>\n<line x1=\"400.0\" y1=\"218.0\" x2=\"412.0\" y2=\"206.0\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_6\">\n<title id=\"title-n5_6\">Noether's theorem<\/title>\n<defs>\n\n<marker id=\"n5_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"92.0\" y=\"204.0\" width=\"98.0\" height=\"88.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"141.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<path d=\"M104,196 C78,144 158,104 196,156 C214,184 210,198 196,198\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<text x=\"140.0\" y=\"324.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">unchanged<\/text>\n<line x1=\"204.0\" y1=\"248.0\" x2=\"306.0\" y2=\"248.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<rect x=\"324.0\" y=\"198.0\" width=\"108.0\" height=\"100.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"378.0\" y=\"267.7\" font-size=\"58\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Q<\/text>\n<circle cx=\"406.0\" cy=\"212.0\" r=\"11.0\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\"/>\n<line x1=\"400.0\" y1=\"218.0\" x2=\"412.0\" y2=\"206.0\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"378.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">conserved<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_6\">\n<title id=\"title-n5_6\">Noether's theorem<\/title>\n<defs>\n\n<marker id=\"n5_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"92.0\" y=\"204.0\" width=\"98.0\" height=\"88.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"141.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<path d=\"M104,196 C78,144 158,104 196,156 C214,184 210,198 196,198\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<text x=\"140.0\" y=\"324.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">unchanged<\/text>\n<line x1=\"204.0\" y1=\"248.0\" x2=\"306.0\" y2=\"248.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<rect x=\"324.0\" y=\"198.0\" width=\"108.0\" height=\"100.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"378.0\" y=\"267.7\" font-size=\"58\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Q<\/text>\n<circle cx=\"406.0\" cy=\"212.0\" r=\"11.0\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\"/>\n<line x1=\"400.0\" y1=\"218.0\" x2=\"412.0\" y2=\"206.0\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"378.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">conserved<\/text>\n<\/svg>", "svg_icon_caption": "A continuous symmetry of S points to a conserved Q.", "svg_detail_caption": "Noether's theorem links symmetry to conservation: if a smooth transformation leaves S unchanged, a corresponding quantity Q is conserved.", "study_questions": [{"question": "A Lagrangian is unchanged under spatial translations. What should you expect from Noether's theorem?\n\nA. A conserved momentum associated with that symmetry\nB. A violation of charge conservation\nC. A preferred inertial frame\nD. A gauge condition for \\(A_\\mu\\)", "answer": "A. Noether's theorem connects continuous symmetries to conserved quantities.\n\nSpatial translation symmetry gives conservation of momentum; time translation symmetry similarly gives conservation of energy."}, {"question": "Which conservation law is associated with each symmetry?\n\n1. Time translation symmetry\n2. Spatial translation symmetry\n3. Rotational symmetry", "answer": "The usual associations are:\n\n1. Time translation symmetry gives conservation of energy.\n2. Spatial translation symmetry gives conservation of momentum.\n3. Rotational symmetry gives conservation of angular momentum.\n\nNoether's theorem explains these as consequences of symmetries of the action, not as unrelated facts."}, {"question": "A free particle has\n\\[ L=\\frac12m\\dot x^2. \\]\nThis Lagrangian has no explicit dependence on \\(x\\) or \\(t\\). For \\(m=2\\,\\mathrm{kg}\\) and \\(\\dot x=3\\,\\mathrm{m\\,s^{-1}}\\), calculate the conserved momentum and energy.", "answer": "No explicit \\(x\\) dependence signals spatial-translation symmetry, so momentum is conserved:\n\\[ p=m\\dot x=2(3)=6\\,\\mathrm{kg\\,m\\,s^{-1}}. \\]\nNo explicit \\(t\\) dependence signals time-translation symmetry, so energy is conserved. For this free particle,\n\\[ E=\\frac12m\\dot x^2=\\frac12(2)(3^2)=9\\,\\mathrm J. \\]"}]}, "6.1": {"label": "Scalar field", "layer": "6", "layer_title": "Field Foundations", "definition_new": "A scalar field assigns a single value \\(\\phi(x)\\) to every \\cref{Spacetime event}{2.2}. Its defining relativistic property is that the value at an event is invariant under \\cref{Lorentz transformations}{3.3}: observers relabel the event but do not transform \\(\\phi\\) into components.", "derivation_new": "A scalar field is a definition rather than a quantity derived from another field. Starting with spacetime points \\(x\\), assign one number \\(\\phi(x)\\) to each point. Under a Lorentz transformation \\(x\\rightarrow x'\\), the scalar transformation law is \\[ \\phi'(x')=\\phi(x). \\] This contrasts with \\cref{Four-vectors}{4.2}, whose components mix between frames.", "explanation_new": "A scalar field assigns one value to every spacetime point. Temperature in a room is a useful nonrelativistic analogy: at each location and time there is a number, not an arrow. In relativity the special feature is that the value of a scalar field at an event is observer-independent. Different observers may use different coordinates to label the event, but they agree on the scalar value there. This makes scalar fields the simplest examples for learning field theory: they have spacetime dependence and dynamics without the extra complication of vector or tensor components.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_1\">\n<title id=\"title-n6_1\">Scalar field<\/title>\n<defs>\n\n<marker id=\"n6_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<line x1=\"158.0\" y1=\"118.0\" x2=\"158.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"218.0\" y1=\"118.0\" x2=\"218.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"278.0\" y1=\"118.0\" x2=\"278.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"338.0\" y1=\"118.0\" x2=\"338.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"178.0\" x2=\"398.0\" y2=\"178.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"238.0\" x2=\"398.0\" y2=\"238.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"298.0\" x2=\"398.0\" y2=\"298.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"358.0\" x2=\"398.0\" y2=\"358.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"414.0\" x2=\"418.0\" y2=\"414.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_1_axis_arrow)\"/>\n<line x1=\"82.0\" y1=\"414.0\" x2=\"82.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_1_axis_arrow)\"/>\n<text x=\"436.0\" y=\"424.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"66.0\" y=\"86.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">ct<\/te " stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"258.0\" cy=\"248.0\" r=\"31.0\" fill=\"#1f4fbf\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"318.0\" cy=\"204.0\" r=\"21.0\" fill=\"#8fb0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"378.0\" cy=\"322.0\" r=\"16.0\" fill=\"#bdd0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"138.0\" cy=\"192.0\" r=\"18.0\" fill=\"#bdd0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"198.0\" cy=\"160.0\" r=\"26.0\" fill=\"#6d93ed\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"318.0\" cy=\"352.0\" r=\"12.0\" fill=\"#d7e5ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"378.0\" cy=\"152.0\" r=\"15.0\" fill=\"#bdd0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<text x=\"300.0\" y=\"246.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">φ(x)<\/text>\n<\/svg>", "svg_icon_caption": "Different-sized discs show one scalar value at each spacetime point.", "svg_detail_caption": "A scalar field assigns one number phi(x) to every spacetime point; the value can vary from point to point but has no direction.", "study_questions": [{"question": "A temperature-like quantity has one value at each spacetime event and does not point in any direction. What kind of relativistic field is this closest to?\n\nA. A four-current\nB. A vector field\nC. A field tensor\nD. A scalar field", "answer": "D. A scalar field assigns one scalar value to each spacetime event.\n\nIt has no direction or index structure, though its numerical value can vary from event to event."}, {"question": "How does a scalar field transform under a Lorentz transformation?", "answer": "If \\(x\\rightarrow x'\\), the scalar transformation law is\n\\[ \\phi'(x')=\\phi(x). \\]\nThe value is invariant at the event. This contrasts with a vector field, whose components mix between frames."}, {"question": "Suppose a scalar field in one frame is \\(\\phi(t,x)=2t+x\\), using units where \\(c=1\\). At an event with \\(t=3\\) and \\(x=4\\), what scalar value must every observer agree on for that same event?", "answer": "Evaluate the field at the event:\n\\[ \\phi=2t+x=2(3)+4=10. \\]\nAnother observer may use different coordinates \\((t',x')\\) for the same event, but the transformed scalar field satisfies \\(\\phi'(x')=10\\)."}]}, "6.2": {"label": "Vector field", "layer": "6", "layer_title": "Field Foundations", "definition_new": "A vector field assigns a four-vector-like object to every spacetime event. Its components, written for example as \\(A^\\mu(x)\\) or \\(A_\\mu(x)\\), transform as a \\cref{Four-vectors}{4.2} under \\cref{Lorentz transformations}{3.3}.", "derivation_new": "A vector field is constructed by taking the four-vector transformation law and applying it locally at every event. If \\(A^\\mu(x)\\) is a vector field, then under a Lorentz transformation \\[ A'^\\mu(x')=\\Lambda^\\mu{}_{\\nu}A^\\nu(x). \\] Thus a vector field is not four unrelated scalar fields; its components mix according to the same rule used for four-vectors.", "explanation_new": "A vector field attaches a vector-like object to every spacetime point. The electromagnetic vector potential is the main example here. The key is locality plus transformation: each event has its own components, and those components transform as a four-vector when observers change frames. It is different from drawing one big arrow in space. Better picture a spacetime grid with a small arrow anchored at each event, allowed to vary from event to event. This is the kind of object a local field equation can act on.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_2\">\n<title id=\"title-n6_2\">Vector field<\/title>\n<defs>\n\n<marker id=\"n6_2_axis_arrow
