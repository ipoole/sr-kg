4.0\" r=\"16.0\" fill=\"#ffdada\" stroke=\"#d22f2f\" stroke-width=\"2\"/>\n<text x=\"388.0\" y=\"263.0\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#d22f2f\" text-anchor=\"middle\">+<\/text>\n<line x1=\"412.0\" y1=\"254.0\" x2=\"474.0\" y2=\"254.0\" stroke=\"#d22f2f\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<text x=\"454.0\" y=\"238.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">F<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_3\">\n<title id=\"title-n7_3\">Electric field<\/title>\n<defs>\n\n<marker id=\"n7_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"268.0\" y1=\"254.0\" x2=\"380.0\" y2=\"254.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"255.7\" y1=\"283.7\" x2=\"334.9\" y2=\"362.9\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"226.0\" y1=\"296.0\" x2=\"226.0\" y2=\"408.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"196.3\" y1=\"283.7\" x2=\"117.1\" y2=\"362.9\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"184.0\" y1=\"254.0\" x2=\"72.0\" y2=\"254.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"196.3\" y1=\"224.3\" x2=\"117.1\" y2=\"145.1\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"226.0\" y1=\"212.0\" x2=\"226.0\" y2=\"100.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"255.7\" y1=\"224.3\" x2=\"334.9\" y2=\"145.1\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<circle cx=\"226.0\" cy=\"254.0\" r=\"30.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"214.0\" y1=\"254.0\" x2=\"238.0\" y2=\"254.0\" stroke=\"white\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"226.0\" y1=\"242.0\" x2=\"226.0\" y2=\"266.0\" stroke=\"white\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"384.0\" y=\"140.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<circle cx=\"388.0\" cy=\"254.0\" r=\"16.0\" fill=\"#ffdada\" stroke=\"#d22f2f\" stroke-width=\"2\"/>\n<text x=\"388.0\" y=\"263.0\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#d22f2f\" text-anchor=\"middle\">+<\/text>\n<line x1=\"412.0\" y1=\"254.0\" x2=\"474.0\" y2=\"254.0\" stroke=\"#d22f2f\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<text x=\"454.0\" y=\"238.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">F<\/text>\n<\/svg>", "svg_icon_caption": "Radial E arrows show the electric field of a positive charge.", "svg_detail_caption": "The electric field tells a stationary positive test charge which direction it would be pushed at each point.", "study_questions": [{"question": "An observer changes inertial frame and part of what was called electric field mixes with magnetic components. What is the safest relativistic way to identify the electric field?\n\nA. Use only the spatial-spatial part of the metric\nB. Read the appropriate time-space components of \\(F_{\\mu\nu}\\) in that observer's frame\nC. Set \\(\\mathbf B=0\\) by definition\nD. Use the scalar field value at the event", "answer": "B. In a given inertial frame, electric field components are read from the time-space parts of \\(F_{\\mu\nu}\\).\n\nDifferent observers may split the same tensor into \\(\\mathbf E\\) and \\(\\mathbf B\\) differently."}, {"question": "Why is the electric field described as frame-dependent in this graph?", "answer": "The electric field is one observer's split of the electromagnetic field tensor into electric and magnetic parts. Another observer moving relative to the first can decompose the same tensor differently, so what counts as electric and magnetic can mix between frames."}, {"question": "In one dimension, suppose the scalar potential is \\(\\phi(x)=10-2x\\) and \\(\\partial\\mathbf A/\\partial t=0\\). Using\n\\[ E_x=-\\frac{d\\phi}{dx}, \\]\nfind \\(E_x\\).", "answer": "Differentiate the potential:\n\\[ \\frac{d\\phi}{dx}=-2. \\]\nTherefore\n\\[ E_x=-\\frac{d\\phi}{dx}=-(-2)=2. \\]\nIn the chosen units, the electric field points in the positive \\(x\\) direction."}]}, "7.4": {"label": "Magnetic field", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The magnetic field is the frame-dependent part of the electromagnetic field associated with forces on moving charges and currents. In covariant notation it is read from the spatial components of the \\cref{Field tensor}{7.2}.", "derivation_new": "After choosing an inertial frame, decompose the \\cref{Field tensor}{7.2}. The purely spatial antisymmetric components \\(F_{ij}\\) encode the magnetic field, again with signs fixed by the convention for \\(F_{\\mu\\nu}\\). In terms of the vector potential, the corresponding three-vector relation is \\[ \\mathbf B=\\nabla\\times\\mathbf A. \\]", "explanation_new": "The magnetic field is easiest to remember as the part of the electromagnetic field tied to moving charges and currents, and to sideways forces on moving test charges. But relativity adds a deeper lesson: magnetic and electric fields are not independent substances. They are different frame-dependent aspects of the same field tensor. A current-carrying wire may be described with magnetic effects in one frame and with a different balance of electric and magnetic effects in another. The circular field around a current is the familiar picture; the tensor is the covariant one.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_4\">\n<title id=\"title-n7_4\">Magnetic field<\/title>\n<defs>\n\n<marker id=\"n7_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"256.0\" y1=\"392.0\" x2=\"256.0\" y2=\"120.0\" stroke=\"#d22f2f\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"286.0\" y=\"194.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">v<\/text>\n<path d=\"M170,256 C170,222 342,222 342,256 C342,290 170,290 170,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M124,256 C124,200 388,200 388,256 C388,312 124,312 124,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M78,256 C78,178 434,178 434,256 C434,334 78,334 78,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"404.0\" y=\"214.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_4\">\n<title id=\"title-n7_4\">Magnetic field<\/title>\n<defs>\n\n<marker id=\"n7_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"256.0\" y1=\"392.0\" x2=\"256.0\" y2=\"120.0\" stroke=\"#d22f2f\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"286.0\" y=\"194.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">v<\/text>\n<path d=\"M170,256 C170,222 342,222 342,256 C342,290 170,290 170,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M124,256 C124,200 388,200 388,256 C388,312 124,312 124,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M78,256 C78,178 434,178 434,256 C434,334 78,334 78,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"404.0\" y=\"214.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<circle cx=\"382.0\" cy=\"320.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"382.0\" y1=\"320.0\" x2=\"432.0\" y2=\"342.0\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"450.0\" y=\"360.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">F<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_4\">\n<title id=\"title-n7_4\">Magnetic field<\/title>\n<defs>\n\n<marker id=\"n7_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"256.0\" y1=\"392.0\" x2=\"256.0\" y2=\"120.0\" stroke=\"#d22f2f\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"286.0\" y=\"194.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">v<\/text>\n<path d=\"M170,256 C170,222 342,222 342,256 C342,290 170,290 170,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M124,256 C124,200 388,200 388,256 C388,312 124,312 124,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M78,256 C78,178 434,178 434,256 C434,334 78,334 78,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"404.0\" y=\"214.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<circle cx=\"382.0\" cy=\"320.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"382.0\" y1=\"320.0\" x2=\"432.0\" y2=\"342.0\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"450.0\" y=\"360.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">F<\/text>\n<\/svg>", "svg_icon_caption": "Circular B arrows wrap around a moving charge or current.", "svg_detail_caption": "Magnetic fields are tied to motion: currents or moving charges create circular B patterns, and moving test charges feel sideways forces.", "study_questions": [{"question": "In the field tensor picture, where should you look for the magnetic field components in a chosen inertial frame?\n\nA. In the spatial-spatial antisymmetric components of \\(F_{\\mu\nu}\\)\nB. Only in the trace of \\(F_{\\mu\nu}\\)\nC. In the scalar potential alone\nD. In the spacetime interval", "answer": "A. The magnetic field is encoded in the spatial-spatial antisymmetric components of \\(F_{\\mu\nu}\\).\n\nTogether with the time-space electric components, these form the full electromagnetic field tensor."}, {"question": "Why does relativity discourage treating magnetic and electric fields as completely separate substances?", "answer": "Because they are frame-dependent components of one electromagnetic field tensor. A change of inertial frame can mix what one observer calls electric with what another calls magnetic. The covariant object is \\(F_{\\mu\\nu}\\), not two unrelated fields."}, {"question": "For a simple vector potential \\(\\mathbf A=(-By/2, Bx/2,0)\\), compute\n\\[ B_z=\\frac{\\partial A_y}{\\partial x}-\\frac{\\partial A_x}{\\partial y}. \\]", "answer": "Here\n\\[ A_y=\\frac{Bx}{2}, \\qquad A_x=-\\frac{By}{2}. \\]\nSo\n\\[ \\frac{\\partial A_y}{\\partial x}=\\frac{B}{2}, \\qquad \\frac{\\partial A_x}{\\partial y}=-\\frac{B}{2}. \\]\nTherefore\n\\[ B_z=\\frac{B}{2}-\\left(-\\frac{B}{2}\\right)=B. \\]\nThe vector potential represents a uniform magnetic field in the \\(z\\) direction."}]}, "7.5": {"label": "Electromagnetic field", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The electromagnetic field is the unified relativistic field whose frame-dependent components are the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}. Covariantly, it is represented by the \\cref{Field tensor}{7.2}.", "derivation_new": "The unified electromagnetic field is obtained conceptually by collecting the electric and magnetic components into the antisymmetric tensor \\(F_{\\mu\\nu}\\). In a chosen frame, \\cref{Electric field}{7.3} components occupy the time-space part of the \\cref{Field tensor}{7.2}, while \\cref{Magnetic field}{7.4} components occupy the spatial antisymmetric part. Under \\cref{Lorentz transformations}{3.3}, those components mix, so the covariant object is the tensor, not the separate three-vectors.", "explanation_new": "The electromagnetic field is the unified physical field whose frame-dependent faces are \\(\\mathbf E\\) and \\(\\mathbf B\\). This is more than a vocabulary upgrade. It explains why electric and magnetic effects transform into each other between observers, why the field can carry energy and momentum, and why a local field description replaces instantaneous action at a distance. A useful mental model is that \\(F_{\\mu\\nu}\\) is the underlying object, while \\(\\mathbf E\\) and \\(\\mathbf B\\) are what a particular observer reads off from it.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_5\">\n<title id=\"title-n7_5\">Electromagnetic field<\/title>\n<defs>\n\n<marker id=\"n7_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_5_e\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"190.0\" y=\"172.0\" width=\"132.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"253.1\" font-size=\"68\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<\/text>\n<line x1=\"114.0\" y1=\"224.0\" x2=\"184.0\" y2=\"224.0\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"106.0\" y=\"214.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"end\">E<\/text>\n<path d=\"M330,224 C372,182 418,218 376,258 C350,284 322,270 338,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"394.0\" y=\"288.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_5\">\n<title id=\"title-n7_5\">Electromagnetic field<\/title>\n<defs>\n\n<marker id=\"n7_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_5_e\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"140.0\" y1=\"108.0\" x2=\"140.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"198.0\" y1=\"108.0\" x2=\"198.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"256.0\" y1=\"108.0\" x2=\"256.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"314.0\" y1=\"108.0\" x2=\"314.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"372.0\" y1=\"108.0\" x2=\"372.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"166.0\" x2=\"430.0\" y2=\"166.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"224.0\" x2=\"430.0\" y2=\"224.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"282.0\" x2=\"430.0\" y2=\"282.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"340.0\" x2=\"430.0\" y2=\"340.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"398.0\" x2=\"430.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"70.0\" y1=\"420.0\" x2=\"452.0\" y2=\"420.0\" stroke=\"#555555\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_axis_arrow)\"/>\n<line x1=\"70.0\" y1=\"420.0\" x2=\"70.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_axis_arrow)\"/>\n<text x=\"470.0\" y=\"430.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"54.0\" y=\"76.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">ct<\/text>\n<text x=\"382.0\" y=\"120.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\">frame<\/text>\n<rect x=\"190.0\" y=\"172.0\" width=\"132.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"253.1\" font-size=\"68\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<\/text>\n<line x1=\"114.0\" y1=\"224.0\" x2=\"184.0\" y2=\"224.0\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"106.0\" y=\"214.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"end\">E<\/text>\n<path d=\"M330,224 C372,182 418,218 376,258 C350,284 322,270 338,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"394.0\" y=\"288.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"256.0\" y=\"336.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_5\">\n<title id=\"title-n7_5\">Electromagnetic field<\/title>\n<defs>\n\n<marker id=\"n7_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_5_e\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"140.0\" y1=\"108.0\" x2=\"140.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"198.0\" y1=\"108.0\" x2=\"198.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"256.0\" y1=\"108.0\" x2=\"256.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"314.0\" y1=\"108.0\" x2=\"314.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"372.0\" y1=\"108.0\" x2=\"372.0\" y2=\"404.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"166.0\" x2=\"430.0\" y2=\"166.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"224.0\" x2=\"430.0\" y2=\"224.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"282.0\" x2=\"430.0\" y2=\"282.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"340.0\" x2=\"430.0\" y2=\"340.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"398.0\" x2=\"430.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"70.0\" y1=\"420.0\" x2=\"452.0\" y2=\"420.0\" stroke=\"#555555\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_axis_arrow)\"/>\n<line x1=\"70.0\" y1=\"420.0\" x2=\"70.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_axis_arrow)\"/>\n<text x=\"470.0\" y=\"430.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"54.0\" y=\"76.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">ct<\/text>\n<text x=\"382.0\" y=\"120.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\">frame<\/text>\n<rect x=\"190.0\" y=\"172.0\" width=\"132.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"253.1\" font-size=\"68\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<\/text>\n<line x1=\"114.0\" y1=\"224.0\" x2=\"184.0\" y2=\"224.0\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"106.0\" y=\"214.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"end\">E<\/text>\n<path d=\"M330,224 C372,182 418,218 376,258 C350,284 322,270 338,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"394.0\" y=\"288.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"256.0\" y=\"336.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "One F object gives rise to E and B component views.", "svg_detail_caption": "The electromagnetic field is the single tensor F_mu_nu; electric and magnetic fields are frame-dependent views of that object.", "study_questions": [{"question": "A relativistic observer wants one object representing the physical electromagnetic field, independent of a particular electric/magnetic split. Which object should they use?\n\nA. The Lagrangian alone\nB. The canonical momentum only\nC. The field tensor \\(F_{\\mu\nu}\\)\nD. The coordinate time \\(t\\)", "answer": "C. The electromagnetic field is represented relativistically by \\(F_{\\mu\nu}\\).\n\nThe electric and magnetic fields are frame-dependent ways of decomposing that one tensor."}, {"question": "What does it mean to say \\(\\mathbf E\\) and \\(\\mathbf B\\) are observer-dependent decompositions?", "answer": "It means an observer chooses a time direction and spatial axes, then reads electric and magnetic components from \\(F_{\\mu\\nu}\\). Another inertial observer can split the same tensor differently, so the underlying field is the tensor while \\(\\mathbf E\\) and \\(\\mathbf B\\) are frame-specific descriptions."}, {"question": "In a chosen frame an electromagnetic field has \\(\\mathbf E=(3,0,0)\\) and \\(\\mathbf B=(0,4,0)\\) in suitable units. How many component numbers are being specified, and why does that match the independent components of \\(F_{\\mu\\nu}\\)?", "answer": "The electric field has three components and the magnetic field has three components, for a total of six numbers. An antisymmetric \\(4\\times4\\) tensor also has\n\\[ \\frac{4\\times3}{2}=6 \\]\nindependent components. This is why \\(F_{\\mu\\nu}\\) can package \\(\\mathbf E\\) and \\(\\mathbf B\\) together."}]}, "7.7": {"label": "Maxwell's equations", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "Maxwell's equations are the relativistic field equations governing the \\cref{Electromagnetic field}{7.5}. In covariant form they relate the antisymmetric \\cref{Field tensor}{7.2} to the source \\cref{Four-current}{7.6}, while the homogeneous equations express the fact that the field tensor is built from a potential.", "derivation_new": "Maxwell's equations follow by applying the \\cref{Euler-Lagrange equations}{5.3} to the electromagnetic \\cref{Field Lagrangian}{6.3}. With \\(F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu\\), a standard electromagnetic Lagrangian density is \\[ \\mathcal L=-\\frac{1}{4\\mu_0}F_{\\mu\\nu}F^{\\mu\\nu}-j_\\mu A^\\mu, \\] using the \\(+---\\) metric convention. Varying the action with respect to the potential \\(A_\\mu\\) gives the sourced Maxwell equation \\[ \\partial_\\mu F^{\\mu\\nu}=\\mu_0 j^\\nu. \\] The second half of Maxwell's equations follows from the definition of \\(F_{\\mu\\nu}\\) itself: \\[ \\partial_\\lambda F_{\\mu\\nu}+\\partial_\\mu F_{\\nu\\lambda}+\\partial_\\nu F_{\\lambda\\mu}=0. \\] Together these equations are local \\cref{Field equations}{6.4}: at each spacetime event they relate field derivatives to the charge and current source at that event.", "explanation_new": "Maxwell's equations are not just four formulas to memorize; they are the local rules governing the electromagnetic field. They connect sources to fields and also allow fields to propagate as waves. In covariant notation, much of the structure becomes shorter: sources enter through the four-current, and the antisymmetric field tensor carries the electric and magnetic components together. If the sources vanish in a region, the equations still have nontrivial wave solutions. That is how light appears as a self-propagating electromagnetic disturbance rather than as a separate kind of object.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_7\">\n<title id=\"title-n7_7\">Maxwell's equations<\/title>\n<defs>\n\n<marker id=\"n7_7_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"58.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"100.0\" y=\"269.7\" font-size=\"52\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<line x1=\"150.0\" y1=\"252.0\" x2=\"214.0\" y2=\"252.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<rect x=\"226.0\" y=\"196.0\" width=\"112.0\" height=\"112.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"282.0\" y=\"273.1\" font-size=\"62\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"346.0\" y1=\"252.0\" x2=\"394.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<path d=\"M410,234 C456,214 456,290 410,270\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,218 C456,198 456,306 410,286\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,202 C456,182 456,322 410,302\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_7\">\n<title id=\"title-n7_7\">Maxwell's equations<\/title>\n<defs>\n\n<marker id=\"n7_7_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"58.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"100.0\" y=\"269.7\" font-size=\"52\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<line x1=\"150.0\" y1=\"252.0\" x2=\"214.0\" y2=\"252.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<rect x=\"226.0\" y=\"196.0\" width=\"112.0\" height=\"112.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"282.0\" y=\"273.1\" font-size=\"62\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<text x=\"282.0\" y=\"178.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">∂<\/text>\n<text x=\"100.0\" y=\"322.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"282.0\" y=\"340.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<line x1=\"346.0\" y1=\"252.0\" x2=\"394.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<path d=\"M410,234 C456,214 456,290 410,270\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,218 C456,198 456,306 410,286\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,202 C456,182 456,322 410,302\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<text x=\"438.0\" y=\"332.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">wave<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_7\">\n<title id=\"title-n7_7\">Maxwell's equations<\/title>\n<defs>\n\n<marker id=\"n7_7_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"58.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"100.0\" y=\"269.7\" font-size=\"52\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<line x1=\"150.0\" y1=\"252.0\" x2=\"214.0\" y2=\"252.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<rect x=\"226.0\" y=\"196.0\" width=\"112.0\" height=\"112.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"282.0\" y=\"273.1\" font-size=\"62\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<text x=\"282.0\" y=\"178.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">∂<\/text>\n<text x=\"100.0\" y=\"322.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"282.0\" y=\"340.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<line x1=\"346.0\" y1=\"252.0\" x2=\"394.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<path d=\"M410,234 C456,214 456,290 410,270\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,218 C456,198 456,306 410,286\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,202 C456,182 456,322 410,302\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<text x=\"438.0\" y=\"332.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">wave<\/text>\n<\/svg>", "svg_icon_caption": "A source J feeds a field F, with outgoing wave marks.", "svg_detail_caption": "Maxwell's equations are local rules linking charge-current sources J to electromagnetic fields and explaining how disturbances propagate as waves.", "study_questions": [{"question": "If Maxwell's equations are written covariantly, what advantage is gained?\n\nA. They no longer describe electric fields\nB. They apply only in the rest frame of a charge\nC. They avoid derivatives\nD. Their Lorentz-invariant structure becomes explicit through tensors such as \\(F_{\\mu\nu}\\) and \\(j^\\mu\\)", "answer": "D. The covariant form writes Maxwell's equations using relativistic tensors and four-vectors.\n\nThis makes their Lorentz-invariant structure explicit and packages the familiar equations compactly."}, {"question": "Why do the homogeneous Maxwell equations follow naturally from writing \\(F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu\\)?", "answer": "Because \\(F_{\\mu\\nu}\\) is built from an antisymmetric derivative of the potential. When derivatives are combined cyclically, the second-derivative terms cancel because partial derivatives commute. This gives the homogeneous equations, often written as\n\\[ \\partial_\\lambda F_{\\mu\\nu}+\\partial_\\mu F_{\\nu\\lambda}+\\partial_\\nu F_{\\lambda\\mu}=0. \\]"}, {"question": "In a source-free region, \\(j^\\nu=0\\). What does the sourced covariant Maxwell equation reduce to? Why does this not mean the field must be zero?", "answer": "If \\(j^\\nu=0\\), then\n\\[ \\partial_\\mu F^{\\mu\\nu}=0. \\]\nThis says the field has no local source in that region. It does not force \\(F^{\\mu\\nu}=0\\); source-free electromagnetic waves can still propagate through the region, carrying energy and momentum."}]}, "8.6": {"label": "Lorenz gauge", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "The Lorenz gauge is the covariant gauge condition \\[ \\partial_\\mu A^\\mu=0 \\] imposed on the \\cref{Vector potential}{7.1}. It selects a convenient representative from a gauge-equivalent family of potentials without changing the physical \\cref{Electromagnetic field}{7.5}.", "derivation_new": "Because of \\cref{Gauge invariance}{8.1}, potentials related by \\(A_\\mu\\rightarrow A_\\mu+\\partial_\\mu\\Lambda\\) describe the same field tensor. The \\cref{Vector potential}{7.1} therefore contains redundant descriptive freedom. The Lorenz gauge fixes part of that freedom by imposing the Lorentz-covariant scalar condition \\[ \\partial_\\mu A^\\mu=0. \\] With this condition, the potential form of \\cref{Maxwell's equations}{7.7} simplifies to a wave equation with source, schematically \\(\\Box A^\\mu=\\mu_0 j^\\mu\\) in SI conventions.", "explanation_new": "The Lorenz gauge is a choice that makes the potential description cleaner without changing the physical field. Gauge conditions can feel suspicious at first: are we changing the physics? No. We are choosing one representative from many equivalent potentials, much like choosing convenient coordinates. The Lorenz gauge condition \\(\\partial_\\mu A^\\mu=0\\) is especially useful because it respects Lorentz covariance and turns Maxwell's equations for the potential into a wave-equation form. Remember the spelling: Lorenz gauge, not Lorentz transformation.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_6\">\n<title id=\"title-n8_6\">Lorenz gauge<\/title>\n<defs>\n\n<marker id=\"n8_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M72,180 C124,146 174,208 220,170\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M72,234 C124,200 174,262 220,224\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M72,288 C124,254 174,316 220,278\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<line x1=\"230.0\" y1=\"234.0\" x2=\"286.0\" y2=\"234.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_6_arrow)\"/>\n<path d=\"M290,142 L368,184 L368,284 L290,326 Z\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"4\"/>\n<text x=\"329.0\" y=\"240.0\" font-size=\"23\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">Lorenz<\/text>\n<line x1=\"364.0\" y1=\"234.0\" x2=\"418.0\" y2=\"234.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_6_arrow)\"/>\n<path d=\"M424,234 C448,202 476,218 470,252\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<text x=\"446.0\" y=\"288.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"256.0\" y=\"382.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>A<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_6\">\n<title id=\"title-n8_6\">Lorenz gauge<\/title>\n<defs>\n\n<marker id=\"n8_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M72,180 C124,146 174,208 220,170\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M72,234 C124,200 174,262 220,224\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M72,288 C124,254 174,316 220,278\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<line x1=\"230.0\" y1=\"234.0\" x2=\"286.0\" y2=\"234.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_6_arrow)\"/>\n<path d=\"M290,142 L368,184 L368,284 L290,326 Z\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"4\"/>\n<text x=\"329.0\" y=\"240.0\" font-size=\"23\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">Lorenz<\/text>\n<line x1=\"364.0\" y1=\"234.0\" x2=\"418.0\" y2=\"234.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_6_arrow)\"/>\n<path d=\"M424,234 C448,202 476,218 470,252\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<text x=\"446.0\" y=\"288.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"256.0\" y=\"334.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> A<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<rect x=\"82.0\" y=\"378.0\" width=\"58.0\" height=\"50.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"111.0\" y=\"413.9\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<rect x=\"410.0\" y=\"378.0\" width=\"58.0\" height=\"50.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"439.0\" y=\"413.9\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<line x1=\"144.0\" y1=\"404.0\" x2=\"406.0\" y2=\"404.0\" stroke=\"#248a3d\" stroke-width=\"3\" stroke-dasharray=\"9 8\" opacity=\"0.55\"/>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_6\">\n<title id=\"title-n8_6\">Lorenz gauge<\/title>\n<defs>\n\n<marker id=\"n8_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M72,180 C124,146 174,208 220,170\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M72,234 C124,200 174,262 220,224\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M72,288 C124,254 174,316 220,278\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<line x1=\"230.0\" y1=\"234.0\" x2=\"286.0\" y2=\"234.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_6_arrow)\"/>\n<path d=\"M290,142 L368,184 L368,284 L290,326 Z\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"4\"/>\n<text x=\"329.0\" y=\"240.0\" font-size=\"23\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">Lorenz<\/text>\n<line x1=\"364.0\" y1=\"234.0\" x2=\"418.0\" y2=\"234.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_6_arrow)\"/>\n<path d=\"M424,234 C448,202 476,218 470,252\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<text x=\"446.0\" y=\"288.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"256.0\" y=\"334.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> A<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<rect x=\"82.0\" y=\"378.0\" width=\"58.0\" height=\"50.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"111.0\" y=\"413.9\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<rect x=\"410.0\" y=\"378.0\" width=\"58.0\" height=\"50.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"439.0\" y=\"413.9\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<line x1=\"144.0\" y1=\"404.0\" x2=\"406.0\" y2=\"404.0\" stroke=\"#248a3d\" stroke-width=\"3\" stroke-dasharray=\"9 8\" opacity=\"0.55\"/>\n<\/svg>", "svg_icon_caption": "Potential representatives pass through a Lorenz gauge selector.", "svg_detail_caption": "Lorenz gauge is a convenient condition, partial_mu A^mu = 0, selecting one potential description without changing the physical field.", "study_questions": [{"question": "You want Maxwell's equations for the potential to simplify into a clean wave equation while keeping Lorentz covariance manifest. Which gauge condition is designed for this?\n\nA. \\(A_\\mu=0\\) everywhere\nB. \\(\\partial_\\mu A^\\mu=0\\)\nC. \\(F_{\\mu\nu}=0\\)\nD. \\(j^\\mu=\\partial^\\mu\\Lambda\\)", "answer": "B. The Lorenz gauge condition is\n\\[ \\partial_\\mu A^\\mu=0. \\]\nIt is especially useful because it simplifies the potential form of Maxwell's equations into wave-equation form."}, {"question": "Why is the Lorenz gauge useful in the potential form of Maxwell's equations?", "answer": "It respects Lorentz covariance and simplifies the equations for the vector potential. With the Lorenz gauge imposed, Maxwell's equations for the potential take a wave-equation form, schematically\n\\[ \\Box A^\\mu=\\mu_0j^\\mu. \\]"}, {"question": "In a two-coordinate toy example, suppose the divergence condition reduces to\n\\[ \\partial_t A^0+\\partial_x A^1=0. \\]\nIf \\(A^0=2t\\) and \\(A^1=-2x\\), does this satisfy the gauge condition?", "answer": "Compute the derivatives:\n\\[ \\partial_t A^0=2, \\qquad \\partial_x A^1=-2. \\]\nSo\n\\[ \\partial_t A^0+\\partial_x A^1=2-2=0. \\]\nIn this simplified example, the Lorenz-type gauge condition is satisfied."}]}, "8.1": {"label": "Gauge invariance", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "Gauge invariance is the freedom to change the electromagnetic potential by \\[ A_\\mu\\rightarrow A_\\mu+\\partial_\\mu\\Lambda \\] without changing the physical electromagnetic field. The \\cref{Field tensor}{7.2} remains invariant under this transformation.", "derivation_new": "The invariance follows from the construction of the \\cref{Field tensor}{7.2}. Under \\(A_\\mu\\rightarrow A_\\mu+\\partial_\\mu\\Lambda\\), \\[ F_{\\mu\\nu}\\rightarrow \\partial_\\mu(A_\\nu+\\partial_\\nu\\Lambda)-\\partial_\\nu(A_\\mu+\\partial_\\mu\\Lambda). \\] The added terms cancel because partial derivatives commute: \\[ \\partial_\\mu\\partial_\\nu\\Lambda-\\partial_\\nu\\partial_\\mu\\Lambda=0. \\] Therefore \\(F_{\\mu\\nu}\\), and hence the physical \\cref{Electromagnetic field}{7.5}, is unchanged.", "explanation_new": "Gauge invariance says the potential has redundancy: different \\(A_\\mu\\) fields can produce the same \\(F_{\\mu\\nu}\\). This can be hard to accept because we are used to different mathematical descriptions meaning different physical situations. Here the field tensor is the observable electromagnetic object, and the potential has extra descriptive freedom. An analogy is choosing coordinates on a map: changing coordinates changes the labels, not the terrain. Gauge invariance is deeper than that analogy, but it helps with the first conceptual step: not every change in the potential is a physical change.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_1\">\n<title id=\"title-n8_1\">Gauge invariance<\/title>\n<defs>\n\n<marker id=\"n8_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M82,178 C128,146 164,192 214,162\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M82,304 C134,264 172,326 214,290\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" opacity=\"0.62\"/>\n<path d=\"M124,222 C152,244 152,252 124,276\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<text x=\"152.0\" y=\"252.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Λ<\/text>\n<line x1=\"224.0\" y1=\"176.0\" x2=\"332.0\" y2=\"232.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"294.0\" x2=\"332.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<rect x=\"350.0\" y=\"206.0\" width=\"92.0\" height=\"84.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"396.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_1\">\n<title id=\"title-n8_1\">Gauge invariance<\/title>\n<defs>\n\n<marker id=\"n8_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M82,178 C128,146 164,192 214,162\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M82,304 C134,264 172,326 214,290\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" opacity=\"0.62\"/>\n<path d=\"M124,222 C152,244 152,252 124,276\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<text x=\"152.0\" y=\"252.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Λ<\/text>\n<text x=\"150.0\" y=\"140.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"154.0\" y=\"356.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> + ∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>Λ<\/text>\n<line x1=\"224.0\" y1=\"176.0\" x2=\"332.0\" y2=\"232.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"294.0\" x2=\"332.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<rect x=\"350.0\" y=\"206.0\" width=\"92.0\" height=\"84.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"396.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<circle cx=\"428.0\" cy=\"220.0\" r=\"10.0\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\"/>\n<line x1=\"422.0\" y1=\"226.0\" x2=\"434.0\" y2=\"214.0\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"394.0\" y=\"326.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#248a3d\" text-anchor=\"middle\">same F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_1\">\n<title id=\"title-n8_1\">Gauge invariance<\/title>\n<defs>\n\n<marker id=\"n8_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M82,178 C128,146 164,192 214,162\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M82,304 C134,264 172,326 214,290\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" opacity=\"0.62\"/>\n<path d=\"M124,222 C152,244 152,252 124,276\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<text x=\"152.0\" y=\"252.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Λ<\/text>\n<text x=\"150.0\" y=\"140.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"154.0\" y=\"356.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> + ∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>Λ<\/text>\n<line x1=\"224.0\" y1=\"176.0\" x2=\"332.0\" y2=\"232.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"294.0\" x2=\"332.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<rect x=\"350.0\" y=\"206.0\" width=\"92.0\" height=\"84.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"396.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<circle cx=\"428.0\" cy=\"220.0\" r=\"10.0\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\"/>\n<line x1=\"422.0\" y1=\"226.0\" x2=\"434.0\" y2=\"214.0\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"394.0\" y=\"326.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#248a3d\" text-anchor=\"middle\">same F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "Two gauge-related potentials point to the same F.", "svg_detail_caption": "Gauge invariance means different potentials, such as A_mu and A_mu + partial_mu Lambda, can describe the same electromagnetic field.", "study_questions": [{"question": "A calculation changes \\(A_\\mu\\) but leaves every component of \\(F_{\\mu\nu}\\) unchanged. How should this be interpreted?\n\nA. As a gauge change, not a change of the physical electromagnetic field\nB. As a violation of Lorentz invariance\nC. As a change in the speed of light\nD. As proof that charge is not conserved", "answer": "A. If \\(F_{\\mu\\nu}\\) is unchanged, the physical electromagnetic field is unchanged.\n\nA transformation such as \\(A_\\mu\\to A_\\mu+\\partial_\\mu\\Lambda\\) changes the potential description but not the gauge-invariant field tensor."}, {"question": "Why does \\(F_{\\mu\\nu}\\) remain unchanged under \\(A_\\mu\\rightarrow A_\\mu+\\partial_\\mu\\Lambda\\)?", "answer": "Substitute the transformed potential into\n\\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu. \\]\nThe new terms are\n\\[ \\partial_\\mu\\partial_\\nu\\Lambda-\\partial_\\nu\\partial_\\mu\\Lambda. \\]\nThese cancel because partial derivatives commute. Therefore the field tensor is unchanged."}, {"question": "Let \\(\\Lambda(x,y)=3xy\\). Compute\n\\[ \\partial_x\\partial_y\\Lambda-\\partial_y\\partial_x\\Lambda. \\]\nWhat does this illustrate about gauge invariance?", "answer": "First,\n\\[ \\partial_y\\Lambda=3x, \\qquad \\partial_x\\partial_y\\Lambda=3. \\]\nAlso,\n\\[ \\partial_x\\Lambda=3y, \\qquad \\partial_y\\partial_x\\Lambda=3. \\]\nSo\n\\[ \\partial_x\\partial_y\\Lambda-\\partial_y\\partial_x\\Lambda=3-3=0. \\]\nThis is the cancellation that prevents a gauge transformation from changing \\(F_{\\mu\\nu}\\)."}]}, "7.6": {"label": "Four-current", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The four-current \\(j^\\mu\\) combines charge density and current density into one relativistic \\cref{Four-vectors}{4.2}: \\[ j^\\mu=(c\\rho,\\mathbf j). \\] It is the source appearing in covariant \\cref{Maxwell's equations}{7.7}.", "derivation_new": "The four-current is built by packaging local charge density and ordinary current density into a four-vector. Since charge density is the time component of charge flow and \\(\\mathbf j\\) is the spatial flux of charge, the covariant object is \\[ j^\\mu=(c\\rho,j_x,j_y,j_z). \\] Its transformation law is the \\cref{Four-vectors}{4.2} transformation law. Local conservation is expressed by its four-divergence, \\(\\partial_\\mu j^\\mu=0\\), developed in \\cref{Charge conservation}{8.5}.", "explanation_new": "The four-current packages charge density and current density into one relativistic source object. Charge density alone is not enough because different observers disagree about densities and currents when charges are moving. What one observer calls mostly charge density, another may partly describe as current. The four-current keeps the bookkeeping together, just as four-momentum keeps energy and momentum together. In a wire, the lab frame and a frame moving with charges can assign different \\(\\rho\\) and \\(\\mathbf j\\), but they are related as components of \\(j^\\mu\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_6\">\n<title id=\"title-n7_6\">Four-current<\/title>\n<defs>\n\n<marker id=\"n7_6_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"324.0\" y=\"162.0\" width=\"112.0\" height=\"160.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"380.0\" y=\"224.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"342.0\" y1=\"214.0\" x2=\"418.0\" y2=\"214.0\" stroke=\"#d22f2f\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_6_arrow)\"/>\n<circle cx=\"356.0\" cy=\"268.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"380.0\" y=\"274.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">ρ<\/text>\n<text x=\"382.0\" y=\"204.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_6\">\n<title id=\"title-n7_6\">Four-current<\/title>\n<defs>\n\n<marker id=\"n7_6_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<line x1=\"120.0\" .5\"/>\n<circle cx=\"240.0\" cy=\"318.0\" r=\"8.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"132.0\" y1=\"250.0\" x2=\"248.0\" y2=\"222.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_6_arrow)\"/>\n<rect x=\"324.0\" y=\"162.0\" width=\"112.0\" height=\"160.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"380.0\" y=\"224.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"342.0\" y1=\"214.0\" x2=\"418.0\" y2=\"214.0\" stroke=\"#d22f2f\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_6_arrow)\"/>\n<circle cx=\"356.0\" cy=\"268.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"380.0\" y=\"274.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">ρ<\/text>\n<text x=\"382.0\" y=\"204.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<text x=\"380.0\" y=\"348.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">ρc + J<\/text>\n<\/svg>", "svg_icon_caption": "A J^mu badge combines charge density and current.", "svg_detail_caption": "The four-current J^mu packages charge density and current flow into one relativistic source for the electromagnetic field.", "study_questions": [{"question": "A source term must describe both charge density and current density in a Lorentz-covariant way. Which object does that?\n\nA. The metric tensor\nB. The scalar potential only\nC. The four-current \\(j^\\mu\\)\nD. Proper time", "answer": "C. The four-current \\(j^\\mu\\) combines charge density and current density into one four-vector.\n\nIt is the natural source object in the covariant form of Maxwell's equations."}, {"question": "Why is charge density alone not enough for a relativistic source description?", "answer": "Different observers can disagree about charge density and current density when charges are moving. These quantities transform into one another as components of the four-current, so the covariant source is \\(j^\\mu\\), not \\(\\rho\\) by itself."}, {"question": "A region has charge density \\(\\rho=2\\,\\mathrm{C\\,m^{-3}}\\) and current density \\(\\mathbf j=(3,4,0)\\,\\mathrm{A\\,m^{-2}}\\). Using \\(c=3.0\\times10^8\\,\\mathrm{m\\,s^{-1}}\\), write \\(j^\\mu=(c\\rho,\\mathbf j)\\).", "answer": "Compute the time component:\n\\[ c\\rho=(3.0\\times10^8)(2)=6.0\\times10^8. \\]\nThus\n\\[ j^\\mu=(6.0\\times10^8,3,4,0) \\]\nin the corresponding units. The large time component reflects the factor of \\(c\\) in the chosen convention."}]}, "8.3": {"label": "Minimal coupling", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "Minimal coupling is the standard prescription for introducing electromagnetic interaction into a charged particle's dynamics by replacing ordinary momentum structure with the gauge-covariant combination involving the \\cref{Vector potential}{7.1}, commonly \\(p_\\mu-eA_\\mu\\).", "derivation_new": "The prescription is guided by \\cref{Gauge invariance}{8.1} and the existence of the \\cref{Vector potential}{7.1}. For a charged particle, one adds the simplest local interaction term between the particle worldline and the potential, proportional to \\[ e A_\\mu dx^\\mu. \\] Equivalently, in momentum language the free momentum is replaced by the gauge-covariant combination \\[ p_\\mu\\rightarrow p_\\mu-eA_\\mu. \\] Varying the minimally coupled action gives the \\cref{Lorentz force law}{8.4}.", "explanation_new": "Minimal coupling is the economical way to make a charged particle interact with electromagnetism. Instead of inventing a separate force rule first, we insert the vector potential into the particle's action or momentum structure. The phrase 'minimal' means no unnecessary extra terms: use the simplest local, gauge-compatible coupling. This also explains why canonical momentum and mechanical momentum can differ. In the nonrelativistic limit, the Lagrangian picks up terms involving \\(\\phi\\) and \\(\\mathbf A\\), and varying it gives the Lorentz force.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_3\">\n<title id=\"title-n8_3\">Minimal coupling<\/title>\n<defs>\n\n<marker id=\"n8_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"62.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"184.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"226.0\" y=\"264.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">eA<\/text>\n<line x1=\"278.0\" y1=\"252.0\" x2=\"356.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-s
