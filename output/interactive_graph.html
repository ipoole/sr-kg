    <script type="text/javascript">
      var conceptData = {"1.1": {"label": "Principle of relativity", "layer": "1", "layer_title": "Foundational Postulates", "body": "The laws of physics are the same in all \\cref{Inertial frames}{2.1}. No experiment can distinguish uniform motion from rest.   When combined with the \\cref{Constancy of the speed of light}{1.2}, this postulate determines the form of the \\cref{Lorentz transformations}{3.1}, which are the cornerstone of special relativity."}, "1.2": {"label": "Constancy of the speed of light", "layer": "1", "layer_title": "Foundational Postulates", "body": "Light in vacuum propagates at the same speed \\(c\\) for all \\cref{Inertial frames}{2.1}.   Combined with the \\cref{Principle of relativity}{1.1}, this eliminates absolute simultaneity and implies that transformations between frames must preserve a single invariant measure — the \\cref{Spacetime interval}{3.2}.   That invariant structure is expressed mathematically through the \\cref{Lorentz transformations}{3.1} and later encoded by the \\cref{Metric tensor}{3.3}."}, "2.1": {"label": "Inertial frames", "layer": "2", "layer_title": "Observers and Events", "body": "Reference frames in which a free particle moves at constant velocity unless acted upon by forces.   According to the \\cref{Principle of relativity}{1.1}, the laws of physics take the same form in all inertial frames.    Coordinates describing a \\cref{Spacetime event}{2.2} in different inertial frames are related by the \\cref{Lorentz transformations}{3.1}.   These transformations preserve the invariant geometry encoded in the \\cref{Spacetime interval}{3.2}."}, "2.2": {"label": "Spacetime event", "layer": "2", "layer_title": "Observers and Events", "body": "A point in spacetime representing where and when a physical occurrence takes place.   In a given \\cref{Inertial frame}{2.1}, an event is described by four coordinates  \\[ (ct,x,y,z) \\]  which together form the \\cref{Position four-vector}{4.3}.    The separation between two events is characterized by the \\cref{Spacetime interval}{3.2}, which remains invariant under \\cref{Lorentz transformations}{3.1}."}, "2.3": {"label": "Principle of locality", "layer": "2", "layer_title": "Observers and Events", "body": "Physical interactions depend only on quantities defined at the same \\cref{Spacetime event}{2.2}.   Fields and particles influence one another through local interactions rather than instantaneous action at a distance.  Combined with the \\cref{Constancy of the speed of light}{1.2}, locality implies that causal influence propagates within the \\cref{Light cone}{3.4} structure of spacetime."}, "3.1": {"label": "Lorentz transformations", "layer": "3", "layer_title": "Minkowski Geometry", "body": "Linear transformations connecting coordinates of a \\cref{Spacetime event}{2.2} between different \\cref{Inertial frames}{2.1}.    They preserve the invariant quantity known as the \\cref{Spacetime interval}{3.2}, ensuring consistency with both the \\cref{Principle of relativity}{1.1} and the \\cref{Constancy of the speed of light}{1.2}.    In matrix form the transformation acts on a \\cref{Four-vector}{4.2}, leaving invariant inner products defined using the \\cref{Metric tensor}{3.3}."}, "3.2": {"label": "Spacetime interval", "layer": "3", "layer_title": "Minkowski Geometry", "body": "The invariant measure of separation between two \\cref{Spacetime events}{2.2}.   Using coordinates in any \\cref{Inertial frame}{2.1}, it is defined as  \\[ s^2 = \\eta_{\\mu\\nu} x^\\mu x^\\nu    = c^2 t^2 - x^2 - y^2 - z^2 \\]  where \\( \\eta_{\\mu\\nu} \\) is the \\cref{Metric tensor}{3.3}.    This quantity remains unchanged under the \\cref{Lorentz transformations}{3.1}, making it the fundamental invariant of Minkowski spacetime."}, "3.3": {"label": "Metric tensor", "layer": "3", "layer_title": "Minkowski Geometry", "body": "The tensor  \\[ \\eta_{\\mu\\nu} = \\mathrm{diag}(1,-1,-1,-1) \\]  defines inner products of \\cref{Four-vectors}{4.2} and determines the \\cref{Spacetime interval}{3.2}.    It encodes the geometric structure of Minkowski spacetime and remains invariant under \\cref{Lorentz transformations}{3.1}."}, "3.4": {"label": "Light cone", "layer": "3", "layer_title": "Minkowski Geometry", "body": "The set of spacetime directions for which the \\cref{Spacetime interval}{3.2} satisfies  \\[ s^2 = 0 \\]  corresponding to the path followed by light signals.    The light cone divides spacetime into causal past, causal future, and spacelike regions, ensuring compatibility with the \\cref{Principle of locality}{2.3}."}, "3.5": {"label": "Minkowski diagram", "layer": "3", "layer_title": "Minkowski Geometry", "body": "A geometric representation of spacetime in which \\cref{Spacetime events}{2.2} are plotted using time and space axes.    The \\cref{Light cone}{3.4} appears as lines at \\(45^\\circ\\), illustrating the invariant causal structure of spacetime.   The effect of \\cref{Lorentz transformations}{3.1} appears as a hyperbolic rotation of the coordinate axes."}, "4.1": {"label": "Proper time", "layer": "4", "layer_title": "Relativistic Kinematics", "body": "The invariant time measured along the world-line of a particle moving between two \\cref{Spacetime events}{2.2}.   For motion in a given \\cref{Inertial frame}{2.1}, the infinitesimal interval of proper time is defined by the \\cref{Spacetime interval}{3.2}:  \\[ d\\tau^2 = dt^2 - \\frac{dx^2 + dy^2 + dz^2}{c^2}. \\]  Unlike coordinate time, proper time is the same for all observers related by \\cref{Lorentz transformations}{3.1}.   It therefore provides a natural parameter for relativistic motion."}, "4.2": {"label": "Four-vectors", "layer": "4", "layer_title": "Relativistic Kinematics", "body": "Objects with four components that transform linearly under \\cref{Lorentz transformations}{3.1}.   A four-vector \\(A^\\mu\\) has components  \\[ A^\\mu = (A^0,A^1,A^2,A^3) \\]  whose invariant inner product is defined using the \\cref{Metric tensor}{3.3}.    Examples include the \\cref{Position four-vector}{4.3}, the \\cref{Velocity four-vector}{4.4}, and the \\cref{Momentum four-vector}{4.5}.   Four-vectors provide a compact way of expressing relativistic laws so that their invariance under changes of \\cref{Inertial frames}{2.1} is manifest."}, "4.3": {"label": "Position four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "body": "The coordinates of a \\cref{Spacetime event}{2.2} arranged into a \\cref{Four-vector}{4.2}:  \\[ x^\\mu = (ct,x,y,z). \\]  Differences between position four-vectors determine the \\cref{Spacetime interval}{3.2}.   Under \\cref{Lorentz transformations}{3.1}, the components of \\(x^\\mu\\) mix so that different observers assign different space and time coordinates to the same event while preserving the invariant interval."}, "4.4": {"label": "Velocity four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "body": "Defined as the derivative of the \\cref{Position four-vector}{4.3} with respect to \\cref{Proper time}{4.1}:  \\[ u^\\mu = \\frac{dx^\\mu}{d\\tau}. \\]  Because proper time is invariant, the velocity four-vector transforms as a true \\cref{Four-vector}{4.2}.   Its invariant magnitude satisfies  \\[ u^\\mu u_\\mu = c^2. \\]  Multiplying the velocity four-vector by mass yields the \\cref{Momentum four-vector}{4.5}."}, "4.5": {"label": "Momentum four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "body": "The relativistic generalization of momentum, defined by  \\[ p^\\mu = m u^\\mu, \\]  where \\(u^\\mu\\) is the \\cref{Velocity four-vector}{4.4}.    Its components are  \\[ p^\\mu = (E/c,\\,\\vec p), \\]  combining energy and three-momentum into a single \\cref{Four-vector}{4.2}.   The invariant magnitude of \\(p^\\mu\\) expresses the relativistic energy–momentum relation."}, "5.1": {"label": "Action principle", "layer": "5", "layer_title": "Variational Mechanics", "body": "The dynamics of a physical system are determined by the requirement that the action  \\[ S = \\int L\\, dt \\]  is stationary with respect to small variations of the path.    Here \\(L\\) is the \\cref{Lagrangian}{5.2}.   This principle provides a unified way of deriving equations of motion consistent with relativistic invariance under \\cref{Lorentz transformations}{3.1}."}, "5.2": {"label": "Lagrangian", "layer": "5", "layer_title": "Variational Mechanics", "body": "A function of generalized coordinates and velocities whose integral defines the action in the \\cref{Action principle}{5.1}.    For relativistic systems the Lagrangian can be constructed using invariant quantities derived from the \\cref{Spacetime interval}{3.2} or from combinations of \\cref{Four-vectors}{4.2}.    The equations of motion follow from the \\cref{Euler–Lagrange equations}{5.3}."}, "5.3": {"label": "Euler–Lagrange equations", "layer": "5", "layer_title": "Variational Mechanics", "body": "The equations obtained by varying the action defined in the \\cref{Action principle}{5.1}.   For a coordinate \\(q\\) they take the form  \\[ \\frac{d}{dt}\\frac{\\partial L}{\\partial \\dot q} - \\frac{\\partial L}{\\partial q} = 0. \\]  These equations determine the dynamics implied by a chosen \\cref{Lagrangian}{5.2}."}, "5.4": {"label": "Hamiltonian formalism", "layer": "5", "layer_title": "Variational Mechanics", "body": "A reformulation of mechanics derived from the \\cref{Lagrangian}{5.2} by introducing the \\cref{Canonical momentum}{5.5}.   The Hamiltonian is defined by  \\[ H = p\\dot q - L. \\]  Time evolution is then described by Hamilton’s equations.   Although equivalent to the \\cref{Euler–Lagrange equations}{5.3}, this formulation clarifies the structure of conserved quantities."}, "5.5": {"label": "Canonical momentum", "layer": "5", "layer_title": "Variational Mechanics", "body": "The momentum conjugate to a coordinate \\(q\\), defined from the \\cref{Lagrangian}{5.2} as  \\[ p = \\frac{\\partial L}{\\partial \\dot q}. \\]  In relativistic systems it is closely related to the \\cref{Momentum four-vector}{4.5}.   Canonical momentum plays a central role in the \\cref{Hamiltonian formalism}{5.4} and later in the introduction of electromagnetic interaction."}, "5.6": {"label": "Noether's theorem", "layer": "5", "layer_title": "Variational Mechanics", "body": "A fundamental result connecting symmetry and conservation laws.   Every continuous symmetry of the action in the \\cref{Action principle}{5.1} implies a conserved quantity.  For example, invariance under spacetime translations leads to conservation of energy and momentum, which are later expressed through the \\cref{Energy–momentum tensor}{9.4}."}, "6.1": {"label": "Scalar field", "layer": "6", "layer_title": "Field Foundations", "body": "A quantity that assigns a single value to every \\cref{Spacetime event}{2.2}.   A scalar field is therefore a function  \\[ \\phi(x) \\]  defined over spacetime.    Unlike a \\cref{Four-vector}{4.2}, a scalar field has the same value for all observers related by \\cref{Lorentz transformations}{3.1}.   Its dynamics are determined by a \\cref{Field Lagrangian}{6.3}, whose variation using the \\cref{Euler–Lagrange equations}{5.3} produces relativistic \\cref{Field equations}{6.4}."}, "6.2": {"label": "Vector field", "layer": "6", "layer_title": "Field Foundations", "body": "A field whose components transform as a \\cref{Four-vector}{4.2} under \\cref{Lorentz transformations}{3.1}.   At each \\cref{Spacetime event}{2.2} it assigns four quantities  \\[ A_\\mu(x). \\]  Vector fields generalize the idea of a relativistic particle variable to systems with infinitely many degrees of freedom.   Their dynamics are determined by a \\cref{Field Lagrangian}{6.3}, extending the \\cref{Lagrangian}{5.2} formalism to fields."}, "6.3": {"label": "Field Lagrangian", "layer": "6", "layer_title": "Field Foundations", "body": "A local density  \\[ \\mathcal{L}(\\phi,\\partial_\\mu \\phi) \\]  defined at every \\cref{Spacetime event}{2.2}.   The action for a field becomes  \\[ S = \\int \\mathcal{L}\\, d^4x, \\]  extending the \\cref{Action principle}{5.1} from particles to continuous fields.    Applying the \\cref{Euler–Lagrange equations}{5.3} to this action produces the corresponding \\cref{Field equations}{6.4}.   Local dependence on the field and its derivatives reflects the \\cref{Principle of locality}{2.3}."}, "6.4": {"label": "Field equations", "layer": "6", "layer_title": "Field Foundations", "body": "Differential equations governing the evolution of a field.   They arise from the \\cref{Euler–Lagrange equations}{5.3} applied to a \\cref{Field Lagrangian}{6.3}.    Because the Lagrangian density is constructed from quantities transforming covariantly under \\cref{Lorentz transformations}{3.1}, the resulting field equations respect relativistic invariance.   For a \\cref{Scalar field}{6.1} these equations reduce to the relativistic wave equation, while for a \\cref{Vector field}{6.2} they describe electromagnetic dynamics."}, "7.1": {"label": "Vector potential \\(A_\\mu\\)", "layer": "7", "layer_title": "Electromagnetic Field", "body": "A \\cref{Vector field}{6.2} defined at every \\cref{Spacetime event}{2.2}.   Rather than describing the electric and magnetic fields directly, electromagnetism is formulated in terms of this potential field.    The observable electromagnetic quantities arise from derivatives of \\(A_\\mu\\), forming the \\cref{Field tensor}{7.2}.   The equations governing \\(A_\\mu\\) follow from an electromagnetic \\cref{Field Lagrangian}{6.3}."}, "7.2": {"label": "Field tensor \\(F_{\\mu\\nu}\\)", "layer": "7", "layer_title": "Electromagnetic Field", "body": "An antisymmetric tensor constructed from derivatives of the \\cref{Vector potential}{7.1}:  \\[ F_{\\mu\\nu} = \\partial_\\mu A_\\nu - \\partial_\\nu A_\\mu. \\]  This tensor transforms covariantly under \\cref{Lorentz transformations}{3.1}.   Its components contain the physical \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.   In relativistic form, the entire \\cref{Electromagnetic field}{7.5} is encoded in \\(F_{\\mu\\nu}\\)."}, "7.3": {"label": "Electric field", "layer": "7", "layer_title": "Electromagnetic Field", "body": "One component of the relativistic \\cref{Electromagnetic field}{7.5}.   In terms of the \\cref{Field tensor}{7.2}, the electric field components are  \\[ E_i = F_{0i}. \\]  The electric field describes the force acting on charges at rest in a given \\cref{Inertial frame}{2.1}.   Under \\cref{Lorentz transformations}{3.1}, electric and magnetic fields mix with one another."}, "7.4": {"label": "Magnetic field", "layer": "7", "layer_title": "Electromagnetic Field", "body": "The second component of the relativistic \\cref{Electromagnetic field}{7.5}.   Its components arise from the spatial parts of the \\cref{Field tensor}{7.2}.    Magnetic fields act on moving charges and currents.   In special relativity the magnetic field is not an independent entity but rather part of the same geometric structure as the \\cref{Electric field}{7.3}."}, "7.5": {"label": "Electromagnetic field", "layer": "7", "layer_title": "Electromagnetic Field", "body": "The unified relativistic field combining the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.   This field is fully represented by the antisymmetric \\cref{Field tensor}{7.2}.    The dynamics of the electromagnetic field are governed by \\cref{Maxwell's equations}{7.6}, which follow from an electromagnetic \\cref{Field Lagrangian}{6.3}."}, "7.6": {"label": "Maxwell's equations", "layer": "7", "layer_title": "Electromagnetic Field", "body": "The relativistic field equations governing the \\cref{Electromagnetic field}{7.5}.   In compact covariant form they may be written  \\[ \\partial_\\mu F^{\\mu\\nu} = J^\\nu. \\]  These equations describe how electric charges and currents act as sources for the electromagnetic field.   They arise from the \\cref{Euler–Lagrange equations}{5.3} applied to the electromagnetic \\cref{Field Lagrangian}{6.3}."}, "7.7": {"label": "Lorenz gauge", "layer": "7", "layer_title": "Electromagnetic Field", "body": "A condition imposed on the \\cref{Vector potential}{7.1}:  \\[ \\partial_\\mu A^\\mu = 0. \\]  This gauge choice simplifies \\cref{Maxwell's equations}{7.6}, allowing them to be written as wave equations for the potential.   The physical \\cref{Electromagnetic field}{7.5} remains unchanged under such gauge transformations."}, "8.1": {"label": "Gauge invariance", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body": "A fundamental symmetry of the electromagnetic theory in which the \\cref{Vector potential}{7.1} can be transformed according to  \\[ A_\\mu \\rightarrow A_\\mu + \\partial_\\mu \\Lambda \\]  without changing the physical \\cref{Electromagnetic field}{7.5}. Because the \\cref{Field tensor}{7.2} depends only on derivatives of the potential, it remains unchanged under such transformations.  Gauge invariance therefore reflects a redundancy in the description of the electromagnetic field.  The freedom to choose different potentials describing the same physics leads naturally to conditions such as the \\cref{Lorenz gauge}{7.7}."}, "8.2": {"label": "Four-current", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body": "The relativistic quantity describing the distribution and motion of electric charge.  It forms a \\cref{Four-vector}{4.2} with components  \\[ J^\\mu = (c\\rho,\\vec J), \\]  where \\( \\rho \\) is charge density and \\( \\vec J \\) is current density.  The four-current acts as the source term in \\cref{Maxwell's equations}{7.6}. Its conservation is expressed through the continuity equation discussed under \\cref{Charge conservation}{8.5}."}, "8.3": {"label": "Minimal coupling", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body": "The prescription for introducing electromagnetic interaction into the \\cref{Lagrangian}{5.2} of a charged particle.  The ordinary momentum is replaced by  \\[ p_\\mu \\rightarrow p_\\mu - eA_\\mu, \\]  where \\(A_\\mu\\) is the \\cref{Vector potential}{7.1}.   This modification preserves \\cref{Gauge invariance}{8.1} and leads directly to the dynamical law governing charged particles in electromagnetic fields."}, "8.4": {"label": "Lorentz force law", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body": "The relativistic equation of motion for a charged particle interacting with the \\cref{Electromagnetic field}{7.5}.  In covariant form it can be written  \\[ \\frac{dp^\\mu}{d\\tau} = eF^{\\mu\\nu}u_\\nu, \\]  where \\(p^\\mu\\) is the \\cref{Momentum four-vector}{4.5}, \\(u^\\mu\\) is the \\cref{Velocity four-vector}{4.4}, and \\(F^{\\mu\\nu}\\) is the \\cref{Field tensor}{7.2}.  This equation arises naturally from applying the \\cref{Action principle}{5.1} to a charged particle interacting with the electromagnetic field via \\cref{Minimal coupling}{8.3}."}, "8.5": {"label": "Charge conservation", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body": "Electric charge is locally conserved.  In relativistic form this statement is expressed by the continuity equation  \\[ \\partial_\\mu J^\\mu = 0, \\]  where \\(J^\\mu\\) is the \\cref{Four-current}{8.2}.   This relation ensures the internal consistency of \\cref{Maxwell's equations}{7.6} and reflects the symmetry structure of the electromagnetic theory."}, "9.1": {"label": "Energy density of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body": "The electromagnetic field itself carries energy.  The energy density stored in the \\cref{Electromagnetic field}{7.5} is  \\[ u = \\frac12 (E^2 + B^2), \\]  where \\(E\\) and \\(B\\) denote the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.   This energy contributes to the relativistic conservation laws described by the \\cref{Energy--momentum tensor}{9.4}."}, "9.2": {"label": "Momentum density (Poynting vector)", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body": "Electromagnetic fields also carry momentum.   The momentum density is given by the Poynting vector  \\[ \\vec S = \\vec E \\times \\vec B. \\]  This vector represents the flow of energy and momentum carried by the \\cref{Electromagnetic field}{7.5}.   Together with the \\cref{Energy density of EM field}{9.1}, it forms part of the relativistic description of field energy and momentum."}, "9.3": {"label": "Stress–energy of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body": "The electromagnetic field exerts stresses and transports energy and momentum through spacetime.   These properties are summarized by the electromagnetic stress–energy tensor, constructed from the \\cref{Field tensor}{7.2} and the \\cref{Metric tensor}{3.3}.  This tensor describes how electromagnetic energy and momentum propagate and interact with matter."}, "9.4": {"label": "Energy--momentum tensor", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body": "A rank-two tensor \\(T^{\\mu\\nu}\\) describing the density and flow of energy and momentum in spacetime.  For the electromagnetic field it is constructed from the \\cref{Field tensor}{7.2}.  Conservation of energy and momentum is expressed by  \\[ \\partial_\\mu T^{\\mu\\nu} = 0. \\]  This conservation law follows from spacetime translation symmetry via \\cref{Noether's theorem}{5.6}."}, "10.1": {"label": "Electromagnetic waves", "layer": "10", "layer_title": "Waves and Radiation", "body": "Self-propagating oscillations of the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.   In regions where the \\cref{Four-current}{8.2} vanishes, the field equations for the \\cref{Electromagnetic field}{7.5} reduce to wave equations, allowing disturbances in the field to propagate through space.  These waves travel at the speed \\(c\\), consistent with the \\cref{Constancy of the speed of light}{1.2}.   Electromagnetic waves carry energy and momentum, described by the \\cref{Energy--momentum tensor}{9.4} and transported through space according to the \\cref{Momentum density (Poynting vector)}{9.2}."}, "10.2": {"label": "Wave equation", "layer": "10", "layer_title": "Waves and Radiation", "body": "In the \\cref{Lorenz gauge}{7.7}, the equations governing the \\cref{Vector potential}{7.1} take the form  \\[ \\square A_\\mu = J_\\mu, \\]  where \\(J_\\mu\\) is the \\cref{Four-current}{8.2} and \\(\\square = \\partial_\\mu \\partial^\\mu\\) is the d'Alembertian operator.  When the source term vanishes, the potential satisfies a free wave equation. Solutions correspond to \\cref{Electromagnetic waves}{10.1} propagating at the speed determined by the spacetime structure encoded in the \\cref{Metric tensor}{3.3}."}, "10.3": {"label": "Radiation reaction", "layer": "10", "layer_title": "Waves and Radiation", "body": "When charged particles accelerate, they emit \\cref{Electromagnetic waves}{10.1}.   Because these waves carry energy and momentum described by the \\cref{Energy--momentum tensor}{9.4}, the emitting particle must experience a recoil force.  This phenomenon modifies the motion predicted by the \\cref{Lorentz force law}{8.4} and represents the back–reaction of the field on its source."}, "11.1": {"label": "Lorentz invariance", "layer": "11", "layer_title": "Symmetry and Invariance Principles", "body": "A fundamental symmetry stating that the laws of physics have the same form in all \\cref{Inertial frames}{2.1}.   Mathematically, this means the equations governing physical quantities are covariant under \\cref{Lorentz transformations}{3.1}.  Objects such as \\cref{Four-vectors}{4.2}, the \\cref{Field tensor}{7.2}, and the \\cref{Energy--momentum tensor}{9.4} transform in ways that preserve the invariant structure defined by the \\cref{Metric tensor}{3.3}.   Lorentz invariance is therefore a guiding principle in constructing relativistic physical theories."}, "11.2": {"label": "Gauge fixing", "layer": "11", "layer_title": "Symmetry and Invariance Principles", "body": "Because of \\cref{Gauge invariance}{8.1}, many different \\cref{Vector potentials}{7.1} correspond to the same physical \\cref{Electromagnetic field}{7.5}.   Gauge fixing is the procedure of choosing a particular representative from this equivalence class.  An example is the \\cref{Lorenz gauge}{7.7}, which simplifies the equations governing the potential by turning \\cref{Maxwell's equations}{7.6} into wave equations.   Although different gauge choices alter the mathematical form of the potential, observable quantities derived from the \\cref{Field tensor}{7.2} remain unchanged."}};
      var edgeKey = {"PREREQUISITE": {"relation": "PREREQUISITE", "directed": true, "category": "knowledge", "meaning": "A requires prior understanding of B. Only include essential, non-redundant dependencies.", "example": "10.1 Electromagnetic waves -> 10.2 Wave equation"}, "DERIVES_FROM": {"relation": "DERIVES_FROM", "directed": true, "category": "knowledge", "meaning": "A can be mathematically derived from B.", "example": "10.2 Wave equation -> 7.6 Maxwell's equations"}, "RELATED": {"relation": "RELATED", "directed": false, "category": "association", "meaning": "A and B are closely associated, but neither is a prerequisite of the other.", "example": "7.3 Electric field -- 7.4 Magnetic field"}};

      function kgAfterReady() {
        var allNodes = nodes.get();
        var allEdges = edges.get();
        var graphContainer = document.getElementById("mynetwork");
        var nodeLabelLayer = document.createElement("div");
        var nodeLabelEls = {};

        nodeLabelLayer.id = "kg_node_labels";
        graphContainer.appendChild(nodeLabelLayer);

        var originalNodes = {};
        var originalEdges = {};
        allNodes.forEach(function(n) { originalNodes[n.id] = Object.assign({}, n); });
        allEdges.forEach(function(e) { originalEdges[e.id] = Object.assign({}, e); });

        function htmlToText(s) {
          var div = document.createElement("div");
          div.innerHTML = s || "";
          return (div.textContent || div.innerText || "").toLowerCase();
        }

        function escapeHtml(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function renderConceptText(s) {
          return escapeHtml(s).replace(
            /\\cref\{([^{}]*)\}\{([^{}]*)\}/g,
            function(match, label, targetId) {
              if (!getConcept(targetId)) {
                return "<strong>" + label + "</strong>";
              }
              return '<a href="#" class="concept-link" data-concept-id="' +
                escapeHtml(targetId) +
                '"><strong>' + label + "</strong></a>";
            }
          );
        }

        function typesetInfoPanel() {
          var panel = document.getElementById("info_panel");
          if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.typesetClear) {
              MathJax.typesetClear([panel]);
            }
            MathJax.typesetPromise([panel]).catch(function(err) {
              console.warn("MathJax typesetting failed:", err);
            });
          }
        }

        function getConcept(nodeId) {
          return conceptData[String(nodeId)] || null;
        }

        function conceptIdParts(id) {
          return String(id).split(".").map(function(part) {
            var n = Number(part);
            return Number.isFinite(n) ? n : part;
          });
        }

        function compareConceptIds(a, b) {
          var aa = conceptIdParts(a);
          var bb = conceptIdParts(b);
          var len = Math.max(aa.length, bb.length);
          for (var i = 0; i < len; i++) {
            if (aa[i] === undefined) { return -1; }
            if (bb[i] === undefined) { return 1; }
            if (aa[i] === bb[i]) { continue; }
            if (typeof aa[i] === "number" && typeof bb[i] === "number") {
              return aa[i] - bb[i];
            }
            return String(aa[i]).localeCompare(String(bb[i]));
          }
          return 0;
        }

        function conceptSearchText(nodeId, node) {
          var concept = getConcept(nodeId) || {};
          return [
            String(nodeId),
            node && node.label ? String(node.label) : "",
            concept.label || "",
            concept.layer || "",
            concept.layer_title || "",
            concept.body || ""
          ].join(" ").toLowerCase();
        }

        function visibleConceptLabel(nodeId) {
          var concept = getConcept(nodeId) || {};
          return '<span class="kg-node-label-id">' + escapeHtml(nodeId) + '</span>' +
            renderConceptText(concept.label || "");
        }

        function buildNodeLabels() {
          nodeLabelLayer.innerHTML = "";
          Object.keys(conceptData).forEach(function(id) {
            var el = document.createElement("div");
            el.className = "kg-node-label";
            el.setAttribute("data-node-id", id);
            el.innerHTML = visibleConceptLabel(id);
            nodeLabelLayer.appendChild(el);
            nodeLabelEls[id] = el;
          });
          typesetNodeLabels();
          updateNodeLabelPositions();
        }

        function typesetNodeLabels() {
          if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.typesetClear) {
              MathJax.typesetClear([nodeLabelLayer]);
            }
            MathJax.typesetPromise([nodeLabelLayer]).catch(function(err) {
              console.warn("MathJax label typesetting failed:", err);
            }).then(function() {
              updateNodeLabelPositions();
            });
          } else {
            setTimeout(typesetNodeLabels, 250);
          }
        }

        function updateNodeLabelPositions() {
          if (!network || !nodeLabelLayer) { return; }

          var positions = network.getPositions();
          Object.keys(nodeLabelEls).forEach(function(id) {
            var el = nodeLabelEls[id];
            var node = nodes.get(id);
            var pos = positions[id];
            if (!node || !pos || node.hidden) {
              el.style.display = "none";
              return;
            }

            var dom = network.canvasToDOM(pos);
            var offset = (Number(node.size) || 18) + 6;
            el.style.display = "block";
            el.style.left = dom.x + "px";
            el.style.top = (dom.y + offset) + "px";
            el.style.opacity = node.opacity === undefined ? "1" : String(node.opacity);
          });
        }

        function showConcept(nodeId) {
          var concept = getConcept(nodeId);
          if (!concept) {
            document.getElementById("info_panel").innerHTML =
              "<h2>" + escapeHtml(nodeId) + "</h2>" +
              "<p>No concept data was found for this node.</p>";
            typesetInfoPanel();
            return;
          }

          var layerParts = [];
          if (concept.layer) { layerParts.push("Layer " + escapeHtml(concept.layer)); }
          if (concept.layer_title) { layerParts.push(escapeHtml(concept.layer_title)); }

          var html = "";
          html += "<h2>" + escapeHtml(nodeId) + "<br>" + renderConceptText(concept.label) + "</h2>";
          if (layerParts.length > 0) {
            html += "<p><b>Layer:</b> " + layerParts.join(" - ") + "</p>";
          }
          html += "<hr>";
          html += '<div class="concept-body">' + renderConceptText(concept.body) + "</div>";
          document.getElementById("info_panel").innerHTML = html;
          typesetInfoPanel();
        }

        window.kgShowEdgeKey = function() {
          var relations = Object.keys(edgeKey).sort();
          var html = "<h2>Edge Key</h2>";

          if (relations.length === 0) {
            html += "<p>No edge key data was loaded.</p>";
            document.getElementById("info_panel").innerHTML = html;
            return;
          }

          html += '<table class="edge-key-table">';
          html += "<thead><tr>" +
            "<th>Relation</th>" +
            "<th>Direction</th>" +
            "<th>Category</th>" +
            "<th>Meaning</th>" +
            "<th>Example</th>" +
            "</tr></thead><tbody>";

          relations.forEach(function(relation) {
            var item = edgeKey[relation] || {};
            html += "<tr>" +
              "<td><strong>" + escapeHtml(relation) + "</strong></td>" +
              "<td>" + (item.directed ? "directed" : "undirected") + "</td>" +
              "<td>" + escapeHtml(item.category || "") + "</td>" +
              "<td>" + escapeHtml(item.meaning || "") + "</td>" +
              "<td>" + escapeHtml(item.example || "") + "</td>" +
              "</tr>";
          });

          html += "</tbody></table>";
          document.getElementById("info_panel").innerHTML = html;
        };

        function setActiveConceptItem(nodeId) {
          document.querySelectorAll(".kg-concept-item.active").forEach(function(el) {
            el.classList.remove("active");
          });
          var item = Array.prototype.find.call(
            document.querySelectorAll(".kg-concept-item"),
            function(el) { return el.getAttribute("data-concept-id") === String(nodeId); }
          );
          if (item) {
            item.classList.add("active");
            item.scrollIntoView({block: "nearest"});
          }
        }

        function focusConcept(nodeId, statusPrefix) {
          if (!getConcept(nodeId)) { return; }
          network.selectNodes([nodeId]);
          network.focus(nodeId, {scale: 1.4, animation: true});
          kgHighlight(nodeId);
          showConcept(nodeId);
          setActiveConceptItem(nodeId);
          if (statusPrefix) {
            document.getElementById("kg_status").innerText = statusPrefix + " " + nodeId + ".";
          }
        }

        function buildConceptList(filterText) {
          var q = String(filterText || "").trim().toLowerCase();
          var ids = Object.keys(conceptData).sort(compareConceptIds);
          var html = "<b>Concepts</b><br>";
          var count = 0;

          ids.forEach(function(id) {
            var concept = getConcept(id);
            var haystack = [
              id,
              concept.label || "",
              concept.layer || "",
              concept.layer_title || "",
              concept.body || ""
            ].join(" ").toLowerCase();
            if (q && !haystack.includes(q)) { return; }

            html += '<button type="button" class="kg-concept-item" data-concept-id="' +
              escapeHtml(id) +
              '"><span class="kg-concept-id">' +
              escapeHtml(id) +
              '</span> ' +
              escapeHtml(concept.label || "") +
              "</button>";
            count += 1;
          });

          if (count === 0) {
            html += '<div style="color:#555; padding:4px 0;">No matching concepts.</div>';
          }
          document.getElementById("kg_concept_list").innerHTML = html;
        }

        window.kgFreezeLayout = function() {
          network.stopSimulation();
          network.setOptions({physics: {enabled: false}});
          document.getElementById("kg_status").innerText = "Layout frozen.";
        };

        window.kgRestartLayout = function() {
          network.setOptions({physics: {enabled: true}});
          network.startSimulation();
          document.getElementById("kg_status").innerText = "Layout physics restarted.";
        };

        window.kgReset = function() {
          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            o.hidden = false;
            return o;
          }));
          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            o.hidden = false;
            return o;
          }));
          updateNodeLabelPositions();
          document.getElementById("kg_status").innerText = "Click a node to highlight its immediate neighbours.";
          setActiveConceptItem(null);
        };

        window.kgShowAll = window.kgReset;

        window.kgSearch = function() {
          var q = document.getElementById("kg_search").value.trim().toLowerCase();
          if (!q) { return; }

          var matches = allNodes.filter(function(n) {
            return conceptSearchText(n.id, n).includes(q) || htmlToText(n.title || "").includes(q);
          });

          if (matches.length === 0) {
            document.getElementById("kg_status").innerText = "No matching concept found.";
            return;
          }

          var id = matches[0].id;
          var concept = getConcept(id) || {};
          focusConcept(id, null);
          document.getElementById("kg_status").innerText =
            "Found " + matches.length + " match(es). Showing first: " + (concept.label || id);
        };

        window.kgHighlight = function(nodeId) {
          var connected = network.getConnectedNodes(nodeId);
          var keep = {};
          keep[nodeId] = true;
          connected.forEach(function(id) { keep[id] = true; });

          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            if (keep[n.id]) {
              o.opacity = 1.0;
              o.font = Object.assign({}, o.font || {}, {color: "#111111"});
            } else {
              o.opacity = 0.18;
              o.font = Object.assign({}, o.font || {}, {color: "#999999"});
            }
            o.hidden = false;
            return o;
          }));

          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            if (e.from == nodeId || e.to == nodeId) {
              o.hidden = false;
              o.color = {color: "#111111", opacity: 0.95};
              o.width = 2.6;
            } else {
              o.color = {color: "#cccccc", opacity: 0.10};
              o.width = 0.4;
              o.hidden = false;
            }
            return o;
          }));
          updateNodeLabelPositions();

          document.getElementById("kg_status").innerText =
            "Selected " + nodeId + ": showing immediate neighbours.";
        };

        window.kgFocusSelected = function() {
          var selected = network.getSelectedNodes();
          if (selected.length === 0) {
            document.getElementById("kg_status").innerText = "Select a node first.";
            return;
          }

          var nodeId = selected[0];
          var connected = network.getConnectedNodes(nodeId);
          var keep = {};
          keep[nodeId] = true;
          connected.forEach(function(id) { keep[id] = true; });

          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            o.hidden = !keep[n.id];
            return o;
          }));

          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            o.hidden = !(keep[e.from] && keep[e.to]);
            return o;
          }));

          network.fit({animation: true});
          updateNodeLabelPositions();
          document.getElementById("kg_status").innerText =
            "Neighbourhood mode for " + nodeId + ".";
        };

        network.on("click", function(params) {

            if (params.nodes.length === 0)
                return;

            const nodeId = params.nodes[0];

            kgHighlight(nodeId);
            showConcept(nodeId);
            setActiveConceptItem(nodeId);
        });

        network.once("stabilizationIterationsDone", function() {
          kgFreezeLayout();
          updateNodeLabelPositions();
        });

        network.on("afterDrawing", updateNodeLabelPositions);
        network.on("dragEnd", updateNodeLabelPositions);
        network.on("zoom", updateNodeLabelPositions);
        network.on("animationFinished", updateNodeLabelPositions);

        document.getElementById("kg_search").addEventListener("keydown", function(e) {
          if (e.key === "Enter") { kgSearch(); }
        });

        document.getElementById("kg_search").addEventListener("input", function(e) {
          buildConceptList(e.target.value);
        });

        document.getElementById("kg_concept_list").addEventListener("click", function(e) {
          var item = e.target.closest(".kg-concept-item");
          if (!item) { return; }

          e.preventDefault();
          focusConcept(item.getAttribute("data-concept-id"), "Selected");
        });

        document.getElementById("info_panel").addEventListener("click", function(e) {
          var link = e.target.closest(".concept-link");
          if (!link) { return; }

          e.preventDefault();
          var id = link.getAttribute("data-concept-id");
          if (!getConcept(id)) { return; }

          focusConcept(id, "Selected");
        });

        // Build legend from node groups.
        var groups = {};
        allNodes.forEach(function(n) {
          if (n.group !== undefined) { groups[n.group] = true; }
        });
        var legend = document.getElementById("kg_legend");
        var html = "<b>Layers</b><br>";
        Object.keys(groups).sort(function(a,b){return Number(a)-Number(b);}).forEach(function(g) {
          var sample = allNodes.find(function(n) { return String(n.group) === String(g); });
          var color = sample && sample.color && sample.color.background ? sample.color.background : "#999";
          var sampleConcept = sample ? getConcept(sample.id) : null;
          var layerTitle = sampleConcept && sampleConcept.layer_title ? sampleConcept.layer_title : "";
          html += '<span class="legend-dot" style="background:' + color + '"></span>' +
                  'Layer ' + g + (layerTitle ? ': ' + layerTitle : '') + '<br>';
        });
        legend.innerHTML = html;
        buildNodeLabels();
        buildConceptList("");
      }

      // Wait until pyvis has created network/nodes/edges variables.
      setTimeout(kgAfterReady, 500);
    </script>
    
</body>
</html>
