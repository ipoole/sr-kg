roke-linecap=\"round\"/>\n<text x=\"380.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#248a3d\" text-anchor=\"middle\">invariant form<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_1\">\n<title id=\"title-n11_1\">Lorentz invariance<\/title>\n<defs>\n\n<marker id=\"n11_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n11_1_blue\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n11_1_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"208.0\" y2=\"368.0\" stroke=\"#222222\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_axis_arrow)\"/>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"82.0\" y2=\"236.0\" stroke=\"#222222\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_axis_arrow)\"/>\n<text x=\"226.0\" y=\"378.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"66.0\" y=\"218.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"200.0\" y2=\"330.0\" stroke=\"#1f4fbf\" stroke-width=\"4.5\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_blue)\"/>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"124.0\" y2=\"244.0\" stroke=\"#1f4fbf\" stroke-width=\"4.5\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_blue)\"/>\n<text x=\"184.0\" y=\"326.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">x′<\/text>\n<text x=\"114.0\" y=\"226.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">ct′<\/text>\n<line x1=\"220.0\" y1=\"270.0\" x2=\"306.0\" y2=\"244.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_arrow)\"/>\n<rect x=\"320.0\" y=\"202.0\" width=\"120.0\" height=\"92.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"380.0\" y=\"262.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">law<\/text>\n<circle cx=\"424.0\" cy=\"214.0\" r=\"13.0\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\"/>\n<line x1=\"416.0\" y1=\"218.0\" x2=\"424.0\" y2=\"226.0\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<line x1=\"424.0\" y1=\"226.0\" x2=\"438.0\" y2=\"206.0\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"380.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#248a3d\" text-anchor=\"middle\">invariant form<\/text>\n<\/svg>", "svg_icon_caption": "Primed and unprimed frames feed the same law tile.", "svg_detail_caption": "Lorentz invariance means changing inertial frames changes components, but the equation itself keeps the same physical form.", "study_questions": [{"question": "A proposed law gives different physical predictions after the same situation is rewritten in another inertial frame. What principle has probably been violated?\n\nA. Lorentz invariance\nB. Charge quantisation\nC. Gauge fixing\nD. The definition of canonical momentum", "answer": "A. Lorentz invariance requires physical laws to keep the same form under Lorentz transformations.\n\nCoordinates and components may change, but the physical content of the law should not depend on the inertial frame used."}, {"question": "Why does tensor notation help express Lorentz invariance?", "answer": "Tensor notation tracks how objects transform. If both sides of an equation are tensors of the same type, the equation keeps its form under Lorentz transformations. Invariant contractions, such as \\(p_\\mu p^\\mu\\), give observer-independent scalars."}, {"question": "Two observers describe a four-momentum with different components, but both compute \\(p_\\mu p^\\mu=4c^2\\). What invariant mass do they infer?", "answer": "For a massive particle,\n\\[ p_\\mu p^\\mu=m^2c^2. \\]\nIf\n\\[ p_\\mu p^\\mu=4c^2, \\]\nthen\n\\[ m^2=4, \\qquad m=2. \\]\nBoth observers infer the same invariant mass, even if their energy and momentum components differ."}]}, "11.2": {"label": "Gauge fixing", "layer": "11", "layer_title": "Symmetry and Invariance Principles", "definition_new": "Gauge fixing is the choice of one representative potential from a family of gauge-equivalent potentials. It removes redundant descriptive freedom associated with \\cref{Gauge invariance}{8.1} without changing the physical electromagnetic field.", "derivation_new": "Gauge fixing is possible because \\cref{Gauge invariance}{8.1} says that many potentials describe the same physical field. The \\cref{Vector potential}{7.1} may be changed while leaving the \\cref{Field tensor}{7.2} and hence the \\cref{Electromagnetic field}{7.5} unchanged. A gauge condition adds an extra equation selecting a convenient representative. The \\cref{Lorenz gauge}{8.6}, \\(\\partial_\\mu A^\\mu=0\\), is one such choice and is useful because it respects \\cref{Lorentz invariance}{11.1}.", "explanation_new": "Gauge fixing is choosing a convenient representative from many physically equivalent potentials. The danger is to think the gauge choice is an extra physical assumption. It is not; it is a way to remove redundant description. The field tensor remains the same. This is similar in spirit to choosing coordinates, though gauge symmetry has its own physics. The Lorenz gauge is a useful example because it preserves Lorentz covariance and simplifies Maxwell's equations for the potential to a wave-equation form, \\(\\Box A^\\mu=\\mu_0j^\\mu\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_2\">\n<title id=\"title-n11_2\">Gauge fixing<\/title>\n<defs>\n\n<marker id=\"n11_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,156 C130,116 172,194 228,148\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M70,214 C130,174 172,252 228,206\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.52\"/>\n<path d=\"M70,272 C130,232 172,310 228,264\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<line x1=\"238.0\" y1=\"218.0\" x2=\"286.0\" y2=\"218.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n11_2_arrow)\"/>\n<path d=\"M294,124 L362,166 L362,286 L294,328 Z\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"4\"/>\n<text x=\"330.0\" y=\"230.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">gauge<\/text>\n<line x1=\"368.0\" y1=\"218.0\" x2=\"418.0\" y2=\"218.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n11_2_arrow)\"/>\n<path d=\"M424,218 C454,184 486,212 468,252\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\"/>\n<text x=\"448.0\" y=\"292.0\" font-siz Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">gauge<\/text>\n<line x1=\"368.0\" y1=\"218.0\" x2=\"418.0\" y2=\"218.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n11_2_arrow)\"/>\n<path d=\"M424,218 C454,184 486,212 468,252\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\"/>\n<text x=\"448.0\" y=\"292.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"332.0\" y=\"360.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">chosen representative<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_2\">\n<title id=\"title-n11_2\">Gauge fixing<\/title>\n<defs>\n\n<marker id=\"n11_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,156 C130,116 172,194 228,148\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M70,214 C130,174 172,252 228,206\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.52\"/>\n<path d=\"M70,272 C130,232 172,310 228,264\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<rect x=\"90.0\" y=\"348.0\" width=\"66.0\" height=\"54.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"123.0\" y=\"386.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<text x=\"150.0\" y=\"330.0\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#248a3d\" text-anchor=\"middle\">same F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<line x1=\"238.0\" y1=\"218.0\" x2=\"286.0\" y2=\"218.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n11_2_arrow)\"/>\n<path d=\"M294,124 L362,166 L362,286 L294,328 Z\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"4\"/>\n<text x=\"330.0\" y=\"230.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">gauge<\/text>\n<line x1=\"368.0\" y1=\"218.0\" x2=\"418.0\" y2=\"218.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n11_2_arrow)\"/>\n<path d=\"M424,218 C454,184 486,212 468,252\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\"/>\n<text x=\"448.0\" y=\"292.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"332.0\" y=\"360.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">chosen representative<\/text>\n<\/svg>", "svg_icon_caption": "Many gauge-equivalent potentials pass through a selector to one A.", "svg_detail_caption": "Gauge fixing chooses one representative potential from many equivalent descriptions, simplifying calculation while leaving the physical field F unchanged.", "study_questions": [{"question": "Why can choosing the Lorenz gauge simplify calculations without changing the electromagnetic physics?\n\nA. It sets the speed of light to one\nB. It makes \\(F_{\\mu\nu}\\) frame-dependent\nC. It selects one representative potential from a gauge-equivalent family\nD. It removes charge conservation", "answer": "C. Gauge fixing chooses one convenient representative from a family of potentials that describe the same field tensor.\n\nThe physical electromagnetic field is unchanged; the description is made less redundant."}, {"question": "Why is gauge fixing not an extra physical assumption about the electromagnetic field?", "answer": "Gauge-equivalent potentials describe the same \\(F_{\\mu\\nu}\\). A gauge condition selects a convenient representative from that equivalence class. The physical field tensor remains unchanged, so the gauge choice is a description choice rather than a new physical force or field."}, {"question": "A gauge condition leaves two possible representatives, \\(A_1\\) and \\(A_2\\), with the same field tensor \\(F_{\\mu\\nu}\\). If a calculation depends only on \\(F_{\\mu\\nu}\\), should it give different physical results for \\(A_1\\) and \\(A_2\\)? Explain.", "answer": "No. If \\(A_1\\) and \\(A_2\\) give the same \\(F_{\\mu\\nu}\\), and the calculation depends only on \\(F_{\\mu\\nu}\\), then the physical result is the same. Gauge fixing should simplify the description, not change gauge-invariant physics."}]}};
      var edgeKey = {"PREREQUISITE": {"relation": "PREREQUISITE", "directed": true, "category": "knowledge", "meaning": "A requires prior understanding of B. Only include essential, non-redundant dependencies.", "example": "10.2 Electromagnetic waves -> 10.1 Wave equation", "colour": "#d62728"}, "DERIVES_FROM": {"relation": "DERIVES_FROM", "directed": true, "category": "knowledge", "meaning": "A can be mathematically derived from B.", "example": "10.1 Wave equation -> 7.7 Maxwell's equations", "colour": "#1f77b4"}, "RELATED": {"relation": "RELATED", "directed": false, "category": "association", "meaning": "A and B are closely associated, but neither is a prerequisite of the other.", "example": "3.5 Minkowski diagram -- 3.4 Light cone", "colour": "#c8c8c8"}};
      var layoutXSpacing = 350;
      var layoutYSpacing = 400;
      var layoutRowStagger = 35;
      var edgeHoverWidth = 9.0;

      function kgAfterReady() {
        var allNodes = nodes.get();
        var allEdges = edges.get();
        var graphContainer = document.getElementById("mynetwork");
        var nodeLabelLayer = document.createElement("div");
        var nodeLabelEls = {};

        nodeLabelLayer.id = "kg_node_labels";
        graphContainer.appendChild(nodeLabelLayer);

        var originalNodes = {};
        var originalEdges = {};
        var enabledEdgeRelations = {};
        var currentView = {mode: "all", nodeId: null};
        var activeNodeId = null;
        var hoveredEdgeId = null;
        var hoveredEdgeBeforeHover = null;
        var svgImageCache = {};
        var activeNodeRadiusScale = 1.4;
        var activeNodeBorderWidth = 6;
        var nodeLabelWidth = 250;
        var nodeLabelFontSize = 30;

        /*
         * Custom node rendering
         *
         * PyVis/vis-network is still responsible for edge routing, hit testing,
         * and node selection. The visible nodes are deliberately split into
         * three pieces:
         *
         * 1. native vis-network dot nodes for the first frame, avoiding a blank
         *    graph while this injected script waits for network/nodes/edges;
         * 2. invisible fixed-size box nodes after startup, giving interaction a
         *    larger hit area that includes the external label footprint;
         * 3. canvas-drawn circles plus HTML labels, so node labels can contain
         *    MathJax and still track pan/zoom.
         */
        var transparentNodeColor = {
          background: "rgba(255,255,255,0)",
          border: "rgba(255,255,255,0)",
          highlight: {
            background: "rgba(255,255,255,0)",
            border: "rgba(255,255,255,0)"
          },
          hover: {
            background: "rgba(255,255,255,0)",
            border: "rgba(255,255,255,0)"
          }
        };

        function applyCollisionNodeStyle(node) {
          var o = Object.assign({}, node);
          o.shape = "box";
          o.label = " ";
          o.borderWidth = 0;
          o.color = Object.assign({}, transparentNodeColor);
          o.font = Object.assign({}, o.font || {}, {
            size: 1,
            color: "rgba(0,0,0,0)"
          });
          return o;
        }

        function visibleConceptLabel(nodeId) {
          var concept = getConcept(nodeId) || {};
          return '<span class="kg-node-label-id">' + escapeHtml(nodeId) + '</span>' +
            renderConceptText(concept.label || "");
        }

        function buildNodeLabels() {
          nodeLabelLayer.innerHTML = "";
          Object.keys(conceptData).forEach(function(id) {
            var el = document.createElement("div");
            el.className = "kg-node-label";
            el.setAttribute("data-node-id", id);
            el.innerHTML = visibleConceptLabel(id);
            nodeLabelLayer.appendChild(el);
            nodeLabelEls[id] = el;
          });
          typesetNodeLabels();
          updateNodeLabelPositions();
        }

        function typesetNodeLabels() {
          if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.typesetClear) {
              MathJax.typesetClear([nodeLabelLayer]);
            }
            MathJax.typesetPromise([nodeLabelLayer]).catch(function(err) {
              console.warn("MathJax label typesetting failed:", err);
            }).then(function() {
              updateNodeLabelPositions();
            });
          } else {
            setTimeout(typesetNodeLabels, 250);
          }
        }

        function updateNodeLabelPositions() {
          if (!network || !nodeLabelLayer) { return; }

          var positions = network.getPositions();
          var labelScale = Math.max(0.35, network.getScale ? network.getScale() : 1);
          Object.keys(nodeLabelEls).forEach(function(id) {
            var el = nodeLabelEls[id];
            var node = nodes.get(id);
            var pos = positions[id];
            if (!node || !pos || node.hidden) {
              el.style.display = "none";
              return;
            }

            var dom = network.canvasToDOM(pos);
            var baseRadius = Number(node.visualSize) || Number(node.size) || 18;
            var radius = id === activeNodeId ? baseRadius * activeNodeRadiusScale : baseRadius;
            var radiusEdge = network.canvasToDOM({x: pos.x + radius, y: pos.y});
            var radiusPx = Math.abs(radiusEdge.x - dom.x);
            var canvasEl = network.canvas && network.canvas.frame ? network.canvas.frame.canvas : null;
            var canvasRect = canvasEl ? canvasEl.getBoundingClientRect() : graphContainer.getBoundingClientRect();
            var layerRect = nodeLabelLayer.getBoundingClientRect();
            var labelCenterX = canvasRect.left - layerRect.left + dom.x;
            var labelTopY = canvasRect.top - layerRect.top + dom.y + Math.max(4, radiusPx + 3);
            var labelWidth = 250 * labelScale;
            el.style.display = "block";
            el.style.width = labelWidth + "px";
            el.style.fontSize = (30 * labelScale) + "px";
            el.style.left = (labelCenterX - labelWidth / 2) + "px";
            el.style.top = labelTopY + "px";
            el.style.opacity = node.opacity === undefined ? "1" : String(node.opacity);
          });
        }

        function drawVisibleNodes(ctx) {
          var positions = network.getPositions();
          nodes.get().forEach(function(node) {
            if (node.hidden) { return; }

            var pos = positions[node.id];
            if (!pos) { return; }

            var baseRadius = Number(node.visualSize) || 18;
            var isActive = node.id === activeNodeId;
            var radius = isActive ? baseRadius * activeNodeRadiusScale : baseRadius;
            var opacity = node.opacity === undefined ? 1 : Number(node.opacity);
            var color = node.visualColor || {};
            var fill = color.background || "#999999";
            var border = color.border || "#333333";
            var concept = getConcept(node.id) || {};
            var svgIcon = concept.svg_icon || concept.svg_graphic || "";
            var svgImage = svgIcon ? getSvgNodeImage(node.id, svgIcon) : null;

            ctx.save();
            ctx.globalAlpha = Number.isFinite(opacity) ? opacity : 1;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI, false);
            ctx.fillStyle = svgImage ? tintHexColour(fill, 0.86) : fill;
            ctx.fill();

            if (svgImage && svgImage.complete && svgImage.naturalWidth > 0) {
              ctx.save();
              ctx.beginPath();
              ctx.arc(pos.x, pos.y, Math.max(1, radius - 3), 0, 2 * Math.PI, false);
              ctx.clip();
              var imagePadding = radius * 0.08;
              var imageSize = Math.max(1, (radius * 2) - (imagePadding * 2));
              var sourceCrop = 36;
              var sourceSize = Math.max(1, 512 - (sourceCrop * 2));
              ctx.drawImage(
                svgImage,
                sourceCrop,
                sourceCrop,
                sourceSize,
                sourceSize,
                pos.x - imageSize / 2,
                pos.y - imageSize / 2,
                imageSize,
                imageSize
              );
              ctx.restore();
            }

            ctx.lineWidth = isActive ? activeNodeBorderWidth : (svgImage ? 4 : 1.5);
            ctx.strokeStyle = isActive ? "#000000" : (svgImage ? fill : border);
            ctx.stroke();
            ctx.restore();
          });
        }

        function getSvgNodeImage(nodeId, svgText) {
          var cached = svgImageCache[nodeId];
          if (cached === null) {
            return null;
          }
          if (cached) {
            return cached;
          }

          var image = new Image();
          image.onload = function() {
            if (network && network.redraw) {
              network.redraw();
            }
          };
          image.onerror = function() {
            svgImageCache[nodeId] = null;
          };
          svgImageCache[nodeId] = image;
          image.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgText);
          return image;
        }

        function tintHexColour(hexColour, amount) {
          var match = String(hexColour || "").trim().match(/^#([0-9a-fA-F]{6})$/);
          if (!match) {
            return "#ffffff";
          }
          var hex = match[1];
          var r = parseInt(hex.slice(0, 2), 16);
          var g = parseInt(hex.slice(2, 4), 16);
          var b = parseInt(hex.slice(4, 6), 16);
          var mix = Math.max(0, Math.min(1, Number(amount)));
          r = Math.round(r + (255 - r) * mix);
          g = Math.round(g + (255 - g) * mix);
          b = Math.round(b + (255 - b) * mix);
          return "rgb(" + r + "," + g + "," + b + ")";
        }

        nodes.update(allNodes.map(applyCollisionNodeStyle));
        allNodes = nodes.get();
        allNodes.forEach(function(n) { originalNodes[n.id] = Object.assign({}, n); });
        allEdges.forEach(function(e) { originalEdges[e.id] = Object.assign({}, e); });
        Object.keys(edgeKey).forEach(function(relation) {
          enabledEdgeRelations[relation] = edgeKey[relation].directed !== false;
        });

        function escapeHtml(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function renderConceptText(s) {
          return escapeHtml(s).replace(
            /\\cref\{([^{}]*)\}\{([^{}]*)\}/g,
            function(match, label, targetId) {
              if (!getConcept(targetId)) {
                return "<strong>" + label + "</strong>";
              }
              return '<a href="#" class="concept-link" data-concept-id="' +
                escapeHtml(targetId) +
                '"><strong>' + label + "</strong></a>";
            }
          );
        }

        function renderCaptionText(s) {
          var html = renderConceptText(s);
          [
            [/partial_mu A\^mu = 0/g, "\\(\\partial_\\mu A^\\mu = 0\\)"],
            [/A_mu \+ partial_mu Lambda/g, "\\(A_\\mu + \\partial_\\mu \\Lambda\\)"],
            [/p_mu - e A_mu/g, "\\(p_\\mu - e A_\\mu\\)"],
            [/delta S = 0/g, "\\(\\delta S = 0\\)"],
            [/u\^mu = dx\^mu\/dtau/g, "\\(u^\\mu = dx^\\mu/d\\tau\\)"],
            [/p\^mu = m u\^mu/g, "\\(p^\\mu = m u^\\mu\\)"],
            [/F_mu_nu/g, "\\(F_{\\mu\\nu}\\)"],
            [/phi\(x\)/g, "\\(\\phi(x)\\)"],
            [/A_mu\(x\)/g, "\\(A_\\mu(x)\\)"],
            [/A_mu/g, "\\(A_\\mu\\)"],
            [/A\^mu/g, "\\(A^\\mu\\)"],
            [/J\^mu/g, "\\(J^\\mu\\)"],
            [/dp\^mu\/dtau/g, "\\(dp^\\mu/d\\tau\\)"],
            [/p\^mu/g, "\\(p^\\mu\\)"],
            [/x\^mu/g, "\\(x^\\mu\\)"],
            [/u\^mu/g, "\\(u^\\mu\\)"],
            [/dx\^mu\/dtau/g, "\\(dx^\\mu/d\\tau\\)"],
            [/p_mu/g, "\\(p_\\mu\\)"],
            [/s\^2/g, "\\(s^2\\)"],
            [/d\^4x/g, "\\(d^4x\\)"],
            [/E=mc\^2/g, "\\(E=mc^2\\)"],
            [/T_EM/g, "\\(T_{EM}\\)"],
            [/T\^munu/g, "\\(T^{\\mu\\nu}\\)"]
          ].forEach(function(replacement) {
            html = html.replace(replacement[0], replacement[1]);
          });
          html = html.replace(/(^|[^\\A-Za-z])tau\b/g, "$1\\(\\tau\\)");
          return html;
        }

        function typesetInfoPanel(options) {
          options = options || {};
          var panel = document.getElementById("info_panel");
          schedulePanelContentRefit();
          if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.typesetClear) {
              MathJax.typesetClear([panel]);
            }
            MathJax.typesetPromise([panel]).catch(function(err) {
              console.warn("MathJax typesetting failed:", err);
            }).then(function() {
              applyInfoPanelSearchHighlight(options.searchQuery, options.scrollToSearchMatch);
              schedulePanelContentRefit();
            });
          } else if (options.searchQuery) {
            setTimeout(function() {
              applyInfoPanelSearchHighlight(options.searchQuery, options.scrollToSearchMatch);
              schedulePanelContentRefit();
            }, 250);
          }
        }

        function shouldSkipSearchHighlightNode(node) {
          var el = node.parentElement;
          if (!el) { return true; }
          return Boolean(el.closest(
            "mark, .study-questions, svg, mjx-container, script, style"
          ));
        }

        function applyInfoPanelSearchHighlight(query, scrollToMatch) {
          var normalizedQuery = searchDisplayText(query).toLowerCase();
          if (!normalizedQuery) { return; }

          var panel = document.getElementById("info_panel");
          var walker = document.createTreeWalker(panel, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
              if (shouldSkipSearchHighlightNode(node)) {
                return NodeFilter.FILTER_REJECT;
              }
              if (node.nodeValue.toLowerCase().indexOf(normalizedQuery) === -1) {
                return NodeFilter.FILTER_REJECT;
              }
              return NodeFilter.FILTER_ACCEPT;
            }
          });

          var matches = [];
          var node;
          while ((node = walker.nextNode())) {
            matches.push(node);
          }

          var firstMark = null;
          matches.forEach(function(textNode) {
            var value = textNode.nodeValue;
            var lower = value.toLowerCase();
            var fragment = document.createDocumentFragment();
            var cursor = 0;
            var index = lower.indexOf(normalizedQuery);

            while (index !== -1) {
              if (index > cursor) {
                fragment.appendChild(document.createTextNode(value.slice(cursor, index)));
              }

              var mark = document.createElement("mark");
              mark.className = "kg-search-mark kg-detail-search-mark";
              mark.textContent = value.slice(index, index + normalizedQuery.length);
              fragment.appendChild(mark);
              if (!firstMark) { firstMark = mark; }

              cursor = index + normalizedQuery.length;
              index = lower.indexOf(normalizedQuery, cursor);
            }

            if (cursor < value.length) {
              fragment.appendChild(document.createTextNode(value.slice(cursor)));
            }
            textNode.parentNode.replaceChild(fragment, textNode);
          });

          if (scrollToMatch && firstMark) {
            firstMark.scrollIntoView({block: "center", inline: "nearest"});
          }
        }

        function setInfoPanelVisible(visible) {
          var panel = document.getElementById("info_panel");
          var button = document.getElementById("kg_info_toggle");
          panel.classList.toggle("kg-hidden", !visible);
          if (button) {
            button.innerText = visible ? "Hide details" : "Show details";
          }
        }

        function setControlsVisible(visible) {
          var panel = document.getElementById("kg_controls");
          var button = document.getElementById("kg_controls_toggle");
          panel.classList.toggle("kg-hidden", !visible);
          if (button) {
            button.innerText = visible ? "Hide controls" : "Show controls";
          }
        }

        function shouldStartWithControlsHidden() {
          var visualWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
          return visualWidth <= 850 || window.matchMedia("(max-width: 850px)").matches;
        }

        function updateModeButtons() {
          var inNeighbourhood = currentView.mode === "neighbourhood";
          var inDescendants = currentView.mode === "descendants";
          var neighbourhoodButton = document.getElementById("kg_mode_neighbourhood");
          var descendantsButton = document.getElementById("kg_mode_descendants");
          var allButton = document.getElementById("kg_mode_all");
          if (neighbourhoodButton) {
            neighbourhoodButton.classList.toggle("kg-active", inNeighbourhood);
            neighbourhoodButton.setAttribute("aria-pressed", inNeighbourhood ? "true" : "false");
          }
          if (descendantsButton) {
            descendantsButton.classList.toggle("kg-active", inDescendants);
            descendantsButton.setAttribute("aria-pressed", inDescendants ? "true" : "false");
          }
          if (allButton) {
            allButton.classList.toggle("kg-active", !inNeighbourhood && !inDescendants);
            allButton.setAttribute("aria-pressed", (!inNeighbourhood && !inDescendants) ? "true" : "false");
          }
        }

        function getConcept(nodeId) {
          return conceptData[String(nodeId)] || null;
        }

        function conceptHash(nodeId) {
          return "#concept-" + encodeURIComponent(String(nodeId));
        }

        function conceptIdFromHash(hash) {
          var prefix = "#concept-";
          if (!hash || hash.indexOf(prefix) !== 0) { return null; }
          try {
            return decodeURIComponent(hash.slice(prefix.length));
          } catch (e) {
            return null;
          }
        }

        function pushConceptHistory(nodeId, mode) {
          var hash = conceptHash(nodeId);
          var state = {
            nodeId: String(nodeId),
            mode: mode || "highlight"
          };
          var currentState = window.history.state || {};
          if (
            window.location.hash === hash &&
            currentState.nodeId === state.nodeId &&
            currentState.mode === state.mode
          ) {
            return;
          }
          window.history.pushState(state, "", hash);

            clearTimeout(panelContentRefitTimer);
          }
          if (panelContentRefitSettledTimer !== null) {
            clearTimeout(panelContentRefitSettledTimer);
          }
          requestAnimationFrame(function() {
            updateNodeLabelPositions();
          });
          panelContentRefitTimer = setTimeout(function() {
            panelContentRefitTimer = null;
            refitCurrentViewForPanels();
          }, 180);
          panelContentRefitSettledTimer = setTimeout(function() {
            panelContentRefitSettledTimer = null;
            refitCurrentViewForPanels();
          }, 520);
        }

        function focusConcept(nodeId, statusPrefix, options) {
          options = options || {};
          if (!getConcept(nodeId)) { return; }
          activeNodeId = nodeId;
          kgHighlight(nodeId, true);
          showConcept(nodeId, {
            searchQuery: options.searchQuery,
            scrollToSearchMatch: options.scrollToSearchMatch
          });
          setActiveConceptItem(nodeId);
          fitHighlightedSelection(nodeId);
          if (!options.skipHistory) {
            pushConceptHistory(nodeId, "highlight");
          }
          if (statusPrefix) {
            document.getElementById("kg_status").innerText = statusPrefix + " " + nodeId + ".";
          }
        }

        function focusNeighbourhood(nodeId, statusPrefix, options) {
          options = options || {};
          if (!getConcept(nodeId)) { return; }
          kgApplyNeighbourhood(nodeId, true);
          showConcept(nodeId);
          setActiveConceptItem(nodeId);
          if (!options.skipHistory) {
            pushConceptHistory(nodeId, "neighbourhood");
          }

          var neighbourCount = enabledConnectedNodes(nodeId).length;
          document.getElementById("kg_status").innerText =
            (statusPrefix ? statusPrefix + " " + nodeId + ". " : "") +
            "Neighbourhood mode: " + nodeId + " plus " + neighbourCount +
            " neighbour" + (neighbourCount === 1 ? "" : "s") +
            ". Click a visible node to walk one step.";
        }

        function focusDescendants(nodeId, statusPrefix, options) {
          options = options || {};
          if (!getConcept(nodeId)) { return; }
          kgApplyDescendants(nodeId, true);
          showConcept(nodeId);
          setActiveConceptItem(nodeId);
          if (!options.skipHistory) {
            pushConceptHistory(nodeId, "descendants");
          }

          var descendantCount = Math.max(0, Object.keys(enabledDirectedDescendants(nodeId)).length - 1);
          document.getElementById("kg_status").innerText =
            (statusPrefix ? statusPrefix + " " + nodeId + ". " : "") +
            "Descendants mode: " + nodeId + " plus " + descendantCount +
            " reachable node" + (descendantCount === 1 ? "" : "s") +
            ". Click a visible node to walk one step.";
        }

        function buildConceptList(filterText) {
          var q = searchDisplayText(filterText).toLowerCase();
          var ids = matchingSearchIds(q);
          var html = "";
          var count = 0;

          ids.forEach(function(id) {
            var concept = getConcept(id);
            var label = searchDisplayText(concept.label || "");
            var titleHtml = '<span class="kg-search-hit-title">' +
              '<span class="kg-concept-id">' + highlightedSearchText(id, q) + "</span> " +
              highlightedSearchText(label, q) +
              "</span>";
            var snippetHtml = "";

            if (q) {
              var snippets = matchingSearchFields(id, q).filter(function(field) {
                return field.name !== "ID" && field.name !== "Title";
              }).slice(0, 2);
              if (snippets.length > 0) {
                snippetHtml += '<span class="kg-search-snippets">';
                snippets.forEach(function(field) {
                  snippetHtml += '<span class="kg-search-snippet">' +
                    '<span class="kg-search-field">' + escapeHtml(field.name) + ":</span> " +
                    searchSnippet(field, q) +
                    "</span>";
                });
                snippetHtml += "</span>";
              }
            }

            html += '<button type="button" class="kg-concept-item" data-concept-id="' +
              escapeHtml(id) +
              '">' +
              titleHtml +
              snippetHtml +
              "</button>";
            count += 1;
          });

          if (count === 0) {
            html += '<div style="color:#555; padding:4px 0;">No matching concepts.</div>';
          }
          document.getElementById("kg_concept_list").innerHTML = html;
        }

        window.kgReset = function(preserveStatus) {
          restoreHoveredEdge();
          network.unselectAll();
          currentView = {mode: "all", nodeId: null};
          activeNodeId = null;
          updateModeButtons();
          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            o.hidden = false;
            o.opacity = 1.0;
            return o;
          }));
          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            return setEdgeHidden(o, !edgeRelationEnabled(e));
          }));
          updateNodeLabelPositions();
          if (!preserveStatus) {
            document.getElementById("kg_status").innerText = "Click a node to highlight its immediate neighbours.";
          }
          setActiveConceptItem(null);
        };

        window.kgShowAll = window.kgReset;

        window.kgSearch = function() {
          var q = searchDisplayText(document.getElementById("kg_search").value).toLowerCase();
          if (!q) { return; }

          var matches = matchingSearchIds(q);

          if (matches.length === 0) {
            document.getElementById("kg_status").innerText = "No matching concept found.";
            return;
          }

          buildConceptList(q);
          var id = matches[0];
          var concept = getConcept(id) || {};
          focusConcept(id, null, {
            searchQuery: q,
            scrollToSearchMatch: true
          });
          document.getElementById("kg_status").innerText =
            "Found " + matches.length + " match(es). Showing first: " + (concept.label || id);
        };

        window.kgHighlight = function(nodeId, preserveStatus) {
          restoreHoveredEdge();
          activeNodeId = nodeId;
          currentView = {mode: "highlight", nodeId: nodeId};
          updateModeButtons();
          var connected = enabledConnectedNodes(nodeId);
          var keep = {};
          keep[nodeId] = true;
          connected.forEach(function(id) { keep[id] = true; });

          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            if (keep[n.id]) {
              o.opacity = 1.0;
              o.font = Object.assign({}, o.font || {}, {color: "#111111"});
            } else {
              o.opacity = 1.0;
              o.font = Object.assign({}, o.font || {}, {color: "#999999"});
              o.visualColor = {
                background: "#f2f2f2",
                border: "#d0d0d0"
              };
            }
            o = applyCollisionNodeStyle(o);
            o.hidden = false;
            return o;
          }));

          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            if (!edgeRelationEnabled(e)) {
              return setEdgeHidden(o, true);
            } else if (e.from == nodeId || e.to == nodeId) {
              o.color = Object.assign({}, o.color || {}, {opacity: 0.95});
              o.width = Math.max(Number(o.width) || 0, 3.0);
              return setEdgeHidden(o, false);
            } else {
              o.color = {
                color: "#cccccc",
                highlight: "#cccccc",
                hover: "#cccccc",
                opacity: 0.10
              };
              o.width = 0.4;
              o = setEdgeHidden(o, false);
              return setEdgeTooltipEnabled(o, false);
            }
          }));
          network.unselectAll();
          updateNodeLabelPositions();

          if (!preserveStatus) {
            document.getElementById("kg_status").innerText =
              "Selected " + nodeId + ": showing immediate neighbours.";
          }
        };

        function kgApplyNeighbourhood(nodeId, preserveStatus) {
          restoreHoveredEdge();
          activeNodeId = nodeId;
          currentView = {mode: "neighbourhood", nodeId: nodeId};
          updateModeButtons();
          var connected = enabledConnectedNodes(nodeId);
          var keep = {};
          keep[nodeId] = true;
          connected.forEach(function(id) { keep[id] = true; });
          var visibleIds = Object.keys(originalNodes).filter(function(id) {
            return keep[id];
          });
          var compactPositions = buildCompactLayerPositions(visibleIds);

          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            o.hidden = !keep[n.id];
            if (compactPositions[n.id]) {
              o.x = compactPositions[n.id].x;
              o.y = compactPositions[n.id].y;
            }
            return o;
          }));

          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            return setEdgeHidden(o, !(edgeRelationEnabled(e) && keep[e.from] && keep[e.to]));
          }));

          fitNodesToAvailableRect(visibleIds, {maxScale: 0.85, animation: false});
          updateNodeLabelPositions();
          if (!preserveStatus) {
            var neighbourCount = Math.max(0, visibleIds.length - 1);
            document.getElementById("kg_status").innerText =
              "Neighbourhood mode: " + nodeId + " plus " + neighbourCount +
              " neighbour" + (neighbourCount === 1 ? "" : "s") +
              ". Click a visible node to walk one step.";
          }
        }

        function kgApplyDescendants(nodeId, preserveStatus) {
          restoreHoveredEdge();
          activeNodeId = nodeId;
          currentView = {mode: "descendants", nodeId: nodeId};
          updateModeButtons();
          var keep = enabledDirectedDescendants(nodeId);
          var visibleIds = Object.keys(originalNodes).filter(function(id) {
            return keep[id];
          });
          var compactPositions = buildCompactLayerPositions(visibleIds);

          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            o.hidden = !keep[n.id];
            if (compactPositions[n.id]) {
              o.x = compactPositions[n.id].x;
              o.y = compactPositions[n.id].y;
            }
            return o;
          }));

          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            return setEdgeHidden(o, !(
              edgeRelationEnabled(e) &&
              edgeRelationDirected(e) &&
              keep[String(e.from)] &&
              keep[String(e.to)]
            ));
          }));

          fitNodesToAvailableRect(visibleIds, {maxScale: 0.85, animation: false});
          updateNodeLabelPositions();
          if (!preserveStatus) {
            var descendantCount = Math.max(0, visibleIds.length - 1);
            document.getElementById("kg_status").innerText =
              "Descendants mode: " + nodeId + " plus " + descendantCount +
              " reachable node" + (descendantCount === 1 ? "" : "s") +
              ". Click a visible node to walk one step.";
          }
        }

        window.kgFocusSelected = function() {
          var selected = network.getSelectedNodes();
          var nodeId = activeNodeId || selected[0];
          if (!nodeId) {
            document.getElementById("kg_status").innerText = "Select a node first.";
            return;
          }

          focusNeighbourhood(nodeId);
        };

        window.kgFocusDescendantsSelected = function() {
          var selected = network.getSelectedNodes();
          var nodeId = activeNodeId || selected[0];
          if (!nodeId) {
            document.getElementById("kg_status").innerText = "Select a node first.";
            return;
          }

          focusDescendants(nodeId);
        };

        network.on("click", function(params) {

            if (params.nodes.length === 0)
                return;

            const nodeId = params.nodes[0];

            if (currentView.mode === "neighbourhood") {
              focusNeighbourhood(nodeId);
            } else if (currentView.mode === "descendants") {
              focusDescendants(nodeId);
            } else {
              focusConcept(nodeId, "Selected");
            }
        });

        network.on("hoverEdge", function(params) {
          if (params.edge !== undefined && params.edge !== null) {
            highlightHoveredEdge(params.edge);
          }
        });

        network.on("blurEdge", function(params) {
          if (params.edge === hoveredEdgeId) {
            restoreHoveredEdge();
          }
        });

        network.on("afterDrawing", function(ctx) {
          drawVisibleNodes(ctx);
          updateNodeLabelPositions();
        });
        network.on("dragEnd", updateNodeLabelPositions);
        network.on("zoom", updateNodeLabelPositions);
        network.on("animationFinished", updateNodeLabelPositions);
        window.addEventListener("resize", scheduleViewportRefit);
        window.addEventListener("orientationchange", scheduleViewportRefit);
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", scheduleViewportRefit);
          window.visualViewport.addEventListener("scroll", scheduleViewportRefit);
        }
        graphContainer.addEventListener("mouseleave", restoreHoveredEdge);

        window.addEventListener("popstate", function(event) {
          var nodeId = event.state && event.state.nodeId;
          var mode = event.state && event.state.mode;
          if (!nodeId) {
            nodeId = conceptIdFromHash(window.location.hash);
          }

          if (nodeId && getConcept(nodeId)) {
            if (mode === "neighbourhood") {
              focusNeighbourhood(nodeId, null, {skipHistory: true});
            } else if (mode === "descendants") {
              focusDescendants(nodeId, null, {skipHistory: true});
            } else {
              focusConcept(nodeId, "Selected", {skipHistory: true});
            }
          } else {
            kgReset(true);
          }
        });

        document.getElementById("kg_search").addEventListener("keydown", function(e) {
          if (e.key === "Enter") { kgSearch(); }
        });

        document.getElementById("kg_search").addEventListener("input", function(e) {
          buildConceptList(e.target.value);
        });

        document.getElementById("kg_edge_filters").addEventListener("change", function(e) {
          var input = e.target.closest("input[data-edge-relation]");
          if (!input) { return; }

          enabledEdgeRelations[input.getAttribute("data-edge-relation")] = input.checked;
          applyCurrentView();
        });

        document.getElementById("kg_concept_list").addEventListener("click", function(e) {
          var item = e.target.closest(".kg-concept-item");
          if (!item) { return; }

          e.preventDefault();
          focusConcept(item.getAttribute("data-concept-id"), "Selected", {
            searchQuery: document.getElementById("kg_search").value,
            scrollToSearchMatch: true
          });
        });

        document.getElementById("info_panel").addEventListener("click", function(e) {
          var link = e.target.closest(".concept-link");
          if (!link) { return; }

          e.preventDefault();
          var id = link.getAttribute("data-concept-id");
          if (!getConcept(id)) { return; }

          if (currentView.mode === "neighbourhood") {
            focusNeighbourhood(id, "Selected");
          } else if (currentView.mode === "descendants") {
            focusDescendants(id, "Selected");
          } else {
            focusConcept(id, "Selected");
          }
        });

        document.getElementById("info_panel").addEventListener("toggle", function(e) {
          if (e.target && e.target.tagName === "DETAILS") {
            schedulePanelContentRefit();
          }
        }, true);

        // Build legend from node groups.
        var groups = {};
        allNodes.forEach(function(n) {
          if (n.layerGroup !== undefined) { groups[n.layerGroup] = true; }
        });
        var legend = document.getElementById("kg_legend");
        var html = "";
        Object.keys(groups).sort(function(a,b){return Number(b)-Number(a);}).forEach(function(g) {
          var sample = allNodes.find(function(n) { return String(n.layerGroup) === String(g); });
          var color = sample && sample.visualColor && sample.visualColor.background ? sample.visualColor.background : "#999";
          var sampleConcept = sample ? getConcept(sample.id) : null;
          var layerTitle = sampleConcept && sampleConcept.layer_title ? sampleConcept.layer_title : "";
          html += '<span class="legend-dot" style="background:' + color + '"></span>' +
                  'Layer ' + g + (layerTitle ? ': ' + layerTitle : '') + '<br>';
        });
        legend.innerHTML = html;
        buildNodeLabels();
        buildEdgeFilters();
        buildConceptList("");
        if (shouldStartWithControlsHidden()) {
          setControlsVisible(false);
        }
        edges.update(allEdges.map(function(e) {
          var o = Object.assign({}, e);
          return setEdgeHidden(o, !edgeRelationEnabled(e));
        }));
        allEdges = edges.get();

        var initialNodeId = conceptIdFromHash(window.location.hash);
        if (initialNodeId && getConcept(initialNodeId)) {
          window.history.replaceState(
            {nodeId: String(initialNodeId), mode: "highlight"},
            "",
            conceptHash(initialNodeId)
          );
          focusConcept(initialNodeId, "Selected", {skipHistory: true});
        } else {
          window.history.replaceState({}, "", window.location.href);
        }
      }

      // Wait until pyvis has created network/nodes/edges variables.
      (function waitForKgNetwork() {
        if (
          typeof network !== "undefined" &&
          typeof nodes !== "undefined" &&
          typeof edges !== "undefined"
        ) {
          kgAfterReady();
          return;
        }
        setTimeout(waitForKgNetwork, 20);
      })();
    </script>
    
</body>
</html>
