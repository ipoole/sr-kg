<\/text>\n<text x=\"154.0\" y=\"356.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">Aμ + ∂μΛ<\/text>\n<line x1=\"224.0\" y1=\"176.0\" x2=\"332.0\" y2=\"232.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"294.0\" x2=\"332.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<rect x=\"350.0\" y=\"206.0\" width=\"92.0\" height=\"84.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"396.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<circle cx=\"428.0\" cy=\"220.0\" r=\"10.0\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\"/>\n<line x1=\"422.0\" y1=\"226.0\" x2=\"434.0\" y2=\"214.0\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"394.0\" y=\"326.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#248a3d\" text-anchor=\"middle\">same Fμν<\/text>\n<\/svg>"}, "8.2": {"label": "Four-current", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body_orig": "The relativistic quantity describing the distribution and motion of electric charge.  It forms a \\cref{Four-vector}{4.2} with components  \\[ J^\\mu = (c\\rho,\\vec J), \\]  where \\( \\rho \\) is charge density and \\( \\vec J \\) is current density.  The four-current acts as the source term in \\cref{Maxwell's equations}{7.6}. Its conservation is expressed through the continuity equation discussed under \\cref{Charge conservation}{8.5}.", "definition_orig": "The four-current is the relativistic object that combines electric charge density and ordinary current density into a single \\cref{Four-vector}{4.2}. It is usually written \\(J^\\mu=(c\\rho,\\vec J)\\), where \\(\\rho\\) is charge density and \\(\\vec J\\) is the three-current density.", "explanation_orig": "In non-relativistic language charge density and current density look like separate quantities, but different inertial observers mix space and time when they describe the same physical situation. A distribution that one observer calls mostly charge density may be described by another as charge plus current. The four-current packages these descriptions into one covariant quantity. It is the source term in the covariant form of \\cref{Maxwell's equations}{7.6}, just as mass density is the source in Newtonian gravity. Because it is a local density-and-flux object, it fits naturally with the \\cref{Principle of locality}{2.3}: electromagnetic fields at an event respond to the charge and current structure represented there.", "example_orig": "A line of charges at rest has charge density but no current in its own rest frame. An observer moving along the line sees length contraction and moving charge, so both \\(\\rho\\) and \\(\\vec J\\) change. The four-current is the covariant object that relates these two descriptions.", "definition_new": "The four-current \\(j^\\mu\\) combines charge density and current density into one relativistic \\cref{Four-vectors}{4.2}: \\[ j^\\mu=(c\\rho,\\mathbf j). \\] It is the source appearing in covariant \\cref{Maxwell's equations}{7.6}.", "derivation_new": "The four-current is built by packaging local charge density and ordinary current density into a four-vector. Since charge density is the time component of charge flow and \\(\\mathbf j\\) is the spatial flux of charge, the covariant object is \\[ j^\\mu=(c\\rho,j_x,j_y,j_z). \\] Its transformation law is the \\cref{Four-vectors}{4.2} transformation law. Local conservation is expressed by its four-divergence, \\(\\partial_\\mu j^\\mu=0\\), developed in \\cref{Charge conservation}{8.5}.", "explanation_new": "The four-current packages charge density and current density into one relativistic source object. Charge density alone is not enough because different observers disagree about densities and currents when charges are moving. What one observer calls mostly charge density, another may partly describe as current. The four-current keeps the bookkeeping together, just as four-momentum keeps energy and momentum together. In a wire, the lab frame and a frame moving with charges can assign different \\(\\rho\\) and \\(\\mathbf j\\), but they are related as components of \\(j^\\mu\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_2\">\n<title id=\"title-n8_2\">Four-current<\/title>\n<defs>\n\n<marker id=\"n8_2_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n8_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"324.0\" y=\"162.0\" width=\"112.0\" height=\"160.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"380.0\" y=\"254.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">Jμ<\/text>\n<line x1=\"342.0\" y1=\"214.0\" x2=\"418.0\" y2=\"214.0\" stroke=\"#d22f2f\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_2_arrow)\"/>\n<circle cx=\"356.0\" cy=\"268.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"380.0\" y=\"274.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">ρ<\/text>\n<text x=\"382.0\" y=\"204.0\" font-size=\"34\" font-family=\"S 29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">ρc + J<\/text>\n<\/svg>"}, "8.3": {"label": "Minimal coupling", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body_orig": "The prescription for introducing electromagnetic interaction into the \\cref{Lagrangian}{5.2} of a charged particle.  The ordinary momentum is replaced by  \\[ p_\\mu \\rightarrow p_\\mu - eA_\\mu, \\]  where \\(A_\\mu\\) is the \\cref{Vector potential}{7.1}.   This modification preserves \\cref{Gauge invariance}{8.1} and leads directly to the dynamical law governing charged particles in electromagnetic fields.", "definition_orig": "Minimal coupling is the standard prescription for introducing electromagnetic interaction into the dynamics of a charged particle. In relativistic notation it replaces the free-particle momentum structure by the gauge-covariant combination \\(p_\\mu-eA_\\mu\\), where \\(A_\\mu\\) is the \\cref{Vector potential}{7.1}.", "explanation_orig": "The phrase “minimal” means that the interaction is introduced in the simplest way compatible with relativity and \\cref{Gauge invariance}{8.1}. Instead of adding an arbitrary new force law by hand, one modifies the particle \\cref{Lagrangian}{5.2} or momentum in a way that makes the electromagnetic potential part of the dynamical structure. This also clarifies the distinction between mechanical momentum and \\cref{Canonical momentum}{5.5}: in the presence of a vector potential, the canonical momentum includes a contribution from the field. Applying the \\cref{Action principle}{5.1} to the minimally coupled particle then gives the \\cref{Lorentz force law}{8.4}.", "example_orig": "For a charged particle, the free-particle action is supplemented by an interaction term involving \\(A_\\mu dx^\\mu\\). Varying this action does not merely produce straight-line inertial motion; it produces acceleration determined by the electromagnetic field tensor.", "definition_new": "Minimal coupling is the standard prescription for introducing electromagnetic interaction into a charged particle's dynamics by replacing ordinary momentum structure with the gauge-covariant combination involving the \\cref{Vector potential}{7.1}, commonly \\(p_\\mu-eA_\\mu\\).", "derivation_new": "The prescription is guided by \\cref{Gauge invariance}{8.1} and the existence of the \\cref{Vector potential}{7.1}. For a charged particle, one adds the simplest local interaction term between the particle worldline and the potential, proportional to \\[ e A_\\mu dx^\\mu. \\] Equivalently, in momentum language the free momentum is replaced by the gauge-covariant combination \\[ p_\\mu\\rightarrow p_\\mu-eA_\\mu. \\] Varying the minimally coupled action gives the \\cref{Lorentz force law}{8.4}.", "explanation_new": "Minimal coupling is the economical way to make a charged particle interact with electromagnetism. Instead of inventing a separate force rule first, we insert the vector potential into the particle's action or momentum structure. The phrase 'minimal' means no unnecessary extra terms: use the simplest local, gauge-compatible coupling. This also explains why canonical momentum and mechanical momentum can differ. In the nonrelativistic limit, the Lagrangian picks up terms involving \\(\\phi\\) and \\(\\mathbf A\\), and varying it gives the Lorentz force.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_3\">\n<title id=\"title-n8_3\">Minimal coupling<\/title>\n<defs>\n\n<marker id=\"n8_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"62.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"184.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"226.0\" y=\"264.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">eA<\/text>\n<line x1=\"278.0\" y1=\"252.0\" x2=\"356.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p-eA<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_3\">\n<title id=\"title-n8_3\">Minimal coupling<\/title>\n<defs>\n\n<marker id=\"n8_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"190.0\" y1=\"164.0\" x2=\"216.0\" y2=\"146.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"228.0\" y1=\"218.0\" x2=\"262.0\" y2=\"210.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"190.0\" y1=\"286.0\" x2=\"220.0\" y2=\"262.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<path d=\"M70,346 C142,260 214,306 286,218\" fill=\"none\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"164.0\" cy=\"292.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"62.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"184.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"226.0\" y=\"264.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">eA<\/text>\n<line x1=\"278.0\" y1=\"252.0\" x2=\"356.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p-eA<\/text>\n<text x=\"242.0\" y=\"338.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">pμ - eAμ<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_3\">\n<title id=\"title-n8_3\">Minimal coupling<\/title>\n<defs>\n\n<marker id=\"n8_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"190.0\" y1=\"164.0\" x2=\"216.0\" y2=\"146.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"228.0\" y1=\"218.0\" x2=\"262.0\" y2=\"210.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"190.0\" y1=\"286.0\" x2=\"220.0\" y2=\"262.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<path d=\"M70,346 C142,260 214,306 286,218\" fill=\"none\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"164.0\" cy=\"292.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"62.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"184.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"226.0\" y=\"264.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">eA<\/text>\n<line x1=\"278.0\" y1=\"252.0\" x2=\"356.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p-eA<\/text>\n<text x=\"242.0\" y=\"338.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">pμ - eAμ<\/text>\n<\/svg>"}, "8.4": {"label": "Lorentz force law", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body_orig": "The relativistic equation of motion for a charged particle interacting with the \\cref{Electromagnetic field}{7.5}.  In covariant form it can be written  \\[ \\frac{dp^\\mu}{d\\tau} = eF^{\\mu\\nu}u_\\nu, \\]  where \\(p^\\mu\\) is the \\cref{Momentum four-vector}{4.5}, \\(u^\\mu\\) is the \\cref{Velocity four-vector}{4.4}, and \\(F^{\\mu\\nu}\\) is the \\cref{Field tensor}{7.2}.  This equation arises naturally from applying the \\cref{Action principle}{5.1} to a charged particle interacting with the electromagnetic field via \\cref{Minimal coupling}{8.3}.", "definition_orig": "The Lorentz force law is the equation of motion for a charged particle in an electromagnetic field. In covariant form it may be written \\(dp^\\mu/d\\tau=eF^{\\mu\\nu}u_\\nu\\), relating the change of \\cref{Momentum four-vector}{4.5} to the \\cref{Field tensor}{7.2} and the particle's \\cref{Velocity four-vector}{4.4}.", "explanation_orig": "This law says how the electromagnetic field acts on matter. The covariant expression is compact because it treats electric and magnetic effects as different components of the same spacetime object. When unpacked into ordinary three-vector language, it contains the familiar electric force on a charge and the velocity-dependent magnetic force. Its relativistic form also shows that the force is not an independent add-on to electromagnetism: it follows from \\cref{Minimal coupling}{8.3} and the \\cref{Action principle}{5.1}. The law therefore links particle dynamics to field theory, connecting the motion of charged particles with the same \\cref{Electromagnetic field}{7.5} governed by \\cref{Maxwell's equations}{7.6}.", "example_orig": "A charge initially at rest in a uniform electric field accelerates along the field direction. A charge already moving through a magnetic field can be deflected sideways, producing circular or helical motion. Both effects are contained in the single covariant equation using \\(F^{\\mu\\nu}\\).", "definition_new": "The Lorentz force law is the relativistic equation of motion for a charged particle in an electromagnetic field. In covariant form it relates the rate of change of \\cref{Momentum four-vector}{4.5} to the \\cref{Field tensor}{7.2} and the particle's \\cref{Velocity four-vector}{4.4}.", "derivation_new": "Starting from the \\cref{Action principle}{5.1} with \\cref{Minimal coupling}{8.3}, varying the charged particle worldline gives the covariant force equation \\[ \\frac{dp^\\mu}{d\\tau}=eF^\\mu{}_{\\nu}U^\\nu, \\] up to conventional placement of indices and unit factors. Here \\(p^\\mu\\) is the \\cref{Momentum four-vector}{4.5}, \\(U^\\nu\\) is the \\cref{Velocity four-vector}{4.4}, and \\(F^\\mu{}_{\\nu}\\) is formed from the \\cref{Field tensor}{7.2}. In three-vector form this contains \\[ \\mathbf F=e(\\mathbf E+\\mathbf v\\times\\mathbf B). \\]", "explanation_new": "The Lorentz force law is the bridge from field to particle motion. In three-vector form it says electric fields push charges along the field and magnetic fields deflect moving charges sideways. In covariant form the same statement becomes one compact equation involving \\(F^\\mu{}_{\\nu}\\), four-velocity, and four-momentum. The compact notation is not just elegance; it shows that electric and magnetic forces are components of one relativistic interaction. A charge at rest in an electric field and a moving charge curving in a magnetic field are two familiar faces of the same law.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<text x=\"258.0\" y=\"388.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">q Fμν u^μ → dp^μ/dτ<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<text x=\"258.0\" y=\"388.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">q Fμν u^μ → dp^μ/dτ<\/text>\n<\/svg>"}, "8.5": {"label": "Charge conservation", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "body_orig": "Electric charge is locally conserved.  In relativistic form this statement is expressed by the continuity equation  \\[ \\partial_\\mu J^\\mu = 0, \\]  where \\(J^\\mu\\) is the \\cref{Four-current}{8.2}.   This relation ensures the internal consistency of \\cref{Maxwell's equations}{7.6} and reflects the symmetry structure of the electromagnetic theory.", "definition_orig": "Charge conservation is the statement that electric charge cannot be locally created or destroyed. In relativistic notation it is expressed by the continuity equation \\(\\partial_\\mu J^\\mu=0\\), where \\(J^\\mu\\) is the \\cref{Four-current}{8.2}.", "explanation_orig": "The word “locally” is important. Charge conservation does not merely say that the total charge of the universe is constant; it says that charge can leave a region only by flowing through its boundary. The continuity equation expresses this bookkeeping at each spacetime event. It is also required for consistency of the sourced form of \\cref{Maxwell's equations}{7.6}: the field equations cannot be compatible with a source whose charge simply appears or disappears. More conceptually, charge conservation is closely tied to the symmetry structure of electromagnetism, especially \\cref{Gauge invariance}{8.1} and the conservation-law ideas summarized by \\cref{Noether's theorem}{5.6}.", "example_orig": "If the charge density inside a small box decreases, the continuity equation says there must be a corresponding outward current through the surface of the box. The lost charge has gone somewhere; it has not vanished at that event.", "definition_new": "Charge conservation is the local statement that electric charge cannot appear or disappear. In relativistic notation it is written as the continuity equation for the \\cref{Four-current}{8.2}: \\[ \\partial_\\mu j^\\mu=0. \\]", "derivation_new": "Charge conservation follows from the sourced \\cref{Maxwell's equations}{7.6}. Taking the divergence of \\[ \\partial_\\mu F^{\\mu\\nu}=\\mu_0 j^\\nu \\] gives \\[ \\partial_\\nu\\partial_\\mu F^{\\mu\\nu}=\\mu_0\\partial_\\nu j^\\nu. \\] The left-hand side vanishes because \\(F^{\\mu\\nu}\\) is antisymmetric while the double derivative is symmetric in \\(\\mu\\) and \\(\\nu\\). Therefore \\[ \\partial_\\mu j^\\mu=0. \\] This is the covariant continuity equation for the \\cref{Four-current}{8.2}.", "explanation_new": "Charge conservation is local bookkeeping. It does not merely say the total charge of the universe stays fixed; it says charge cannot disappear from a small box unless current flows through the boundary. The continuity equation expresses that point-by-point accounting. In Maxwell theory it also follows from the antisymmetry of the field tensor, so it is built into the consistency of the equations. If charge density in a small region decreases, the equation demands an outward current. The charge went somewhere; it did not vanish at an event.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_5\">\n<title id=\"title-n8_5\">Charge conservation<\/title>\n<defs>\n\n<marker id=\"n8_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"150.0\" y=\"142.0\" width=\"180.0\" height=\"180.0\" rx=\"12.0\" fill=\"#fff6f6\" stroke=\"#222222\" stroke-width=\"4\"/>\n<circle cx=\"196.0\" cy=\"198.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"238.0\" cy=\"230.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"276.0\" cy=\"184.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"230.0\" cy=\"278.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"330.0\" y1=\"204.0\" x2=\"408.0\" y2=\"184.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"330.0\" y1=\"264.0\" x2=\"408.0\" y2=\"294.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"182.0\" y1=\"142.0\" x2=\"154.0\" y2=\"78.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"150.0\" y1=\"254.0\" x2=\"78.0\" y2=\"278.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<text x=\"386.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">J<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_5\">\n<title id=\"title-n8_5\">Charge conservation<\/title>\n<defs>\n\n<marker id=\"n8_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"150.0\" y=\"142.0\" width=\"180.0\" height=\"180.0\" rx=\"12.0\" fill=\"#fff6f6\" stroke=\"#222222\" stroke-width=\"4\"/>\n<circle cx=\"196.0\" cy=\"198.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"238.0\" cy=\"230.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"276.0\" cy=\"184.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"230.0\" cy=\"278.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"330.0\" y1=\"204.0\" x2=\"408.0\" y2=\"184.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"330.0\" y1=\"264.0\" x2=\"408.0\" y2=\"294.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"182.0\" y1=\"142.0\" x2=\"154.0\" y2=\"78.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"150.0\" y1=\"254.0\" x2=\"78.0\" y2=\"278.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<text x=\"386.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">J<\/text>\n<text x=\"240.0\" y=\"372.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂μJ^μ = 0<\/text>\n<text x=\"238.0\" y=\"130.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">rho<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_5\">\n<title id=\"title-n8_5\">Charge conservation<\/title>\n<defs>\n\n<marker id=\"n8_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"150.0\" y=\"142.0\" width=\"180.0\" height=\"180.0\" rx=\"12.0\" fill=\"#fff6f6\" stroke=\"#222222\" stroke-width=\"4\"/>\n<circle cx=\"196.0\" cy=\"198.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"238.0\" cy=\"230.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"276.0\" cy=\"184.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"230.0\" cy=\"278.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"330.0\" y1=\"204.0\" x2=\"408.0\" y2=\"184.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"330.0\" y1=\"264.0\" x2=\"408.0\" y2=\"294.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"182.0\" y1=\"142.0\" x2=\"154.0\" y2=\"78.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"150.0\" y1=\"254.0\" x2=\"78.0\" y2=\"278.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<text x=\"386.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">J<\/text>\n<text x=\"240.0\" y=\"372.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂μJ^μ = 0<\/text>\n<text x=\"238.0\" y=\"130.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">rho<\/text>\n<\/svg>"}, "9.1": {"label": "Energy density of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body_orig": "The electromagnetic field itself carries energy.  The energy density stored in the \\cref{Electromagnetic field}{7.5} is  \\[ u = \\frac12 (E^2 + B^2), \\]  where \\(E\\) and \\(B\\) denote the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.   This energy contributes to the relativistic conservation laws described by the \\cref{Energy--momentum tensor}{9.4}.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "The electromagnetic energy density is the energy per unit volume carried by the \\cref{Electromagnetic field}{7.5}. In SI units it is \\[ u=\\frac12\\left(\\epsilon_0 E^2+\\frac{1}{\\mu_0}B^2\\right), \\] where \\(\\mathbf E\\) and \\(\\mathbf B\\) are the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.", "derivation_new": "The energy density is obtained as the time-time component of the electromagnetic \\cref{Energy--momentum tensor}{9.4}. In a chosen inertial frame, decomposing the field tensor into the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4} gives \\[ T^{00}=u=\\frac12\\left(\\epsilon_0 E^2+\\frac{1}{\\mu_0}B^2\\right). \\] Thus the energy stored locally in the field is built from the squared electric and magnetic field strengths.", "explanation_new": "Electromagnetic fields store energy locally. That is a major conceptual step if you first met fields only as devices for exerting forces on charges. The energy is not just in the particles; it can be in the field between them and can move through space. The formula \\(u=\\tfrac12(\\epsilon_0E^2+B^2/\\mu_0)\\) says stronger fields carry more energy density. In a plane wave, the electric and magnetic contributions are equal, so the field energy is shared between the two components. This energy density is one component of the larger energy-momentum tensor.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy density of EM field<\/title>\n\n<rect x=\"210.0\" y=\"190.0\" width=\"130.0\" height=\"130.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"228.0\" y1=\"244.6\" x2=\"322.0\" y2=\"244.6\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M234,275.8 C250,252.4 268,299.2 316,273.2\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"372.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u<\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy density of EM field<\/title>\n\n<rect x=\"188.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"233.8\" x2=\"260.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,255.4 C228,239.2 246,271.6 254,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"233.8\" x2=\"356.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,255.4 C324,239.2 342,271.6 350,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"188.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"329.8\" x2=\"260.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,351.4 C228,335.2 246,367.6 254,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"329.8\" x2=\"356.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,351.4 C324,335.2 342,367.6 350,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"416.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u_EM<\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy density of EM field<\/title>\n\n<rect x=\"188.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"233.8\" x2=\"260.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,255.4 C228,239.2 246,271.6 254,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"233.8\" x2=\"356.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,255.4 C324,239.2 342,271.6 350,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"188.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"329.8\" x2=\"260.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,351.4 C228,335.2 246,367.6 254,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"329.8\" x2=\"356.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,351.4 C324,335.2 342,367.6 350,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"416.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u_EM<\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>"}, "9.2": {"label": "Momentum density (Poynting vector)", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body_orig": "Electromagnetic fields also carry momentum.   The momentum density is given by the Poynting vector  \\[ \\vec S = \\vec E \\times \\vec B. \\]  This vector represents the flow of energy and momentum carried by the \\cref{Electromagnetic field}{7.5}.   Together with the \\cref{Energy density of EM field}{9.1}, it forms part of the relativistic description of field energy and momentum.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "The Poynting vector \\(\\mathbf S\\) describes electromagnetic energy flux: the rate at which field energy flows through unit area. In SI units, \\[ \\mathbf S=\\frac{1}{\\mu_0}\\mathbf E\\times\\mathbf B. \\] It is closely related to the momentum density of the electromagnetic field.", "derivation_new": "The Poynting vector is obtained from the mixed time-space components of the electromagnetic \\cref{Energy--momentum tensor}{9.4}. When those components are decomposed into the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}, the energy-flow result from \\cref{Field energy}{7.5} gives \\[ \\mathbf S=\\frac{1}{\\mu_0}\\mathbf E\\times\\mathbf B. \\] The corresponding field momentum density is \\[ \\mathbf g=\\frac{\\mathbf S}{c^2}. \\]", "explanation_new": "The Poynting vector tells you where electromagnetic energy is going. Energy density says how much field energy is stored in a region; \\(\\mathbf S\\) says how that energy flows through space. The cross product \\(\\mathbf E\\times\\mathbf B\\) is a direction cue as well as a formula: in a plane wave with \\(\\mathbf E\\) along \\(y\\) and \\(\\mathbf B\\) along \\(z\\), \\(\\mathbf S\\) points along the direction of propagation. Relativity ties this energy flux to momentum density, so field energy flow also means field momentum.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"180.0\" y1=\"314.0\" x2=\"180.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"126.0\" y1=\"260.0\" x2=\"234.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"192.0\" y1=\"248.0\" x2=\"292.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"132.0\" y1=\"274.0\" x2=\"132.0\" y2=\"166.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"78.0\" y1=\"220.0\" x2=\"186.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"144.0\" y1=\"208.0\" x2=\"244.0\" y2=\"148.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"230.0\" y1=\"314.0\" x2=\"230.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"176.0\" y1=\"260.0\" x2=\"284.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"242.0\" y1=\"248.0\" x2=\"342.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"328.0\" y1=\"354.0\" x2=\"328.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"274.0\" y1=\"300.0\" x2=\"382.0\" y2=\"300.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"340.0\" y1=\"288.0\" x2=\"440.
