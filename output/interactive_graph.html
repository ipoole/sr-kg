e=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"90.0\" y1=\"404.0\" x2=\"420.0\" y2=\"404.0\" stroke=\"#222222\" stroke-width=\"5.5\" stroke-linecap=\"round\" marker-end=\"url(#n4_1_axis_arrow)\"/>\n<line x1=\"90.0\" y1=\"404.0\" x2=\"90.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"5.5\" stroke-linecap=\"round\" marker-end=\"url(#n4_1_axis_arrow)\"/>\n<text x=\"438.0\" y=\"414.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"74.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"340.0\" y1=\"130.0\" x2=\"340.0\" y2=\"404.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"8 9\" stroke-linecap=\"round\"/>\n<text x=\"358.0\" y=\"394.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">t<\/text>\n<path d=\"M142,352 C210,214 284,336 340,130\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\" stroke-linecap=\"round\"/>\n<path d=\"M142,352 C174,286 258,286 340,130\" fill=\"none\" stroke=\"#222222\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<line x1=\"163.0\" y1=\"290.0\" x2=\"193.0\" y2=\"306.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"210.6\" y1=\"261.5\" x2=\"237.4\" y2=\"282.5\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"258.6\" y1=\"219.4\" x2=\"281.4\" y2=\"244.6\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"298.0\" y1=\"160.2\" x2=\"318.0\" y2=\"187.8\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"142.0\" cy=\"352.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<circle cx=\"340.0\" cy=\"130.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<text x=\"100.0\" y=\"360.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"362.0\" y=\"122.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"242.0\" y=\"246.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">τ<\/text>\n<\/svg>", "svg_icon_caption": "Ticks along a timelike worldline represent accumulated proper time tau.", "svg_detail_caption": "Proper time is the time carried by a clock along its own timelike path; coordinate time is a frame-dependent comparison.", "study_questions": [{"question": "Two clocks separate, follow different timelike paths, and reunite. They need not show the same elapsed time. Which quantity is each clock directly measuring along its own path?\n\nA. Coordinate time in the original frame\nB. Coordinate distance divided by \\(c\\)\nC. The value of the electromagnetic potential\nD. Proper time along its worldline", "answer": "D. Each clock measures proper time along its own worldline.\n\nProper time is built from the spacetime interval, so different paths between the same meetings can accumulate different elapsed proper times."}, {"question": "Why is proper time a natural parameter for relativistic particle motion?", "answer": "Proper time belongs to the particle's own worldline, not to an arbitrary observer's coordinate system. Since it is invariant, differentiating with respect to \\(\\tau\\) produces objects such as the velocity four-vector that transform cleanly between inertial frames."}, {"question": "A particle moves at constant speed \\(v=0.8c\\) for a coordinate time \\(dt=10\\,\\mathrm s\\) in one inertial frame. Using\n\\[ d\\tau=dt\\sqrt{1-v^2/c^2}, \\]\ncalculate the elapsed proper time.", "answer": "First compute the square-root factor:\n\\[ \\sqrt{1-v^2/c^2}=\\sqrt{1-0.8^2}=\\sqrt{0.36}=0.6. \\]\nTherefore\n\\[ d\\tau=10(0.6)=6\\,\\mathrm s. \\]\nThe moving clock records \\(6\\,\\mathrm s\\) of proper time along that segment."}]}, "4.2": {"label": "Four-vectors", "layer": "4", "layer_title": "Relativistic Kinematics", "definition_new": "A four-vector is an object with four components that transform under \\cref{Lorentz transformations}{3.3} in the same way as spacetime displacement components. Four-vectors provide the standard language for writing relativistic quantities independently of a particular inertial frame.", "derivation_new": "The concept is abstracted from the transformation law of the coordinate displacement \\(\\Delta x^\\mu\\). If \\(\\Delta x'^\\mu=\\Lambda^\\mu{}_{\\nu}\\Delta x^\\nu\\), then any object \\(A^\\mu\\) satisfying \\[ A'^\\mu=\\Lambda^\\mu{}_{\\nu}A^\\nu \\] is called a four-vector. The \\cref{Metric tensor}{3.1} then defines invariant scalar products, \\[ A_\\mu B^\\mu=\\eta_{\\mu\\nu}A^\\mu B^\\nu. \\]", "explanation_new": "A four-vector is one object seen through different coordinate frames. The components may change, but they change together according to a strict rule, and contractions such as \\(A_\\mu B^\\mu\\) remain invariant. This is the same idea as ordinary vectors under rotations, except Lorentz transformations mix time and space with the Minkowski metric. Try not to picture four independent numbers sitting in a list. Picture a single spacetime arrow or physical quantity whose components depend on the observer. Position, velocity, momentum, current, and potential all use this pattern.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_2\">\n<title id=\"title-n4_2\">Four-vectors<\/title>\n<defs>\n\n<marker id=\"n4_2_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_2_vec\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"98.0\" y1=\"390.0\" x2=\"358.0\" y2=\"390.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_2_axis_arrow)\"/>\n<line x1=\"98.0\" y1=\"390.0\" x2=\"98.0\" y2=\"116.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_2_axis_arrow)\"/>\n<text x=\"376.0\" y=\"400.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"82.0\" y=\"98.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"98.0\" y1=\"390.0\" x2=\"306.0\" y2=\"230.0\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_2_vec)\"/>\n<text x=\"224.0\" y=\"292.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<path d=\"M340,136 C320,174.6 320,242.6 340,274\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<path d=\"M434,136 C454,174.6 454,242.6 434,274\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<text x=\"387.0\" y=\"162.4\" font-size=\"24\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">•<\/text>\n<text x=\"387.0\" y=\"196.4\" font-size=\"24\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">•<\/text>\n<text x=\"387.0\" y=\"230.4\" font-siz fX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_2_vec\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"98.0\" y1=\"390.0\" x2=\"358.0\" y2=\"390.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_2_axis_arrow)\"/>\n<line x1=\"98.0\" y1=\"390.0\" x2=\"98.0\" y2=\"116.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_2_axis_arrow)\"/>\n<text x=\"376.0\" y=\"400.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"82.0\" y=\"98.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"306.0\" y1=\"230.0\" x2=\"306.0\" y2=\"390.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"8 9\" stroke-linecap=\"round\"/>\n<line x1=\"98.0\" y1=\"230.0\" x2=\"306.0\" y2=\"230.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"8 9\" stroke-linecap=\"round\"/>\n<line x1=\"98.0\" y1=\"390.0\" x2=\"306.0\" y2=\"230.0\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_2_vec)\"/>\n<text x=\"224.0\" y=\"292.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<path d=\"M340,136 C320,174.6 320,242.6 340,274\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<path d=\"M434,136 C454,174.6 454,242.6 434,274\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<text x=\"387.0\" y=\"162.4\" font-size=\"24\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">A⁰<\/text>\n<text x=\"387.0\" y=\"196.4\" font-size=\"24\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">A¹<\/text>\n<text x=\"387.0\" y=\"230.4\" font-size=\"24\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">A²<\/text>\n<text x=\"387.0\" y=\"264.4\" font-size=\"24\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">A³<\/text>\n<rect x=\"358.0\" y=\"326.0\" width=\"68.0\" height=\"58.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"392.0\" y=\"367.2\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">η<\/text>\n<\/svg>", "svg_icon_caption": "One spacetime arrow and a component column represent a single four-vector.", "svg_detail_caption": "A four-vector is one spacetime object with linked components; Lorentz transformations reshuffle the components without destroying the object.", "study_questions": [{"question": "A list of four numbers is measured in one frame. What extra test must it pass before it deserves to be called a four-vector?\n\nA. Its four components must all be positive\nB. Its components must transform under Lorentz transformations like \\(\\Delta x^\\mu\\)\nC. Its spatial components must vanish in every frame\nD. Its Euclidean length must be invariant", "answer": "B. A four-vector is defined by its Lorentz transformation law.\n\nThe components may change between frames, but they must change in the same structured way as spacetime displacement components."}, {"question": "Why are scalar products such as \\(A_\\mu B^\\mu\\) important?", "answer": "They are invariant contractions. The metric combines the components so that observers in different inertial frames agree on the scalar value, even though they may disagree on the individual components of \\(A^\\mu\\) and \\(B^\\mu\\)."}, {"question": "Using the \\(+---\\) metric, calculate the invariant square of\n\\[ A^\\mu=(5,3,4,0). \\]\nIs it timelike, lightlike, or spacelike?", "answer": "With the \\(+---\\) metric,\n\\[ A_\\mu A^\\mu=(A^0)^2-(A^1)^2-(A^2)^2-(A^3)^2. \\]\nSo\n\\[ A_\\mu A^\\mu=5^2-3^2-4^2-0^2=25-9-16=0. \\]\nThe four-vector is lightlike."}]}, "4.3": {"label": "Position four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "definition_new": "The position four-vector packages the coordinates of a \\cref{Spacetime event}{2.2} into \\[ x^\\mu=(ct,x,y,z). \\] It is the prototype \\cref{Four-vectors}{4.2} object in special relativity.", "derivation_new": "Starting with an event described in an inertial frame by time \\(t\\) and position \\((x,y,z)\\), multiply the time coordinate by \\(c\\) so all components have dimensions of length. This gives \\[ x^\\mu=(ct,x,y,z). \\] Under \\cref{Lorentz transformations}{3.3}, these components transform linearly as a four-vector. Differences \\(\\Delta x^\\mu\\) between two such position four-vectors are then contracted with the \\cref{Metric tensor}{3.1} to obtain the \\cref{Spacetime interval}{3.2}.", "explanation_new": "The position four-vector packages the coordinates of an event as \\(x^\\mu=(ct,x,y,z)\\). The factor \\(c\\) is there so the time component has units of length, matching the spatial components. The vector from the origin to one event depends on where you choose the origin, but differences between position four-vectors describe separations between events, and those separations have invariant intervals. In a diagram, the arrow to an event is a useful picture, but the deeper lesson is that time and space coordinates are components of one Lorentz-transforming object.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_3\">\n<title id=\"title-n4_3\">Position four-vector<\/title>\n<defs>\n\n<marker id=\"n4_3_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_3_vec\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"422.0\" y2=\"398.0\" stroke=\"#222222\" stroke-width=\"5.5\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_axis_arrow)\"/>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"92.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"5.5\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_axis_arrow)\"/>\n<text x=\"440.0\" y=\"408.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"76.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"332.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_vec)\"/>\n<circle cx=\"92.0\" cy=\"398.0\" r=\"9.0\" fill=\"#222222\" stroke=\"none\"/>\n<circle cx=\"332.0\" cy=\"206.0\" r=\"22.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"58.0\" y=\"432.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">O<\/text>\n<text x=\"360.0\" y=\"188.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">P<\/text>\n<text x= <path d=\"M438,274 C458,278.75 458,346.75 438,345\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<text x=\"391.0\" y=\"300.8\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">ct<\/text>\n<text x=\"391.0\" y=\"334.8\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">x<\/text>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"332.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_vec)\"/>\n<circle cx=\"92.0\" cy=\"398.0\" r=\"9.0\" fill=\"#222222\" stroke=\"none\"/>\n<circle cx=\"332.0\" cy=\"206.0\" r=\"22.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"58.0\" y=\"432.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">O<\/text>\n<text x=\"360.0\" y=\"188.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">P<\/text>\n<text x=\"220.0\" y=\"286.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">x<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_3\">\n<title id=\"title-n4_3\">Position four-vector<\/title>\n<defs>\n\n<marker id=\"n4_3_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_3_vec\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"422.0\" y2=\"398.0\" stroke=\"#222222\" stroke-width=\"5.5\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_axis_arrow)\"/>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"92.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"5.5\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_axis_arrow)\"/>\n<text x=\"440.0\" y=\"408.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"76.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"332.0\" y1=\"206.0\" x2=\"332.0\" y2=\"398.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"8 9\" stroke-linecap=\"round\"/>\n<line x1=\"92.0\" y1=\"206.0\" x2=\"332.0\" y2=\"206.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"8 9\" stroke-linecap=\"round\"/>\n<path d=\"M344,274 C324,278.75 324,346.75 344,345\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<path d=\"M438,274 C458,278.75 458,346.75 438,345\" fill=\"none\" stroke=\"#222222\" stroke-width=\"3.2\" stroke-linecap=\"round\"/>\n<text x=\"391.0\" y=\"300.8\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">ct<\/text>\n<text x=\"391.0\" y=\"334.8\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">x<\/text>\n<line x1=\"92.0\" y1=\"398.0\" x2=\"332.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_3_vec)\"/>\n<circle cx=\"92.0\" cy=\"398.0\" r=\"9.0\" fill=\"#222222\" stroke=\"none\"/>\n<circle cx=\"332.0\" cy=\"206.0\" r=\"22.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"58.0\" y=\"432.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">O<\/text>\n<text x=\"360.0\" y=\"188.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">P<\/text>\n<text x=\"220.0\" y=\"286.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">x<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "The position four-vector points from the origin event O to event P.", "svg_detail_caption": "The position four-vector x^mu packages the coordinates of event P relative to origin O, making event location a spacetime vector.", "study_questions": [{"question": "Why is the time coordinate written as \\(ct\\) in \\(x^\\mu=(ct,x,y,z)\\)?\n\nA. To make time disappear from the theory\nB. To force all events to be lightlike\nC. To give the time component the same dimensions as the spatial components\nD. To make Lorentz transformations nonlinear", "answer": "C. Multiplying by \\(c\\) gives the time component dimensions of length.\n\nThen the four components of \\(x^\\mu=(ct,x,y,z)\\) can be combined naturally in the spacetime interval."}, {"question": "Why are differences between position four-vectors especially important?", "answer": "The position of one event depends on the chosen origin, but the difference between two event positions describes their spacetime separation. Contracting that displacement with the metric gives the invariant spacetime interval."}, {"question": "An event occurs at \\(t=4.0\\,\\mathrm{ns}\\), \\(x=0.8\\,\\mathrm m\\), \\(y=0\\), \\(z=0\\). Using \\(c=3.0\\times10^8\\,\\mathrm{m\\,s^{-1}}\\), write its position four-vector components in metres.", "answer": "First convert the time component:\n\\[ ct=(3.0\\times10^8)(4.0\\times10^{-9})=1.2\\,\\mathrm m. \\]\nSo\n\\[ x^\\mu=(1.2\\,\\mathrm m,0.8\\,\\mathrm m,0,0). \\]\nThe event's time and space coordinates are now packaged with the same units."}]}, "4.4": {"label": "Velocity four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "definition_new": "The velocity four-vector is the derivative of the \\cref{Position four-vector}{4.3} with respect to \\cref{Proper time}{4.1}: \\[ U^\\mu=\\frac{dx^\\mu}{d\\tau}. \\] It has invariant magnitude \\(U^\\mu U_\\mu=c^2\\).", "derivation_new": "Differentiate the position four-vector \\(x^\\mu=(ct,\\mathbf x)\\) with respect to the invariant parameter \\(\\tau\\). Since \\(dt/d\\tau=\\gamma\\), \\[ U^\\mu=\\frac{dx^\\mu}{d\\tau}=\\gamma(c,\\mathbf v). \\] Using the \\(+---\\) metric, \\[ U^\\mu U_\\mu=\\gamma^2(c^2-v^2)=c^2. \\] Thus the construction depends directly on both the \\cref{Position four-vector}{4.3} and \\cref{Proper time}{4.1}.", "explanation_new": "Ordinary velocity \\(\\mathbf v=d\\mathbf x/dt\\) is frame-dependent and its components do not form a four-vector by themselves. The trick is to differentiate position with respect to proper time, the time measured along the particle's own path. That gives \\(U^\\mu=\\gamma(c,\\mathbf v)\\). The extra \\(\\gamma\\) is not a random correction; it converts coordinate-time change into proper-time change. A particle at rest still has \\(U^\\mu=(c,0,0,0)\\), because it is moving through time. The invariant norm \\(U_\\mu U^\\mu=c^2\\) is a useful sign check.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_4\">\n<title id=\"title-n4_4\">Velocity four-vector<\/title>\n<defs>\n\n<marker id=\"n4_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_4_u\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"92.0\" y1=\"402.0\" x2=\"420.0\" y2=\"402.0\" stroke=\"#222222\" stroke-width=\"5.3\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_axis_arrow)\"/>\n<line x1=\"92.0\" y1=\"402.0\" x2=\"92.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"5.3\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_axis_arrow)\"/>\n<text x=\"438.0\" y=\"412.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"76.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<path d=\"M132,366 C184,324 176,244 244,246 C314,248 306,156 386,118\" fill=\"none\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<circle cx=\"244.0\" cy=\"246.0\" r=\"18.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"244.0\" y1=\"246.0\" x2=\"348.0\" y2=\"158.0\" stroke=\"#248a3d\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_u)\"/>\n<text x=\"374.0\" y=\"154.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_4\">\n<title id=\"title-n4_4\">Velocity four-vector<\/title>\n<defs>\n\n<marker id=\"n4_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_4_u\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" =\"145.0\" y1=\"112.0\" x2=\"145.0\" y2=\"402.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"198.0\" y1=\"112.0\" x2=\"198.0\" y2=\"402.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"251.0\" y1=\"112.0\" x2=\"251.0\" y2=\"402.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"304.0\" y1=\"112.0\" x2=\"304.0\" y2=\"402.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"357.0\" y1=\"112.0\" x2=\"357.0\" y2=\"402.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"92.0\" y1=\"165.0\" x2=\"410.0\" y2=\"165.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"92.0\" y1=\"218.0\" x2=\"410.0\" y2=\"218.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"92.0\" y1=\"271.0\" x2=\"410.0\" y2=\"271.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"92.0\" y1=\"324.0\" x2=\"410.0\" y2=\"324.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"92.0\" y1=\"377.0\" x2=\"410.0\" y2=\"377.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"92.0\" y1=\"402.0\" x2=\"420.0\" y2=\"402.0\" stroke=\"#222222\" stroke-width=\"5.3\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_axis_arrow)\"/>\n<line x1=\"92.0\" y1=\"402.0\" x2=\"92.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"5.3\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_axis_arrow)\"/>\n<text x=\"438.0\" y=\"412.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"76.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<path d=\"M132,366 C184,324 176,244 244,246 C314,248 306,156 386,118\" fill=\"none\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"196.7\" y1=\"278.9\" x2=\"223.3\" y2=\"261.1\" stroke=\"#1f4fbf\" stroke-width=\"4.5\" stroke-linecap=\"round\"/>\n<line x1=\"272.7\" y1=\"222.9\" x2=\"299.3\" y2=\"205.1\" stroke=\"#1f4fbf\" stroke-width=\"4.5\" stroke-linecap=\"round\"/>\n<text x=\"178.0\" y=\"286.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">τ<\/text>\n<text x=\"306.0\" y=\"204.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">τ+dτ<\/text>\n<line x1=\"210.0\" y1=\"270.0\" x2=\"286.0\" y2=\"214.0\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"7 7\" stroke-linecap=\"round\"/>\n<text x=\"322.0\" y=\"182.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">dx^μ<\/text>\n<circle cx=\"244.0\" cy=\"246.0\" r=\"18.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"244.0\" y1=\"246.0\" x2=\"348.0\" y2=\"158.0\" stroke=\"#248a3d\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n4_4_u)\"/>\n<text x=\"374.0\" y=\"154.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "A green tangent vector at a worldline event represents four-velocity.", "svg_detail_caption": "Four-velocity u^mu is tangent to a timelike worldline and measures change of position four-vector per unit proper time.", "study_questions": [{"question": "A student differentiates \\(x^\\mu\\) with respect to coordinate time \\(t\\) and expects a four-vector. What correction is needed?\n\nA. Differentiate \\(x^\\mu\\) with respect to proper time \\(\\tau\\) instead\nB. Differentiate only the spatial components\nC. Set the time component to zero\nD. Replace velocity with canonical momentum", "answer": "A. The velocity four-vector is\n\\[ U^\\mu=\\frac{dx^\\mu}{d\\tau}. \\]\nUsing proper time rather than coordinate time is what makes the result transform as a four-vector."}, {"question": "Why is ordinary three-velocity \\(\\mathbf v=d\\mathbf x/dt\\) not itself a four-vector?", "answer": "Ordinary velocity uses one observer's coordinate time \\(t\\), which is frame-dependent. The velocity four-vector instead differentiates the position four-vector with respect to invariant proper time \\(\\tau\\), giving\n\\[ U^\\mu=\\gamma(c,\\mathbf v). \\]"}, {"question": "A particle moves with \\(v=0.6c\\) along the \\(x\\)-axis. Using \\(\\gamma=1.25\\), write \\(U^\\mu=\\gamma(c,\\mathbf v)\\) in units of \\(c\\).", "answer": "In units of \\(c\\), the ordinary velocity is \\(\\mathbf v=(0.6c,0,0)\\). Thus\n\\[ U^\\mu=\\gamma(c,0.6c,0,0)=1.25(c,0.6c,0,0). \\]\nSo\n\\[ U^\\mu=(1.25c,0.75c,0,0). \\]\nA quick check gives \\(U_\\mu U^\\mu=(1.25^2-0.75^2)c^2=c^2\\)."}]}, "4.5": {"label": "Momentum four-vector", "layer": "4", "layer_title": "Relativistic Kinematics", "definition_new": "The momentum four-vector combines relativistic energy and three-momentum into \\[ p^\\mu=mU^\\mu=(E/c,\\mathbf p). \\] Its invariant square is \\(p^\\mu p_\\mu=m^2c^2\\), equivalent to the energy-momentum relation.", "derivation_new": "For a massive particle, multiply the \\cref{Velocity four-vector}{4.4} by the invariant mass \\(m\\): \\[ p^\\mu=mU^\\mu=m\\gamma(c,\\mathbf v). \\] Identifying \\(E=\\gamma mc^2\\) and \\(\\mathbf p=\\gamma m\\mathbf v\\) gives \\[ p^\\mu=(E/c,\\mathbf p). \\] Contracting with the \\cref{Metric tensor}{3.1}, \\[ p^\\mu p_\\mu=\\frac{E^2}{c^2}-\\mathbf p^2=m^2c^2, \\] or \\[ E^2=\\mathbf p^2c^2+m^2c^4. \\]", "explanation_new": "Four-momentum is where energy and momentum stop being separate bookkeeping columns and become one relativistic object. One observer may say a particle has more energy and more spatial momentum than another observer does, but both are describing the same four-vector. In the rest frame the spatial momentum is zero, yet the time component remains \\(mc\\), corresponding to rest energy. In a moving frame, \\(p^\\mu=(\\gamma mc,\\gamma m\\mathbf v)\\). The invariant square stays \\(m^2c^2\\), which is why the energy-momentum relation is more fundamental than any one observer's measured energy.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n4_5\">\n<title id=\"title-n4_5\">Momentum four-vector<\/title>\n<defs>\n\n<marker id=\"n4_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n4_5_p\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"360.0\" y2=\"390.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"100.0\" y2=\"114.0\" stroke=\"#222222\" stroke-width=\"5.2\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_axis_arrow)\"/>\n<text x=\"378.0\" y=\"400.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<text x=\"84.0\" y=\"96.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">E/c<\/text>\n<line x1=\"100.0\" y1=\"390.0\" x2=\"286.0\" y2=\"168.0\" stroke=\"#1f4fbf\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n4_5_p)\"/>\n<text x=\"208.0\" y=\"264.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">p<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"348.0\" y=\"174.0\" width=\"92.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>
