\" stroke-width=\"1.5\"/>\n<circle cx=\"240.0\" cy=\"318.0\" r=\"8.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"132.0\" y1=\"250.0\" x2=\"248.0\" y2=\"222.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_6_arrow)\"/>\n<rect x=\"324.0\" y=\"162.0\" width=\"112.0\" height=\"160.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"380.0\" y=\"224.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"342.0\" y1=\"214.0\" x2=\"418.0\" y2=\"214.0\" stroke=\"#d22f2f\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_6_arrow)\"/>\n<circle cx=\"356.0\" cy=\"268.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"380.0\" y=\"274.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">ρ<\/text>\n<text x=\"382.0\" y=\"204.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<text x=\"380.0\" y=\"348.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">ρc + J<\/text>\n<\/svg>", "svg_icon_caption": "A J^mu badge combines charge density and current.", "svg_detail_caption": "The four-current J^mu packages charge density and current flow into one relativistic source for the electromagnetic field."}, "8.3": {"label": "Minimal coupling", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "Minimal coupling is the standard prescription for introducing electromagnetic interaction into a charged particle's dynamics by replacing ordinary momentum structure with the gauge-covariant combination involving the \\cref{Vector potential}{7.1}, commonly \\(p_\\mu-eA_\\mu\\).", "derivation_new": "The prescription is guided by \\cref{Gauge invariance}{8.1} and the existence of the \\cref{Vector potential}{7.1}. For a charged particle, one adds the simplest local interaction term between the particle worldline and the potential, proportional to \\[ e A_\\mu dx^\\mu. \\] Equivalently, in momentum language the free momentum is replaced by the gauge-covariant combination \\[ p_\\mu\\rightarrow p_\\mu-eA_\\mu. \\] Varying the minimally coupled action gives the \\cref{Lorentz force law}{8.4}.", "explanation_new": "Minimal coupling is the economical way to make a charged particle interact with electromagnetism. Instead of inventing a separate force rule first, we insert the vector potential into the particle's action or momentum structure. The phrase 'minimal' means no unnecessary extra terms: use the simplest local, gauge-compatible coupling. This also explains why canonical momentum and mechanical momentum can differ. In the nonrelativistic limit, the Lagrangian picks up terms involving \\(\\phi\\) and \\(\\mathbf A\\), and varying it gives the Lorentz force.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_3\">\n<title id=\"title-n8_3\">Minimal coupling<\/title>\n<defs>\n\n<marker id=\"n8_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"62.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"18 2.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"184.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"226.0\" y=\"264.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">eA<\/text>\n<line x1=\"278.0\" y1=\"252.0\" x2=\"356.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p-eA<\/text>\n<text x=\"242.0\" y=\"338.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> - eA<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_3\">\n<title id=\"title-n8_3\">Minimal coupling<\/title>\n<defs>\n\n<marker id=\"n8_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"190.0\" y1=\"164.0\" x2=\"216.0\" y2=\"146.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"228.0\" y1=\"218.0\" x2=\"262.0\" y2=\"210.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<line x1=\"190.0\" y1=\"286.0\" x2=\"220.0\" y2=\"262.0\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\" opacity=\"0.65\"/>\n<path d=\"M70,346 C142,260 214,306 286,218\" fill=\"none\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"164.0\" cy=\"292.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"62.0\" y1=\"252.0\" x2=\"166.0\" y2=\"252.0\" stroke=\"#222222\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<text x=\"98.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<\/text>\n<rect x=\"184.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"226.0\" y=\"264.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">eA<\/text>\n<line x1=\"278.0\" y1=\"252.0\" x2=\"356.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_3_arrow)\"/>\n<rect x=\"368.0\" y=\"210.0\" width=\"112.0\" height=\"84.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"424.0\" y=\"263.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p-eA<\/text>\n<text x=\"242.0\" y=\"338.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">p<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> - eA<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "Free momentum p enters an A-dependent coupling rule.", "svg_detail_caption": "Minimal coupling introduces electromagnetism by replacing free momentum with p_mu - e A_mu, so motion responds to the vector potential."}, "8.4": {"label": "Lorentz force law", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "The Lorentz force law is the relativistic equation of motion for a charged particle in an electromagnetic field. In covariant form it relates the rate of change of \\cref{Momentum four-vector}{4.5} to the \\cref{Field tensor}{7.2} and the particle's \\cref{Velocity four-vector}{4.4}.", "derivation_new": "Starting from the \\cref{Action principle}{5.2} with \\cref{Minimal coupling}{8.3}, varying the charged particle worldline gives the covariant force equation \\[ \\frac{dp^\\mu}{d\\tau}=eF^\\mu{}_{\\nu}U^\\nu, \\] up to conventional placement of indices and unit factors. Here \\(p^\\mu\\) is the \\cref{Momentum four-vector}{4.5}, \\(U^\\nu\\) is the \\cref{Velocity four-vector}{4.4}, and \\(F^\\mu{}_{\\nu}\\) is formed from the \\cref{Field tensor}{7.2}. In three-vector form this contains \\[ \\mathbf F=e(\\mathbf E+\\mathbf v\\times\\mathbf B). \\]", "explanation_new": "The Lorentz force law is the bridge from field to particle motion. In three-vector form it says electric fields push charges along the field and magnetic fields deflect moving charges sideways. In covariant form the same statement becomes one compact equation involving \\(F^\\mu{}_{\\nu}\\), four-velocity, and four-momentum. The compact notation is not just elegance; it shows that electric and magnetic forces are components of one relativistic interaction. A charge at rest in an electric field and a moving charge curving in a magnetic field are two familiar faces of the same law.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_4\">\n<title id=\"title-n8_4\">Lorentz force law<\/title>\n<defs>\n\n<marker id=\"n8_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n< 6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M88,360 C148,254 236,310 296,182\" fill=\"none\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<circle cx=\"196.0\" cy=\"276.0\" r=\"17.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2.5\"/>\n<line x1=\"196.0\" y1=\"276.0\" x2=\"240.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"224.0\" y=\"226.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">u<\/text>\n<rect x=\"316.0\" y=\"168.0\" width=\"86.0\" height=\"78.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"359.0\" y=\"224.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"292.0\" y1=\"258.0\" x2=\"380.0\" y2=\"306.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n8_4_arrow)\"/>\n<text x=\"358.0\" y=\"294.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">dp<\/text>\n<text x=\"258.0\" y=\"388.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">q F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan> u<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> → dp<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan>/dτ<\/text>\n<\/svg>", "svg_icon_caption": "A particle with velocity u in field F receives a momentum change dp.", "svg_detail_caption": "The Lorentz force law uses charge, field tensor, and four-velocity to determine the particle's momentum change dp^mu/dtau."}, "8.5": {"label": "Charge conservation", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "Charge conservation is the local statement that electric charge cannot appear or disappear. In relativistic notation it is written as the continuity equation for the \\cref{Four-current}{7.6}: \\[ \\partial_\\mu j^\\mu=0. \\]", "derivation_new": "Charge conservation follows from the sourced \\cref{Maxwell's equations}{7.7}. Taking the divergence of \\[ \\partial_\\mu F^{\\mu\\nu}=\\mu_0 j^\\nu \\] gives \\[ \\partial_\\nu\\partial_\\mu F^{\\mu\\nu}=\\mu_0\\partial_\\nu j^\\nu. \\] The left-hand side vanishes because \\(F^{\\mu\\nu}\\) is antisymmetric while the double derivative is symmetric in \\(\\mu\\) and \\(\\nu\\). Therefore \\[ \\partial_\\mu j^\\mu=0. \\] This is the covariant continuity equation for the \\cref{Four-current}{7.6}.", "explanation_new": "Charge conservation is local bookkeeping. It does not merely say the total charge of the universe stays fixed; it says charge cannot disappear from a small box unless current flows through the boundary. The continuity equation expresses that point-by-point accounting. In Maxwell theory it also follows from the antisymmetry of the field tensor, so it is built into the consistency of the equations. If charge density in a small region decreases, the equation demands an outward current. The charge went somewhere; it did not vanish at an event.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_5\">\n<title id=\"title-n8_5\">Charge conservation<\/title>\n<defs>\n\n<marker id=\"n8_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"150.0\" y=\"142.0\" width=\"180.0\" height=\"180.0\" rx=\"12.0\" fill=\"#fff6f6\" stroke=\"#222222\" stroke-width=\"4\"/>\n<circle cx=\"196.0\" cy=\"198.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circl n<circle cx=\"230.0\" cy=\"278.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"330.0\" y1=\"204.0\" x2=\"408.0\" y2=\"184.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"330.0\" y1=\"264.0\" x2=\"408.0\" y2=\"294.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"182.0\" y1=\"142.0\" x2=\"154.0\" y2=\"78.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"150.0\" y1=\"254.0\" x2=\"78.0\" y2=\"278.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<text x=\"386.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">J<\/text>\n<text x=\"240.0\" y=\"372.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<text x=\"238.0\" y=\"130.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">rho<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_5\">\n<title id=\"title-n8_5\">Charge conservation<\/title>\n<defs>\n\n<marker id=\"n8_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"150.0\" y=\"142.0\" width=\"180.0\" height=\"180.0\" rx=\"12.0\" fill=\"#fff6f6\" stroke=\"#222222\" stroke-width=\"4\"/>\n<circle cx=\"196.0\" cy=\"198.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"238.0\" cy=\"230.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"276.0\" cy=\"184.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"230.0\" cy=\"278.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"330.0\" y1=\"204.0\" x2=\"408.0\" y2=\"184.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"330.0\" y1=\"264.0\" x2=\"408.0\" y2=\"294.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"182.0\" y1=\"142.0\" x2=\"154.0\" y2=\"78.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"150.0\" y1=\"254.0\" x2=\"78.0\" y2=\"278.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<text x=\"386.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">J<\/text>\n<text x=\"240.0\" y=\"372.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<text x=\"238.0\" y=\"130.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">rho<\/text>\n<\/svg>", "svg_icon_caption": "Charge dots leave a local box only through current arrows.", "svg_detail_caption": "Charge conservation is local bookkeeping: changes of charge inside a volume must be balanced by current crossing its boundary."}, "9.4": {"label": "Energy density of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The electromagnetic energy density is the energy per unit volume carried by the \\cref{Electromagnetic field}{7.5}. In SI units it is \\[ u=\\frac12\\left(\\epsilon_0 E^2+\\frac{1}{\\mu_0}B^2\\right), \\] where \\(\\mathbf E\\) and \\(\\mathbf B\\) are the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.", "derivation_new": "The energy density is obtained as the time-time component of the electromagnetic \\cref{Energy--momentum tensor}{9.1}. In a chosen inertial frame, decomposing the field tensor into the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4} gives \\[ T^{00}=u=\\frac12\\left(\\epsilon_0 E^2+\\frac{1}{\\mu_0}B^2\\right). \\] Thus the energy stored locally in the field is built from the squared electric and magnetic field strengths.", "explanation_new": "Electromagnetic fields store energy locally. That is a major conceptual step if you first met fields only as devices for exerting forces on charges. The energy is not just in the particles; it can be in the field between them and can move through space. The formula \\(u=\\tfrac12(\\epsilon_0E^2+B^2/\\mu_0)\\) says stronger fields carry more energy density. In a plane wave, the electric and magnetic contributions are equal, so the field energy is shared between the two components. This energy density is one component of the larger energy-momentum tensor.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy density of EM field<\/title>\n\n<rect x=\"210.0\" y=\"190.0\" width=\"130.0\" height=\"130.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"228.0\" y1=\"244.6\" x2=\"322.0\" y2=\"244.6\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M234,275.8 C250,252.4 268,299.2 316,273.2\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"372.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u<\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy density of EM field<\/title>\n\n<rect x=\"188.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"233.8\" x2=\"260.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,255.4 C228,239.2 246,271.6 254,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"233.8\" x2=\"356.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,255.4 C324,239.2 342,271.6 350,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"188.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"329.8\" x2=\"260.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,351.4 C228,335.2 246,367.6 254,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"329.8\" x2=\"356.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,351.4 C324,335.2 342,367.6 350,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"416.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy density of EM field<\/title>\n\n<rect x=\"188.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"233.8\" x2=\"260.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,255.4 C228,239.2 246,271.6 254,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"233.8\" x2=\"356.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,255.4 C324,239.2 342,271.6 350,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"188.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"329.8\" x2=\"260.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,351.4 C228,335.2 246,367.6 254,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"329.8\" x2=\"356.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,351.4 C324,335.2 342,367.6 350,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"416.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_icon_caption": "A field cell stores energy density u in E and B.", "svg_detail_caption": "Electromagnetic energy density is stored locally in the field; stronger E and B values mean more energy in that spacetime cell."}, "9.2": {"label": "Momentum density (Poynting vector)", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The Poynting vector \\(\\mathbf S\\) describes electromagnetic energy flux: the rate at which field energy flows through unit area. In SI units, \\[ \\mathbf S=\\frac{1}{\\mu_0}\\mathbf E\\times\\mathbf B. \\] It is closely related to the momentum density of the electromagnetic field.", "derivation_new": "The Poynting vector is obtained from the mixed time-space components of the electromagnetic \\cref{Energy--momentum tensor}{9.1}. When those components are decomposed into the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}, the energy-flow result from \\cref{Field energy}{7.5} gives \\[ \\mathbf S=\\frac{1}{\\mu_0}\\mathbf E\\times\\mathbf B. \\] The corresponding field momentum density is \\[ \\mathbf g=\\frac{\\mathbf S}{c^2}. \\]", "explanation_new": "The Poynting vector tells you where electromagnetic energy is going. Energy density says how much field energy is stored in a region; \\(\\mathbf S\\) says how that energy flows through space. The cross product \\(\\mathbf E\\times\\mathbf B\\) is a direction cue as well as a formula: in a plane wave with \\(\\mathbf E\\) along \\(y\\) and \\(\\mathbf B\\) along \\(z\\), \\(\\mathbf S\\) points along the direction of propagation. Relativity ties this energy flux to momentum density, so field energy flow also means field momentum.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"180.0\" y1=\"314.0\" x2=\"180.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"126.0\" y1=\"260.0\" x2=\"234.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"192.0\" y1=\"248.0\" x2=\"292.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"132.0\" y1=\"274.0\" x2=\"132.0\" y2=\"166.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"78.0\" y1=\"220.0\" x2=\"186.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"144.0\" y1=\"208.0\" x2=\"244.0\" y2=\"148.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"230.0\" y1=\"314.0\" x2=\"230.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"176.0\" y1=\"260.0\" x2=\"284.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"242.0\" y1=\"248.0\" x2=\"342.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"328.0\" y1=\"354.0\" x2=\"328.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"274.0\" y1=\"300.0\" x2=\"382.0\" y2=\"300.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"340.0\" y1=\"288.0\" x2=\"440.0\" y2=\"228.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"258.0\" y=\"402.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">E × B → S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"132.0\" y1=\"274.0\" x2=\"132.0\" y2=\"166.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"78.0\" y1=\"220.0\" x2=\"186.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"144.0\" y1=\"208.0\" x2=\"244.0\" y2=\"148.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"230.0\" y1=\"314.0\" x2=\"230.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"176.0\" y1=\"260.0\" x2=\"284.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"242.0\" y1=\"248.0\" x2=\"342.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"328.0\" y1=\"354.0\" x2=\"328.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"274.0\" y1=\"300.0\" x2=\"382.0\" y2=\"300.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"340.0\" y1=\"288.0\" x2=\"440.0\" y2=\"228.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"258.0\" y=\"402.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">E × B → S<\/text>\n<\/svg>", "svg_icon_caption": "Crossed E and B arrows produce a Poynting vector S.", "svg_detail_caption": "The Poynting vector S points in the direction electromagnetic energy and momentum flow, set by the combined E and B fields."}, "9.3": {"label": "Stress–energy of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The electromagnetic stress-energy tensor is the electromagnetic-field instance of the general \\cref{Energy--momentum tensor}{9.1}. It combines electromagnetic energy density, momentum density, energy flux, and stresses into one Lorentz-covariant tensor.", "derivation_new": "For the electromagnetic field, the stress-energy tensor is constructed algebraically from the \\cref{Field tensor}{7.2} and the \\cref{Metric tensor}{3.1}. With the \\(+---\\) convention and suppressing unit-dependent constants, a common form is \\[ T^{\\mu\\nu}=-F^{\\mu\\lambda}F^\\nu{}_{\\lambda}+\\frac14\\eta^{\\mu\\nu}F^{\\alpha\\beta}F_{\\alpha\\beta}. \\] This is the electromagnetic specialization of the general \\cref{Energy--momentum tensor}{9.1}.", "explanation_new": "The stress-energy tensor may sound abstract, but it is a complete local accounting sheet for electromagnetic energy and momentum. The time-time part is energy density, the mixed parts describe energy flux and momentum density, and the spatial parts describe stresses: momentum flowing across surfaces. Radiation pressure is a concrete example. Light hitting a surface carries momentum, so it can push. Different observers split the tensor into density, flux, and stress differently, but they are decomposing the same covariant object.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"240.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"240.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"166.0\" y1=\"178.0\" x2=\"112.0\" y2=\"178.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"346.0\" y1=\"284.0\" x2=\"408.0\" y2=\"284.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"222.0\" y1=\"148.0\" x2=\"222.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"286.0\" y1=\"318.0\" x2=\"286.0\" y2=\"380.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<text x=\"390.0\" y=\"216.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"256.0\" y=\"360.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">u + flux + stress<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"240.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"166.0\" y1=\"178.0\" x2=\"112.0\" y2=\"178.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"346.0\" y1=\"284.0\" x2=\"408.0\" y2=\"284.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"222.0\" y1=\"148.0\" x2=\"222.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"286.0\" y1=\"318.0\" x2=\"286.0\" y2=\"380.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<text x=\"390.0\" y=\"216.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"256.0\" y=\"360.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">u + flux + stress<\/text>\n<\/svg>", "svg_icon_caption": "A T_EM block combines field glyphs with face arrows.", "svg_detail_caption": "The electromagnetic stress-energy tensor collects field energy density, momentum flow, and stresses into one object that can be conserved and transported."}, "9.1": {"label": "Energy--momentum tensor", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The energy-momentum tensor \\(T^{\\mu\\nu}\\) is a rank-two tensor that describes the density and flow of energy and momentum through spacetime. Its conservation equation, \\[ \\partial_\\mu T^{\\mu\\nu}=0, \\] expresses local conservation of energy and momentum for an isolated system.", "derivation_new": "The energy-momentum tensor is derived from spacetime translation symmetry using \\cref{Noether's theorem}{5.6}. If the action is unchanged under constant shifts \\[ x^\\mu \\rightarrow x^\\mu+\\epsilon^\\mu, \\] then there is a conserved current for each spacetime direction. These four conserved currents are assembled into \\(T^{\\mu\\nu}\\), with the conservation law \\[ \\partial_\\mu T^{\\mu\\nu}=0. \\] For fields described by a Lagrangian density \\(\\mathcal L(\\phi_a,\\partial_\\mu\\phi_a)\\), the canonical form is \\[ T^\\mu{}_{\\nu}=\\frac{\\partial\\mathcal L}{\\partial(\\partial_\\mu\\phi_a)}\\partial_\\nu\\phi_a-\\delta^\\mu{}_{\\nu}\\mathcal L. \\] This form may be improved or symmetrized when needed, especially for gauge fields. For electromagnetism, the physically useful symmetric tensor is constructed from the \\cref{Field tensor}{7.2}. With the \\(+---\\) metric convention and suppressing unit-dependent constants, \\[ T^{\\mu\\nu}=-F^{\\mu\\lambda}F^\\nu{}_{\\lambda}+\\frac14 \\eta^{\\mu\\nu}F^{\\alpha\\beta}F_{\\alpha\\beta}. \\] This tensor packages electromagnetic energy density, momentum density, and stresses into one Lorentz-covariant object.", "explanation_new": "The energy-momentum tensor generalizes the idea of energy and momentum conservation to fields and continuous systems. A field can have energy spread through space, momentum flowing from one region to another, and stresses across surfaces. All of that local bookkeeping is held in \\(T^{\\mu\\nu}\\). The conservation equation \\(\\partial_\\mu T^{\\mu\\nu}=0\\) says energy-momentum is not disappearing at a point; it is balanced by flow. For electromagnetism, \\(T^{00}\\) gives field energy density, while other components encode Poynting flux, momentum density, and pressure-like stresses.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"80.0\" y=\"164.0\" width=\"144.0\" height=\"144.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"224.0\" y1=\"204.0\" x2=\"286.0\" y2=\"184.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"264.0\" x2=\"286.0\" y2=\"292.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"136.0\" y1=\"164.0\" x2=\"116.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"80.0\" y1=\"236.0\" x2=\"34.0\" y2=\"254.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<text x=\"256.0\" y=\"390.0\" font-size=\"33\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan> = 0<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"80.0\" y=\"164.0\" width=\"144.0\" height=\"144.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"224.0\" y1=\"204.0\" x2=\"286.0\" y2=\"184.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"264.0\" x2=\"286.0\" y2=\"292.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"136.0\" y1=\"164.0\" x2=\"116.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"80.0\" y1=\"236.0\" x2=\"34.0\" y2=\"254.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<text x=\"256.0\" y=\"390.0\" font-size=\"33\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan> = 0<\/text>\n<\/svg>", "svg_icon_caption": "A T^munu tile highlights density and flux cells.", "svg_detail_caption": "The energy-momentum tensor records local density and flux of energy and momentum; zero divergence means local conservation."}, "10.2": {"label": "Electromagnetic waves", "layer": "10", "layer_title": "Waves and Radiation", "definition_new": "Electromagnetic waves are propagating source-free disturbances of the \\cref{Electromagnetic field}{7.5}. In a chosen frame they appear as coupled oscillations of the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}, travelling at speed \\(c\\) in vacuum.", "derivation_new": "Electromagnetic waves follow from source-free \\cref{Maxwell's equations}{7.7}. In a region where the \\cref{Four-current}{7.6} vanishes, Maxwell's equations imply a \\cref{Wave equation}{10.1} for the field or for the potential in a suitable gauge: \\[ \\Box A^\\mu=0. \\] Plane-wave solutions have electric and magnetic components transverse to the propagation direction, and the speed of propagation is fixed by the invariant light speed \\(c\\).", "explanation_new": "An electromagnetic wave is a self-sustaining disturbance of one electromagnetic field, not two independent waves called electric and magnetic. Maxwell's equations link the changing electric and magnetic components so the disturbance propagates at \\(c\\) in vacuum. In a plane wave, \\(\\mathbf E\\), \\(\\mathbf B\\), and the direction of travel are mutually perpendicular, and the Poynting vector points along the propagation direction. The wave carries energy and momentum, which is why light can heat a surface or exert radiation pressure.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<line x1=\"150.0\" y1=\"172.0\" x2=\"150.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"250.0\" y1=\"172.0\" x2=\"250.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"350.0\" y1=\"172.0\" x2=\"350.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"154.0\" y1=\"386.0\" x2=\"354.0\" y2=\"386.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"374.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<line x1=\"150.0\" y1=\"172.0\" x2=\"150.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"250.0\" y1=\"172.0\" x2=\"250.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"350.0\" y1=\"172.0\" x2=\"350.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"154.0\" y1=\"386.0\" x2=\"354.0\" y2=\"386.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"374.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "Coupled E and B waves propagate in the c direction.", "svg_detail_caption": "Electromagnetic waves are coupled E and B oscillations that sustain each other, propagate at c, and carry energy-momentum."}, "10.1": {"label": "Wave equation", "layer": "10", "layer_title": "Waves and Radiation", "definition_new": "The relativistic wave equation is a field equation involving the d'Alembertian operator \\[ \\Box=\\partial_\\mu\\partial^\\mu=\\frac{1}{c^2}\\frac{\\partial^2}{\\partial t^2}-\\nabla^2. \\] For electromagnetism, it describes propagating solutions of the vector potential or fields.", "derivation_new": "The electromagnetic wave equation is obtained from \\cref{Maxwell's equations}{7.7}. Writing the field in terms of the \\cref{Vector potential}{7.1} and imposing the \\cref{Lorenz gauge}{8.6}, \\(\\partial_\\mu A^\\mu=0\\), the sourced equation becomes schematically \\[ \\Box A^\\mu=\\mu_0 j^\\mu. \\] The operator \\(\\Box\\) is formed using the \\cref{Metric tensor}{3.1}. In source-free regions where the \\cref{Four-current}{7.6} vanishes, this reduces to \\[ \\Box A^\\mu=0, \\] whose solutions describe \\cref{Electromagnetic waves}{10.2}.", "explanation_new": "The wave equation is the mathematical pattern for finite-speed propagation. With the \\(+---\\) metric, the d'Alembertian has one time part and three spatial parts: \\(\\Box=c^{-2}\\partial_t^2-\\nabla^2\\). That sign structure is what makes light-cone propagation appear. In electromagnetism, choosing the Lorenz gauge turns the potential equations into a clean wave equation. In a source-free region, plane waves satisfy \\(\\omega=ck\\), which is the compact statement that the disturbance moves at speed \\(c\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"258.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"258.0\" font-size=\"42\" font-family=\"STIX Two ily=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"92.0\" y=\"96.0\" width=\"84.0\" height=\"62.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"136.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">j<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"134.0\" y1=\"164.0\" x2=\"134.0\" y2=\"198.0\" stroke=\"#d22f2f\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<text x=\"142.0\" y=\"334.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">operator<\/text>\n<text x=\"372.0\" y=\"334.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">wave<\/text>\n<\/svg>", "svg_icon_caption": "A wave operator acting on A produces a propagating wave.", "svg_detail_caption": "A wave equation is a local propagation rule: sources can create disturbances, while source-free regions support travelling wave solutions."}, "10.3": {"label": "Radiation reaction", "layer": "10", "layer_title": "Waves and Radiation", "definition_new": "Radiation reaction is the back-reaction force on an accelerating charged particle caused by the energy and momentum it radiates away as electromagnetic waves.", "derivation_new": "An accelerating charge emits \\cref{Electromagnetic waves}{10.2}. Those waves carry energy and momentum, described locally by the \\cref{Energy--momentum tensor}{9.1}. Conservation of total energy and momentum then requires the charged particle's motion to be modified: the particle loses energy-momentum to the field it radiates. Radiation reaction is the correction to the motion beyond the applied \\cref{Lorentz force law}{8.4}.", "explanation_new": "Radiation reaction is difficult because the charge is affected by the field it creates. The ordinary Lorentz force describes how an external field acts on a charge. But an accelerating charge emits electromagnetic waves, and those waves carry energy and momentum away. Conservation then says the particle's motion must reflect that loss. A driven electron, for example, radiates while it oscillates, so some work done on it leaves as radiation rather than remaining as particle energy. The details are subtle because self-interaction can lead to unphysical runaway or pre-accelerating solutions if handled carelessly.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_3\">\n<title id=\"title-n10_3\">Radiation reaction<\/title>\n<defs>\n\n<marker id=\"n10_3_wave\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<marker id=\"n10_3_recoil\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M96,354 C150,250 216,314 256,208\" fill=\"none\" stroke=\"#222222\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"194.0\" cy=\"278.0\" r=\"24.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"194.0\" y=\"288.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif n<path d=\"M96,354 C150,250 216,314 256,208\" fill=\"none\" stroke=\"#222222\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"194.0\" cy=\"278.0\" r=\"24.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"194.0\" y=\"288.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"white\" text-anchor=\"middle\">q<\/text>\n<path d=\"M178,240 C194,210 216,210 230,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<path d=\"M250,244 C318,214 356,340 294,312\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,220 C318,190 356,364 294,336\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,196 C318,166 356,388 294,360\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<line x1=\"182.0\" y1=\"292.0\" x2=\"118.0\" y2=\"336.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_recoil)\"/>\n<text x=\"88.0\" y=\"350.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#d22f2f\" text-anchor=\"middle\">recoil<\/text>\n<line x1=\"292.0\" y1=\"254.0\" x2=\"398.0\" y2=\"212.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<text x=\"366.0\" y=\"202.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">radiation<\/text>\n<\/svg>", "svg_icon_caption": "An accelerating charge emits waves and recoils.", "svg_detail_caption": "Radiation reaction is self-back-reaction: an accelerating charge emits waves that carry energy-momentum away, altering the charge's later motion."}, "11.1": {"label": "Lorentz invariance", "layer": "11", "layer_title": "Symmetry and Invariance Principles", "definition_new": "Lorentz invariance is the statement that the laws of physics have the same form in all inertial frames related by \\cref{Lorentz transformations}{3.3}. Equivalently, physical equations should be expressible using Lorentz-covariant objects and invariant contractions.", "derivation_new": "Lorentz invariance is the modern mathematical expression of the \\cref{Principle of relativity}{1.3} in Minkowski spacetime. The relevant transformations are the \\cref{Lorentz transformations}{3.3}, defined by preserving the \\cref{Metric tensor}{3.1}: \\[ \\Lambda^T\\eta\\Lambda=\\eta. \\] Objects such as \\cref{Four-vectors}{4.2}, the \\cref{Field tensor}{7.2}, and the \\cref{Energy--momentum tensor}{9.1} transform in ways that preserve tensor equations between inertial frames.", "explanation_new": "Lorentz invariance is the demand that the form of physical law does not depend on which inertial observer writes it down. This does not mean every observer measures the same components. They usually do not. It means the equations relate objects that transform consistently, so all observers describe the same physics. Tensor notation is helpful because it makes this structure visible: if both sides of an equation are tensors of the same type, covariance is built in. For example, \\(p_\\mu p^\\mu=m^2c^2\\) is invariant, while Maxwell's equations in tensor form are covariant.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_1\">\n<title id=\"title-n11_1\">Lorentz invariance<\/title>\n<defs>\n\n<marker id=\"n11_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n11_1_blue\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"stroke ng a convenient representative from many physically equivalent potentials. The danger is to think the gauge choice is an extra physical assumption. It is not; it is a way to remove redundant description. The field tensor remains the same. This is similar in spirit to choosing coordinates, though gauge symmetry has its own physics. The Lorenz gauge is a useful example because it preserves Lorentz covariance and simplifies Maxwell's equations for the potential to a wave-equation form, \\(\\Box A^\\mu=\\mu_0j^\\mu\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_2\">\n<title id=\"title-n11_2\">Gauge fixing<\/title>\n<defs>\n\n<marker id=\"n11_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,156 C130,116 172,194 228,148\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M70,214 C130,174 172,252 228,206\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.52\"/>\n<path d=\"M70,272 C130,232 172,310 228,264\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<line x1=\"238.0\" y1=\"218.0\" x2=\"286.0\" y2=\"218.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n11_2_arrow)\"/>\n<path d=\"M294,124 L362,166 L362,286 L294,328 Z\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"4\"/>\n<text x=\"330.0\" y=\"230.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">gauge<\/text>\n<line x1=\"368.0\" y1=\"218.0\" x2=\"418.0\" y2=\"218.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n11_2_arrow)\"/>\n<path d=\"M424,218
