1.5\"/>\n<circle cx=\"230.0\" cy=\"278.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"330.0\" y1=\"204.0\" x2=\"408.0\" y2=\"184.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"330.0\" y1=\"264.0\" x2=\"408.0\" y2=\"294.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"182.0\" y1=\"142.0\" x2=\"154.0\" y2=\"78.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"150.0\" y1=\"254.0\" x2=\"78.0\" y2=\"278.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<text x=\"386.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">J<\/text>\n<text x=\"240.0\" y=\"372.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<text x=\"238.0\" y=\"130.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">rho<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_5\">\n<title id=\"title-n8_5\">Charge conservation<\/title>\n<defs>\n\n<marker id=\"n8_5_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"150.0\" y=\"142.0\" width=\"180.0\" height=\"180.0\" rx=\"12.0\" fill=\"#fff6f6\" stroke=\"#222222\" stroke-width=\"4\"/>\n<circle cx=\"196.0\" cy=\"198.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"238.0\" cy=\"230.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"276.0\" cy=\"184.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<circle cx=\"230.0\" cy=\"278.0\" r=\"10.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"1.5\"/>\n<line x1=\"330.0\" y1=\"204.0\" x2=\"408.0\" y2=\"184.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"330.0\" y1=\"264.0\" x2=\"408.0\" y2=\"294.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"182.0\" y1=\"142.0\" x2=\"154.0\" y2=\"78.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<line x1=\"150.0\" y1=\"254.0\" x2=\"78.0\" y2=\"278.0\" stroke=\"#d22f2f\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n8_5_arrow)\"/>\n<text x=\"386.0\" y=\"232.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">J<\/text>\n<text x=\"240.0\" y=\"372.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<text x=\"238.0\" y=\"130.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">rho<\/text>\n<\/svg>", "svg_icon_caption": "Charge dots leave a local box only through current arrows.", "svg_detail_caption": "Charge conservation is local bookkeeping: changes of charge inside a volume must be balanced by current crossing its boundary.", "study_questions": [{"question": "A small region has more electric charge flowing out than flowing in. What must happen to the charge density inside that region?\n\nA. It decreases, as expressed locally by the continuity equation\nB. It increases regardless of the current\nC. It stays fixed because charge conservation is global only\nD. It becomes gauge-dependent", "answer": "A. If more charge flows out than in, the local charge density decreases.\n\nThe covariant statement is \\(\\partial_\\mu j^\\mu=0\\), which is the relativistic continuity equation for charge."}, {"question": "Why does charge conservation follow from the sourced Maxwell equation?", "answer": "Taking the divergence of\n\\[ \\partial_\\mu F^{\\mu\\nu}=\\mu_0j^\\nu \\]\ngives a double derivative of the antisymmetric field tensor. The double derivative is symmetric in the derivative indices, while \\(F^{\\mu\\nu}\\) is antisymmetric, so the left-hand side vanishes. Therefore \\(\\partial_\\nu j^\\nu=0\\)."}, {"question": "In one spatial dimension, the continuity equation is\n\\[ \\frac{\\partial\\rho}{\\partial t}+\\frac{\\partial j_x}{\\partial x}=0. \\]\nIf \\(\\partial j_x/\\partial x=5\\,\\mathrm{C\\,m^{-3}\\,s^{-1}}\\), what is \\(\\partial\\rho/\\partial t\\)?", "answer": "Rearrange the continuity equation:\n\\[ \\frac{\\partial\\rho}{\\partial t}=-\\frac{\\partial j_x}{\\partial x}. \\]\nThus\n\\[ \\frac{\\partial\\rho}{\\partial t}=-5\\,\\mathrm{C\\,m^{-3}\\,s^{-1}}. \\]\nThe charge density decreases locally because current is flowing out faster than it flows in."}]}, "9.4": {"label": "Energy density of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The electromagnetic energy density is the energy per unit volume carried by the \\cref{Electromagnetic field}{7.5}. In SI units it is \\[ u=\\frac12\\left(\\epsilon_0 E^2+\\frac{1}{\\mu_0}B^2\\right), \\] where \\(\\mathbf E\\) and \\(\\mathbf B\\) are the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.", "derivation_new": "The energy density is obtained as the time-time component of the electromagnetic \\cref{Energy--momentum tensor}{9.1}. In a chosen inertial frame, decomposing the field tensor into the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4} gives \\[ T^{00}=u=\\frac12\\left(\\epsilon_0 E^2+\\frac{1}{\\mu_0}B^2\\right). \\] Thus the energy stored locally in the field is built from the squared electric and magnetic field strengths.", "explanation_new": "Electromagnetic fields store energy locally. That is a major conceptual step if you first met fields only as devices for exerting forces on charges. The energy is not just in the particles; it can be in the field between them and can move through space. The formula \\(u=\\tfrac12(\\epsilon_0E^2+B^2/\\mu_0)\\) says stronger fields carry more energy density. In a plane wave, the electric and magnetic contributions are equal, so the field energy is shared between the two components. This energy density is one component of the larger energy-momentum tensor.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy density of EM field<\/title>\n\n<rect x=\"210.0\" y=\"190.0\" width=\"130.0\" height=\"130.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"228.0\" y1=\"244.6\" x2=\"322.0\" y2=\"244.6\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M234,275.8 C250,252.4 268,299.2 316,273.2\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"372.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u<\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy density of EM field<\/title>\n\n<rect x=\"188.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"233.8\" x2=\"260.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,255.4 C228,239.2 246,271.6 254,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"233.8\" x2=\"356.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,255.4 C324,239.2 342,271.6 350,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"188.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"329.8\" x2=\"260.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,351.4 C228,335.2 246,367.6 254,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"329.8\" x2=\"356.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,351.4 C324,335.2 342,367.6 350,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"416.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy density of EM field<\/title>\n\n<rect x=\"188.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"233.8\" x2=\"260.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,255.4 C228,239.2 246,271.6 254,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"196.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"233.8\" x2=\"356.0\" y2=\"233.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,255.4 C324,239.2 342,271.6 350,253.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"188.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"206.0\" y1=\"329.8\" x2=\"260.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M212,351.4 C228,335.2 246,367.6 254,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"284.0\" y=\"292.0\" width=\"90.0\" height=\"90.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\" opacity=\"0.92\"/>\n<line x1=\"302.0\" y1=\"329.8\" x2=\"356.0\" y2=\"329.8\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<path d=\"M308,351.4 C324,335.2 342,367.6 350,349.6\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<text x=\"256.0\" y=\"416.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">u<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<text x=\"170.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"332.0\" y=\"164.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_icon_caption": "A field cell stores energy density u in E and B.", "svg_detail_caption": "Electromagnetic energy density is stored locally in the field; stronger E and B values mean more energy in that spacetime cell.", "study_questions": [{"question": "In a region with no particles present, strong electric and magnetic fields can still store something physically measurable. What is it?\n\nA. Proper time\nB. Gauge choice\nC. Electromagnetic energy density\nD. Rest mass of the vacuum", "answer": "C. Electromagnetic fields carry energy density.\n\nIn SI form this includes terms proportional to \\(E^2\\) and \\(B^2\\), so stronger fields store more energy per unit volume."}, {"question": "Why does the formula contain squared field strengths?", "answer": "The local energy stored in the electromagnetic field grows with field strength. Squaring the field magnitudes makes the energy density positive and means stronger electric or magnetic fields store more energy per unit volume."}, {"question": "In simplified units where \\(\\epsilon_0=1\\) and \\(1/\\mu_0=1\\), compute\n\\[ u=\\frac12(E^2+B^2) \\]\nfor \\(E=3\\) and \\(B=4\\).", "answer": "Substitute the values:\n\\[ u=\\frac12(3^2+4^2)=\\frac12(9+16)=\\frac{25}{2}=12.5. \\]\nThe field energy density is \\(12.5\\) in the chosen units."}]}, "9.2": {"label": "Momentum density (Poynting vector)", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The Poynting vector \\(\\mathbf S\\) describes electromagnetic energy flux: the rate at which field energy flows through unit area. In SI units, \\[ \\mathbf S=\\frac{1}{\\mu_0}\\mathbf E\\times\\mathbf B. \\] It is closely related to the momentum density of the electromagnetic field.", "derivation_new": "The Poynting vector is obtained from the mixed time-space components of the electromagnetic \\cref{Energy--momentum tensor}{9.1}. When those components are decomposed into the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}, the energy-flow result from \\cref{Field energy}{7.5} gives \\[ \\mathbf S=\\frac{1}{\\mu_0}\\mathbf E\\times\\mathbf B. \\] The corresponding field momentum density is \\[ \\mathbf g=\\frac{\\mathbf S}{c^2}. \\]", "explanation_new": "The Poynting vector tells you where electromagnetic energy is going. Energy density says how much field energy is stored in a region; \\(\\mathbf S\\) says how that energy flows through space. The cross product \\(\\mathbf E\\times\\mathbf B\\) is a direction cue as well as a formula: in a plane wave with \\(\\mathbf E\\) along \\(y\\) and \\(\\mathbf B\\) along \\(z\\), \\(\\mathbf S\\) points along the direction of propagation. Relativity ties this energy flux to momentum density, so field energy flow also means field momentum.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"180.0\" y1=\"314.0\" x2=\"180.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"126.0\" y1=\"260.0\" x2=\"234.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"192.0\" y1=\"248.0\" x2=\"292.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"132.0\" y1=\"274.0\" x2=\"132.0\" y2=\"166.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"78.0\" y1=\"220.0\" x2=\"186.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"144.0\" y1=\"208.0\" x2=\"244.0\" y2=\"148.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"230.0\" y1=\"314.0\" x2=\"230.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"176.0\" y1=\"260.0\" x2=\"284.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"242.0\" y1=\"248.0\" x2=\"342.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"328.0\" y1=\"354.0\" x2=\"328.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"274.0\" y1=\"300.0\" x2=\"382.0\" y2=\"300.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"340.0\" y1=\"288.0\" x2=\"440.0\" y2=\"228.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"258.0\" y=\"402.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">E × B → S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_2\">\n<title id=\"title-n9_2\">Momentum density<\/title>\n<defs>\n\n<marker id=\"n9_2_blue\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n9_2_green\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<marker id=\"n9_2_amber\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<line x1=\"132.0\" y1=\"274.0\" x2=\"132.0\" y2=\"166.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"78.0\" y1=\"220.0\" x2=\"186.0\" y2=\"220.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"144.0\" y1=\"208.0\" x2=\"244.0\" y2=\"148.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"230.0\" y1=\"314.0\" x2=\"230.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"176.0\" y1=\"260.0\" x2=\"284.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"242.0\" y1=\"248.0\" x2=\"342.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"328.0\" y1=\"354.0\" x2=\"328.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"274.0\" y1=\"300.0\" x2=\"382.0\" y2=\"300.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"340.0\" y1=\"288.0\" x2=\"440.0\" y2=\"228.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"258.0\" y=\"402.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">E × B → S<\/text>\n<\/svg>", "svg_icon_caption": "Crossed E and B arrows produce a Poynting vector S.", "svg_detail_caption": "The Poynting vector S points in the direction electromagnetic energy and momentum flow, set by the combined E and B fields.", "study_questions": [{"question": "A beam of light transfers energy across a surface and can exert radiation pressure. Which field quantity points in the direction of energy flow?\n\nA. The scalar potential\nB. The metric tensor\nC. Proper time\nD. The Poynting vector \\(\\mathbf S\\)", "answer": "D. The Poynting vector \\(\\mathbf S\\) gives electromagnetic energy flux.\n\nIts direction is the direction energy flows, and the associated momentum density is \\(\\mathbf g=\\mathbf S/c^2\\)."}, {"question": "How is electromagnetic momentum density related to the Poynting vector?", "answer": "The field momentum density is\n\\[ \\mathbf g=\\frac{\\mathbf S}{c^2}. \\]\nRelativity ties energy flow to momentum density, so electromagnetic energy moving through space also carries momentum."}, {"question": "Take units where \\(1/\\mu_0=1\\). If \\(\\mathbf E=(0,3,0)\\) and \\(\\mathbf B=(0,0,2)\\), compute \\(\\mathbf S=\\mathbf E\\times\\mathbf B\\).", "answer": "Compute the cross product:\n\\[ (0,3,0)\\times(0,0,2)=(6,0,0). \\]\nSo\n\\[ \\mathbf S=(6,0,0). \\]\nThe energy flux points in the positive \\(x\\) direction."}]}, "9.3": {"label": "Stress–energy of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The electromagnetic stress-energy tensor is the electromagnetic-field instance of the general \\cref{Energy--momentum tensor}{9.1}. It combines electromagnetic energy density, momentum density, energy flux, and stresses into one Lorentz-covariant tensor.", "derivation_new": "For the electromagnetic field, the stress-energy tensor is constructed algebraically from the \\cref{Field tensor}{7.2} and the \\cref{Metric tensor}{3.1}. With the \\(+---\\) convention and suppressing unit-dependent constants, a common form is \\[ T^{\\mu\\nu}=-F^{\\mu\\lambda}F^\\nu{}_{\\lambda}+\\frac14\\eta^{\\mu\\nu}F^{\\alpha\\beta}F_{\\alpha\\beta}. \\] This is the electromagnetic specialization of the general \\cref{Energy--momentum tensor}{9.1}.", "explanation_new": "The stress-energy tensor may sound abstract, but it is a complete local accounting sheet for electromagnetic energy and momentum. The time-time part is energy density, the mixed parts describe energy flux and momentum density, and the spatial parts describe stresses: momentum flowing across surfaces. Radiation pressure is a concrete example. Light hitting a surface carries momentum, so it can push. Different observers split the tensor into density, flux, and stress differently, but they are decomposing the same covariant object.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"240.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"240.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"166.0\" y1=\"178.0\" x2=\"112.0\" y2=\"178.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"346.0\" y1=\"284.0\" x2=\"408.0\" y2=\"284.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"222.0\" y1=\"148.0\" x2=\"222.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"286.0\" y1=\"318.0\" x2=\"286.0\" y2=\"380.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<text x=\"390.0\" y=\"216.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"256.0\" y=\"360.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">u + flux + stress<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"240.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"sub\" font-size=\"68%\">EM<\/tspan><\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"166.0\" y1=\"178.0\" x2=\"112.0\" y2=\"178.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"346.0\" y1=\"284.0\" x2=\"408.0\" y2=\"284.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"222.0\" y1=\"148.0\" x2=\"222.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"286.0\" y1=\"318.0\" x2=\"286.0\" y2=\"380.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<text x=\"390.0\" y=\"216.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"256.0\" y=\"360.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">u + flux + stress<\/text>\n<\/svg>", "svg_icon_caption": "A T_EM block combines field glyphs with face arrows.", "svg_detail_caption": "The electromagnetic stress-energy tensor collects field energy density, momentum flow, and stresses into one object that can be conserved and transported.", "study_questions": [{"question": "Why is the electromagnetic stress-energy tensor richer than just a number for field energy density?\n\nA. It is only a gauge parameter\nB. It also includes momentum density, energy flux, and stresses\nC. It contains no information about magnetic fields\nD. It replaces Lorentz transformations", "answer": "B. The electromagnetic stress-energy tensor collects several related quantities.\n\nIt includes energy density, momentum density, energy flux, and stresses, all arranged in one relativistic tensor."}, {"question": "Why is the stress-energy tensor more than just an energy density?", "answer": "A field can store energy, carry momentum, transport energy from place to place, and exert stresses across surfaces. The different components of \\(T^{\\mu\\nu}\\) keep track of all this local energy-momentum bookkeeping, not just the amount of energy per volume."}, {"question": "For a simple plane wave, suppose the energy density is \\(u=5\\,\\mathrm{J\\,m^{-3}}\\). The radiation pressure on a perfectly absorbing surface is \\(P=u\\). What pressure does the wave exert in this simplified case?", "answer": "Using the given relation for a perfectly absorbing surface,\n\\[ P=u=5\\,\\mathrm{Pa}. \\]\nThis illustrates the stress part of the stress-energy tensor: electromagnetic fields can exert pressure because they carry momentum."}]}, "9.1": {"label": "Energy--momentum tensor", "layer": "9", "layer_title": "Energy and Momentum in Fields", "definition_new": "The energy-momentum tensor \\(T^{\\mu\\nu}\\) is a rank-two tensor that describes the density and flow of energy and momentum through spacetime. Its conservation equation, \\[ \\partial_\\mu T^{\\mu\\nu}=0, \\] expresses local conservation of energy and momentum for an isolated system.", "derivation_new": "The energy-momentum tensor is derived from spacetime translation symmetry using \\cref{Noether's theorem}{5.6}. If the action is unchanged under constant shifts \\[ x^\\mu \\rightarrow x^\\mu+\\epsilon^\\mu, \\] then there is a conserved current for each spacetime direction. These four conserved currents are assembled into \\(T^{\\mu\\nu}\\), with the conservation law \\[ \\partial_\\mu T^{\\mu\\nu}=0. \\] For fields described by a Lagrangian density \\(\\mathcal L(\\phi_a,\\partial_\\mu\\phi_a)\\), the canonical form is \\[ T^\\mu{}_{\\nu}=\\frac{\\partial\\mathcal L}{\\partial(\\partial_\\mu\\phi_a)}\\partial_\\nu\\phi_a-\\delta^\\mu{}_{\\nu}\\mathcal L. \\] This form may be improved or symmetrized when needed, especially for gauge fields. For electromagnetism, the physically useful symmetric tensor is constructed from the \\cref{Field tensor}{7.2}. With the \\(+---\\) metric convention and suppressing unit-dependent constants, \\[ T^{\\mu\\nu}=-F^{\\mu\\lambda}F^\\nu{}_{\\lambda}+\\frac14 \\eta^{\\mu\\nu}F^{\\alpha\\beta}F_{\\alpha\\beta}. \\] This tensor packages electromagnetic energy density, momentum density, and stresses into one Lorentz-covariant object.", "explanation_new": "The energy-momentum tensor generalizes the idea of energy and momentum conservation to fields and continuous systems. A field can have energy spread through space, momentum flowing from one region to another, and stresses across surfaces. All of that local bookkeeping is held in \\(T^{\\mu\\nu}\\). The conservation equation \\(\\partial_\\mu T^{\\mu\\nu}=0\\) says energy-momentum is not disappearing at a point; it is balanced by flow. For electromagnetism, \\(T^{00}\\) gives field energy density, while other components encode Poynting flux, momentum density, and pressure-like stresses.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"80.0\" y=\"164.0\" width=\"144.0\" height=\"144.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"224.0\" y1=\"204.0\" x2=\"286.0\" y2=\"184.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"264.0\" x2=\"286.0\" y2=\"292.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"136.0\" y1=\"164.0\" x2=\"116.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"80.0\" y1=\"236.0\" x2=\"34.0\" y2=\"254.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<text x=\"256.0\" y=\"390.0\" font-size=\"33\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan> = 0<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_1\">\n<title id=\"title-n9_1\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"80.0\" y=\"164.0\" width=\"144.0\" height=\"144.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"224.0\" y1=\"204.0\" x2=\"286.0\" y2=\"184.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"224.0\" y1=\"264.0\" x2=\"286.0\" y2=\"292.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"136.0\" y1=\"164.0\" x2=\"116.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<line x1=\"80.0\" y1=\"236.0\" x2=\"34.0\" y2=\"254.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_1_arrow)\"/>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<text x=\"256.0\" y=\"390.0\" font-size=\"33\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan>T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan> = 0<\/text>\n<\/svg>", "svg_icon_caption": "A T^munu tile highlights density and flux cells.", "svg_detail_caption": "The energy-momentum tensor records local density and flux of energy and momentum; zero divergence means local conservation.", "study_questions": [{"question": "A field theory has symmetry under spacetime translations. Which tensor is the natural bookkeeping object for the conserved flow associated with that symmetry?\n\nA. The energy-momentum tensor \\(T^{\\mu\nu}\\)\nB. The scalar potential \\(\\phi\\) alone\nC. The light cone\nD. The Lorenz gauge condition", "answer": "A. The energy-momentum tensor \\(T^{\\mu\nu}\\) describes density and flow of energy and momentum.\n\nIt is the natural object associated with spacetime-translation conservation laws."}, {"question": "How is Noether's theorem connected to the energy-momentum tensor?", "answer": "Noether's theorem links continuous symmetries of the action to conserved quantities. Spacetime translation symmetry gives conserved currents associated with energy and momentum. These currents are assembled into the energy-momentum tensor \\(T^{\\mu\\nu}\\)."}, {"question": "In a one-dimensional energy-flow model, local conservation is\n\\[ \\frac{\\partial u}{\\partial t}+\\frac{\\partial S}{\\partial x}=0. \\]\nIf \\(\\partial S/\\partial x=4\\,\\mathrm{J\\,m^{-3}\\,s^{-1}}\\), what is \\(\\partial u/\\partial t\\)?", "answer": "Rearrange the conservation equation:\n\\[ \\frac{\\partial u}{\\partial t}=-\\frac{\\partial S}{\\partial x}. \\]\nTherefore\n\\[ \\frac{\\partial u}{\\partial t}=-4\\,\\mathrm{J\\,m^{-3}\\,s^{-1}}. \\]\nEnergy density is decreasing locally because there is net outward energy flux."}]}, "10.2": {"label": "Electromagnetic waves", "layer": "10", "layer_title": "Waves and Radiation", "definition_new": "Electromagnetic waves are propagating source-free disturbances of the \\cref{Electromagnetic field}{7.5}. In a chosen frame they appear as coupled oscillations of the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}, travelling at speed \\(c\\) in vacuum.", "derivation_new": "Electromagnetic waves follow from source-free \\cref{Maxwell's equations}{7.7}. In a region where the \\cref{Four-current}{7.6} vanishes, Maxwell's equations imply a \\cref{Wave equation}{10.1} for the field or for the potential in a suitable gauge: \\[ \\Box A^\\mu=0. \\] Plane-wave solutions have electric and magnetic components transverse to the propagation direction, and the speed of propagation is fixed by the invariant light speed \\(c\\).", "explanation_new": "An electromagnetic wave is a self-sustaining disturbance of one electromagnetic field, not two independent waves called electric and magnetic. Maxwell's equations link the changing electric and magnetic components so the disturbance propagates at \\(c\\) in vacuum. In a plane wave, \\(\\mathbf E\\), \\(\\mathbf B\\), and the direction of travel are mutually perpendicular, and the Poynting vector points along the propagation direction. The wave carries energy and momentum, which is why light can heat a surface or exert radiation pressure.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<line x1=\"150.0\" y1=\"172.0\" x2=\"150.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"250.0\" y1=\"172.0\" x2=\"250.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"350.0\" y1=\"172.0\" x2=\"350.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"154.0\" y1=\"386.0\" x2=\"354.0\" y2=\"386.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"374.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<line x1=\"150.0\" y1=\"172.0\" x2=\"150.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"250.0\" y1=\"172.0\" x2=\"250.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"350.0\" y1=\"172.0\" x2=\"350.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"154.0\" y1=\"386.0\" x2=\"354.0\" y2=\"386.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<text x=\"256.0\" y=\"374.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "Coupled E and B waves propagate in the c direction.", "svg_detail_caption": "Electromagnetic waves are coupled E and B oscillations that sustain each other, propagate at c, and carry energy-momentum.", "study_questions": [{"question": "In a source-free electromagnetic wave, \\(\\mathbf E\\), \\(\\mathbf B\\), and the propagation direction form a mutually perpendicular triad. Which direction is picked out by \\(\\mathbf E\\times\\mathbf B\\)?\n\nA. The direction opposite the electric field\nB. The direction of proper time\nC. The direction of energy propagation\nD. The direction of gauge transformation", "answer": "C. The vector \\(\\mathbf E\\times\\mathbf B\\) points in the direction of electromagnetic energy flow.\n\nFor a plane wave, that is the propagation direction, matching the direction of the Poynting vector."}, {"question": "In a plane electromagnetic wave, how are \\(\\mathbf E\\), \\(\\mathbf B\\), and the propagation direction related?", "answer": "They are mutually perpendicular. The energy-flow direction is given by the Poynting vector\n\\[ \\mathbf S\\propto \\mathbf E\\times\\mathbf B, \\]\nwhich points along the propagation direction."}, {"question": "A plane wave has \\(\\mathbf E\\) along \\(+y\\) and \\(\\mathbf B\\) along \\(+z\\). In which direction does it propagate?", "answer": "The propagation direction follows \\(\\mathbf E\\times\\mathbf B\\). Using the right-hand rule,\n\\[ \\hat y\\times\\hat z=\\hat x. \\]\nSo the wave propagates in the \\(+x\\) direction."}]}, "10.1": {"label": "Wave equation", "layer": "10", "layer_title": "Waves and Radiation", "definition_new": "The relativistic wave equation is a field equation involving the d'Alembertian operator \\[ \\Box=\\partial_\\mu\\partial^\\mu=\\frac{1}{c^2}\\frac{\\partial^2}{\\partial t^2}-\\nabla^2. \\] For electromagnetism, it describes propagating solutions of the vector potential or fields.", "derivation_new": "The electromagnetic wave equation is obtained from \\cref{Maxwell's equations}{7.7}. Writing the field in terms of the \\cref{Vector potential}{7.1} and imposing the \\cref{Lorenz gauge}{8.6}, \\(\\partial_\\mu A^\\mu=0\\), the sourced equation becomes schematically \\[ \\Box A^\\mu=\\mu_0 j^\\mu. \\] The operator \\(\\Box\\) is formed using the \\cref{Metric tensor}{3.1}. In source-free regions where the \\cref{Four-current}{7.6} vanishes, this reduces to \\[ \\Box A^\\mu=0, \\] whose solutions describe \\cref{Electromagnetic waves}{10.2}.", "explanation_new": "The wave equation is the mathematical pattern for finite-speed propagation. With the \\(+---\\) metric, the d'Alembertian has one time part and three spatial parts: \\(\\Box=c^{-2}\\partial_t^2-\\nabla^2\\). That sign structure is what makes light-cone propagation appear. In electromagnetism, choosing the Lorenz gauge turns the potential equations into a clean wave equation. In a source-free region, plane waves satisfy \\(\\omega=ck\\), which is the compact statement that the disturbance moves at speed \\(c\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"258.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"258.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"92.0\" y=\"96.0\" width=\"84.0\" height=\"62.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"136.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">j<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"134.0\" y1=\"164.0\" x2=\"134.0\" y2=\"198.0\" stroke=\"#d22f2f\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<text x=\"142.0\" y=\"334.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">operator<\/text>\n<text x=\"372.0\" y=\"334.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">wave<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"258.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<rect x=\"92.0\" y=\"96.0\" width=\"84.0\" height=\"62.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"136.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">j<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"134.0\" y1=\"164.0\" x2=\"134.0\" y2=\"198.0\" stroke=\"#d22f2f\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<text x=\"142.0\" y=\"334.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">operator<\/text>\n<text x=\"372.0\" y=\"334.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">wave<\/text>\n<\/svg>", "svg_icon_caption": "A wave operator acting on A produces a propagating wave.", "svg_detail_caption": "A wave equation is a local propagation rule: sources can create disturbances, while source-free regions support travelling wave solutions.", "study_questions": [{"question": "A source-free component of the electromagnetic potential has disturbances that propagate at speed \\(c\\). Which compact relativistic equation expresses that wave behaviour?\n\nA. \\(p_\\mu p^\\mu=m^2c^2\\)\nB. \\(\\partial_\\mu j^\\mu=0\\)\nC. \\(F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu\\)\nD. \\(\\Box A^\\mu=0\\)", "answer": "D. In source-free regions and a suitable gauge, the potential satisfies\n\\[ \\Box A^\\mu=0. \\]\nThe d'Alembertian \\(\\Box\\) is the relativistic wave operator."}, {"question": "How does the Lorenz gauge help produce a wave equation for the electromagnetic potential?", "answer": "Writing the electromagnetic field in terms of \\(A^\\mu\\) and imposing the Lorenz gauge \\(\\partial_\\mu A^\\mu=0\\) simplifies Maxwell's equations to a wave-equation form for the potential, schematically\n\\[ \\Box A^\\mu=\\mu_0j^\\mu. \\]\nIn source-free regions this becomes \\(\\Box A^\\mu=0\\)."}, {"question": "A source-free plane wave satisfies \\(\\omega=ck\\). If \\(k=2.0\\,\\mathrm{m^{-1}}\\) and \\(c=3.0\\times10^8\\,\\mathrm{m\\,s^{-1}}\\), what is \\(\\omega\\)?", "answer": "Use \\(\\omega=ck\\):\n\\[ \\omega=(3.0\\times10^8)(2.0)=6.0\\times10^8\\,\\mathrm{s^{-1}}. \\]\nThis is the angular frequency for the source-free wave."}]}, "10.3": {"label": "Radiation reaction", "layer": "10", "layer_title": "Waves and Radiation", "definition_new": "Radiation reaction is the back-reaction force on an accelerating charged particle caused by the energy and momentum it radiates away as electromagnetic waves.", "derivation_new": "An accelerating charge emits \\cref{Electromagnetic waves}{10.2}. Those waves carry energy and momentum, described locally by the \\cref{Energy--momentum tensor}{9.1}. Conservation of total energy and momentum then requires the charged particle's motion to be modified: the particle loses energy-momentum to the field it radiates. Radiation reaction is the correction to the motion beyond the applied \\cref{Lorentz force law}{8.4}.", "explanation_new": "Radiation reaction is difficult because the charge is affected by the field it creates. The ordinary Lorentz force describes how an external field acts on a charge. But an accelerating charge emits electromagnetic waves, and those waves carry energy and momentum away. Conservation then says the particle's motion must reflect that loss. A driven electron, for example, radiates while it oscillates, so some work done on it leaves as radiation rather than remaining as particle energy. The details are subtle because self-interaction can lead to unphysical runaway or pre-accelerating solutions if handled carelessly.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_3\">\n<title id=\"title-n10_3\">Radiation reaction<\/title>\n<defs>\n\n<marker id=\"n10_3_wave\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<marker id=\"n10_3_recoil\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M96,354 C150,250 216,314 256,208\" fill=\"none\" stroke=\"#222222\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"194.0\" cy=\"278.0\" r=\"24.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"194.0\" y=\"288.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"white\" text-anchor=\"middle\">q<\/text>\n<path d=\"M178,240 C194,210 216,210 230,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<path d=\"M250,244 C318,214 356,340 294,312\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,220 C318,190 356,364 294,336\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,196 C318,166 356,388 294,360\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<line x1=\"182.0\" y1=\"292.0\" x2=\"118.0\" y2=\"336.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_recoil)\"/>\n<text x=\"88.0\" y=\"350.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#d22f2f\" text-anchor=\"middle\">recoil<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_3\">\n<title id=\"title-n10_3\">Radiation reaction<\/title>\n<defs>\n\n<marker id=\"n10_3_wave\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<marker id=\"n10_3_recoil\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M96,354 C150,250 216,314 256,208\" fill=\"none\" stroke=\"#222222\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"194.0\" cy=\"278.0\" r=\"24.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"194.0\" y=\"288.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"white\" text-anchor=\"middle\">q<\/text>\n<path d=\"M178,240 C194,210 216,210 230,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<path d=\"M250,244 C318,214 356,340 294,312\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,220 C318,190 356,364 294,336\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,196 C318,166 356,388 294,360\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<line x1=\"182.0\" y1=\"292.0\" x2=\"118.0\" y2=\"336.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_recoil)\"/>\n<text x=\"88.0\" y=\"350.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#d22f2f\" text-anchor=\"middle\">recoil<\/text>\n<line x1=\"292.0\" y1=\"254.0\" x2=\"398.0\" y2=\"212.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<text x=\"366.0\" y=\"202.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">radiation<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_3\">\n<title id=\"title-n10_3\">Radiation reaction<\/title>\n<defs>\n\n<marker id=\"n10_3_wave\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<marker id=\"n10_3_recoil\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M96,354 C150,250 216,314 256,208\" fill=\"none\" stroke=\"#222222\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"194.0\" cy=\"278.0\" r=\"24.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"194.0\" y=\"288.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"white\" text-anchor=\"middle\">q<\/text>\n<path d=\"M178,240 C194,210 216,210 230,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<path d=\"M250,244 C318,214 356,340 294,312\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,220 C318,190 356,364 294,336\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,196 C318,166 356,388 294,360\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<line x1=\"182.0\" y1=\"292.0\" x2=\"118.0\" y2=\"336.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_recoil)\"/>\n<text x=\"88.0\" y=\"350.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#d22f2f\" text-anchor=\"middle\">recoil<\/text>\n<line x1=\"292.0\" y1=\"254.0\" x2=\"398.0\" y2=\"212.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<text x=\"366.0\" y=\"202.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">radiation<\/text>\n<\/svg>", "svg_icon_caption": "An accelerating charge emits waves and recoils.", "svg_detail_caption": "Radiation reaction is self-back-reaction: an accelerating charge emits waves that carry energy-momentum away, altering the charge's later motion.", "study_questions": [{"question": "An accelerating charge emits radiation and later moves differently because energy-momentum has been carried away. What effect is this pointing to?\n\nA. Gauge fixing\nB. Radiation reaction\nC. Metric signature\nD. Relativity of simultaneity", "answer": "B. This is radiation reaction.\n\nThe charge's own emitted electromagnetic radiation carries energy and momentum, producing a subtle back-reaction on the charge's motion."}, {"question": "Why is radiation reaction conceptually difficult?", "answer": "The charge is affected by the field it creates. The ordinary Lorentz force describes how an external field acts on a charge, but an accelerating charge radiates, and conservation of energy-momentum requires the particle's motion to reflect the radiated loss. Treating this self-interaction consistently is subtle."}, {"question": "A driven charge radiates power \\(P=2\\,\\mathrm W\\) for \\(5\\,\\mathrm s\\). How much energy is carried away by radiation, and what does radiation reaction say qualitatively about the particle's motion?", "answer": "The radiated energy is\n\\[ E=Pt=2\\times5=10\\,\\mathrm J. \\]\nRadiation reaction says this energy-momentum loss cannot be ignored: the particle's motion must include a back-reaction correction beyond the applied external Lorentz force."}]}, "11.1": {"label": "Lorentz invariance", "layer": "11", "layer_title": "Symmetry and Invariance Principles", "definition_new": "Lorentz invariance is the statement that the laws of physics have the same form in all inertial frames related by \\cref{Lorentz transformations}{3.3}. Equivalently, physical equations should be expressible using Lorentz-covariant objects and invariant contractions.", "derivation_new": "Lorentz invariance is the modern mathematical expression of the \\cref{Principle of relativity}{1.3} in Minkowski spacetime. The relevant transformations are the \\cref{Lorentz transformations}{3.3}, defined by preserving the \\cref{Metric tensor}{3.1}: \\[ \\Lambda^T\\eta\\Lambda=\\eta. \\] Objects such as \\cref{Four-vectors}{4.2}, the \\cref{Field tensor}{7.2}, and the \\cref{Energy--momentum tensor}{9.1} transform in ways that preserve tensor equations between inertial frames.", "explanation_new": "Lorentz invariance is the demand that the form of physical law does not depend on which inertial observer writes it down. This does not mean every observer measures the same components. They usually do not. It means the equations relate objects that transform consistently, so all observers describe the same physics. Tensor notation is helpful because it makes this structure visible: if both sides of an equation are tensors of the same type, covariance is built in. For example, \\(p_\\mu p^\\mu=m^2c^2\\) is invariant, while Maxwell's equations in tensor form are covariant.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_1\">\n<title id=\"title-n11_1\">Lorentz invariance<\/title>\n<defs>\n\n<marker id=\"n11_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n11_1_blue\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n11_1_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"208.0\" y2=\"368.0\" stroke=\"#222222\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_axis_arrow)\"/>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"82.0\" y2=\"236.0\" stroke=\"#222222\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_axis_arrow)\"/>\n<text x=\"226.0\" y=\"378.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">x<\/text>\n<text x=\"66.0\" y=\"218.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">ct<\/text>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"200.0\" y2=\"330.0\" stroke=\"#1f4fbf\" stroke-width=\"4.5\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_blue)\"/>\n<line x1=\"82.0\" y1=\"368.0\" x2=\"124.0\" y2=\"244.0\" stroke=\"#1f4fbf\" stroke-width=\"4.5\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_blue)\"/>\n<text x=\"184.0\" y=\"326.0\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">x′
