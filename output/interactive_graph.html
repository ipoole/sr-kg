\n<line x1=\"144.0\" y1=\"208.0\" x2=\"244.0\" y2=\"148.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"230.0\" y1=\"314.0\" x2=\"230.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"176.0\" y1=\"260.0\" x2=\"284.0\" y2=\"260.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"242.0\" y1=\"248.0\" x2=\"342.0\" y2=\"188.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<line x1=\"328.0\" y1=\"354.0\" x2=\"328.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_blue)\"/>\n<line x1=\"274.0\" y1=\"300.0\" x2=\"382.0\" y2=\"300.0\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_green)\"/>\n<line x1=\"340.0\" y1=\"288.0\" x2=\"440.0\" y2=\"228.0\" stroke=\"#c78a00\" stroke-width=\"9\" stroke-linecap=\"round\" marker-end=\"url(#n9_2_amber)\"/>\n<text x=\"112.0\" y=\"162.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"210.0\" y=\"322.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"386.0\" y=\"176.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"258.0\" y=\"402.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">E x B → S<\/text>\n<\/svg>"}, "9.3": {"label": "Stress–energy of EM field", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body_orig": "The electromagnetic field exerts stresses and transports energy and momentum through spacetime.   These properties are summarized by the electromagnetic stress–energy tensor, constructed from the \\cref{Field tensor}{7.2} and the \\cref{Metric tensor}{3.3}.  This tensor describes how electromagnetic energy and momentum propagate and interact with matter.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "The electromagnetic stress-energy tensor is the electromagnetic-field instance of the general \\cref{Energy--momentum tensor}{9.4}. It combines electromagnetic energy density, momentum density, energy flux, and stresses into one Lorentz-covariant tensor.", "derivation_new": "For the electromagnetic field, the stress-energy tensor is constructed algebraically from the \\cref{Field tensor}{7.2} and the \\cref{Metric tensor}{3.3}. With the \\(+---\\) convention and suppressing unit-dependent constants, a common form is \\[ T^{\\mu\\nu}=-F^{\\mu\\lambda}F^\\nu{}_{\\lambda}+\\frac14\\eta^{\\mu\\nu}F^{\\alpha\\beta}F_{\\alpha\\beta}. \\] This is the electromagnetic specialization of the general \\cref{Energy--momentum tensor}{9.4}.", "explanation_new": "The stress-energy tensor may sound abstract, but it is a complete local accounting sheet for electromagnetic energy and momentum. The time-time part is energy density, the mixed parts describe energy flux and momentum density, and the spatial parts describe stresses: momentum flowing across surfaces. Radiation pressure is a concrete example. Light hitting a surface carries momentum, so it can push. Different observers split the tensor into density, flux, and stress differently, but they are decomposing the same covariant object.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"247.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T_EM<\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"247.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T_EM<\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"166.0\" y1=\"178.0\" x2=\"112.0\" y2=\"178.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"346.0\" y1=\"284.0\" x2=\"408.0\" y2=\"284.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"222.0\" y1=\"148.0\" x2=\"222.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"286.0\" y1=\"318.0\" x2=\"286.0\" y2=\"380.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<text x=\"390.0\" y=\"216.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"256.0\" y=\"360.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">u + flux + stress<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_3\">\n<title id=\"title-n9_3\">Stress-energy of EM field<\/title>\n<defs>\n\n<marker id=\"n9_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<rect x=\"166.0\" y=\"148.0\" width=\"180.0\" height=\"170.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"247.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T_EM<\/text>\n<line x1=\"190.0\" y1=\"204.0\" x2=\"322.0\" y2=\"204.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<path d=\"M202,250 C230,222 258,278 310,246\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"346.0\" y1=\"232.0\" x2=\"424.0\" y2=\"232.0\" stroke=\"#c78a00\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"166.0\" y1=\"178.0\" x2=\"112.0\" y2=\"178.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"346.0\" y1=\"284.0\" x2=\"408.0\" y2=\"284.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"222.0\" y1=\"148.0\" x2=\"222.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<line x1=\"286.0\" y1=\"318.0\" x2=\"286.0\" y2=\"380.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_3_arrow)\"/>\n<text x=\"390.0\" y=\"216.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">S<\/text>\n<text x=\"256.0\" y=\"360.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">u + flux + stress<\/text>\n<\/svg>"}, "9.4": {"label": "Energy--momentum tensor", "layer": "9", "layer_title": "Energy and Momentum in Fields", "body_orig": "A rank-two tensor \\(T^{\\mu\\nu}\\) describing the density and flow of energy and momentum in spacetime.  For the electromagnetic field it is constructed from the \\cref{Field tensor}{7.2}.  Conservation of energy and momentum is expressed by  \\[ \\partial_\\mu T^{\\mu\\nu} = 0. \\]  This conservation law follows from spacetime translation symmetry via \\cref{Noether's theorem}{5.6}.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "The energy-momentum tensor \\(T^{\\mu\\nu}\\) is a rank-two tensor that describes the density and flow of energy and momentum through spacetime. Its conservation equation, \\[ \\partial_\\mu T^{\\mu\\nu}=0, \\] expresses local conservation of energy and momentum for an isolated system.", "derivation_new": "The energy-momentum tensor is derived from spacetime translation symmetry using \\cref{Noether's theorem}{5.6}. If the action is unchanged under constant shifts \\[ x^\\mu \\rightarrow x^\\mu+\\epsilon^\\mu, \\] then there is a conserved current for each spacetime direction. These four conserved currents are assembled into \\(T^{\\mu\\nu}\\), with the conservation law \\[ \\partial_\\mu T^{\\mu\\nu}=0. \\] For fields described by a Lagrangian density \\(\\mathcal L(\\phi_a,\\partial_\\mu\\phi_a)\\), the canonical form is \\[ T^\\mu{}_{\\nu}=\\frac{\\partial\\mathcal L}{\\partial(\\partial_\\mu\\phi_a)}\\partial_\\nu\\phi_a-\\delta^\\mu{}_{\\nu}\\mathcal L. \\] This form may be improved or symmetrized when needed, especially for gauge fields. For electromagnetism, the physically useful symmetric tensor is constructed from the \\cref{Field tensor}{7.2}. With the \\(+---\\) metric convention and suppressing unit-dependent constants, \\[ T^{\\mu\\nu}=-F^{\\mu\\lambda}F^\\nu{}_{\\lambda}+\\frac14 \\eta^{\\mu\\nu}F^{\\alpha\\beta}F_{\\alpha\\beta}. \\] This tensor packages electromagnetic energy density, momentum density, and stresses into one Lorentz-covariant object.", "explanation_new": "The energy-momentum tensor generalizes the idea of energy and momentum conservation to fields and continuous systems. A field can have energy spread through space, momentum flowing from one region to another, and stresses across surfaces. All of that local bookkeeping is held in \\(T^{\\mu\\nu}\\). The conservation equation \\(\\partial_\\mu T^{\\mu\\nu}=0\\) says energy-momentum is not disappearing at a point; it is balanced by flow. For electromagnetism, \\(T^{00}\\) gives field energy density, while other components encode Poynting flux, momentum density, and pressure-like stresses.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"80.0\" y=\"164.0\" width=\"144.0\" height=\"144.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"224.0\" y1=\"204.0\" x2=\"286.0\" y2=\"184.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<line x1=\"224.0\" y1=\"264.0\" x2=\"286.0\" y2=\"292.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<line x1=\"136.0\" y1=\"164.0\" x2=\"116.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<line x1=\"80.0\" y1=\"236.0\" x2=\"34.0\" y2=\"254.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<text x=\"256.0\" y=\"390.0\" font-size=\"33\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂μT^μν = 0<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n9_4\">\n<title id=\"title-n9_4\">Energy-momentum tensor<\/title>\n<defs>\n\n<marker id=\"n9_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<rect x=\"80.0\" y=\"164.0\" width=\"144.0\" height=\"144.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<line x1=\"224.0\" y1=\"204.0\" x2=\"286.0\" y2=\"184.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<line x1=\"224.0\" y1=\"264.0\" x2=\"286.0\" y2=\"292.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<line x1=\"136.0\" y1=\"164.0\" x2=\"116.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<line x1=\"80.0\" y1=\"236.0\" x2=\"34.0\" y2=\"254.0\" stroke=\"#555555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n9_4_arrow)\"/>\n<rect x=\"286.0\" y=\"154.0\" width=\"116.0\" height=\"116.0\" rx=\"8.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"4\"/>\n<rect x=\"294.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#fff6df\" stroke=\"none\"/>\n<rect x=\"350.0\" y=\"162.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<rect x=\"294.0\" y=\"218.0\" width=\"46.0\" height=\"46.0\" rx=\"5.0\" fill=\"#edf3ff\" stroke=\"none\"/>\n<line x1=\"344.0\" y1=\"154.0\" x2=\"344.0\" y2=\"270.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<line x1=\"286.0\" y1=\"212.0\" x2=\"402.0\" y2=\"212.0\" stroke=\"#c8c8c8\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"314.0\" font-size=\"35\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">T<tspan baseline-shift=\"super\" font-size=\"68%\">μν<\/tspan><\/text>\n<text x=\"256.0\" y=\"390.0\" font-size=\"33\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂μT^μν = 0<\/text>\n<\/svg>"}, "10.1": {"label": "Electromagnetic waves", "layer": "10", "layer_title": "Waves and Radiation", "body_orig": "Self-propagating oscillations of the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}.   In regions where the \\cref{Four-current}{8.2} vanishes, the field equations for the \\cref{Electromagnetic field}{7.5} reduce to wave equations, allowing disturbances in the field to propagate through space.  These waves travel at the speed \\(c\\), consistent with the \\cref{Constancy of the speed of light}{1.2}.   Electromagnetic waves carry energy and momentum, described by the \\cref{Energy--momentum tensor}{9.4} and transported through space according to the \\cref{Momentum density (Poynting vector)}{9.2}.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "Electromagnetic waves are propagating source-free disturbances of the \\cref{Electromagnetic field}{7.5}. In a chosen frame they appear as coupled oscillations of the \\cref{Electric field}{7.3} and \\cref{Magnetic field}{7.4}, travelling at speed \\(c\\) in vacuum.", "derivation_new": "Electromagnetic waves follow from source-free \\cref{Maxwell's equations}{7.6}. In a region where the \\cref{Four-current}{8.2} vanishes, Maxwell's equations imply a \\cref{Wave equation}{10.2} for the field or for the potential in a suitable gauge: \\[ \\Box A^\\mu=0. \\] Plane-wave solutions have electric and magnetic components transverse to the propagation direction, and the speed of propagation is fixed by the invariant light speed \\(c\\).", "explanation_new": "An electromagnetic wave is a self-sustaining disturbance of one electromagnetic field, not two independent waves called electric and magnetic. Maxwell's equations link the changing electric and magnetic components so the disturbance propagates at \\(c\\) in vacuum. In a plane wave, \\(\\mathbf E\\), \\(\\mathbf B\\), and the direction of travel are mutually perpendicular, and the Poynting vector points along the propagation direction. The wave carries energy and momentum, which is why light can heat a surface or exert radiation pressure.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<line x1=\"150.0\" y1=\"172.0\" x2=\"150.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"250.0\" y1=\"172.0\" x2=\"250.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"350.0\" y1=\"172.0\" x2=\"350.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"154.0\" y1=\"386.0\" x2=\"354.0\" y2=\"386.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<text x=\"256.0\" y=\"374.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_1\">\n<title id=\"title-n10_1\">Electromagnetic waves<\/title>\n<defs>\n\n<marker id=\"n10_1_arrow\" markerWidth=\"7\" markerHeight=\"7\"\n        refX=\"5\" refY=\"3.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L5,3.5 L0,7 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,230 C110,170 150,290 190,230 C230,170 270,290 310,230 C350,170 390,290 430,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M70,292 C110,352 150,232 190,292 C230,352 270,232 310,292 C350,352 390,232 430,292\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<line x1=\"104.0\" y1=\"128.0\" x2=\"408.0\" y2=\"128.0\" stroke=\"#c78a00\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<text x=\"256.0\" y=\"106.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">c<\/text>\n<text x=\"86.0\" y=\"204.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">E<\/text>\n<text x=\"86.0\" y=\"346.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<line x1=\"150.0\" y1=\"172.0\" x2=\"150.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"250.0\" y1=\"172.0\" x2=\"250.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"350.0\" y1=\"172.0\" x2=\"350.0\" y2=\"350.0\" stroke=\"#c8c8c8\" stroke-width=\"3\" stroke-dasharray=\"7 8\"/>\n<line x1=\"154.0\" y1=\"386.0\" x2=\"354.0\" y2=\"386.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_1_arrow)\"/>\n<text x=\"256.0\" y=\"374.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>"}, "10.2": {"label": "Wave equation", "layer": "10", "layer_title": "Waves and Radiation", "body_orig": "In the \\cref{Lorenz gauge}{7.7}, the equations governing the \\cref{Vector potential}{7.1} take the form  \\[ \\square A_\\mu = J_\\mu, \\]  where \\(J_\\mu\\) is the \\cref{Four-current}{8.2} and \\(\\square = \\partial_\\mu \\partial^\\mu\\) is the d'Alembertian operator.  When the source term vanishes, the potential satisfies a free wave equation. Solutions correspond to \\cref{Electromagnetic waves}{10.1} propagating at the speed determined by the spacetime structure encoded in the \\cref{Metric tensor}{3.3}.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "The relativistic wave equation is a field equation involving the d'Alembertian operator \\[ \\Box=\\partial_\\mu\\partial^\\mu=\\frac{1}{c^2}\\frac{\\partial^2}{\\partial t^2}-\\nabla^2. \\] For electromagnetism, it describes propagating solutions of the vector potential or fields.", "derivation_new": "The electromagnetic wave equation is obtained from \\cref{Maxwell's equations}{7.6}. Writing the field in terms of the \\cref{Vector potential}{7.1} and imposing the \\cref{Lorenz gauge}{7.7}, \\(\\partial_\\mu A^\\mu=0\\), the sourced equation becomes schematically \\[ \\Box A^\\mu=\\mu_0 j^\\mu. \\] The operator \\(\\Box\\) is formed using the \\cref{Metric tensor}{3.3}. In source-free regions where the \\cref{Four-current}{8.2} vanishes, this reduces to \\[ \\Box A^\\mu=0, \\] whose solutions describe \\cref{Electromagnetic waves}{10.1}.", "explanation_new": "The wave equation is the mathematical pattern for finite-speed propagation. With the \\(+---\\) metric, the d'Alembertian has one time part and three spatial parts: \\(\\Box=c^{-2}\\partial_t^2-\\nabla^2\\). That sign structure is what makes light-cone propagation appear. In electromagnetism, choosing the Lorenz gauge turns the potential equations into a clean wave equation. In a source-free region, plane waves satisfy \\(\\omega=ck\\), which is the compact statement that the disturbance moves at speed \\(c\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"261.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<\/text>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"261.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<\/text>\n<rect x=\"92.0\" y=\"96.0\" width=\"84.0\" height=\"62.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"136.2\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">Jμ<\/text>\n<line x1=\"134.0\" y1=\"164.0\" x2=\"134.0\" y2=\"198.0\" stroke=\"#d22f2f\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<text x=\"142.0\" y=\"334.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">operator<\/text>\n<text x=\"372.0\" y=\"334.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">wave<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_2\">\n<title id=\"title-n10_2\">Wave equation<\/title>\n<defs>\n\n<marker id=\"n10_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"78.0\" y=\"204.0\" width=\"112.0\" height=\"86.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"261.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">□A<\/text>\n<rect x=\"92.0\" y=\"96.0\" width=\"84.0\" height=\"62.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"134.0\" y=\"136.2\" font-size=\"27\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">Jμ<\/text>\n<line x1=\"134.0\" y1=\"164.0\" x2=\"134.0\" y2=\"198.0\" stroke=\"#d22f2f\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<line x1=\"202.0\" y1=\"246.0\" x2=\"282.0\" y2=\"246.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_2_arrow)\"/>\n<path d=\"M296,246 C330,200 364,292 398,246 C420,216 442,248 458,230\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<text x=\"142.0\" y=\"334.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\" text-anchor=\"middle\">operator<\/text>\n<text x=\"372.0\" y=\"334.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">wave<\/text>\n<\/svg>"}, "10.3": {"label": "Radiation reaction", "layer": "10", "layer_title": "Waves and Radiation", "body_orig": "When charged particles accelerate, they emit \\cref{Electromagnetic waves}{10.1}.   Because these waves carry energy and momentum described by the \\cref{Energy--momentum tensor}{9.4}, the emitting particle must experience a recoil force.  This phenomenon modifies the motion predicted by the \\cref{Lorentz force law}{8.4} and represents the back–reaction of the field on its source.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "Radiation reaction is the back-reaction force on an accelerating charged particle caused by the energy and momentum it radiates away as electromagnetic waves.", "derivation_new": "An accelerating charge emits \\cref{Electromagnetic waves}{10.1}. Those waves carry energy and momentum, described locally by the \\cref{Energy--momentum tensor}{9.4}. Conservation of total energy and momentum then requires the charged particle's motion to be modified: the particle loses energy-momentum to the field it radiates. Radiation reaction is the correction to the motion beyond the applied \\cref{Lorentz force law}{8.4}.", "explanation_new": "Radiation reaction is difficult because the charge is affected by the field it creates. The ordinary Lorentz force describes how an external field acts on a charge. But an accelerating charge emits electromagnetic waves, and those waves carry energy and momentum away. Conservation then says the particle's motion must reflect that loss. A driven electron, for example, radiates while it oscillates, so some work done on it leaves as radiation rather than remaining as particle energy. The details are subtle because self-interaction can lead to unphysical runaway or pre-accelerating solutions if handled carelessly.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n10_3\">\n<title id=\"title-n10_3\">Radiation reaction<\/title>\n<defs>\n\n<marker id=\"n10_3_wave\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#c78a00\"/>\n<\/marker>\n<marker id=\"n10_3_recoil\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<path d=\"M96,354 C150,250 216,314 256,208\" fill=\"none\" stroke=\"#222222\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<circle cx=\"194.0\" cy=\"278.0\" r=\"24.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"194.0\" y=\"288.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"white\" text-anchor=\"middle\">q<\/text>\n<path d=\"M178,240 C194,210 216,210 230,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<path d=\"M250,244 C318,214 356,340 294,312\" fill=\"none\" stroke  Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"white\" text-anchor=\"middle\">q<\/text>\n<path d=\"M178,240 C194,210 216,210 230,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<path d=\"M250,244 C318,214 356,340 294,312\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,220 C318,190 356,364 294,336\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M250,196 C318,166 356,388 294,360\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<line x1=\"182.0\" y1=\"292.0\" x2=\"118.0\" y2=\"336.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_recoil)\"/>\n<text x=\"88.0\" y=\"350.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#d22f2f\" text-anchor=\"middle\">recoil<\/text>\n<line x1=\"292.0\" y1=\"254.0\" x2=\"398.0\" y2=\"212.0\" stroke=\"#c78a00\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n10_3_wave)\"/>\n<text x=\"366.0\" y=\"202.0\" font-size=\"29\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">radiation<\/text>\n<\/svg>"}, "11.1": {"label": "Lorentz invariance", "layer": "11", "layer_title": "Symmetry and Invariance Principles", "body_orig": "A fundamental symmetry stating that the laws of physics have the same form in all \\cref{Inertial frames}{2.1}.   Mathematically, this means the equations governing physical quantities are covariant under \\cref{Lorentz transformations}{3.1}.  Objects such as \\cref{Four-vectors}{4.2}, the \\cref{Field tensor}{7.2}, and the \\cref{Energy--momentum tensor}{9.4} transform in ways that preserve the invariant structure defined by the \\cref{Metric tensor}{3.3}.   Lorentz invariance is therefore a guiding principle in constructing relativistic physical theories.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "Lorentz invariance is the statement that the laws of physics have the same form in all inertial frames related by \\cref{Lorentz transformations}{3.1}. Equivalently, physical equations should be expressible using Lorentz-covariant objects and invariant contractions.", "derivation_new": "Lorentz invariance is the modern mathematical expression of the \\cref{Principle of relativity}{1.1} in Minkowski spacetime. The relevant transformations are the \\cref{Lorentz transformations}{3.1}, defined by preserving the \\cref{Metric tensor}{3.3}: \\[ \\Lambda^T\\eta\\Lambda=\\eta. \\] Objects such as \\cref{Four-vectors}{4.2}, the \\cref{Field tensor}{7.2}, and the \\cref{Energy--momentum tensor}{9.4} transform in ways that preserve tensor equations between inertial frames.", "explanation_new": "Lorentz invariance is the demand that the form of physical law does not depend on which inertial observer writes it down. This does not mean every observer measures the same components. They usually do not. It means the equations relate objects that transform consistently, so all observers describe the same physics. Tensor notation is helpful because it makes this structure visible: if both sides of an equation are tensors of the same type, covariance is built in. For example, \\(p_\\mu p^\\mu=m^2c^2\\) is invariant, while Maxwell's equations in tensor form are covariant.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_1\">\n<title id=\"title-n11_1\">Lorentz invariance<\/title>\n<defs>\n\n<marker id=\"n11_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n11_1_blue\" markerWi 55555\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n11_1_arrow)\"/>\n<rect x=\"320.0\" y=\"202.0\" width=\"120.0\" height=\"92.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"380.0\" y=\"262.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">law<\/text>\n<circle cx=\"424.0\" cy=\"214.0\" r=\"13.0\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\"/>\n<line x1=\"416.0\" y1=\"218.0\" x2=\"424.0\" y2=\"226.0\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<line x1=\"424.0\" y1=\"226.0\" x2=\"438.0\" y2=\"206.0\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"380.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#248a3d\" text-anchor=\"middle\">invariant form<\/text>\n<\/svg>"}, "11.2": {"label": "Gauge fixing", "layer": "11", "layer_title": "Symmetry and Invariance Principles", "body_orig": "Because of \\cref{Gauge invariance}{8.1}, many different \\cref{Vector potentials}{7.1} correspond to the same physical \\cref{Electromagnetic field}{7.5}.   Gauge fixing is the procedure of choosing a particular representative from this equivalence class.  An example is the \\cref{Lorenz gauge}{7.7}, which simplifies the equations governing the potential by turning \\cref{Maxwell's equations}{7.6} into wave equations.   Although different gauge choices alter the mathematical form of the potential, observable quantities derived from the \\cref{Field tensor}{7.2} remain unchanged.", "definition_orig": "", "explanation_orig": "", "example_orig": "", "definition_new": "Gauge fixing is the choice of one representative potential from a family of gauge-equivalent potentials. It removes redundant descriptive freedom associated with \\cref{Gauge invariance}{8.1} without changing the physical electromagnetic field.", "derivation_new": "Gauge fixing is possible because \\cref{Gauge invariance}{8.1} says that many potentials describe the same physical field. The \\cref{Vector potential}{7.1} may be changed while leaving the \\cref{Field tensor}{7.2} and hence the \\cref{Electromagnetic field}{7.5} unchanged. A gauge condition adds an extra equation selecting a convenient representative. The \\cref{Lorenz gauge}{7.7}, \\(\\partial_\\mu A^\\mu=0\\), is one such choice and is useful because it respects \\cref{Lorentz invariance}{11.1}.", "explanation_new": "Gauge fixing is choosing a convenient representative from many physically equivalent potentials. The danger is to think the gauge choice is an extra physical assumption. It is not; it is a way to remove redundant description. The field tensor remains the same. This is similar in spirit to choosing coordinates, though gauge symmetry has its own physics. The Lorenz gauge is a useful example because it preserves Lorentz covariance and simplifies Maxwell's equations for the potential to a wave-equation form, \\(\\Box A^\\mu=\\mu_0j^\\mu\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n11_2\">\n<title id=\"title-n11_2\">Gauge fixing<\/title>\n<defs>\n\n<marker id=\"n11_2_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M70,156 C130,116 172,194 228,148\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M70,214 C130,174 172,252 228,206\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.52\"/>\n<path d=\"M70,272 C130,232 172,310 228,264\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<line x1=\"238.0\" y1=\"218.0\" x2=\"286.0\" y2=\"218.0\       var edgeKey = {"PREREQUISITE": {"relation": "PREREQUISITE", "directed": true, "category": "knowledge", "meaning": "A requires prior understanding of B. Only include essential, non-redundant dependencies.", "example": "10.1 Electromagnetic waves -> 10.2 Wave equation", "colour": "#d62728"}, "DERIVES_FROM": {"relation": "DERIVES_FROM", "directed": true, "category": "knowledge", "meaning": "A can be mathematically derived from B.", "example": "10.2 Wave equation -> 7.6 Maxwell's equations", "colour": "#1f77b4"}, "RELATED": {"relation": "RELATED", "directed": false, "category": "association", "meaning": "A and B are closely associated, but neither is a prerequisite of the other.", "example": "7.3 Electric field -- 7.4 Magnetic field", "colour": "#c8c8c8"}};

      function kgAfterReady() {
        var allNodes = nodes.get();
        var allEdges = edges.get();
        var graphContainer = document.getElementById("mynetwork");
        var nodeLabelLayer = document.createElement("div");
        var nodeLabelEls = {};

        nodeLabelLayer.id = "kg_node_labels";
        graphContainer.appendChild(nodeLabelLayer);

        var originalNodes = {};
        var originalEdges = {};
        var enabledEdgeRelations = {};
        var currentView = {mode: "all", nodeId: null};
        var activeNodeId = null;
        var svgImageCache = {};
        var layoutFinalized = false;
        var layoutFinalizeTimer = null;
        var recentConceptIds = [];
        var recentConceptLimit = 6;

        /*
         * Custom node rendering
         *
         * PyVis/vis-network is still responsible for physics, edge routing,
         * hit testing, and node selection. The visible nodes are deliberately
         * split into three pieces:
         *
         * 1. native vis-network dot nodes for the first frame, avoiding a blank
         *    graph while this injected script waits for network/nodes/edges;
         * 2. invisible fixed-size box nodes after startup, giving physics a
         *    larger collision area that includes the external label footprint;
         * 3. canvas-drawn circles plus HTML labels, so node labels can contain
         *    MathJax and still track pan/zoom.
         */
        var transparentNodeColor = {
          background: "rgba(255,255,255,0)",
          border: "rgba(255,255,255,0)",
          highlight: {
            background: "rgba(255,255,255,0)",
            border: "rgba(255,255,255,0)"
          },
          hover: {
            background: "rgba(255,255,255,0)",
            border: "rgba(255,255,255,0)"
          }
        };

        function applyCollisionNodeStyle(node) {
          var o = Object.assign({}, node);
          o.shape = "box";
          o.label = " ";
          o.borderWidth = 0;
          o.color = Object.assign({}, transparentNodeColor);
          o.font = Object.assign({}, o.font || {}, {
            size: 1,
            color: "rgba(0,0,0,0)"
          });
          return o;
        }

        function visibleConceptLabel(nodeId) {
          var concept = getConcept(nodeId) || {};
          return '<span class="kg-node-label-id">' + escapeHtml(nodeId) + '</span>' +
            renderConceptText(concept.label || "");
        }

        function buildNodeLabels() {
          nodeLabelLayer.innerHTML = "";
          Object.keys(conceptData).forEach(function(id) {
            var el = document.createElement("div");
            el.className = "kg-node-label";
            el.setAttribute("data-node-id", id);
            el.innerHTML = visibleConceptLabel(id);
            nodeLabelLayer.appendChild(el);
            nodeLabelEls[id] = el;
          });
          typesetNodeLabels();
          updateNodeLabelPositions();
        }

        function typesetNodeLabels() {
          if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.typesetClear) {
              MathJax.typesetClear([nodeLabelLayer]);
            }
            MathJax.typesetPromise([nodeLabelLayer]).catch(function(err) {
              console.warn("MathJax label typesetting failed:", err);
            }).then(function() {
              updateNodeLabelPositions();
            });
          } else {
            setTimeout(typesetNodeLabels, 250);
          }
        }

        function updateNodeLabelPositions() {
          if (!network || !nodeLabelLayer) { return; }

          var positions = network.getPositions();
          var labelScale = Math.max(0.35, network.getScale ? network.getScale() : 1);
          Object.keys(nodeLabelEls).forEach(function(id) {
            var el = nodeLabelEls[id];
            var node = nodes.get(id);
            var pos = positions[id];
            if (!node || !pos || node.hidden) {
              el.style.display = "none";
              return;
            }

            var dom = network.canvasToDOM(pos);
            var radius = Number(node.visualSize) || Number(node.size) || 18;
            var radiusEdge = network.canvasToDOM({x: pos.x + radius, y: pos.y});
            var radiusPx = Math.abs(radiusEdge.x - dom.x);
            var canvasEl = network.canvas && network.canvas.frame ? network.canvas.frame.canvas : null;
            var canvasRect = canvasEl ? canvasEl.getBoundingClientRect() : graphContainer.getBoundingClientRect();
            var layerRect = nodeLabelLayer.getBoundingClientRect();
            var labelCenterX = canvasRect.left - layerRect.left + dom.x;
            var labelTopY = canvasRect.top - layerRect.top + dom.y + Math.max(4, radiusPx + 3);
            var labelWidth = 250 * labelScale;
            el.style.display = "block";
            el.style.width = labelWidth + "px";
            el.style.fontSize = (32 * labelScale) + "px";
            el.style.left = (labelCenterX - labelWidth / 2) + "px";
            el.style.top = labelTopY + "px";
            el.style.opacity = node.opacity === undefined ? "1" : String(node.opacity);
          });
        }

        function drawVisibleNodes(ctx) {
          var positions = network.getPositions();
          nodes.get().forEach(function(node) {
            if (node.hidden) { return; }

            var pos = positions[node.id];
            if (!pos) { return; }

            var radius = Number(node.visualSize) || 18;
            var opacity = node.opacity === undefined ? 1 : Number(node.opacity);
            var color = node.visualColor || {};
            var fill = color.background || "#999999";
            var border = color.border || "#333333";
            var concept = getConcept(node.id) || {};
            var svgIcon = concept.svg_icon || concept.svg_graphic || "";
            var svgImage = svgIcon ? getSvgNodeImage(node.id, svgIcon) : null;

            ctx.save();
            ctx.globalAlpha = Number.isFinite(opacity) ? opacity : 1;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI, false);
            ctx.fillStyle = svgImage ? tintHexColour(fill, 0.86) : fill;
            ctx.fill();

            if (svgImage && svgImage.complete && svgImage.naturalWidth > 0) {
              ctx.save();
              ctx.beginPath();
              ctx.arc(pos.x, pos.y, Math.max(1, radius - 3), 0, 2 * Math.PI, false);
              ctx.clip();
              var imagePadding = radius * 0.08;
              var imageSize = Math.max(1, (radius * 2) - (imagePadding * 2));
              var sourceCrop = 36;
              var sourceSize = Math.max(1, 512 - (sourceCrop * 2));
              ctx.drawImage(
                svgImage,
                sourceCrop,
                sourceCrop,
                sourceSize,
                sourceSize,
                pos.x - imageSize / 2,
                pos.y - imageSize / 2,
                imageSize,
                imageSize
              );
              ctx.restore();
            }

            ctx.lineWidth = svgImage ? 4 : 1.5;
            ctx.strokeStyle = svgImage ? fill : (node.id === activeNodeId ? "#000000" : border);
            ctx.stroke();
            if (svgImage && node.id === activeNodeId) {
              ctx.lineWidth = 2;
              ctx.strokeStyle = "#000000";
              ctx.stroke();
            }
            ctx.restore();
          });
        }

        function getSvgNodeImage(nodeId, svgText) {
          var cached = svgImageCache[nodeId];
          if (cached === null) {
            return null;
          }
          if (cached) {
            return cached;
          }

          var image = new Image();
          image.onload = function() {
            if (network && network.redraw) {
              network.redraw();
            }
          };
          image.onerror = function() {
            svgImageCache[nodeId] = null;
          };
          svgImageCache[nodeId] = image;
          image.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgText);
          return image;
        }

        function tintHexColour(hexColour, amount) {
          var match = String(hexColour || "").trim().match(/^#([0-9a-fA-F]{6})$/);
          if (!match) {
            return "#ffffff";
          }
          var hex = match[1];
          var r = parseInt(hex.slice(0, 2), 16);
          var g = parseInt(hex.slice(2, 4), 16);
          var b = parseInt(hex.slice(4, 6), 16);
          var mix = Math.max(0, Math.min(1, Number(amount)));
          r = Math.round(r + (255 - r) * mix);
          g = Math.round(g + (255 - g) * mix);
          b = Math.round(b + (255 - b) * mix);
          return "rgb(" + r + "," + g + "," + b + ")";
        }

        nodes.update(allNodes.map(applyCollisionNodeStyle));
        allNodes = nodes.get();
        allNodes.forEach(function(n) { originalNodes[n.id] = Object.assign({}, n); });
        allEdges.forEach(function(e) { originalEdges[e.id] = Object.assign({}, e); });
        Object.keys(edgeKey).forEach(function(relation) {
          enabledEdgeRelations[relation] = true;
        });

        function htmlToText(s) {
          var div = document.createElement("div");
          div.innerHTML = s || "";
          return (div.textContent || div.innerText || "").toLowerCase();
        }

        function escapeHtml(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function renderConceptText(s) {
          return escapeHtml(s).replace(
            /\\cref\{([^{}]*)\}\{([^{}]*)\}/g,
            function(match, label, targetId) {
              if (!getConcept(targetId)) {
                return "<strong>" + label + "</strong>";
              }
              return '<a href="#" class="concept-link" data-concept-id="' +
                escapeHtml(targetId) +
                '"><strong>' + label + "</strong></a>";
            }
          );
        }

        function typesetInfoPanel() {
          var panel = document.getElementById("info_panel");
          if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.typesetClear) {
              MathJax.typesetClear([panel]);
            }
            MathJax.typesetPromise([panel]).catch(function(err) {
              console.warn("MathJax typesetting failed:", err);
            });
          }
        }

        function setInfoPanelVisible(visible) {
          var panel = document.getElementById("info_panel");
          var button = document.getElementById("kg_info_toggle");
          panel.classList.toggle("kg-hidden", !visible);
          if (button) {
            button.innerText = visible ? "Hide details" : "Show details";
          }
        }

        function setControlsVisible(visible) {
          var panel = document.getElementById("kg_controls");
          var button = document.getElementById("kg_controls_toggle");
          panel.classList.toggle("kg-hidden", !visible);
          if (button) {
            button.innerText = visible ? "Hide controls" : "Show controls";
          }
        }

        function getConcept(nodeId) {
          return conceptData[String(nodeId)] || null;
        }

        function conceptHash(nodeId) {
          return "#concept-" + encodeURIComponent(String(nodeId));
        }

        function conceptIdFromHash(hash) {
          var prefix = "#concept-";
          if (!hash || hash.indexOf(prefix) !== 0) { return null; }
          try {
            return decodeURIComponent(hash.slice(prefix.length));
          } catch (e) {
            return null;
          }
        }

        function pushConceptHistory(nodeId) {
          var hash = conceptHash(nodeId);
          if (window.location.hash === hash) { return; }
          window.history.pushState({nodeId: String(nodeId)}, "", hash);
        }

        function rememberConcept(nodeId) {
          var id = String(nodeId);
          recentConceptIds = recentConceptIds.filter(function(existingId) {
            return existingId !== id;
          });
          recentConceptIds.push(id);
          if (recentConceptIds.length > recentConceptLimit) {
            recentConceptIds = recentConceptIds.slice(recentConceptIds.length - recentConceptLimit);
          }
          renderRecentConcepts();
        }

        function renderRecentConcepts() {
          var container = document.getElementById("kg_recent");
          var section = document.getElementById("kg_recent_section");
          if (!container) { return; }

          if (recentConceptIds.length === 0) {
            container.innerHTML = "";
            if (section) { section.hidden = true; }
            return;
          }

          if (section) {
            if (section.hidden) { section.open = true; }
            section.hidden = false;
          }

          var html = '<button type="button" class="kg-recent-clear" onclick="kgClearRecent()">Clear</button>';
          recentConceptIds.forEach(function(id) {
            var concept = getConcept(id) || {};
            var activeClass = id === activeNodeId ? " active" : "";
            html += '<button type="button" class="kg-concept-item' + activeClass +
              '" data-recent-concept-id="' + escapeHtml(id) + '">' +
              '<span class="kg-concept-id">' + escapeHtml(id) + '</span> ' +
              escapeHtml(concept.label || "") +
              "</button>";
          });
          container.innerHTML = html;
        }

        window.kgClearRecent = function() {
          recentConceptIds = [];
          renderRecentConcepts();
        };

        function conceptIdParts(id) {
          return String(id).split(".").map(function(part) {
            var n = Number(part);
            return Number.isFinite(n) ? n : part;
          });
        }

        function compareConceptIds(a, b) {
          var aa = conceptIdParts(a);
          var bb = conceptIdParts(b);
          var len = Math.max(aa.length, bb.length);
          for (var i = 0; i < len; i++) {
            if (aa[i] === undefined) { return -1; }
            if (bb[i] === undefined) { return 1; }
            if (aa[i] === bb[i]) { continue; }
            if (typeof aa[i] === "number" && typeof bb[i] === "number") {
              return aa[i] - bb[i];
            }
            return String(aa[i]).localeCompare(String(bb[i]));
          }
          return 0;
        }

        function conceptSearchText(nodeId, node) {
          var concept = getConcept(nodeId) || {};
          return [
            String(nodeId),
            node && node.label ? String(node.label) : "",
            concept.label || "",
            concept.layer || "",
            concept.layer_title || "",
            concept.definition_new || "",
            concept.derivation_new || "",
            concept.explanation_new || ""
          ].join(" ").toLowerCase();
        }

        function edgeRelation(edge) {
          return String(edge.relation || "");
        }

        function edgeRelationEnabled(edge) {
          var relation = edgeRelation(edge);
          return enabledEdgeRelations[relation] !== false;
        }

        function enabledConnectedNodes(nodeId) {
          var connected = {};
          allEdges.forEach(function(edge) {
            if (!edgeRelationEnabled(edge)) { return; }
            if (edge.from == nodeId) { connected[edge.to] = true; }
            if (edge.to == nodeId) { connected[edge.from] = true; }
          });
          return Object.keys(connected);
        }

        function relationColour(relation) {
          var item = edgeKey[relation] || {};
          return item.colour || "#999999";
        }

        function buildEdgeFilters() {
          var relations = Object.keys(edgeKey).sort();
          var html = "";

          if (relations.length === 0) {
            html += '<div style="color:#555;">No edge key loaded.</div>';
            document.getElementById("kg_edge_filters").innerHTML = html;
            return;
          }

          relations.forEach(function(relation) {
            var inputId = "kg_edge_filter_" + relation.replace(/[^a-zA-Z0-9_-]/g, "_");
            html += '<label class="kg-edge-filter" for="' + escapeHtml(inputId) + '">' +
              '<input type="checkbox" id="' + escapeHtml(inputId) +
              '" data-edge-relation="' + escapeHtml(relation) + '" checked>' +
              '<span class="kg-edge-filter-swatch" style="background:' +
              escapeHtml(relationColour(relation)) + '"></span>' +
              '<span class="kg-edge-filter-label">' + escapeHtml(relation) + "</span>" +
              "</label>";
          });

          document.getElementById("kg_edge_filters").innerHTML = html;
        }

        function applyCurrentView() {
          if (currentView.mode === "highlight" && currentView.nodeId !== null) {
            kgHighlight(currentView.nodeId, true);
            return;
          }
          if (currentView.mode === "neighbourhood" && currentView.nodeId !== null) {
            kgApplyNeighbourhood(currentView.nodeId, true);
            return;
          }
          kgReset(true);
        }

        function lockLayout() {
          network.stopSimulation();
          network.setOptions({physics: {enabled: false}});
        }

        function releaseNodeDragConstraints(node) {
          var o = Object.assign({}, node);
          o.fixed = {x: false, y: false};
          return o;
        }

        function captureCurrentNodeLayout() {
          var positions = network.getPositions();
          allNodes = nodes.get();
          originalNodes = {};
          allNodes.forEach(function(n) {
            var o = Object.assign({}, n);
            if (positions[n.id]) {
              o.x = positions[n.id].x;
              o.y = positions[n.id].y;
            }
            o = releaseNodeDragConstraints(o);
            originalNodes[n.id] = applyCollisionNodeStyle(o);
          });
          nodes.update(Object.keys(originalNodes).map(function(id) {
            return Object.assign({}, originalNodes[id]);
          }));
          allNodes = nodes.get();
        }

        function finalizeLayoutForInteraction() {
          if (layoutFinalized) { return; }
          if (layoutFinalizeTimer !== null) {
            clearTimeout(layoutFinalizeTimer);
            layoutFinalizeTimer = null;
          }
          lockLayout();
          captureCurrentNodeLayout();
          layoutFinalized = true;
          updateNodeLabelPositions();
        }

        function showConcept(nodeId) {
          var concept = getConcept(nodeId);
          if (!concept) {
            document.getElementById("info_panel").innerHTML =
              "<h2>" + escapeHtml(nodeId) + "</h2>" +
              "<p>No concept data was found for this node.</p>";
            typesetInfoPanel();
            return;
          }

          var layerParts = [];
          if (concept.layer) { layerParts.push("Layer " + escapeHtml(concept.layer)); }
          if (concept.layer_title) { layerParts.push(escapeHtml(concept.layer_title)); }

          var html = "";
          html += "<h2>" + escapeHtml(nodeId) + " " + renderConceptText(concept.label) + "</h2>";
          if (layerParts.length > 0) {
            html += "<p>" + layerParts.join(" - ") + "</p>";
          }
          var svgDetail = concept.svg_detail || concept.svg_graphic || concept.svg_icon || "";
          if (svgDetail) {
            html += '<div class="concept-graphic">' + svgDetail + "</div>";
          }
          html += "<hr>";
          [
            ["Definition", concept.definition_new],
            ["Derivation", concept.derivation_new],
            ["Explanation", concept.explanation_new]
          ].forEach(function(section) {
            if (!section[1]) { return; }
            html += "<h3>" + section[0] + "</h3>";
            html += '<div class="concept-body">' + renderConceptText(section[1]) + "</div>";
          });
          document.getElementById("info_panel").innerHTML = html;
          typesetInfoPanel();
        }

        window.kgShowEdgeKey = function() {
          setInfoPanelVisible(true);
          var relations = Object.keys(edgeKey).sort();
          var html = "<h2>Edge Key</h2>";

          if (relations.length === 0) {
            html += "<p>No edge key data was loaded.</p>";
            document.getElementById("info_panel").innerHTML = html;
            return;
          }

          html += '<table class="edge-key-table">';
          html += "<thead><tr>" +
            "<th>Relation</th>" +
            "<th>Colour</th>" +
            "<th>Direction</th>" +
            "<th>Category</th>" +
            "<th>Meaning</th>" +
            "<th>Example</th>" +
            "</tr></thead><tbody>";

          relations.forEach(function(relation) {
            var item = edgeKey[relation] || {};
            var colour = item.colour || "#999999";
            html += "<tr>" +
              "<td><strong>" + escapeHtml(relation) + "</strong></td>" +
              '<td><span class="edge-colour-swatch" style="background:' + escapeHtml(colour) + '"></span>' +
              escapeHtml(colour) + "</td>" +
              "<td>" + (item.directed ? "directed" : "undirected") + "</td>" +
              "<td>" + escapeHtml(item.category || "") + "</td>" +
              "<td>" + escapeHtml(item.meaning || "") + "</td>" +
              "<td>" + escapeHtml(item.example || "") + "</td>" +
              "</tr>";
          });

          html += "</tbody></table>";
          document.getElementById("info_panel").innerHTML = html;
        };

        window.kgToggleInfoPanel = function() {
          var panel = document.getElementById("info_panel");
          setInfoPanelVisible(panel.classList.contains("kg-hidden"));
          updateNodeLabelPositions();
        };

        window.kgToggleControls = function() {
          var panel = document.getElementById("kg_controls");
          setControlsVisible(panel.classList.contains("kg-hidden"));
          updateNodeLabelPositions();
        };

        function setActiveConceptItem(nodeId) {
          document.querySelectorAll(".kg-concept-item.active").forEach(function(el) {
            el.classList.remove("active");
          });
          var item = Array.prototype.find.call(
            document.querySelectorAll(".kg-concept-item"),
            function(el) { return el.getAttribute("data-concept-id") === String(nodeId); }
          );
          if (item) {
            item.classList.add("active");
            item.scrollIntoView({block: "nearest"});
          }
        }

        function focusConcept(nodeId, statusPrefix, options) {
          options = options || {};
          if (!getConcept(nodeId)) { return; }
          finalizeLayoutForInteraction();
          activeNodeId = nodeId;
          network.focus(nodeId, {scale: 0.7, animation: true});
          kgHighlight(nodeId);
          showConcept(nodeId);
          setActiveConceptItem(nodeId);
          setInfoPanelVisible(true);
          if (!options.skipRecent) {
            rememberConcept(nodeId);
          }
          if (!options.skipHistory) {
            pushConceptHistory(nodeId);
          }
          if (statusPrefix) {
            document.getElementById("kg_status").innerText = statusPrefix + " " + nodeId + ".";
          }
        }

        function buildConceptList(filterText) {
          var q = String(filterText || "").trim().toLowerCase();
          var ids = Object.keys(conceptData).sort(compareConceptIds);
          var html = "";
          var count = 0;

          ids.forEach(function(id) {
            var concept = getConcept(id);
            var haystack = [
              id,
              concept.label || "",
              concept.layer || "",
              concept.layer_title || "",
              concept.definition_new || "",
              concept.derivation_new || "",
              concept.explanation_new || ""
            ].join(" ").toLowerCase();
            if (q && !haystack.includes(q)) { return; }

            html += '<button type="button" class="kg-concept-item" data-concept-id="' +
              escapeHtml(id) +
              '"><span class="kg-concept-id">' +
              escapeHtml(id) +
              '</span> ' +
              escapeHtml(concept.label || "") +
              "</button>";
            count += 1;
          });

          if (count === 0) {
            html += '<div style="color:#555; padding:4px 0;">No matching concepts.</div>';
          }
          document.getElementById("kg_concept_list").innerHTML = html;
        }

        window.kgRestartLayout = function() {
          network.setOptions({
            physics: {enabled: false}
          });
          network.fit({animation: true});
          document.getElementById("kg_status").innerText = "Initial compact layout restored.";
        };

        window.kgReset = function(preserveStatus) {
          finalizeLayoutForInteraction();
          network.unselectAll();
          currentView = {mode: "all", nodeId: null};
          activeNodeId = null;
          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            o.hidden = false;
            o.opacity = 1.0;
            return o;
          }));
          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            o.hidden = !edgeRelationEnabled(e);
            return o;
          }));
          updateNodeLabelPositions();
          if (!preserveStatus) {
            document.getElementById("kg_status").innerText = "Click a node to highlight its immediate neighbours.";
          }
          setActiveConceptItem(null);
          renderRecentConcepts();
        };

        window.kgShowAll = window.kgReset;

        window.kgSearch = function() {
          finalizeLayoutForInteraction();
          var q = document.getElementById("kg_search").value.trim().toLowerCase();
          if (!q) { return; }

          var matches = allNodes.filter(function(n) {
            return conceptSearchText(n.id, n).includes(q) || htmlToText(n.title || "").includes(q);
          });

          if (matches.length === 0) {
            document.getElementById("kg_status").innerText = "No matching concept found.";
            return;
          }

          var id = matches[0].id;
          var concept = getConcept(id) || {};
          focusConcept(id, null);
          document.getElementById("kg_status").innerText =
            "Found " + matches.length + " match(es). Showing first: " + (concept.label || id);
        };

        window.kgHighlight = function(nodeId, preserveStatus) {
          finalizeLayoutForInteraction();
          activeNodeId = nodeId;
          currentView = {mode: "highlight", nodeId: nodeId};
          var connected = enabledConnectedNodes(nodeId);
          var keep = {};
          keep[nodeId] = true;
          connected.forEach(function(id) { keep[id] = true; });

          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            if (keep[n.id]) {
              o.opacity = 1.0;
              o.font = Object.assign({}, o.font || {}, {color: "#111111"});
            } else {
              o.opacity = 1.0;
              o.font = Object.assign({}, o.font || {}, {color: "#999999"});
              o.visualColor = {
                background: "#f2f2f2",
                border: "#d0d0d0"
              };
            }
            o = applyCollisionNodeStyle(o);
            o.hidden = false;
            return o;
          }));

          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            if (!edgeRelationEnabled(e)) {
              o.hidden = true;
            } else if (e.from == nodeId || e.to == nodeId) {
              o.hidden = false;
              o.color = Object.assign({}, o.color || {}, {opacity: 0.95});
              o.width = Math.max(Number(o.width) || 0, 3.0);
            } else {
              o.color = {
                color: "#cccccc",
                highlight: "#cccccc",
                hover: "#cccccc",
                opacity: 0.10
              };
              o.width = 0.4;
              o.hidden = false;
            }
            return o;
          }));
          network.unselectAll();
          updateNodeLabelPositions();

          if (!preserveStatus) {
            document.getElementById("kg_status").innerText =
              "Selected " + nodeId + ": showing immediate neighbours.";
          }
        };

        function kgApplyNeighbourhood(nodeId, preserveStatus) {
          finalizeLayoutForInteraction();
          activeNodeId = nodeId;
          currentView = {mode: "neighbourhood", nodeId: nodeId};
          var connected = enabledConnectedNodes(nodeId);
          var keep = {};
          keep[nodeId] = true;
          connected.forEach(function(id) { keep[id] = true; });

          nodes.update(allNodes.map(function(n) {
            var o = Object.assign({}, originalNodes[n.id]);
            o.hidden = !keep[n.id];
            return o;
          }));

          edges.update(allEdges.map(function(e) {
            var o = Object.assign({}, originalEdges[e.id]);
            o.hidden = !(edgeRelationEnabled(e) && keep[e.from] && keep[e.to]);
            return o;
          }));

          network.fit({animation: true});
          updateNodeLabelPositions();
          if (!preserveStatus) {
            document.getElementById("kg_status").innerText =
              "Neighbourhood mode for " + nodeId + ".";
          }
        }

        window.kgFocusSelected = function() {
          var selected = network.getSelectedNodes();
          var nodeId = activeNodeId || selected[0];
          if (!nodeId) {
            document.getElementById("kg_status").innerText = "Select a node first.";
            return;
          }

          kgApplyNeighbourhood(nodeId, false);
        };

        network.on("click", function(params) {

            if (params.nodes.length === 0)
                return;

            const nodeId = params.nodes[0];

            focusConcept(nodeId, "Selected");
        });

        network.once("stabilized", function() {
          finalizeLayoutForInteraction();
          updateNodeLabelPositions();
        });

        layoutFinalizeTimer = setTimeout(function() {
          finalizeLayoutForInteraction();
        }, 1500);

        network.on("afterDrawing", function(ctx) {
          drawVisibleNodes(ctx);
          updateNodeLabelPositions();
        });
        network.on("dragEnd", updateNodeLabelPositions);
        network.on("zoom", updateNodeLabelPositions);
        network.on("animationFinished", updateNodeLabelPositions);
        window.addEventListener("resize", updateNodeLabelPositions);

        window.addEventListener("popstate", function(event) {
          var nodeId = event.state && event.state.nodeId;
          if (!nodeId) {
            nodeId = conceptIdFromHash(window.location.hash);
          }

          if (nodeId && getConcept(nodeId)) {
            focusConcept(nodeId, "Selected", {skipHistory: true});
          } else {
            kgReset(true);
          }
        });

        document.getElementById("kg_search").addEventListener("keydown", function(e) {
          if (e.key === "Enter") { kgSearch(); }
        });

        document.getElementById("kg_search").addEventListener("input", function(e) {
          buildConceptList(e.target.value);
        });

        document.getElementById("kg_edge_filters").addEventListener("change", function(e) {
          var input = e.target.closest("input[data-edge-relation]");
          if (!input) { return; }

          enabledEdgeRelations[input.getAttribute("data-edge-relation")] = input.checked;
          applyCurrentView();
        });

        document.getElementById("kg_concept_list").addEventListener("click", function(e) {
          var item = e.target.closest(".kg-concept-item");
          if (!item) { return; }

          e.preventDefault();
          focusConcept(item.getAttribute("data-concept-id"), "Selected");
        });

        document.getElementById("kg_recent").addEventListener("click", function(e) {
          var item = e.target.closest(".kg-concept-item[data-recent-concept-id]");
          if (!item) { return; }

          e.preventDefault();
          focusConcept(item.getAttribute("data-recent-concept-id"), "Selected");
        });

        document.getElementById("info_panel").addEventListener("click", function(e) {
          var link = e.target.closest(".concept-link");
          if (!link) { return; }

          e.preventDefault();
          var id = link.getAttribute("data-concept-id");
          if (!getConcept(id)) { return; }

          focusConcept(id, "Selected");
        });

        // Build legend from node groups.
        var groups = {};
        allNodes.forEach(function(n) {
          if (n.layerGroup !== undefined) { groups[n.layerGroup] = true; }
        });
        var legend = document.getElementById("kg_legend");
        var html = "";
        Object.keys(groups).sort(function(a,b){return Number(b)-Number(a);}).forEach(function(g) {
          var sample = allNodes.find(function(n) { return String(n.layerGroup) === String(g); });
          var color = sample && sample.visualColor && sample.visualColor.background ? sample.visualColor.background : "#999";
          var sampleConcept = sample ? getConcept(sample.id) : null;
          var layerTitle = sampleConcept && sampleConcept.layer_title ? sampleConcept.layer_title : "";
          html += '<span class="legend-dot" style="background:' + color + '"></span>' +
                  'Layer ' + g + (layerTitle ? ': ' + layerTitle : '') + '<br>';
        });
        legend.innerHTML = html;
        buildNodeLabels();
        buildEdgeFilters();
        buildConceptList("");

        var initialNodeId = conceptIdFromHash(window.location.hash);
        if (initialNodeId && getConcept(initialNodeId)) {
          window.history.replaceState({nodeId: String(initialNodeId)}, "", conceptHash(initialNodeId));
          focusConcept(initialNodeId, "Selected", {skipHistory: true});
        } else {
          window.history.replaceState({}, "", window.location.href);
        }
      }

      // Wait until pyvis has created network/nodes/edges variables.
      (function waitForKgNetwork() {
        if (
