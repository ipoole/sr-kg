=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"140.0\" y1=\"216.0\" x2=\"168.0\" y2=\"240.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n6_2_vec)\"/>\n<circle cx=\"264.0\" cy=\"152.0\" r=\"5.0\" fill=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"264.0\" y1=\"152.0\" x2=\"300.0\" y2=\"136.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n6_2_vec)\"/>\n<circle cx=\"382.0\" cy=\"284.0\" r=\"5.0\" fill=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"382.0\" y1=\"284.0\" x2=\"408.0\" y2=\"250.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n6_2_vec)\"/>\n<text x=\"278.0\" y=\"86.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<text x=\"308.0\" y=\"86.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">(x)<\/text>\n<\/svg>", "svg_icon_caption": "Anchored arrows show a vector attached to each spacetime point.", "svg_detail_caption": "A vector field assigns a vector such as A_mu(x) at each event, so both size and direction can vary across spacetime.", "study_questions": [{"question": "At every spacetime event, a field assigns components that transform like a four-vector. What is the key difference from a scalar field?\n\nA. It cannot vary in space\nB. It has direction/component structure as well as spacetime dependence\nC. It is always gauge-invariant\nD. It must have zero time component", "answer": "B. A vector field assigns a four-vector to each event.\n\nUnlike a scalar field, it has components that mix under Lorentz transformations, so its direction/component structure matters."}, {"question": "Why is a vector field not just four unrelated scalar fields?", "answer": "Because its components mix under Lorentz transformations. Four unrelated scalar fields would each keep their own value at an event. A vector field's components are tied together by the four-vector transformation law."}, {"question": "A vector field has components \\(A^\\mu=(2,1,0,0)\\) at an event. For a boost with \\(\\beta=0.6\\), \\(\\gamma=1.25\\), use\n\\[ A'^0=\\gamma(A^0-\\beta A^1), \\qquad A'^1=\\gamma(A^1-\\beta A^0). \\]\nFind \\(A'^0\\) and \\(A'^1\\).", "answer": "Substitute the numbers:\n\\[ A'^0=1.25(2-0.6\\times1)=1.25(1.4)=1.75, \\]\n\\[ A'^1=1.25(1-0.6\\times2)=1.25(-0.2)=-0.25. \\]\nThe components change and mix, which is the point of calling this object a vector field."}]}, "6.3": {"label": "Field Lagrangian", "layer": "6", "layer_title": "Field Foundations", "definition_new": "A field Lagrangian is a local Lagrangian density \\(\\mathcal L\\) built from fields and their spacetime derivatives. The field action is \\[ S=\\int \\mathcal L\\,d^4x, \\] extending the \\cref{Action principle}{5.2} from particle paths to fields over spacetime.", "derivation_new": "The construction extends the \\cref{Action principle}{5.2} from the particle action \\(S=\\int L\\,dt\\) to systems with degrees of freedom at every spacetime point. Locality motivates a density depending on field values and derivatives at the same event, for example \\(\\mathcal L(\\phi_a,\\partial_\\mu\\phi_a,x)\\). Integrating that density over spacetime gives \\[ S[\\phi]=\\int \\mathcal L(\\phi_a,\\partial_\\mu\\phi_a,x)\\,d^4x. \\] Applying the variational method then produces \\cref{Field equations}{6.4}.", "explanation_new": "A field Lagrangian is the field-theory version of the Lagrangian idea. Instead of assigning one \\(L\\) to a particle path at each time, we assign a density \\(\\mathcal L\\) to every spacetime point and integrate over spacetime. This is why notation matters: \\(L\\) and \\(\\mathcal L\\) are related but not the same kind of object. The density must be local, built from fields and their derivatives at the same event. Once you have \\(\\mathcal L\\), varying the fields gives field equations, just as varying particle paths gives particle equations.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_3\">\n<title id=\"title-n6_3\">Field Lagrangian<\/title>\n<defs>\n\n<marker id=\"n6_3_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n6_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"128.0\" y1=\"112.0\" x2=\"128.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"180.0\" y1=\"112.0\" x2=\"180.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"232.0\" y1=\"112.0\" x2=\"232.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"284.0\" y1=\"112.0\" x2=\"284.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"164.0\" x2=\"336.0\" y2=\"164.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"216.0\" x2=\"336.0\" y2=\"216.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"268.0\" x2=\"336.0\" y2=\"268.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"320.0\" x2=\"336.0\" y2=\"320.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"372.0\" x2=\"336.0\" y2=\"372.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"64.0\" y1=\"410.0\" x2=\"350.0\" y2=\"410.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_3_axis_arrow)\"/>\n<line x1=\"64.0\" y1=\"410.0\" x2=\"64.0\" y2=\"100.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_3_axis_arrow)\"/>\n<tex =\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_3_axis_arrow)\"/>\n<text x=\"368.0\" y=\"420.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"48.0\" y=\"82.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">ct<\/text>\n<rect x=\"88.0\" y=\"262.0\" width=\"48.0\" height=\"48.0\" rx=\"8.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"112.0\" y=\"295.5\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"140.0\" y=\"210.0\" width=\"48.0\" height=\"48.0\" rx=\"8.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"164.0\" y=\"243.5\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"192.0\" y=\"262.0\" width=\"48.0\" height=\"48.0\" rx=\"8.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"216.0\" y=\"295.5\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"192.0\" y=\"158.0\" width=\"48.0\" height=\"48.0\" rx=\"8.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"216.0\" y=\"191.5\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"244.0\" y=\"210.0\" width=\"48.0\" height=\"48.0\" rx=\"8.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"268.0\" y=\"243.5\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<text x=\"206.0\" y=\"390.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\" text-anchor=\"middle\">d⁴x<\/text>\n<line x1=\"322.0\" y1=\"252.0\" x2=\"380.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n6_3_arrow)\"/>\n<rect x=\"392.0\" y=\"210.0\" width=\"78.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"431.0\" y=\"269.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "Local L density cells over spacetime feed the field action S.", "svg_detail_caption": "Field action sums a Lagrangian density over spacetime volume d^4x, replacing a particle path with local field values everywhere.", "study_questions": [{"question": "For a relativistic field theory, why do we usually build the field Lagrangian from scalars made out of fields and derivatives?\n\nA. Scalars are easier to plot\nB. Scalars make every field constant\nC. A scalar action supports Lorentz-invariant field equations\nD. Scalar expressions remove the need for boundary conditions", "answer": "C. The action should be a Lorentz scalar.\n\nBuilding the field Lagrangian density from scalar combinations helps ensure the resulting field equations respect Lorentz invariance."}, {"question": "Why is \\(\\mathcal L\\) called a density rather than just the Lagrangian \\(L\\)?", "answer": "For particles, the action integrates \\(L\\) over time. For fields, there are degrees of freedom at every spacetime point, so the action integrates a local density \\(\\mathcal L\\) over spacetime volume \\(d^4x\\). The density is the local contribution per spacetime volume."}, {"question": "Suppose a field Lagrangian density is constant, \\(\\mathcal L=3\\), over a spacetime region with four-volume \\(\\Delta^4x=5\\) in some chosen units. What is the action contribution from that region?", "answer": "For a constant density over the region,\n\\[ S=\\int \\mathcal L\\,d^4x=\\mathcal L\\Delta^4x. \\]\nThus\n\\[ S=3\\times5=15 \\]\nin the corresponding action units. Real field theories usually have \\(\\mathcal L\\) varying from event to event, but the density-times-volume idea is the same."}]}, "6.4": {"label": "Field equations", "layer": "6", "layer_title": "Field Foundations", "definition_new": "Field equations are differential equations that determine how a field varies across spacetime. In relativistic field theory they are usually obtained by applying a variational principle to a \\cref{Field Lagrangian}{6.3}, producing equations whose form is compatible with \\cref{Lorentz transformations}{3.3}.", "derivation_new": "For fields \\(\\phi_a(x)\\), the action is written as an integral of a Lagrangian density, \\[ S[\\phi]=\\int \\mathcal L(\\phi_a,\\partial_\\mu\\phi_a,x)\\,d^4x, \\] where \\(x^\\mu=(ct,x,y,z)\\) and the metric convention is \\[ \\eta_{\\mu\\nu}=\\mathrm{diag}(1,-1,-1,-1). \\] Applying the \\cref{Euler-Lagrange equations}{5.3} to the action built from a \\cref{Field Lagrangian}{6.3} gives the field Euler-Lagrange equations: \\[ \\frac{\\partial \\mathcal L}{\\partial \\phi_a} - \\partial_\\mu\\left(\\frac{\\partial \\mathcal L}{\\partial(\\partial_\\mu \\phi_a)}\\right)=0. \\] Thus the ordinary generalized coordinates \\(q(t)\\) of particle mechanics are replaced by fields \\(\\phi_a(x)\\), and ordinary time derivatives are replaced by spacetime derivatives \\(\\partial_\\mu\\). With the \\(+---\\) convention, \\[ \\Box=\\partial_\\mu\\partial^\\mu=\\frac{1}{c^2}\\frac{\\partial^2}{\\partial t^2}-\\nabla^2, \\] so wave-like relativistic field equations naturally contain this invariant operator.", "explanation_new": "Field equations tell fields how to fit together from point to point. They are local differential equations: the field and its nearby changes at an event determine what is allowed there. This is the field analogue of Newton's equation of motion, but now the unknown is a function over spacetime rather than a particle coordinate. Maxwell's equations are the central example in this graph. They say how electromagnetic fields relate to sources and how disturbances propagate, all using local relations rather than instantaneous action across distance.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_4\">\n<title id=\"title-n6_4\">Field equations<\/title>\n<defs>\n\n<marker id=\"n6_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n6_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"126.0\" y1=\"110.0\" x2=\"126.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"176.0\" y1=\"110.0\" x2=\"176.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"226.0\" y1=\"110.0\" x2=\"226.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"276.0\" y1=\"110.0\" x2=\"276.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"160.0\" x2=\"326.0\" y2=\"160.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"210.0\" x2=\"326.0\" y2=\"210.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"260.0\" x2=\"326.0\" y2=\"260.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"310.0\" x2=\"326.0\" y2=\"310.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"360.0\" x2=\"326.0\" y2=\"360.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"64.0\" y1=\"410.0\" x2=\ -family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"white\" text-anchor=\"middle\">φ<\/text>\n<line x1=\"288.0\" y1=\"250.0\" x2=\"350.0\" y2=\"250.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n6_4_arrow)\"/>\n<rect x=\"362.0\" y=\"214.0\" width=\"104.0\" height=\"72.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"414.0\" y=\"258.5\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">field eq<\/text>\n<path d=\"M374,334 C410,304 448,326 470,286\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n6_4_arrow)\"/>\n<\/svg>", "svg_icon_caption": "Neighbouring field values feed a local field-equation tile.", "svg_detail_caption": "Field equations are local update rules: neighbouring field values and derivatives determine how the field changes and propagates.", "study_questions": [{"question": "After choosing a field Lagrangian density, what plays the role analogous to Newton's equations for the field?\n\nA. The field equations obtained by varying the action\nB. The graph layout coordinates\nC. The choice of units only\nD. The list of possible gauge functions", "answer": "A. Field equations are obtained by varying the action with respect to the fields.\n\nThey are the local differential equations that determine how the fields behave in spacetime."}, {"question": "How do field equations extend the Euler-Lagrange idea from particle mechanics?", "answer": "Particle mechanics varies paths \\(q(t)\\). Field theory varies fields \\(\\phi_a(x)\\). The field Euler-Lagrange equations replace ordinary coordinate and velocity dependence with dependence on fields and spacetime derivatives:\n\\[ \\frac{\\partial \\mathcal L}{\\partial \\phi_a}-\\partial_\\mu\\left(\\frac{\\partial \\mathcal L}{\\partial(\\partial_\\mu\\phi_a)}\\right)=0. \\]"}, {"question": "In one spatial dimension, the source-free wave equation can be written\n\\[ \\frac{1}{c^2}\\frac{\\partial^2\\phi}{\\partial t^2}-\\frac{\\partial^2\\phi}{\\partial x^2}=0. \\]\nFor a trial wave \\(\\phi=\\sin(kx-\\omega t)\\), what relation between \\(\\omega\\) and \\(k\\) makes this equation hold?", "answer": "For \\(\\phi=\\sin(kx-\\omega t)\\),\n\\[ \\frac{\\partial^2\\phi}{\\partial t^2}=-\\omega^2\\phi, \\qquad \\frac{\\partial^2\\phi}{\\partial x^2}=-k^2\\phi. \\]\nSubstitute into the wave equation:\n\\[ -\\frac{\\omega^2}{c^2}\\phi+k^2\\phi=0. \\]\nFor a nonzero wave, this requires\n\\[ \\omega^2=c^2k^2, \\]\nor \\(\\omega=ck\\) for positive frequency."}]}, "7.1": {"label": "Vector potential \\(A_\\mu\\)", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The vector potential \\(A_\\mu\\) is the electromagnetic \\cref{Vector field}{6.2} defined over spacetime from which the physical electromagnetic field is constructed. With the conventions used here, one may write \\(A^\\mu=(\\phi/c,\\mathbf A)\\) and \\(A_\\mu=(\\phi/c,-\\mathbf A)\\).", "derivation_new": "The vector potential is not derived from the field tensor; it is introduced as the potential variable whose spacetime derivatives generate the electromagnetic field. At each \\cref{Spacetime event}{2.2}, it assigns four components transforming as a \\cref{Vector field}{6.2}. The observable field is then obtained from the antisymmetric derivative \\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu, \\] which defines the \\cref{Field tensor}{7.2}. In a Lagrangian treatment, \\(A_\\mu\\) is the field variable varied in the electromagnetic \\cref{Field Lagrangian}{6.3}.", "explanation_new": "The vector potential can be confusing because it is not directly the electric or magnetic field you first learn about. It is a more basic-looking object whose derivatives produce the field tensor. One reason it matters is that it fits naturally into relativistic and Lagrangian descriptions. Another is gauge freedom: different potentials can describe the same physical electromagnetic field. So do not think of \\(A_\\mu\\) as just a computational trick or as directly observable in the same way as \\(\\mathbf E\\) and \\(\\mathbf B\\). Think of it as the local potential structure from which the field is built.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_1\">\n<title id=\"title-n7_1\">Vector potential<\/title>\n<defs>\n\n<marker id=\"n7_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_1_avec\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n7_1_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"128.0\" y1=\"110.0\" x2=\"128.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"180.0\" y1=\"110.0\" x2=\"180.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"232.0\" y1=\"110.0\" x2=\"232.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"284.0\" y1=\"110.0\" x2=\"284.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"162.0\" x2=\"334.0\" y2=\"162.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"214.0\" x2=\"334.0\" y2=\"214.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"266.0\" x2=\"334.0\" y2=\"266.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"318.0\" x2=\"334.0\" y2=\"318.0\" stroke=\"#eeeeee\" s Height=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"128.0\" y1=\"110.0\" x2=\"128.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"180.0\" y1=\"110.0\" x2=\"180.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"232.0\" y1=\"110.0\" x2=\"232.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"284.0\" y1=\"110.0\" x2=\"284.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"162.0\" x2=\"334.0\" y2=\"162.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"214.0\" x2=\"334.0\" y2=\"214.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"266.0\" x2=\"334.0\" y2=\"266.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"318.0\" x2=\"334.0\" y2=\"318.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"370.0\" x2=\"334.0\" y2=\"370.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"64.0\" y1=\"416.0\" x2=\"350.0\" y2=\"416.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_axis_arrow)\"/>\n<line x1=\"64.0\" y1=\"416.0\" x2=\"64.0\" y2=\"102.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_axis_arrow)\"/>\n<text x=\"368.0\" y=\"426.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"48.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">ct<\/text>\n<circle cx=\"118.0\" cy=\"334.0\" r=\"4.0\" fill=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"118.0\" y1=\"334.0\" x2=\"152.0\" y2=\"320.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_avec)\"/>\n<circle cx=\"170.0\" cy=\"282.0\" r=\"4.0\" fill=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"170.0\" y1=\"282.0\" x2=\"208.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_avec)\"/>\n<circle cx=\"222.0\" cy=\"230.0\" r=\"4.0\" fill=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"222.0\" y1=\"230.0\" x2=\"254.0\" y2=\"206.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_avec)\"/>\n<circle cx=\"274.0\" cy=\"178.0\" r=\"4.0\" fill=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"274.0\" y1=\"178.0\" x2=\"304.0\" y2=\"142.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_avec)\"/>\n<circle cx=\"222.0\" cy=\"334.0\" r=\"4.0\" fill=\"#222222\" opacity=\"0.45\"/>\n<line x1=\"222.0\" y1=\"334.0\" x2=\"264.0\" y2=\"326.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_avec)\"/>\n<rect x=\"148.0\" y=\"204.0\" width=\"128.0\" height=\"104.0\" rx=\"10.0\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"3\" stroke-dasharray=\"8 7\"/>\n<text x=\"210.0\" y=\"196.0\" font-size=\"31\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">∂A<\/text>\n<line x1=\"324.0\" y1=\"256.0\" x2=\"374.0\" y2=\"256.0\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_1_flow)\"/>\n<rect x=\"386.0\" y=\"218.0\" width=\"82.0\" height=\"76.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"427.0\" y=\"272.3\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<text x=\"154.0\" y=\"82.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "A vector-potential field feeds a derivative operation to produce F.", "svg_detail_caption": "The vector potential A_mu is not the field itself; local derivatives of A_mu combine to form the electromagnetic tensor F_mu_nu.", "study_questions": [{"question": "Two potentials that differ by a gauge transformation can give the same electromagnetic field. What does this suggest about \\(A_\\mu\\)?\n\nA. It is directly unique and observable component by component\nB. It is unrelated to electric or magnetic fields\nC. It is a useful potential with some descriptive redundancy\nD. It must vanish in the Lorenz gauge", "answer": "C. The vector potential is a useful field variable, but it has gauge redundancy.\n\nDifferent \\(A_\\mu\\) choices can produce the same physical field tensor \\(F_{\\mu\nu}\\)."}, {"question": "Why should a student not think of \\(A_\\mu\\) as directly the observable electric or magnetic field?", "answer": "The observable electromagnetic field is represented by \\(F_{\\mu\\nu}\\), built from derivatives of \\(A_\\mu\\). Different potentials can describe the same physical field because of gauge freedom. So \\(A_\\mu\\) is a potential structure, not simply the directly observed \\(\\mathbf E\\) or \\(\\mathbf B\\)."}, {"question": "Using the convention \\(A^\\mu=(\\phi/c,\\mathbf A)\\), take \\(c=3.0\\times10^8\\,\\mathrm{m\\,s^{-1}}\\), \\(\\phi=6.0\\times10^8\\,\\mathrm V\\), and \\(\\mathbf A=(1,2,0)\\) in suitable units. What is \\(A^0=\\phi/c\\), and what are the four components of \\(A^\\mu\\)?", "answer": "Compute the time component:\n\\[ A^0=\\frac{\\phi}{c}=\\frac{6.0\\times10^8}{3.0\\times10^8}=2. \\]\nSo, with the given spatial vector potential,\n\\[ A^\\mu=(2,1,2,0). \\]\nThe exact units depend on convention, but the packaging idea is the main point."}]}, "7.2": {"label": "Field tensor \\(F_{\\mu\\nu}\\)", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The field tensor \\(F_{\\mu\\nu}\\) is the antisymmetric tensor that represents the electromagnetic field in covariant form. It is constructed from the \\cref{Vector potential}{7.1} by \\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu. \\]", "derivation_new": "Starting from the \\cref{Vector potential}{7.1}, take the antisymmetric spacetime derivative \\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu. \\] The antisymmetry gives \\(F_{\\mu\\nu}=-F_{\\nu\\mu}\\), so in four dimensions there are six independent components. These components are identified, up to the conventional factors of \\(c\\) fixed by the choice of units, with the three components of the \\cref{Electric field}{7.3} and the three components of the \\cref{Magnetic field}{7.4}. Indices are raised and lowered with the \\cref{Metric tensor}{3.1}.", "explanation_new": "The field tensor is the compact relativistic package for electromagnetism. Electric and magnetic fields can look like separate entities in three-vector notation, but in relativity they are frame-dependent components of one tensor. A change of inertial frame can mix what one observer calls electric with what another calls magnetic. The antisymmetry of \\(F_{\\mu\\nu}\\) is also doing work: it encodes the structure that leads to homogeneous Maxwell equations and gauge invariance. The tensor is the object behind the observer-dependent \\(\\mathbf E\\)/\\(\\mathbf B\\) split.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_2\">\n<title id=\"title-n7_2\">Field tensor<\/title>\n\n<rect x=\"156.0\" y=\"124.0\" width=\"200.0\" height=\"200.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"249.8\" font-size=\"76\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<\/text>\n<line x1=\"186.0\" y1=\"178.0\" x2=\"326.0\" y2=\"178.0\" stroke=\"#1f4fbf\" stroke-width=\"16\" stroke-linecap=\"round\" opacity=\"0 E<\/text>\n<rect x=\"118.0\" y=\"176.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#edf3ff\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"152.0\" y=\"219.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">−E<\/text>\n<rect x=\"186.0\" y=\"176.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#f7f7f7\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"220.0\" y=\"219.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c8c8c8\" text-anchor=\"middle\">0<\/text>\n<rect x=\"254.0\" y=\"176.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#eef8f0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"288.0\" y=\"219.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">B<\/text>\n<rect x=\"322.0\" y=\"176.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#eef8f0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"356.0\" y=\"219.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">B<\/text>\n<rect x=\"118.0\" y=\"244.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#edf3ff\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"152.0\" y=\"287.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">−E<\/text>\n<rect x=\"186.0\" y=\"244.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#eef8f0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"220.0\" y=\"287.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">B<\/text>\n<rect x=\"254.0\" y=\"244.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#f7f7f7\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"288.0\" y=\"287.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c8c8c8\" text-anchor=\"middle\">0<\/text>\n<rect x=\"322.0\" y=\"244.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#eef8f0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"356.0\" y=\"287.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">B<\/text>\n<rect x=\"118.0\" y=\"312.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#edf3ff\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"152.0\" y=\"355.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">−E<\/text>\n<rect x=\"186.0\" y=\"312.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#eef8f0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"220.0\" y=\"355.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">B<\/text>\n<rect x=\"254.0\" y=\"312.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#eef8f0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"288.0\" y=\"355.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">B<\/text>\n<rect x=\"322.0\" y=\"312.0\" width=\"68.0\" height=\"68.0\" rx=\"4.0\" fill=\"#f7f7f7\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<text x=\"356.0\" y=\"355.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c8c8c8\" text-anchor=\"middle\">0<\/text>\n<text x=\"124.0\" y=\"424.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\">antisymmetric<\/text>\n<text x=\"356.0\" y=\"424.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#222222\" text-anchor=\"middle\">E + B<\/text>\n<\/svg>", "svg_icon_caption": "An F tensor badge contains electric and magnetic component cues.", "svg_detail_caption": "The field tensor F_mu_nu packages electric and magnetic components into one relativistic object rather than two unrelated fields.", "study_questions": [{"question": "Why is \\(F_{\\mu\\nu}\\) a better relativistic object than treating \\(\\mathbf E\\) and \\(\\mathbf B\\) as unrelated fields?\n\nA. It removes magnetic effects entirely\nB. It is a scalar with one component\nC. It depends on the observer's coordinates but not on fields\nD. It packages electric and magnetic components into one Lorentz-transforming tensor", "answer": "D. \\(F_{\\mu\\nu}\\) packages \\(\\mathbf E\\) and \\(\\mathbf B\\) into one antisymmetric tensor.\n\nLorentz transformations can mix what observers call electric and magnetic components, so the tensor is the unified relativistic object."}, {"question": "The field tensor is defined by\n\\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu. \\]\nExplain why this implies \\(F_{\\mu\\nu}=-F_{\\nu\\mu}\\). What does this say about the diagonal components?", "answer": "Swapping \\(\\mu\\) and \\(\\nu\\) reverses the two terms:\n\\[ F_{\\nu\\mu}=\\partial_\\nu A_\\mu-\\partial_\\mu A_\\nu=-F_{\\mu\\nu}. \\]\nSo the tensor is antisymmetric. On the diagonal, \\(F_{\\mu\\mu}=-F_{\\mu\\mu}\\), which means \\(F_{\\mu\\mu}=0\\)."}, {"question": "A \\(4\\times4\\) tensor has 16 components. If \\(F_{\\mu\\nu}\\) is antisymmetric and all diagonal components vanish, how many independent components remain? Why is this number physically suggestive?", "answer": "The diagonal gives 4 zero components. The remaining off-diagonal components come in opposite-sign pairs: \\(F_{\\mu\\nu}=-F_{\\nu\\mu}\\).\n\nThere are\n\\[ \\frac{4\\times3}{2}=6 \\]\nindependent off-diagonal components. This is physically suggestive because the electromagnetic field has three electric-field components and three magnetic-field components."}]}, "7.3": {"label": "Electric field", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The electric field is the frame-dependent part of the electromagnetic field that acts on a charge even when the charge is instantaneously at rest in a chosen \\cref{Inertial frames}{1.1}. In relativistic notation it is read from the time-space components of the \\cref{Field tensor}{7.2}.", "derivation_new": "Choose an inertial frame and decompose the \\cref{Field tensor}{7.2} into time-space and space-space components. The electric field comes from the time-space components, conventionally \\(F_{0i}\\) or \\(F^{0i}\\) up to factors and signs determined by the definitions of \\(A^\\mu\\), \\(A_\\mu\\), and \\(c\\). In three-vector potential language this gives \\[ \\mathbf E=-\\nabla\\phi-\\frac{\\partial\\mathbf A}{\\partial t}. \\]", "explanation_new": "The electric field is the part of the electromagnetic field that shows up as force on a charge at rest in a chosen inertial frame. That phrase 'in a chosen frame' is important. Another observer moving relative to the charge may split the same electromagnetic field differently into electric and magnetic parts. In everyday examples, a positive source charge has outward electric field lines and a positive test charge feels a force along them. Relativistically, those familiar arrows are one frame's view of components inside the field tensor.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_3\">\n<title id=\"title-n7_3\">Electric field<\/title>\n<defs>\n\n<marker id=\"n7_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>
