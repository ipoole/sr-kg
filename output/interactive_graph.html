"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<circle cx=\"416.0\" cy=\"150.0\" r=\"20.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"52.0\" y=\"380.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"440.0\" y=\"140.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"250.0\" y=\"210.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "A highlighted path between fixed endpoints is compared with nearby variations.", "svg_detail_caption": "The physical path is the one whose action is stationary: small fixed-endpoint variations make no first-order change in S."}, "5.1": {"label": "Lagrangian", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "A Lagrangian \\(L\\) is a function of generalized coordinates, velocities, and possibly time that is integrated to form the action. For particle mechanics, \\[ S=\\int L(q,\\dot q,t)\\,dt. \\]", "derivation_new": "The Lagrangian is not derived from a universal formula; it is chosen to encode the physical assumptions of the system. Once inserted into the \\cref{Action principle}{5.2}, it determines the equations of motion through the \\cref{Euler-Lagrange equations}{5.3}. In relativistic systems the allowed building blocks are constrained by Lorentz covariance: one builds \\(L\\), or the action directly, from invariant quantities such as the \\cref{Spacetime interval}{3.2}, \\cref{Proper time}{4.1}, or scalar contractions of \\cref{Four-vectors}{4.2}.", "explanation_new": "The Lagrangian is the local ingredient whose accumulated value gives the action. In simple mechanics it is often \\(T-V\\), but the deeper idea is not that particular formula. The Lagrangian is a compact rule that tells the variational principle what kind of motion is allowed. If you know \\(L\\), you can form \\(S=\\int L\\,dt\\), vary the path, and derive equations of motion. For relativistic systems, the Lagrangian must be built from quantities that make sense across inertial frames. That is why invariant intervals, four-vectors, and later field densities enter the story.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"172.0\" y=\"244.0\" width=\"70.0\" height=\"62.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"207.0\" y=\"289.3\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_1_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"98.0\" y=\"258.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"126.0\" y=\"297.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"162.0\" y=\"242.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"190.0\" y=\"281.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"226.0\" y=\"202.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"254.0\" y=\"241.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<text x=\"260.0\" y=\"388.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">∫ L dt<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_1_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_1\">\n<title id=\"title-n5_1\">Lagrangian<\/title>\n<defs>\n\n<marker id=\"n5_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M80,340 C158,246 230,294 300,206\" fill=\"none\" stroke=\"#555555\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<rect x=\"98.0\" y=\"258.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"126.0\" y=\"297.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"162.0\" y=\"242.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"190.0\" y=\"281.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<rect x=\"226.0\" y=\"202.0\" width=\"56.0\" height=\"56.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"254.0\" y=\"241.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<text x=\"260.0\" y=\"388.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">∫ L dt<\/text>\n<line x1=\"308.0\" y1=\"256.0\" x2=\"382.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_1_arrow)\"/>\n<rect x=\"390.0\" y=\"214.0\" width=\"76.0\" height=\"84.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"428.0\" y=\"273.0\" font-size=\"50\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "Local Lagrangian tiles accumulate into the action S.", "svg_detail_caption": "The Lagrangian is the local rule assigned along a history; adding it up through time gives the action S."}, "5.3": {"label": "Euler–Lagrange equations", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "The Euler-Lagrange equations are the equations of motion obtained by applying the \\cref{Action principle}{5.2} to a chosen \\cref{Lagrangian}{5.1}. For one coordinate, \\[ \\frac{d}{dt}\\left(\\frac{\\partial L}{\\partial\\dot q}\\right)-\\frac{\\partial L}{\\partial q}=0. \\]", "derivation_new": "Start with the \\cref{Action principle}{5.2} in the form \\(S=\\int_{t_1}^{t_2}L(q,\\dot q,t)\\,dt\\) and vary the path \\(q(t)\\rightarrow q(t)+\\delta q(t)\\), holding the endpoints fixed. The first variation is \\[ \\delta S=\\int_{t_1}^{t_2}\\left(\\frac{\\partial L}{\\partial q}\\delta q+\\frac{\\partial L}{\\partial\\dot q}\\delta\\dot q\\right)dt. \\] Integrating the second term by parts and using \\(\\delta q(t_1)=\\delta q(t_2)=0\\) gives \\[ \\delta S=\\int_{t_1}^{t_2}\\left(\\frac{\\partial L}{\\partial q}-\\frac{d}{dt}\\frac{\\partial L}{\\partial\\dot q}\\right)\\delta q\\,dt. \\] Since this must vanish for arbitrary \\(\\delta q\\), the Euler-Lagrange equation follows.", "explanation_new": "Euler-Lagrange equations are what the action principle looks like after the variation has been done. The intimidating derivative expression is really a balance statement: changes in how \\(L\\) depends on position are balanced against changes in how \\(L\\) depends on velocity. For a familiar example, using \\(L=\\tfrac12m\\dot x^2-V(x)\\) gives \\(m\\ddot x=-dV/dx\\), Newton's law in disguise. The power of the formula is that the same pattern works for generalized coordinates and, with suitable modification, for fields.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<line x1=\"270.0\" y1=\"256.0\" x2=\"340.0\" y2=\"256.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"356.0\" y=\"214.0\" width=\"96.0\" height=\"84.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"404.0\" y=\"268.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<rect x=\"288.0\" y=\"98.0\" width=\"112.0\" height=\"58.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"137.2\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">δS = 0<\/text>\n<line x1=\"344.0\" y1=\"164.0\" x2=\"344.0\" y2=\"238.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"280.0\" y=\"248.0\" width=\"100.0\" height=\"72.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"330.0\" y=\"295.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<path d=\"M390,284 C430,272 454,244 474,202\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_3\">\n<title id=\"title-n5_3\">Euler-Lagrange equations<\/title>\n<defs>\n\n<marker id=\"n5_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M62,342 C118,232 204,308 254,190\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"10 8\"/>\n<path d=\"M62,342 C128,270 194,262 254,190\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n<circle cx=\"62.0\" cy=\"342.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<circle cx=\"254.0\" cy=\"190.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"50.0\" y=\"382.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">A<\/text>\n<text x=\"262.0\" y=\"176.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">B<\/text>\n<text x=\"154.0\" y=\"228.0\" font-size=\"40\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">δ<\/text>\n<rect x=\"288.0\" y=\"98.0\" width=\"112.0\" height=\"58.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"137.2\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">δS = 0<\/text>\n<line x1=\"344.0\" y1=\"164.0\" x2=\"344.0\" y2=\"238.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" marker-end=\"url(#n5_3_arrow)\"/>\n<rect x=\"280.0\" y=\"248.0\" width=\"100.0\" height=\"72.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"330.0\" y=\"295.6\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">E-L<\/text>\n<path d=\"M390,284 C430,272 454,244 474,202\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_3_arrow)\"/>\n<\/svg>", "svg_icon_caption": "A varied path leads to an Euler-Lagrange equation tile.", "svg_detail_caption": "Fixed-endpoint variations of the path impose delta S = 0, which turns the action principle into the Euler-Lagrange equations."}, "5.5": {"label": "Hamiltonian formalism", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "Hamiltonian formalism rewrites dynamics in terms of coordinates and canonical momenta rather than coordinates and velocities. It is obtained by defining \\cref{Canonical momentum}{5.4} and forming the Hamiltonian \\[ H(q,p,t)=p\\dot q-L. \\]", "derivation_new": "Starting from a \\cref{Lagrangian}{5.1}, define the \\cref{Canonical momentum}{5.4} \\[ p=\\frac{\\partial L}{\\partial\\dot q}. \\] If this relation can be solved for \\(\\dot q\\) in terms of \\(q\\) and \\(p\\), perform the Legendre transform \\[ H(q,p,t)=p\\dot q-L(q,\\dot q,t). \\] Differentiating \\(H\\) gives Hamilton's equations, \\[ \\dot q=\\frac{\\partial H}{\\partial p}, \\qquad \\dot p=-\\frac{\\partial H}{\\partial q}. \\] Thus the formalism is derived from the Lagrangian formulation plus the canonical momentum construction.", "explanation_new": "Hamiltonian formalism reorganizes the same dynamics into phase space, where coordinates and momenta are treated as paired variables. The Hamiltonian often corresponds to energy, but conceptually it is the generator of time evolution in this phase-space description. The move from Lagrangian to Hamiltonian is a Legendre transform: replace velocity dependence with momentum dependence. This is useful because many conservation laws and symmetry structures become especially clear. For a free particle the Hamiltonian tracks energy; for constrained or gauge systems it can be subtler, so it should not be treated as merely a synonym for energy.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_5_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_flow)\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_5_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M146,318 C214,236 308,230 374,306\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M166,344 C236,276 316,276 396,338\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_flow)\"/>\n<line x1=\"213.3\" y1=\"259.9\" x2=\"238.7\" y2=\"244.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"297.3\" y1=\"211.9\" x2=\"322.7\" y2=\"196.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_5\">\n<title id=\"title-n5_5\">Hamiltonian formalism<\/title>\n<defs>\n\n<marker id=\"n5_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#222222\"/>\n<\/marker>\n<marker id=\"n5_5_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"422.0\" y2=\"388.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<line x1=\"100.0\" y1=\"388.0\" x2=\"100.0\" y2=\"102.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_axis_arrow)\"/>\n<text x=\"440.0\" y=\"398.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<text x=\"84.0\" y=\"84.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">p<\/text>\n<path d=\"M146,318 C214,236 308,230 374,306\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M166,344 C236,276 316,276 396,338\" fill=\"none\" stroke=\"#c8c8c8\" stroke-width=\"4\" stroke-dasharray=\"9 9\"/>\n<path d=\"M154,318 C210,214 318,230 376,152\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_5_flow)\"/>\n<line x1=\"213.3\" y1=\"259.9\" x2=\"238.7\" y2=\"244.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<line x1=\"297.3\" y1=\"211.9\" x2=\"322.7\" y2=\"196.1\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n<rect x=\"322.0\" y=\"284.0\" width=\"72.0\" height=\"66.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"358.0\" y=\"332.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">H<\/text>\n<\/svg>", "svg_icon_caption": "A curve in q-p phase space is generated by H.", "svg_detail_caption": "Hamiltonian mechanics describes dynamics as flow in q-p phase space, where H generates time evolution of coordinates and momenta."}, "5.4": {"label": "Canonical momentum", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "Canonical momentum is the momentum conjugate to a coordinate in the Lagrangian formulation. For a coordinate \\(q\\), \\[ p=\\frac{\\partial L}{\\partial\\dot q}. \\]", "derivation_new": "Canonical momentum is derived from the velocity dependence of the \\cref{Lagrangian}{5.1}. When the action is varied, the coefficient of \\(\\delta\\dot q\\) is \\(\\partial L/\\partial\\dot q\\). This quantity is therefore the natural variable paired with \\(q\\), and it is the object used in the Legendre transform leading to \\cref{Hamiltonian formalism}{5.5}.", "explanation_new": "Canonical momentum is the momentum that belongs to the Lagrangian coordinate system. In simple cases it equals mechanical momentum, so it is tempting to identify the two. Electromagnetism shows why that is too quick. When a charged particle couples to a vector potential, the canonical momentum includes potential-dependent terms, while the mechanical momentum describes the particle's actual motion. The definition \\(p=\\partial L/\\partial\\dot q\\) is therefore not just a fancy way to write \\(mv\\); it tells you which momentum is paired with \\(q\\) in Hamiltonian mechanics.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_4\">\n<title id=\"title-n5_4\">Canonical momentum<\/title>\n<defs>\n\n<marker id=\"n5_4_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"76.0\" y1=\"344.0\" x2=\"290.0\" y2=\"344.0\" stroke=\"#222222\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n<text x=\"298.0\" y=\"374.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">q<\/text>\n<circle cx=\"172.0\" cy=\"344.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"172.0\" y1=\"344.0\" x2=\"172.0\" y2=\"242.0\" stroke=\"#248a3d\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<text x=\"188.0\" y=\"250.0\" font-size=\"44\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">p<\/text>\n<rect x=\"320.0\" y=\"252.0\" width=\"72.0\" height=\"62.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"356.0\" y=\"295.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"314.0\" y1=\"282.0\" x2=\"220.0\" y2=\"282.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<\/svg>", .0\" width=\"64.0\" height=\"60.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"344.0\" y=\"206.9\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">L<\/text>\n<line x1=\"340.0\" y1=\"232.0\" x2=\"340.0\" y2=\"282.0\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<rect x=\"304.0\" y=\"270.0\" width=\"126.0\" height=\"54.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#555555\" stroke-width=\"3\"/>\n<text x=\"367.0\" y=\"305.0\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂L / ∂q̇<\/text>\n<line x1=\"304.0\" y1=\"318.0\" x2=\"214.0\" y2=\"306.0\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n5_4_arrow)\"/>\n<\/svg>", "svg_icon_caption": "The coordinate q is paired with a conjugate momentum p.", "svg_detail_caption": "Canonical momentum p is paired with coordinate q because it comes from how the Lagrangian depends on q's velocity."}, "5.6": {"label": "Noether's theorem", "layer": "5", "layer_title": "Variational Mechanics", "definition_new": "Noether's theorem states that every continuous symmetry of the action corresponds to a conserved quantity. It links symmetries in the \\cref{Action principle}{5.2} to conservation laws such as energy, momentum, angular momentum, and charge.", "derivation_new": "The theorem follows from the stationarity of the action in the \\cref{Action principle}{5.2}. Suppose a continuous transformation changes the dynamical variables by an infinitesimal amount and leaves the action unchanged, up to possible boundary terms. Applying \\(\\delta S=0\\) and using the equations of motion leaves a total derivative, which identifies a conserved current or conserved quantity. For time translations the conserved quantity is energy; for spatial translations it is momentum. In field theory, spacetime translations lead to the \\cref{Energy--momentum tensor}{9.1}.", "explanation_new": "Noether's theorem is one of the best organizing ideas in physics: a continuous symmetry gives a conservation law. If the action does not change when you shift every position by the same small amount, momentum is conserved. If it does not change when you shift the time origin, energy is conserved. The theorem is not saying conservation is a coincidence; it explains where conservation laws come from. For example, in a translation-invariant system, nudging the whole experiment sideways should not change the physics, and that symmetry is what lies behind conservation of momentum.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_6\">\n<title id=\"title-n5_6\">Noether's theorem<\/title>\n<defs>\n\n<marker id=\"n5_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"92.0\" y=\"204.0\" width=\"98.0\" height=\"88.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"141.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<path d=\"M104,196 C78,144 158,104 196,156 C214,184 210,198 196,198\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<line x1=\"204.0\" y1=\"248.0\" x2=\"306.0\" y2=\"248.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<rect x=\"324.0\" y=\"198.0\" width=\"108.0\" height=\"100.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"378.0\" y=\"267.7\" font-size=\"58\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Q<\/text>\n<circle cx=\"406.0\" cy=\"212.0\" r=\"11.0\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\"/>\n<line x1=\"400.0\" y1=\"218.0\" x2=\"412.0\" y2=\"206.0\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_6\">\n<title id=\"title-n5_6\">Noether's theorem<\/title>\n<defs>\n\n<marker id=\"n5_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"92.0\" y=\"204.0\" width=\"98.0\" height=\"88.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"141.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<path d=\"M104,196 C78,144 158,104 196,156 C214,184 210,198 196,198\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<text x=\"140.0\" y=\"324.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">unchanged<\/text>\n<line x1=\"204.0\" y1=\"248.0\" x2=\"306.0\" y2=\"248.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<rect x=\"324.0\" y=\"198.0\" width=\"108.0\" height=\"100.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"378.0\" y=\"267.7\" font-size=\"58\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Q<\/text>\n<circle cx=\"406.0\" cy=\"212.0\" r=\"11.0\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\"/>\n<line x1=\"400.0\" y1=\"218.0\" x2=\"412.0\" y2=\"206.0\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"378.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">conserved<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n5_6\">\n<title id=\"title-n5_6\">Noether's theorem<\/title>\n<defs>\n\n<marker id=\"n5_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"92.0\" y=\"204.0\" width=\"98.0\" height=\"88.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"141.0\" y=\"266.4\" font-size=\"54\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">S<\/text>\n<path d=\"M104,196 C78,144 158,104 196,156 C214,184 210,198 196,198\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<text x=\"140.0\" y=\"324.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#1f4fbf\" text-anchor=\"middle\">unchanged<\/text>\n<line x1=\"204.0\" y1=\"248.0\" x2=\"306.0\" y2=\"248.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n5_6_arrow)\"/>\n<rect x=\"324.0\" y=\"198.0\" width=\"108.0\" height=\"100.0\" rx=\"12.0\" fill=\"#fff6df\" stroke=\"#c78a00\" stroke-width=\"3\"/>\n<text x=\"378.0\" y=\"267.7\" font-size=\"58\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Q<\/text>\n<circle cx=\"406.0\" cy=\"212.0\" r=\"11.0\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"4\"/>\n<line x1=\"400.0\" y1=\"218.0\" x2=\"412.0\" y2=\"206.0\" stroke=\"#c78a00\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<text x=\"378.0\" y=\"332.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#c78a00\" text-anchor=\"middle\">conserved<\/text>\n<\/svg>", "svg_icon_caption": "A continuous symmetry of S points to a conserved Q.", "svg_detail_caption": "Noether's theorem links symmetry to conservation: if a smooth transformation leaves S unchanged, a corresponding quantity Q is conserved."}, "6.1": {"label": "Scalar field", "layer": "6", "layer_title": "Field Foundations", "definition_new": "A scalar field assigns a single value \\(\\phi(x)\\) to every \\cref{Spacetime event}{2.2}. Its defining relativistic property is that the value at an event is invariant under \\cref{Lorentz transformations}{3.3}: observers relabel the event but do not transform \\(\\phi\\) into components.", "derivation_new": "A scalar field is a definition rather than a quantity derived from another field. Starting with spacetime points \\(x\\), assign one number \\(\\phi(x)\\) to each point. Under a Lorentz transformation \\(x\\rightarrow x'\\), the scalar transformation law is \\[ \\phi'(x')=\\phi(x). \\] This contrasts with \\cref{Four-vectors}{4.2}, whose components mix between frames.", "explanation_new": "A scalar field assigns one value to every spacetime point. Temperature in a room is a useful nonrelativistic analogy: at each location and time there is a number, not an arrow. In relativity the special feature is that the value of a scalar field at an event is observer-independent. Different observers may use different coordinates to label the event, but they agree on the scalar value there. This makes scalar fields the simplest examples for learning field theory: they have spacetime dependence and dynamics without the extra complication of vector or tensor components.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_1\">\n<title id=\"title-n6_1\">Scalar field<\/title>\n<defs>\n\n<marker id=\"n6_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<\/defs>\n<line x1=\"158.0\" y1=\"118.0\" x2=\"158.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"218.0\" y1=\"118.0\" x2=\"218.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"278.0\" y1=\"118.0\" x2=\"278.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"338.0\" y1=\"118.0\" x2=\"338.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"178.0\" x2=\"398.0\" y2=\"178.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"238.0\" x2=\"398.0\" y2=\"238.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"298.0\" x2=\"398.0\" y2=\"298.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"98.0\" y1=\"358.0\" x2=\"398.0\" y2=\"358.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"82.0\" y1=\"414.0\" x2=\"418.0\" y2=\"414.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_1_axis_arrow)\"/>\n<line x1=\"82.0\" y1=\"414.0\" x2=\"82.0\" y2=\"104.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n6_1_axis_arrow)\"/>\n<text x=\"436.0\" y=\"424.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"66.0\" y=\"86.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">ct<\/text>\n<circle cx=\"138.0\" cy=\"336.0\" r=\"13.0\" fill=\"#d7e5ff\" stroke=\"#222222\" stroke-width=\"2\" o oke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"318.0\" cy=\"204.0\" r=\"21.0\" fill=\"#8fb0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"378.0\" cy=\"322.0\" r=\"16.0\" fill=\"#bdd0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"138.0\" cy=\"192.0\" r=\"18.0\" fill=\"#bdd0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"198.0\" cy=\"160.0\" r=\"26.0\" fill=\"#6d93ed\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"318.0\" cy=\"352.0\" r=\"12.0\" fill=\"#d7e5ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<circle cx=\"378.0\" cy=\"152.0\" r=\"15.0\" fill=\"#bdd0ff\" stroke=\"#222222\" stroke-width=\"2\" opacity=\"0.92\"/>\n<text x=\"300.0\" y=\"246.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\">φ(x)<\/text>\n<\/svg>", "svg_icon_caption": "Different-sized discs show one scalar value at each spacetime point.", "svg_detail_caption": "A scalar field assigns one number phi(x) to every spacetime point; the value can vary from point to point but has no direction."}, "6.2": {"label": "Vector field", "layer": "6", "layer_title": "Field Foundations", "definition_new": "A vector field assigns a four-vector-like object to every spacetime event. Its components, written for example as \\(A^\\mu(x)\\) or \\(A_\\mu(x)\\), transform as a \\cref{Four-vectors}{4.2} under \\cref{Lorentz transformations}{3.3}.", "derivation_new": "A vector field is constructed by taking the four-vector transformation law and applying it locally at every event. If \\(A^\\mu(x)\\) is a vector field, then under a Lorentz transformation \\[ A'^\\mu(x')=\\Lambda^\\mu{}_{\\nu}A^\\nu(x). \\] Thus a vector field is not four unrelated scalar fields; its components mix according to the same rule used for four-vectors.", "explanation_new": "A vector field attaches a vector-like object to every spacetime point. The electromagnetic vector potential is the main example here. The key is locality plus transformation: each event has its own components, and those components transform as a four-vector when observers change frames. It is different from drawing one big arrow in space. Better picture a spacetime grid with a small arrow anchored at each event, allowed to vary from event to event. This is the kind of object a local field equation can act on.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_2\">\n<title id=\"title-n6_2\">Vector field<\/title>\n<defs>\n\n<marker id=\"n6_2_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n6_2_vec\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"156.0\" y1=\"118.0\" x2=\"156.0\" y2=\"400.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"216.0\" y1=\"118.0\" x2=\"216.0\" y2=\"400.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"276.0\" y1=\"118.0\" x2=\"276.0\" y2=\"400.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"336.0\" y1=\"118.0\" x2=\"336.0\" y2=\"400.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"396.0\" y1=\"118.0\" x2=\"396.0\" y2=\"400.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"96.0\" y1=\"178.0\" x2=\"402.0\" y2=\"178.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"96.0\" y1=\"238.0\" x2=\"402.0\" y2=\"238.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"96.0\" y1=\"298.0\" x2=\"402.0\" y2=\"298.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"96.0\" y1=\"358.0\" x2=\"402.0\" y2=\"358.0\" stroke=\"#eeeeee\" stroke-width=\ acetime."}, "6.3": {"label": "Field Lagrangian", "layer": "6", "layer_title": "Field Foundations", "definition_new": "A field Lagrangian is a local Lagrangian density \\(\\mathcal L\\) built from fields and their spacetime derivatives. The field action is \\[ S=\\int \\mathcal L\\,d^4x, \\] extending the \\cref{Action principle}{5.2} from particle paths to fields over spacetime.", "derivation_new": "The construction extends the \\cref{Action principle}{5.2} from the particle action \\(S=\\int L\\,dt\\) to systems with degrees of freedom at every spacetime point. Locality motivates a density depending on field values and derivatives at the same event, for example \\(\\mathcal L(\\phi_a,\\partial_\\mu\\phi_a,x)\\). Integrating that density over spacetime gives \\[ S[\\phi]=\\int \\mathcal L(\\phi_a,\\partial_\\mu\\phi_a,x)\\,d^4x. \\] Applying the variational method then produces \\cref{Field equations}{6.4}.", "explanation_new": "A field Lagrangian is the field-theory version of the Lagrangian idea. Instead of assigning one \\(L\\) to a particle path at each time, we assign a density \\(\\mathcal L\\) to every spacetime point and integrate over spacetime. This is why notation matters: \\(L\\) and \\(\\mathcal L\\) are related but not the same kind of object. The density must be local, built from fields and their derivatives at the same event. Once you have \\(\\mathcal L\\), varying the fields gives field equations, just as varying particle paths gives particle equations.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_3\">\n<title id=\"title-n6_3\">Field Lagrangian<\/title>\n<defs>\n\n<marker id=\"n6_3_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n6_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n ill=\"#c78a00\" text-anchor=\"middle\">S<\/text>\n<\/svg>", "svg_icon_caption": "Local L density cells over spacetime feed the field action S.", "svg_detail_caption": "Field action sums a Lagrangian density over spacetime volume d^4x, replacing a particle path with local field values everywhere."}, "6.4": {"label": "Field equations", "layer": "6", "layer_title": "Field Foundations", "definition_new": "Field equations are differential equations that determine how a field varies across spacetime. In relativistic field theory they are usually obtained by applying a variational principle to a \\cref{Field Lagrangian}{6.3}, producing equations whose form is compatible with \\cref{Lorentz transformations}{3.3}.", "derivation_new": "For fields \\(\\phi_a(x)\\), the action is written as an integral of a Lagrangian density, \\[ S[\\phi]=\\int \\mathcal L(\\phi_a,\\partial_\\mu\\phi_a,x)\\,d^4x, \\] where \\(x^\\mu=(ct,x,y,z)\\) and the metric convention is \\[ \\eta_{\\mu\\nu}=\\mathrm{diag}(1,-1,-1,-1). \\] Applying the \\cref{Euler-Lagrange equations}{5.3} to the action built from a \\cref{Field Lagrangian}{6.3} gives the field Euler-Lagrange equations: \\[ \\frac{\\partial \\mathcal L}{\\partial \\phi_a} - \\partial_\\mu\\left(\\frac{\\partial \\mathcal L}{\\partial(\\partial_\\mu \\phi_a)}\\right)=0. \\] Thus the ordinary generalized coordinates \\(q(t)\\) of particle mechanics are replaced by fields \\(\\phi_a(x)\\), and ordinary time derivatives are replaced by spacetime derivatives \\(\\partial_\\mu\\). With the \\(+---\\) convention, \\[ \\Box=\\partial_\\mu\\partial^\\mu=\\frac{1}{c^2}\\frac{\\partial^2}{\\partial t^2}-\\nabla^2, \\] so wave-like relativistic field equations naturally contain this invariant operator.", "explanation_new": "Field equations tell fields how to fit together from point to point. They are local differential equations: the field and its nearby changes at an event determine what is allowed there. This is the field analogue of Newton's equation of motion, but now the unknown is a function over spacetime rather than a particle coordinate. Maxwell's equations are the central example in this graph. They say how electromagnetic fields relate to sources and how disturbances propagate, all using local relations rather than instantaneous action across distance.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n6_4\">\n<title id=\"title-n6_4\">Field equations<\/title>\n<defs>\n\n<marker id=\"n6_4_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n6_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"126.0\" y1=\"110.0\" x2=\"126.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"176.0\" y1=\"110.0\" x2=\"176.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"226.0\" y1=\"110.0\" x2=\"226.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"276.0\" y1=\"110.0\" x2=\"276.0\" y2=\"392.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"160.0\" x2=\"326.0\" y2=\"160.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"210.0\" x2=\"326.0\" y2=\"210.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"260.0\" x2=\"326.0\" y2=\"260.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"310.0\" x2=\"326.0\" y2=\"310.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"360.0\" x2=\"326.0\" y2=\"360.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"64.0\" y1=\"410.0\" x2=\"346.0\" y2=\"410.0\" stroke=\"#555555\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end= te\" text-anchor=\"middle\">φ<\/text>\n<line x1=\"288.0\" y1=\"250.0\" x2=\"350.0\" y2=\"250.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n6_4_arrow)\"/>\n<rect x=\"362.0\" y=\"214.0\" width=\"104.0\" height=\"72.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"414.0\" y=\"258.5\" font-size=\"25\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">field eq<\/text>\n<path d=\"M374,334 C410,304 448,326 470,286\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n6_4_arrow)\"/>\n<\/svg>", "svg_icon_caption": "Neighbouring field values feed a local field-equation tile.", "svg_detail_caption": "Field equations are local update rules: neighbouring field values and derivatives determine how the field changes and propagates."}, "7.1": {"label": "Vector potential \\(A_\\mu\\)", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The vector potential \\(A_\\mu\\) is the electromagnetic \\cref{Vector field}{6.2} defined over spacetime from which the physical electromagnetic field is constructed. With the conventions used here, one may write \\(A^\\mu=(\\phi/c,\\mathbf A)\\) and \\(A_\\mu=(\\phi/c,-\\mathbf A)\\).", "derivation_new": "The vector potential is not derived from the field tensor; it is introduced as the potential variable whose spacetime derivatives generate the electromagnetic field. At each \\cref{Spacetime event}{2.2}, it assigns four components transforming as a \\cref{Vector field}{6.2}. The observable field is then obtained from the antisymmetric derivative \\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu, \\] which defines the \\cref{Field tensor}{7.2}. In a Lagrangian treatment, \\(A_\\mu\\) is the field variable varied in the electromagnetic \\cref{Field Lagrangian}{6.3}.", "explanation_new": "The vector potential can be confusing because it is not directly the electric or magnetic field you first learn about. It is a more basic-looking object whose derivatives produce the field tensor. One reason it matters is that it fits naturally into relativistic and Lagrangian descriptions. Another is gauge freedom: different potentials can describe the same physical electromagnetic field. So do not think of \\(A_\\mu\\) as just a computational trick or as directly observable in the same way as \\(\\mathbf E\\) and \\(\\mathbf B\\). Think of it as the local potential structure from which the field is built.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_1\">\n<title id=\"title-n7_1\">Vector potential<\/title>\n<defs>\n\n<marker id=\"n7_1_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_1_avec\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<marker id=\"n7_1_flow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"128.0\" y1=\"110.0\" x2=\"128.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"180.0\" y1=\"110.0\" x2=\"180.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"232.0\" y1=\"110.0\" x2=\"232.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"284.0\" y1=\"110.0\" x2=\"284.0\" y2=\"398.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"162.0\" x2=\"334.0\" y2=\"162.0\" stroke=\"#eeeeee\" stroke-width=\"2\"/>\n<line x1=\"76.0\" y1=\"214.0\" x2=\"334.0\" y2= wo Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\">A<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "A vector-potential field feeds a derivative operation to produce F.", "svg_detail_caption": "The vector potential A_mu is not the field itself; local derivatives of A_mu combine to form the electromagnetic tensor F_mu_nu."}, "7.2": {"label": "Field tensor \\(F_{\\mu\\nu}\\)", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The field tensor \\(F_{\\mu\\nu}\\) is the antisymmetric tensor that represents the electromagnetic field in covariant form. It is constructed from the \\cref{Vector potential}{7.1} by \\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu. \\]", "derivation_new": "Starting from the \\cref{Vector potential}{7.1}, take the antisymmetric spacetime derivative \\[ F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu. \\] The antisymmetry gives \\(F_{\\mu\\nu}=-F_{\\nu\\mu}\\), so in four dimensions there are six independent components. These components are identified, up to the conventional factors of \\(c\\) fixed by the choice of units, with the three components of the \\cref{Electric field}{7.3} and the three components of the \\cref{Magnetic field}{7.4}. Indices are raised and lowered with the \\cref{Metric tensor}{3.1}.", "explanation_new": "The field tensor is the compact relativistic package for electromagnetism. Electric and magnetic fields can look like separate entities in three-vector notation, but in relativity they are frame-dependent components of one tensor. A change of inertial frame can mix what one observer calls electric with what another calls magnetic. The antisymmetry of \\(F_{\\mu\\nu}\\) is also doing work: it encodes the structure that leads to homogeneous Maxwell equations and gauge invariance. The tensor is the object behind the observer-dependent \\(\\mathbf E\\)/\\(\\mathbf B\\) split.", "svg_icon": "<svg force on a charge at rest in a chosen inertial frame. That phrase 'in a chosen frame' is important. Another observer moving relative to the charge may split the same electromagnetic field differently into electric and magnetic parts. In everyday examples, a positive source charge has outward electric field lines and a positive test charge feels a force along them. Relativistically, those familiar arrows are one frame's view of components inside the field tensor.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_3\">\n<title id=\"title-n7_3\">Electric field<\/title>\n<defs>\n\n<marker id=\"n7_3_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<line x1=\"268.0\" y1=\"254.0\" x2=\"380.0\" y2=\"254.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"255.7\" y1=\"283.7\" x2=\"334.9\" y2=\"362.9\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"226.0\" y1=\"296.0\" x2=\"226.0\" y2=\"408.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"196.3\" y1=\"283.7\" x2=\"117.1\" y2=\"362.9\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"184.0\" y1=\"254.0\" x2=\"72.0\" y2=\"254.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"196.3\" y1=\"224.3\" x2=\"117.1\" y2=\"145.1\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n<line x1=\"226.0\" y1=\"212.0\" x2=\"226.0\" y2=\"100.0\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_3_arrow)\"/>\n title>\n<defs>\n\n<marker id=\"n7_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"256.0\" y1=\"392.0\" x2=\"256.0\" y2=\"120.0\" stroke=\"#d22f2f\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"286.0\" y=\"194.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">v<\/text>\n<path d=\"M170,256 C170,222 342,222 342,256 C342,290 170,290 170,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M124,256 C124,200 388,200 388,256 C388,312 124,312 124,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M78,256 C78,178 434,178 434,256 C434,334 78,334 78,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"404.0\" y=\"214.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_4\">\n<title id=\"title-n7_4\">Magnetic field<\/title>\n<defs>\n\n<marker id=\"n7_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"256.0\" y1=\"392.0\" x2=\"256.0\" y2=\"120.0\" stroke=\"#d22f2f\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"286.0\" y=\"194.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">v<\/text>\n<path d=\"M170,256 C170,222 342,222 342,256 C342,290 170,290 170,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M124,256 C124,200 388,200 388,256 C388,312 124,312 124,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<path d=\"M78,256 C78,178 434,178 434,256 C434,334 78,334 78,256\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"404.0\" y=\"214.0\" font-size=\"48\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<circle cx=\"382.0\" cy=\"320.0\" r=\"13.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<line x1=\"382.0\" y1=\"320.0\" x2=\"432.0\" y2=\"342.0\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"450.0\" y=\"360.0\" font-size=\"30\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\">F<\/text>\n<\/svg>", "svg_graphic": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_4\">\n<title id=\"title-n7_4\">Magnetic field<\/title>\n<defs>\n\n<marker id=\"n7_4_arrow\" markerWidth=\"5\" markerHeight=\"5\"\n        refX=\"3\" refY=\"2.5\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L3,2.5 L0,5 Z\" fill=\"#248a3d\"/>\n<\/marker>\n<\/defs>\n<line x1=\"256.0\" y1=\"392.0\" x2=\"256.0\" y2=\"120.0\" stroke=\"#d22f2f\" stroke-width=\"10\" stroke-linecap=\"round\" marker-end=\"url(#n7_4_arrow)\"/>\n<text x=\"286.0\" y=\"194.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">v<\/text>\n<path d=\"M170,256 C170,222 342,222 342,2 f{Magnetic field}{7.4} components occupy the spatial antisymmetric part. Under \\cref{Lorentz transformations}{3.3}, those components mix, so the covariant object is the tensor, not the separate three-vectors.", "explanation_new": "The electromagnetic field is the unified physical field whose frame-dependent faces are \\(\\mathbf E\\) and \\(\\mathbf B\\). This is more than a vocabulary upgrade. It explains why electric and magnetic effects transform into each other between observers, why the field can carry energy and momentum, and why a local field description replaces instantaneous action at a distance. A useful mental model is that \\(F_{\\mu\\nu}\\) is the underlying object, while \\(\\mathbf E\\) and \\(\\mathbf B\\) are what a particular observer reads off from it.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_5\">\n<title id=\"title-n7_5\">Electromagnetic field<\/title>\n<defs>\n\n<marker id=\"n7_5_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_5_e\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"190.0\" y=\"172.0\" width=\"132.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"253.1\" font-size=\"68\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<\/text>\n<line x1=\"114.0\" y1=\"224.0\" x2=\"184.0\" y2=\"224.0\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"106.0\" y=\"214.0\" font-size=\"42\" font-family=\"STIX Two Math, Ca  y1=\"420.0\" x2=\"70.0\" y2=\"94.0\" stroke=\"#555555\" stroke-width=\"3.5\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_axis_arrow)\"/>\n<text x=\"470.0\" y=\"430.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">x<\/text>\n<text x=\"54.0\" y=\"76.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#555555\">ct<\/text>\n<text x=\"382.0\" y=\"120.0\" font-size=\"28\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" fill=\"#555555\">frame<\/text>\n<rect x=\"190.0\" y=\"172.0\" width=\"132.0\" height=\"116.0\" rx=\"12.0\" fill=\"#f7f7f7\" stroke=\"#222222\" stroke-width=\"3\"/>\n<text x=\"256.0\" y=\"253.1\" font-size=\"68\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<\/text>\n<line x1=\"114.0\" y1=\"224.0\" x2=\"184.0\" y2=\"224.0\" stroke=\"#1f4fbf\" stroke-width=\"8\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"106.0\" y=\"214.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"end\">E<\/text>\n<path d=\"M330,224 C372,182 418,218 376,258 C350,284 322,270 338,238\" fill=\"none\" stroke=\"#248a3d\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_5_e)\"/>\n<text x=\"394.0\" y=\"288.0\" font-size=\"42\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\">B<\/text>\n<text x=\"256.0\" y=\"336.0\" font-size=\"36\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">F<tspan baseline-shift=\"sub\" font-size=\"68%\">μν<\/tspan><\/text>\n<\/svg>", "svg_icon_caption": "One F object gives rise to E and B component views.", "svg_detail_caption": "The electromagnetic field is the single tensor F_mu_nu; electric and magnetic fields are frame-dependent views of that object."}, "7.7": {"label": "Maxwell's equations", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "Maxwell's equations are the relativistic field equations governing the \\cref{Electromagnetic field}{7.5}. In covariant form they relate the antisymmetric \\cref{Field tensor}{7.2} to the source \\cref{Four-current}{7.6}, while the homogeneous equations express the fact that the field tensor is built from a potential.", "derivation_new": "Maxwell's equations follow by applying the \\cref{Euler-Lagrange equations}{5.3} to the electromagnetic \\cref{Field Lagrangian}{6.3}. With \\(F_{\\mu\\nu}=\\partial_\\mu A_\\nu-\\partial_\\nu A_\\mu\\), a standard electromagnetic Lagrangian density is \\[ \\mathcal L=-\\frac{1}{4\\mu_0}F_{\\mu\\nu}F^{\\mu\\nu}-j_\\mu A^\\mu, \\] using the \\(+---\\) metric convention. Varying the action with respect to the potential \\(A_\\mu\\) gives the sourced Maxwell equation \\[ \\partial_\\mu F^{\\mu\\nu}=\\mu_0 j^\\nu. \\] The second half of Maxwell's equations follows from the definition of \\(F_{\\mu\\nu}\\) itself: \\[ \\partial_\\lambda F_{\\mu\\nu}+\\partial_\\mu F_{\\nu\\lambda}+\\partial_\\nu F_{\\lambda\\mu}=0. \\] Together these equations are local \\cref{Field equations}{6.4}: at each spacetime event they relate field derivatives to the charge and current source at that event.", "explanation_new": "Maxwell's equations are not just four formulas to memorize; they are the local rules governing the electromagnetic field. They connect sources to fields and also allow fields to propagate as waves. In covariant notation, much of the structure becomes shorter: sources enter through the four-current, and the antisymmetric field tensor carries the electric and magnetic components together. If the sources vanish in a region, the equations still have nontrivial wave solutions. That is how light appears as a self-propagating electromagnetic disturbance rather than as a separate kind of object.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_7\">\n<title id=\"title-n7_7\">Maxwell's equations<\/title>\n<defs>\n\n<marker id=\"n7_7_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<rect x=\"58.0\" y=\"210.0\" width=\"84.0\" height=\"84.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"100.0\" y=\"269.7\" font-size=\"52\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<line x1=\"150.0\" y1=\"252.0\" x2=\"214.0\" y2=\"252.0\" stroke=\"#d22f2f\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<rect x=\"226.0\" y=\"196.0\" width=\"112.0\" height=\"112.0\" rx=\"12.0\" fill=\"#edf3ff\" stroke=\"#1f4fbf\" stroke-width=\"3\"/>\n<text x=\"282.0\" y=\"273.1\" font-size=\"62\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#1f4fbf\" text-anchor=\"middle\">F<\/text>\n<line x1=\"346.0\" y1=\"252.0\" x2=\"394.0\" y2=\"252.0\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" marker-end=\"url(#n7_7_arrow)\"/>\n<path d=\"M410,234 C456,214 456,290 410,270\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,218 C456,198 456,306 410,286\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<path d=\"M410,202 C456,182 456,322 410,302\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\"0.82\"/>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\ ated by \\(A_\\mu\\rightarrow A_\\mu+\\partial_\\mu\\Lambda\\) describe the same field tensor. The \\cref{Vector potential}{7.1} therefore contains redundant descriptive freedom. The Lorenz gauge fixes part of that freedom by imposing the Lorentz-covariant scalar condition \\[ \\partial_\\mu A^\\mu=0. \\] With this condition, the potential form of \\cref{Maxwell's equations}{7.7} simplifies to a wave equation with source, schematically \\(\\Box A^\\mu=\\mu_0 j^\\mu\\) in SI conventions.", "explanation_new": "The Lorenz gauge is a choice that makes the potential description cleaner without changing the physical field. Gauge conditions can feel suspicious at first: are we changing the physics? No. We are choosing one representative from many equivalent potentials, much like choosing convenient coordinates. The Lorenz gauge condition \\(\\partial_\\mu A^\\mu=0\\) is especially useful because it respects Lorentz covariance and turns Maxwell's equations for the potential into a wave-equation form. Remember the spelling: Lorenz gauge, not Lorentz transformation.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_6\">\n<title id=\"title-n8_6\">Lorenz gauge<\/title>\n<defs>\n\n<marker id=\"n8_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M72,180 C124,146 174,208 220,170\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<path d=\"M72,234 C124,200 174,262 220,224\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.55\"/>\n<path d=\"M72,288 C124,254 174,316 220,278\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.35\"/>\n<line x1=\"230.0\" y1=\"234.0\" x2=\"286.0\" y2=\"234.0\" str y=\"334.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#222222\" text-anchor=\"middle\">∂<tspan baseline-shift=\"sub\" font-size=\"68%\">μ<\/tspan> A<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan> = 0<\/text>\n<rect x=\"82.0\" y=\"378.0\" width=\"58.0\" height=\"50.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"111.0\" y=\"413.9\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<rect x=\"410.0\" y=\"378.0\" width=\"58.0\" height=\"50.0\" rx=\"12.0\" fill=\"#eef8f0\" stroke=\"#248a3d\" stroke-width=\"3\"/>\n<text x=\"439.0\" y=\"413.9\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#248a3d\" text-anchor=\"middle\">F<\/text>\n<line x1=\"144.0\" y1=\"404.0\" x2=\"406.0\" y2=\"404.0\" stroke=\"#248a3d\" stroke-width=\"3\" stroke-dasharray=\"9 8\" opacity=\"0.55\"/>\n<\/svg>", "svg_icon_caption": "Potential representatives pass through a Lorenz gauge selector.", "svg_detail_caption": "Lorenz gauge is a convenient condition, partial_mu A^mu = 0, selecting one potential description without changing the physical field."}, "8.1": {"label": "Gauge invariance", "layer": "8", "layer_title": "Gauge Symmetry and Interaction", "definition_new": "Gauge invariance is the freedom to change the electromagnetic potential by \\[ A_\\mu\\rightarrow A_\\mu+\\partial_\\mu\\Lambda \\] without changing the physical electromagnetic field. The \\cref{Field tensor}{7.2} remains invariant under this transformation.", "derivation_new": "The invariance follows from the construction of the \\cref{Field tensor}{7.2}. Under \\(A_\\mu\\rightarrow A_\\mu+\\partial_\\mu\\Lambda\\), \\[ F_{\\mu\\nu}\\rightarrow \\partial_\\mu(A_\\nu+\\partial_\\nu\\Lambda)-\\partial_\\nu(A_\\mu+\\partial_\\mu\\Lambda). \\] The added terms cancel because partial derivatives commute: \\[ \\partial_\\mu\\partial_\\nu\\Lambda-\\partial_\\nu\\partial_\\mu\\Lambda=0. \\] Therefore \\(F_{\\mu\\nu}\\), and hence the physical \\cref{Electromagnetic field}{7.5}, is unchanged.", "explanation_new": "Gauge invariance says the potential has redundancy: different \\(A_\\mu\\) fields can produce the same \\(F_{\\mu\\nu}\\). This can be hard to accept because we are used to different mathematical descriptions meaning different physical situations. Here the field tensor is the observable electromagnetic object, and the potential has extra descriptive freedom. An analogy is choosing coordinates on a map: changing coordinates changes the labels, not the terrain. Gauge invariance is deeper than that analogy, but it helps with the first conceptual step: not every change in the potential is a physical change.", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n8_1\">\n<title id=\"title-n8_1\">Gauge invariance<\/title>\n<defs>\n\n<marker id=\"n8_1_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#1f4fbf\"/>\n<\/marker>\n<\/defs>\n<path d=\"M82,178 C128,146 164,192 214,162\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n<path d=\"M82,304 C134,264 172,326 214,290\" fill=\"none\" stroke=\"#1f4fbf\" stroke-width=\"7\" stroke-linecap=\"round\" opacity=\"0.62\"/>\n<path d=\"M124,222 C152,244 152,252 124,276\" fill=\"none\" stroke=\"#c78a00\" stroke-width=\"5\" stroke-linecap=\"round\" marker-end=\"url(#n8_1_arrow)\"/>\n<text x=\"152.0\" y=\"252.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#c78a00\" text-anchor=\"middle\">Λ<\/text>\n<line x1=\"224.0\" y1=\"176.0\" x2=\"332.0\" y2=\"232.0\" stroke=\ caption": "Two gauge-related potentials point to the same F.", "svg_detail_caption": "Gauge invariance means different potentials, such as A_mu and A_mu + partial_mu Lambda, can describe the same electromagnetic field."}, "7.6": {"label": "Four-current", "layer": "7", "layer_title": "Electromagnetic Field", "definition_new": "The four-current \\(j^\\mu\\) combines charge density and current density into one relativistic \\cref{Four-vectors}{4.2}: \\[ j^\\mu=(c\\rho,\\mathbf j). \\] It is the source appearing in covariant \\cref{Maxwell's equations}{7.7}.", "derivation_new": "The four-current is built by packaging local charge density and ordinary current density into a four-vector. Since charge density is the time component of charge flow and \\(\\mathbf j\\) is the spatial flux of charge, the covariant object is \\[ j^\\mu=(c\\rho,j_x,j_y,j_z). \\] Its transformation law is the \\cref{Four-vectors}{4.2} transformation law. Local conservation is expressed by its four-divergence, \\(\\partial_\\mu j^\\mu=0\\), developed in \\cref{Charge conservation}{8.5}.", "explanation_new": "The four-current packages charge density and current density into one relativistic source object. Charge density alone is not enough because different observers disagree about densities and currents when charges are moving. What one observer calls mostly charge density, another may partly describe as current. The four-current keeps the bookkeeping together, just as four-momentum keeps energy and momentum together. In a wire, the lab frame and a frame moving with charges can assign different \\(\\rho\\) and \\(\\mathbf j\\), but they are related as components of \\(j^\\mu\\).", "svg_icon": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_6\">\n<title id=\"title-n7_6\">Four-current<\/title>\n<defs>\n\n<marker id=\"n7_6_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\n<rect x=\"324.0\" y=\"162.0\" width=\"112.0\" height=\"160.0\" rx=\"12.0\" fill=\"#ffeaea\" stroke=\"#d22f2f\" stroke-width=\"3\"/>\n<text x=\"380.0\" y=\"224.0\" font-size=\"38\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<tspan baseline-shift=\"super\" font-size=\"68%\">μ<\/tspan><\/text>\n<line x1=\"342.0\" y1=\"214.0\" x2=\"418.0\" y2=\"214.0\" stroke=\"#d22f2f\" stroke-width=\"4\" stroke-linecap=\"round\" marker-end=\"url(#n7_6_arrow)\"/>\n<circle cx=\"356.0\" cy=\"268.0\" r=\"14.0\" fill=\"#d22f2f\" stroke=\"#222222\" stroke-width=\"2\"/>\n<text x=\"380.0\" y=\"274.0\" font-size=\"32\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\">ρ<\/text>\n<text x=\"382.0\" y=\"204.0\" font-size=\"34\" font-family=\"STIX Two Math, Cambria Math, Times New Roman, serif\" font-style=\"italic\" fill=\"#d22f2f\" text-anchor=\"middle\">J<\/text>\n<\/svg>", "svg_detail": "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"512\" height=\"512\" viewBox=\"0 0 512 512\" role=\"img\" aria-labelledby=\"title-n7_6\">\n<title id=\"title-n7_6\">Four-current<\/title>\n<defs>\n\n<marker id=\"n7_6_axis_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#555555\"/>\n<\/marker>\n<marker id=\"n7_6_arrow\" markerWidth=\"6\" markerHeight=\"6\"\n        refX=\"4\" refY=\"3.0\" orient=\"auto\"\n        markerUnits=\"strokeWidth\">\n  <path d=\"M0,0 L4,3.0 L0,6 Z\" fill=\"#d22f2f\"/>\n<\/marker>\n<\/defs>\
